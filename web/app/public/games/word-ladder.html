<title>Word Ladder</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
    --good:#22c55e; --bad:#ef4444; --gold:#fbbf24;
    --key:#334155; --keyf:#475569;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    touch-action:manipulation; overflow:hidden;
    user-select:none; -webkit-user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{
    width:100%; max-width:430px; height:100%;
    display:flex; flex-direction:column; padding:8px 10px; gap:8px;
  }
  header{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  h1{font-size:20px; margin:0; letter-spacing:.5px;}
  h1 .sub{color:var(--accent);}
  #newBtn{
    background:var(--accent); color:#04121d; border:none; border-radius:10px;
    font-weight:700; font-size:13px; padding:8px 12px; cursor:pointer;
  }
  #newBtn:active{transform:scale(.96);}
  .goal{
    display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--panel); border-radius:12px; padding:8px;
  }
  .gword{display:flex; gap:4px;}
  .gword .t{
    width:30px; height:34px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:18px; text-transform:uppercase;
  }
  .start .t{background:var(--panel2); color:var(--txt);}
  .target .t{background:#3b2f06; color:var(--gold); border:1px solid var(--gold);}
  .arrow{color:var(--muted); font-size:18px; padding:0 2px;}
  .stats{
    display:flex; justify-content:space-around; font-size:12px; color:var(--muted);
    background:var(--panel); border-radius:10px; padding:6px 4px;
  }
  .stats b{color:var(--txt); font-size:15px; display:block; text-align:center;}
  .ladder{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:flex; flex-direction:column; gap:5px; padding:6px 2px; min-height:0;
  }
  .row{display:flex; gap:5px; justify-content:center; align-items:center;}
  .row .t{
    width:42px; height:42px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:22px; text-transform:uppercase;
    background:var(--panel2); color:var(--txt);
  }
  .row.changed .t.chg{background:var(--accent); color:#04121d;}
  .row.win .t{background:var(--good); color:#04200f;}
  .row.startrow .t{background:#1f2b3d; color:var(--muted);}
  /* input row (current typing) */
  .input{display:flex; gap:5px; justify-content:center; align-items:center; padding-top:2px;}
  .input .t{
    width:42px; height:42px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:22px; text-transform:uppercase;
    background:#0b1626; border:2px solid var(--keyf); color:var(--txt);
  }
  .input .t.filled{border-color:var(--accent);}
  #msg{text-align:center; font-size:13px; min-height:18px; font-weight:600;}
  #msg.bad{color:var(--bad);} #msg.good{color:var(--good);} #msg.info{color:var(--muted);}
  /* keyboard */
  .kb{display:flex; flex-direction:column; gap:6px; padding-top:2px;}
  .kbrow{display:flex; gap:5px; justify-content:center;}
  .key{
    flex:1; max-width:34px; height:48px; border:none; border-radius:7px;
    background:var(--key); color:var(--txt); font-size:16px; font-weight:700;
    cursor:pointer; text-transform:uppercase; display:flex; align-items:center; justify-content:center;
    padding:0;
  }
  .key:active{background:var(--keyf);}
  .key.wide{flex:1.6; max-width:none; font-size:12px;}
  .key.enter{background:var(--accent); color:#04121d;}
  .overlay{
    position:fixed; inset:0; background:rgba(2,6,16,.82);
    display:none; align-items:center; justify-content:center; z-index:10; padding:20px;
  }
  .overlay.show{display:flex;}
  .card{
    background:var(--panel); border-radius:16px; padding:22px; text-align:center;
    max-width:320px; width:100%; border:1px solid var(--keyf);
  }
  .card h2{margin:0 0 8px; font-size:26px; color:var(--gold);}
  .card p{margin:6px 0; color:var(--muted); font-size:14px;}
  .card b{color:var(--txt);}
  .card button{
    margin-top:14px; background:var(--accent); color:#04121d; border:none;
    border-radius:10px; font-weight:700; font-size:15px; padding:11px 18px; cursor:pointer; width:100%;
  }
</style>

<div class="wrap">
  <header>
    <h1>Word <span class="sub">Ladder</span></h1>

  <div class="kb" id="kb"></div>
</div>

<div class="overlay" id="overlay">

    <h2 id="winTitle">Solved!</h2>
    <p id="winBody"></p>
    <button id="winBtn">New Puzzle</button>
  </div>
</div>

(function(){
  var arr = RAW.split(/\s+/), seen={};
  for(var i=0;i<arr.length;i++){
    var w = arr[i].toLowerCase().replace(/[^a-z]/g,'');
    if(w.length!==4) continue;
    if(seen[w]) continue;
    seen[w]=true;
    WORDS[w]=true;
    FOUR.push(w);
  }
})();

/* ---------- Graph / BFS over 4-letter words ---------- */
function diff(a,b){ var d=0; for(var i=0;i<a.length;i++) if(a[i]!==b[i]) d++; return d; }

// adjacency built lazily by bucket (wildcard patterns)
var BUCKETS = null;
function buildBuckets(){
  BUCKETS = {};
  for(var i=0;i<FOUR.length;i++){
    var w = FOUR[i];
    for(var p=0;p<4;p++){
      var key = w.slice(0,p)+'*'+w.slice(p+1);
      (BUCKETS[key] || (BUCKETS[key]=[])).push(w);
    }
  }
}
function neighbors(w){
  if(!BUCKETS) buildBuckets();
  var out={}, list=[];
  for(var p=0;p<4;p++){
    var key=w.slice(0,p)+'*'+w.slice(p+1);
    var b=BUCKETS[key]; if(!b) continue;
    for(var j=0;j<b.length;j++){
      var n=b[j];
      if(n!==w && !out[n]){ out[n]=true; list.push(n); }
    }
  }
  return list;
}

// BFS shortest distance from start; returns dist map
function bfsFrom(start){
  var dist={}; dist[start]=0;
  var q=[start], head=0;
  while(head<q.length){
    var cur=q[head++]; var d=dist[cur]+1;
    var ns=neighbors(cur);
    for(var i=0;i<ns.length;i++){
      var n=ns[i];
      if(dist[n]===undefined){ dist[n]=d; q.push(n); }
    }
  }
  return dist;
}

/* ---------- Puzzle generation: guaranteed solvable ---------- */
var state = null;

function newPuzzle(){
  var tries=0, start, target, dist, best;
  // pick a start word that has a non-trivial reachable target
  while(tries<400){
    tries++;
    start = FOUR[(Math.random()*FOUR.length)|0];
    dist = bfsFrom(start);
    // collect targets at distance between 3 and 6 (nice difficulty)
    var cand=[];
    for(var w in dist){
      var d=dist[w];
      if(d>=3 && d<=6) cand.push(w);
    }
    if(cand.length){
      target = cand[(Math.random()*cand.length)|0];
      best = dist[target];
      break;
    }
  }
  if(!target){
    // fallback hand-picked guaranteed pair
    start='cold'; target='warm';
    dist=bfsFrom(start); best=dist[target]||4;
  }
  state = {
    start: start,
    target: target,
    best: best,
    chain: [start],
    cur: ''        // current typed buffer
  };
  render();
  setMsg('Change one letter to reach '+target.toUpperCase()+'.', 'info');
}

/* ---------- Rendering ---------- */
var el = function(id){ return document.getElementById(id); };

function wordTiles(word, container, cls){
  container.innerHTML='';
  for(var i=0;i<word.length;i++){
    var t=document.createElement('div');
    t.className='t'+(cls?(' '+cls):'');
    t.textContent=word[i];
    container.appendChild(t);
  }
}

function render(){
  // goal
  wordTiles(state.start, el('goalStart'));
  wordTiles(state.target, el('goalTarget'));
  // stats
  el('stMoves').textContent = state.chain.length-1;
  el('stBest').textContent = state.best;
  var left = state.best - (state.chain.length-1);
  el('stLeft').textContent = (left>0? left : 0);

  // ladder
  var lad = el('ladder');
  lad.innerHTML='';
  for(var i=0;i<state.chain.length;i++){
    var word=state.chain[i];
    var row=document.createElement('div');
    row.className='row';
    if(i===0) row.className+=' startrow';
    if(word===state.target) row.className+=' win';
    var prev = i>0 ? state.chain[i-1] : null;
    for(var k=0;k<4;k++){
      var t=document.createElement('div');
      t.className='t';
      if(prev && prev[k]!==word[k]) t.className+=' chg';
      t.textContent=word[k];
      row.appendChild(t);
    }
    if(prev) row.classList.add('changed');
    lad.appendChild(row);
  }
  lad.scrollTop = lad.scrollHeight;

  // input row
  var inp = el('inputRow');
  inp.innerHTML='';
  var done = state.chain[state.chain.length-1]===state.target;
  if(done){ inp.style.display='none'; }
  else{
    inp.style.display='flex';
    for(var c=0;c<4;c++){
      var t=document.createElement('div');
      t.className='t';
      if(state.cur[c]){ t.className+=' filled'; t.textContent=state.cur[c]; }
      else t.textContent='';
      inp.appendChild(t);
    }
  }
}

function setMsg(txt, cls){
  var m=el('msg');
  m.textContent=txt;
  m.className=cls||'info';
}

/* ---------- Audio ---------- */
var AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq, dur, type, vol){
  var c=ac(); if(!c) return;
  try{
    var o=c.createOscillator(), g=c.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.value=vol||0.07;
    o.connect(g); g.connect(c.destination);
    var now=c.currentTime;
    o.start(now);
    g.gain.setValueAtTime(g.gain.value, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.stop(now+dur);
  }catch(e){}
}
function sGood(){ beep(660,0.12,'triangle',0.08); }
function sBad(){ beep(150,0.18,'sawtooth',0.09); }
function sKey(){ beep(420,0.04,'square',0.04); }
function sWin(){ beep(523,0.12,'triangle',0.09); setTimeout(function(){beep(659,0.12,'triangle',0.09);},120); setTimeout(function(){beep(784,0.2,'triangle',0.1);},260); }

/* ---------- Input logic ---------- */
function pressLetter(ch){
  if(isDone()) return;
  if(state.cur.length>=4) return;
  state.cur += ch.toLowerCase();
  sKey();
  render();
}
function backspace(){
  if(isDone()) return;
  if(state.cur.length===0) return;
  state.cur = state.cur.slice(0,-1);
  render();
}
function isDone(){ return state.chain[state.chain.length-1]===state.target; }

function submit(){
  if(isDone()) return;
  var w = state.cur;
  if(w.length!==4){ setMsg('Enter a 4-letter word.','bad'); sBad(); return; }
  var prev = state.chain[state.chain.length-1];
  if(w===prev){ setMsg('Same word — change one letter.','bad'); sBad(); return; }
  var d = diff(prev, w);
  if(d!==1){
    setMsg('Change exactly ONE letter ('+d+' changed).','bad'); sBad();
    shake(); return;
  }
  if(!WORDS[w]){
    setMsg('"'+w.toUpperCase()+'" is not in the dictionary.','bad'); sBad();
    shake(); return;
  }
  // valid move
  state.chain.push(w);
  state.cur='';
  if(w===state.target){
    render();
    win();
    return;
  }
  sGood();
  setMsg('Good! Keep going to '+state.target.toUpperCase()+'.','good');
  render();
}

function shake(){
  var inp=el('inputRow');
  inp.animate ? inp.animate(
    [{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],
    {duration:220}
  ) : 0;
}

function win(){
  sWin();
  var moves = state.chain.length-1;
  var bt=el('winTitle'), bb=el('winBody');
  bt.textContent='Solved!';
  var msg = 'You went '+state.start.toUpperCase()+' → '+state.target.toUpperCase()+
            ' in <b>'+moves+'</b> moves.<br>Optimal: <b>'+state.best+'</b>.';
  if(moves<=state.best) msg += '<br>🏆 Perfect — optimal solution!';
  bb.innerHTML=msg;
  el('overlay').classList.add('show');
  setMsg('Solved in '+moves+' moves!','good');
}

/* ---------- Keyboard UI ---------- */
function buildKeyboard(){
  var rows=['qwertyuiop','asdfghjkl','zxcvbnm'];
  var kb=el('kb'); kb.innerHTML='';
  for(var r=0;r<rows.length;r++){
    var row=document.createElement('div'); row.className='kbrow';
    if(r===2){
      row.appendChild(makeKey('⏎','enter wide','ENTER'));
    }
    for(var i=0;i<rows[r].length;i++){
      row.appendChild(makeKey(rows[r][i],'',rows[r][i]));
    }
    if(r===2){
      row.appendChild(makeKey('⌫','wide','BACK'));
    }
    kb.appendChild(row);
  }
}
function makeKey(label, extra, action){
  var b=document.createElement('button');
  b.className='key'+(extra?(' '+extra):'');
  if(action==='ENTER') b.className+=' enter';
  b.textContent=label;
  b.setAttribute('type','button');
  b.addEventListener('click', function(e){
    e.preventDefault();
    if(ac() && ac().state==='suspended') ac().resume();
    if(action==='ENTER') submit();
    else if(action==='BACK') backspace();
    else pressLetter(action);
  });
  // prevent double-tap zoom / focus stealing
  b.addEventListener('touchend', function(e){ e.preventDefault(); }, {passive:false});
  return b;
}

/* physical keyboard */
document.addEventListener('keydown', function(e){
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  var k=e.key;
  if(k==='Enter'){ e.preventDefault(); submit(); }
  else if(k==='Backspace'){ e.preventDefault(); backspace(); }
  else if(/^[a-zA-Z]$/.test(k)){ e.preventDefault(); pressLetter(k); }
});

/* buttons */
el('newBtn').addEventListener('click', function(){ el('overlay').classList.remove('show'); newPuzzle(); });
el('winBtn').addEventListener('click', function(){ el('overlay').classList.remove('show'); newPuzzle(); });

/* prevent gesture zoom */
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
document.addEventListener('dblclick', function(e){ e.preventDefault(); }, {passive:false});

/* ---------- init ---------- */
buildKeyboard();
newPuzzle();

})();
</script>
