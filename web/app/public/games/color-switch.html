<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Color Switch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0d0d14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    pointer-events: none;
    z-index: 5;
  }
  #title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0.9;
    text-transform: uppercase;
  }
  #scores { text-align: right; font-size: 13px; line-height: 1.4; }
  #scores b { font-size: 20px; }
  #scores span { opacity: 0.65; }
  canvas {
    display: block;
    touch-action: none;
    border-radius: 14px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    background: #15151f;
  }
  #restart {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    padding: 8px 22px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }
  #restart:active { background: rgba(255,255,255,0.25); }
</style>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="Color Switch">
    <link rel="apple-touch-icon" href="/games/icons/color-switch.svg">

    <script>
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/games/games-sw.js').catch(function(){})})}
    // Back-to-all-games pill (top-left) + one-tap install button (bottom-right).
    // Positioned with env(safe-area-inset-*) so they clear the notch/Dynamic Island.
    window.addEventListener('DOMContentLoaded',function(){var a=document.createElement('a');a.href='/games';a.textContent='‹ Games';a.setAttribute('style','position:fixed;left:calc(env(safe-area-inset-left,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;padding:6px 12px;border-radius:20px;background:rgba(15,23,42,.6);color:#fff;font:600 13px system-ui,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);touch-action:manipulation');document.body.appendChild(a);});
    (function(){var dp=null,btn=null;function mk(){btn=document.createElement('button');btn.textContent='⬇ Install';btn.setAttribute('style','position:fixed;right:calc(env(safe-area-inset-right,0px) + 12px);bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:2147483647;padding:10px 16px;border:none;border-radius:24px;background:#06B6D4;color:#fff;font:600 14px system-ui,sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation');btn.onclick=function(){if(!dp)return;dp.prompt();dp.userChoice.finally(function(){dp=null;btn.remove();btn=null;});};document.body.appendChild(btn);}window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;if(!btn)mk();});window.addEventListener('appinstalled',function(){if(btn){btn.remove();btn=null;}});})();
    </script>

</head>
<body>
<div id="wrap">
  <div id="hud">
    <div id="title">Color Switch</div>
    <div id="scores"><b id="score">0</b><br><span>best <span id="best">0</span></span></div>
  </div>
  <canvas id="c"></canvas>
  <button id="restart">Restart</button>
</div>
<script>
(function(){
  "use strict";

  var COLORS = ["#ff3b6b", "#ffd23b", "#3bd6ff", "#6bff3b"]; // pink, yellow, cyan, green
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var scoreEl = document.getElementById("score");
  var bestEl = document.getElementById("best");
  var restartBtn = document.getElementById("restart");

  // Logical world is a fixed-width column; we scale to fit the screen.
  var W = 360;      // logical width
  var H = 640;      // logical height (visible portion)
  var DPR = 1;
  var scale = 1;    // css px per logical px
  var pxW = W, pxH = H;

  function resize() {
    var availW = window.innerWidth;
    var availH = window.innerHeight;
    // portrait column with aspect ratio W/H
    var aspect = W / H;
    var cssW = availW;
    var cssH = cssW / aspect;
    if (cssH > availH) {
      cssH = availH;
      cssW = cssH * aspect;
    }
    scale = cssW / W;
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    pxW = Math.round(cssW * DPR);
    pxH = Math.round(cssH * DPR);
    canvas.width = pxW;
    canvas.height = pxH;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
  }
  window.addEventListener("resize", resize);

  // ---- Audio ----
  var actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    return actx;
  }
  function beep(freq, dur, type, vol) {
    var a = audio();
    if (!a) return;
    if (a.state === "suspended") a.resume();
    var o = a.createOscillator();
    var g = a.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    g.gain.value = vol == null ? 0.12 : vol;
    o.connect(g); g.connect(a.destination);
    var t = a.currentTime;
    g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur);
  }

  // ---- Game state ----
  var GRAV = 0.55;
  var FLAP = -9.2;
  var BALL_R = 11;
  var ballX = W / 2;

  var state, ball, obstacles, cameraY, score, best, spawnY, frame;

  best = parseInt(localStorage.getItem("colorswitch_best") || "0", 10) || 0;
  bestEl.textContent = best;

  // An obstacle = a rotating ring at world Y, made of 4 colored arcs.
  // Ball passes through only where its current color matches the arc it crosses.
  function makeObstacle(worldY) {
    var ringColors = COLORS.slice();
    // rotate the color order randomly so rings differ
    var off = Math.floor(Math.random() * 4);
    ringColors = ringColors.slice(off).concat(ringColors.slice(0, off));
    return {
      y: worldY,
      radius: 74,
      thick: 16,
      angle: Math.random() * Math.PI * 2,
      speed: (Math.random() < 0.5 ? 1 : -1) * (0.018 + Math.random() * 0.014),
      colors: ringColors,   // 4 arcs, each PI/2
      passed: false,
      switchTaken: false    // color-switch pickup sits just above ring center
    };
  }

  function reset() {
    score = 0;
    frame = 0;
    ball = {
      x: ballX,
      y: H - 120,          // world Y (world grows downward; we climb to smaller Y)
      vy: 0,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    };
    cameraY = ball.y;      // map the ball to FOCUS_LINE initially
    obstacles = [];
    // first obstacle a bit above the ball, then spaced upward
    spawnY = ball.y - 220;
    for (var i = 0; i < 6; i++) {
      obstacles.push(makeObstacle(spawnY));
      spawnY -= 240;
    }
    state = "ready"; // ready -> playing -> dead
    scoreEl.textContent = "0";
    draw();
  }

  function startOrFlap() {
    if (state === "ready") {
      state = "playing";
      ball.vy = FLAP;
      beep(520, 0.08, "square", 0.1);
    } else if (state === "playing") {
      ball.vy = FLAP;
      beep(520, 0.08, "square", 0.08);
    } else if (state === "dead") {
      reset();
    }
  }

  // worldY -> screen Y. The ball is held near a fixed screen line as it climbs.
  // cameraY = world Y that maps to FOCUS_LINE on screen.
  var FOCUS_LINE = H * 0.62;
  function screenY(wy) { return wy - cameraY + FOCUS_LINE; }

  function update() {
    if (state !== "playing") return;
    frame++;

    ball.vy += GRAV;
    ball.y += ball.vy;

    // camera follows ball upward only (never scrolls back down past progress)
    var targetCam = ball.y;
    if (targetCam < cameraY) cameraY = targetCam;
    // also keep ball from being above focus when falling? camera only moves up.

    // rotate obstacles
    for (var i = 0; i < obstacles.length; i++) {
      obstacles[i].angle += obstacles[i].speed;
    }

    // collisions & scoring
    for (var j = 0; j < obstacles.length; j++) {
      var ob = obstacles[j];
      checkObstacle(ob);
    }

    // color-switch pickups: each obstacle has one at its center-ish, grab to recolor
    for (var k = 0; k < obstacles.length; k++) {
      var o = obstacles[k];
      if (!o.switchTaken) {
        var sx = ballX, sy = o.y - o.radius - 30; // pickup floats above ring
        var dx = ball.x - sx, dy = ball.y - sy;
        if (dx*dx + dy*dy < (BALL_R + 12) * (BALL_R + 12)) {
          o.switchTaken = true;
          var nc = ball.color;
          while (nc === ball.color) nc = COLORS[Math.floor(Math.random()*COLORS.length)];
          ball.color = nc;
          beep(880, 0.12, "sine", 0.12);
        }
      }
    }

    // death: ball fell below the bottom of the screen
    if (screenY(ball.y) > H + 40) {
      die();
      return;
    }

    // recycle obstacles that are now well below the camera/screen and spawn new ones above
    for (var m = 0; m < obstacles.length; m++) {
      if (screenY(obstacles[m].y) > H + 120) {
        // remove (mark) — we'll filter after
        obstacles[m]._remove = true;
      }
    }
    var kept = [];
    for (var n = 0; n < obstacles.length; n++) {
      if (!obstacles[n]._remove) kept.push(obstacles[n]);
    }
    obstacles = kept;
    // ensure enough obstacles ahead (above = smaller y)
    var topMost = Infinity;
    for (var p = 0; p < obstacles.length; p++) topMost = Math.min(topMost, obstacles[p].y);
    while (topMost === Infinity || topMost > cameraY - H * 1.5) {
      var newY = (isFinite(topMost) ? topMost : ball.y - 220) - 240;
      obstacles.push(makeObstacle(newY));
      topMost = newY;
    }
  }

  // The ring has 4 colored arcs each spanning PI/2, starting at ob.angle.
  // Determine which arc index a given angle theta falls into.
  function arcColorAt(ob, theta) {
    var rel = theta - ob.angle;
    rel = rel % (Math.PI * 2);
    if (rel < 0) rel += Math.PI * 2;
    var idx = Math.floor(rel / (Math.PI / 2)) % 4;
    return ob.colors[idx];
  }

  function checkObstacle(ob) {
    // distance from ball center to ring center
    var dx = ball.x - ballX;          // ball.x is fixed = ballX, so dx ~ 0
    var dy = ball.y - ob.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var inner = ob.radius - ob.thick / 2 - BALL_R;
    var outer = ob.radius + ob.thick / 2 + BALL_R;

    // scoring: ball center crossed above the ring center (climbed past it)
    if (!ob.passed && ball.y < ob.y - 4) {
      ob.passed = true;
      score++;
      scoreEl.textContent = score;
      beep(660, 0.07, "triangle", 0.1);
    }

    // collision only when ball overlaps the ring band
    if (dist > inner && dist < outer) {
      // angle of the ball relative to ring center
      var theta = Math.atan2(dy, dx);
      var arcCol = arcColorAt(ob, theta);
      if (arcCol !== ball.color) {
        die();
      }
    }
  }

  function die() {
    if (state === "dead") return;
    state = "dead";
    beep(180, 0.3, "sawtooth", 0.16);
    setTimeout(function(){ beep(120, 0.4, "sawtooth", 0.14); }, 90);
    if (score > best) {
      best = score;
      localStorage.setItem("colorswitch_best", String(best));
      bestEl.textContent = best;
    }
  }

  // ---- Rendering ----
  function draw() {
    ctx.save();
    ctx.scale(DPR * scale, DPR * scale);
    // background
    ctx.fillStyle = "#15151f";
    ctx.fillRect(0, 0, W, H);

    // subtle vertical guide
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ballX, 0); ctx.lineTo(ballX, H); ctx.stroke();

    // obstacles
    for (var i = 0; i < obstacles.length; i++) {
      drawObstacle(obstacles[i]);
    }

    // ball
    var by = screenY(ball.y);
    ctx.beginPath();
    ctx.arc(ball.x, by, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = ball.color;
    ctx.shadowColor = ball.color;
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowBlur = 0;
    // glossy highlight
    ctx.beginPath();
    ctx.arc(ball.x - 3, by - 3, BALL_R * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.fill();

    // overlays
    if (state === "ready") {
      banner("TAP TO START", "tap / click / space to hop", false);
    } else if (state === "dead") {
      banner("GAME OVER", "score " + score + "   best " + best + "\nTAP TO RESTART", true);
    }

    ctx.restore();
  }

  function drawObstacle(ob) {
    var cy = screenY(ob.y);
    if (cy < -120 || cy > H + 120) return;
    var cx = ballX;
    ctx.lineWidth = ob.thick;
    ctx.lineCap = "butt";
    for (var i = 0; i < 4; i++) {
      var a0 = ob.angle + i * (Math.PI / 2);
      var a1 = a0 + Math.PI / 2;
      ctx.beginPath();
      ctx.strokeStyle = ob.colors[i];
      ctx.arc(cx, cy, ob.radius, a0, a1);
      ctx.stroke();
    }
    // color-switch pickup floating above the ring
    if (!ob.switchTaken) {
      var sy = screenY(ob.y - ob.radius - 30);
      var t = (frame % 60) / 60;
      var pr = 8 + Math.sin(t * Math.PI * 2) * 1.5;
      var grad = ctx.createConicGradient ? null : null;
      ctx.save();
      // draw a 4-color pie to signal "switch"
      for (var q = 0; q < 4; q++) {
        ctx.beginPath();
        ctx.moveTo(cx, sy);
        ctx.arc(cx, sy, pr, q * Math.PI / 2, (q + 1) * Math.PI / 2);
        ctx.closePath();
        ctx.fillStyle = COLORS[q];
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function banner(big, small, dim) {
    if (dim) {
      ctx.fillStyle = "rgba(8,8,14,0.62)";
      ctx.fillRect(0, 0, W, H);
    }
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = "700 30px -apple-system, sans-serif";
    ctx.fillText(big, W / 2, H * 0.42);
    ctx.font = "500 15px -apple-system, sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    var lines = small.split("\n");
    for (var i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], W / 2, H * 0.42 + 34 + i * 22);
    }
  }

  // ---- Loop ----
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // ---- Input ----
  function onTap(e) {
    if (e) { e.preventDefault(); }
    startOrFlap();
  }
  window.addEventListener("touchstart", onTap, { passive: false });
  window.addEventListener("mousedown", function(e){
    if (e.target === restartBtn) return;
    onTap(e);
  });
  window.addEventListener("keydown", function(e){
    if (e.code === "Space" || e.code === "ArrowUp" || e.key === " ") {
      e.preventDefault();
      startOrFlap();
    }
  });
  restartBtn.addEventListener("click", function(e){
    e.preventDefault();
    e.stopPropagation();
    reset();
  });
  // block gesture scroll/zoom
  document.addEventListener("touchmove", function(e){ e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", function(e){ e.preventDefault(); }, { passive: false });

  // ---- Boot ----
  resize();
  reset();
  loop();
})();
</script>
</body>
</html>
