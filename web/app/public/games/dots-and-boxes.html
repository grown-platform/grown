<style>

    flex: 1;

  }
  canvas {

  }
  #controls {
    display: flex;
    gap: 8px;
    align-items: center;

  select, button {

  #overlay {

    align-items: center;

    background: rgba(8,10,15,0.82);

  }
  #overlay.show { display: flex; }
  #card {
    background: #1c2230;

  }

  #card p { font-size: 15px; opacity: 0.85; margin-bottom: 18px; }
  #card button { width: 100%; padding: 13px; }
  #modeOverlay {
    position: fixed;
    inset: 0;

    align-items: center;

    background: rgba(8,10,15,0.82);

    backdrop-filter: blur(3px);
  }
  #modeOverlay.show { display: flex; }
  #modeCard {
    background: #1c2230;

  #modeCard .modeBtns { display: flex; flex-direction: column; gap: 12px; }
  #modeCard button { width: 100%; padding: 13px; }

<script src="/games/game-multiplayer.js?v=2"></script>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("board");
  var ctx = canvas.getContext("2d");
  var scoresEl = document.getElementById("scores");
  var turnEl = document.getElementById("turn");
  var sizeSel = document.getElementById("size");
  var overlay = document.getElementById("overlay");
  var resTitle = document.getElementById("resTitle");
  var resText = document.getElementById("resText");
  var modeOverlay = document.getElementById("modeOverlay");

  var mode = "ai"; // "ai" = vs computer (P1 human), "2p" = pass-and-play, "online" = networked

  // ---- Player model (generalized to N players) ----
  // Players are numbered 1..playerCount. `current` is the player whose turn it
  // is. Local modes always use 2 players (1 & 2). Online uses 2..4, where seat S
  // (0-based) maps to player number S+1 and seat 0 (host) goes first.
  var playerCount = 2;  // number of players this match
  var mySide = 1;       // which player number this client controls when online
  var onlineSize = 4;   // shared (host-chosen) board size for online matches
  var onlinePeerLeft = false; // true once a player drops mid-match

  // Distinct color per player (index 0 = player 1). Up to 4 players online.
  var COLORS = [
    { line: "#ff5c7a", fill: "rgba(255,92,122,0.22)", glow: "rgba(255,92,122,0.4)", name: "Pink" },
    { line: "#4db8ff", fill: "rgba(77,184,255,0.22)", glow: "rgba(77,184,255,0.4)", name: "Blue" },
    { line: "#5ddf8e", fill: "rgba(93,223,142,0.22)", glow: "rgba(93,223,142,0.4)", name: "Green" },
    { line: "#ffd84d", fill: "rgba(255,216,77,0.22)", glow: "rgba(255,216,77,0.4)", name: "Gold" },
  ];
  function pColor(player) { return COLORS[(player - 1) % COLORS.length]; }

  // In 2p both players are human, so the current player is always human.
  // In ai mode only player 1 is human. Online: only your own side is human.
  function isHumanTurn() {
    if (mode === "online") return current === mySide;
    return mode === "2p" ? true : current === 1;
  }
  function sideName(player) {
    if (mode === "online") {
      return (player === mySide ? "You (" + pColor(player).name + ")" : "Player " + player);
    }
    if (mode === "2p") return player === 1 ? "Player 1" : "Player 2";
    return player === 1 ? "You" : "CPU";
  }
  function shortName(player) {
    if (mode === "online") return (player === mySide ? "You" : "P" + player);
    if (mode === "2p") return "P" + player;
    return player === 1 ? "You" : "CPU";
  }

  // Score-card DOM elements, rebuilt for the current player count.
  var cardEls = []; // [{ box, val }] indexed by player-1
  function buildScoreCards() {
    scoresEl.innerHTML = "";
    cardEls = [];
    for (var p = 1; p <= playerCount; p++) {
      var col = pColor(p);
      var box = document.createElement("div");
      box.className = "score";
      box.style.setProperty("--c", col.line);
      box.style.setProperty("--glow", col.glow);
      var nm = document.createElement("div");
      nm.className = "name";
      nm.textContent = shortName(p);
      var val = document.createElement("div");
      val.className = "val";
      val.textContent = "0";
      box.appendChild(nm);
      box.appendChild(val);
      scoresEl.appendChild(box);
      cardEls.push({ box: box, val: val, name: nm });
    }
  }

  // ---- Game state ----
  var N;            // boxes per side
  // Edges represented as two arrays:
  //   hEdges[r][c]: horizontal edge below... actually horizontal lines at row r (0..N), col c (0..N-1)
  //   vEdges[r][c]: vertical lines at row r (0..N-1), col c (0..N)
  var hEdges, vEdges;   // boolean: drawn?
  var hOwner, vOwner;   // player number who drew it (for line color) 1..count
  var owner;            // owner[r][c] of box (0 none, else player number)
  var current;          // player number whose turn it is (1..playerCount)
  var gameOver;
  var busy;             // input locked during cpu move / animation

  // geometry (pixels)
  var dotR, gap, ox, oy, cellPx;

  function init(n) {
    N = n;
    hEdges = []; hOwner = [];
    vEdges = []; vOwner = [];
    owner = [];
    for (var r = 0; r <= N; r++) {
      var hr = [], hor = [];
      for (var c = 0; c < N; c++) { hr.push(false); hor.push(0); }
      hEdges.push(hr); hOwner.push(hor);
    }
    for (var r2 = 0; r2 < N; r2++) {
      var vr = [], vor = [];
      for (var c2 = 0; c2 <= N; c2++) { vr.push(false); vor.push(0); }
      vEdges.push(vr); vOwner.push(vor);
      var orow = [];
      for (var c3 = 0; c3 < N; c3++) orow.push(0);
      owner.push(orow);
    }
    current = 1;
    gameOver = false;
    busy = false;
    overlay.classList.remove("show");
    buildScoreCards();
    updateUI();
    resize();
  }

  // ---- Layout / drawing ----
  function resize() {
    var wrap = document.getElementById("boardWrap");
    var avail = Math.min(wrap.clientWidth, wrap.clientHeight);
    if (avail <= 0) avail = Math.min(window.innerWidth - 20, 480);
    var px = Math.max(160, Math.floor(avail) - 4);
    var dpr = window.devicePixelRatio || 1;

    canvas.style.width = px + "px";
    canvas.style.height = px + "px";
    canvas.width = Math.round(px * dpr);
    canvas.height = Math.round(px * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var margin = Math.round(px * 0.07);
    ox = margin; oy = margin;
    cellPx = (px - margin * 2) / N;
    gap = cellPx;
    dotR = Math.max(3, Math.min(7, cellPx * 0.09));
    draw();
  }

  function dotXY(r, c) {
    return { x: ox + c * cellPx, y: oy + r * cellPx };
  }

  function draw() {
    var w = canvas.width / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, w);

    // filled boxes
    for (var r = 0; r < N; r++) {
      for (var c = 0; c < N; c++) {
        if (owner[r][c]) {
          var p = dotXY(r, c);
          ctx.fillStyle = pColor(owner[r][c]).fill;
          ctx.fillRect(p.x, p.y, cellPx, cellPx);
        }
      }
    }

    var lineW = Math.max(3, cellPx * 0.085);

    // undrawn edge hints (faint)
    ctx.lineWidth = Math.max(1.5, lineW * 0.4);
    ctx.lineCap = "round";
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    drawEdges(false);

    // drawn edges (colored)
    ctx.lineWidth = lineW;
    drawEdges(true);

    // dots
    ctx.fillStyle = "#cdd6e2";
    for (var rr = 0; rr <= N; rr++) {
      for (var cc = 0; cc <= N; cc++) {
        var d = dotXY(rr, cc);
        ctx.beginPath();
        ctx.arc(d.x, d.y, dotR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawEdges(drawnOnes) {
    var r, c, a, b;
    // horizontal
    for (r = 0; r <= N; r++) {
      for (c = 0; c < N; c++) {
        if (hEdges[r][c] !== drawnOnes) continue;
        a = dotXY(r, c); b = dotXY(r, c + 1);
        if (drawnOnes) ctx.strokeStyle = pColor(hOwner[r][c]).line;
        seg(a, b);
      }
    }
    // vertical
    for (r = 0; r < N; r++) {
      for (c = 0; c <= N; c++) {
        if (vEdges[r][c] !== drawnOnes) continue;
        a = dotXY(r, c); b = dotXY(r + 1, c);
        if (drawnOnes) ctx.strokeStyle = pColor(vOwner[r][c]).line;
        seg(a, b);
      }
    }
  }

  function seg(a, b) {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // ---- Edge model helpers ----
  // An edge is { type:'h'|'v', r, c }
  function edgeDrawn(e) {
    return e.type === "h" ? hEdges[e.r][e.c] : vEdges[e.r][e.c];
  }
  function setEdge(e, player) {
    if (e.type === "h") { hEdges[e.r][e.c] = true; hOwner[e.r][e.c] = player; }
    else { vEdges[e.r][e.c] = true; vOwner[e.r][e.c] = player; }
  }

  // count drawn sides of box (r,c); optionally treating a hypothetical edge as drawn
  function boxSides(r, c) {
    var n = 0;
    if (hEdges[r][c]) n++;
    if (hEdges[r + 1][c]) n++;
    if (vEdges[r][c]) n++;
    if (vEdges[r][c + 1]) n++;
    return n;
  }

  // Boxes adjacent to an edge
  function adjacentBoxes(e) {
    var res = [];
    if (e.type === "h") {
      if (e.r - 1 >= 0) res.push({ r: e.r - 1, c: e.c });
      if (e.r < N) res.push({ r: e.r, c: e.c });
    } else {
      if (e.c - 1 >= 0) res.push({ r: e.r, c: e.c - 1 });
      if (e.c < N) res.push({ r: e.r, c: e.c });
    }
    return res;
  }

  // all undrawn edges
  function freeEdges() {
    var list = [];
    var r, c;
    for (r = 0; r <= N; r++)
      for (c = 0; c < N; c++)
        if (!hEdges[r][c]) list.push({ type: "h", r: r, c: c });
    for (r = 0; r < N; r++)
      for (c = 0; c <= N; c++)
        if (!vEdges[r][c]) list.push({ type: "v", r: r, c: c });
    return list;
  }

  // ---- Play a move ----
  // Returns number of boxes completed by this move.
  function applyMove(e, player) {
    setEdge(e, player);
    var boxes = adjacentBoxes(e);
    var completed = 0;
    for (var i = 0; i < boxes.length; i++) {
      var b = boxes[i];
      if (owner[b.r][b.c] === 0 && boxSides(b.r, b.c) === 4) {
        owner[b.r][b.c] = player;
        completed++;
      }
    }
    return completed;
  }

  // Per-player box counts, indexed by player-1 (length === playerCount).
  function scores() {
    var arr = [];
    for (var i = 0; i < playerCount; i++) arr.push(0);
    var claimed = 0;
    for (var r = 0; r < N; r++)
      for (var c = 0; c < N; c++) {
        var o = owner[r][c];
        if (o >= 1 && o <= playerCount) { arr[o - 1]++; claimed++; }
      }
    arr.claimed = claimed;
    return arr;
  }

  function totalBoxes() { return N * N; }

  function isFull() {
    return scores().claimed === totalBoxes();
  }

  // Index (0-based) of the leading player; ties broken by lowest player number.
  // Returns { tie:bool, leaders:[playerNumbers], top:count }.
  function standings() {
    var s = scores();
    var top = -1;
    for (var i = 0; i < s.length; i++) if (s[i] > top) top = s[i];
    var leaders = [];
    for (var j = 0; j < s.length; j++) if (s[j] === top) leaders.push(j + 1);
    return { scores: s, top: top, leaders: leaders, tie: leaders.length > 1 };
  }

  function updateUI() {
    var s = scores();
    for (var i = 0; i < cardEls.length; i++) {
      cardEls[i].val.textContent = s[i];
      cardEls[i].box.classList.toggle("active", current === i + 1 && !gameOver);
    }
    if (gameOver) {
      turnEl.textContent = "Game over";
    } else if (mode === "online") {
      turnEl.textContent = current === mySide
        ? "Your turn — tap a line"
        : sideName(current) + "'s turn…";
    } else if (mode === "2p") {
      turnEl.textContent = sideName(current) + " — tap a line";
    } else {
      turnEl.textContent = current === 1 ? "Your turn — tap a line" : "CPU is thinking…";
    }
  }

  function finish() {
    gameOver = true;
    updateUI();
    var st = standings();
    if (st.tie) {
      if (mode === "online" && st.leaders.indexOf(mySide) >= 0) resTitle.textContent = "It's a tie — you share the lead!";
      else resTitle.textContent = "It's a tie!";
      resTitle.style.color = "#e8edf2";
    } else {
      var win = st.leaders[0];
      if (mode === "online") resTitle.textContent = win === mySide ? "You win!" : sideName(win) + " wins!";
      else if (mode === "2p") resTitle.textContent = sideName(win) + " wins!";
      else resTitle.textContent = win === 1 ? "You win!" : "CPU wins";
      resTitle.style.color = pColor(win).line;
    }
    // Final standings, highest first.
    var s = st.scores;
    var order = [];
    for (var i = 0; i < s.length; i++) order.push(i + 1);
    order.sort(function (a, b) { return s[b - 1] - s[a - 1] || a - b; });
    resText.textContent = order.map(function (p) {
      return sideName(p) + " " + s[p - 1];
    }).join("  •  ");

    // Online: host-only rematch (other seats just see the result). After a peer
    // left, anyone can start a new game.
    if (mode === "online") {
      var ob = document.getElementById("againBtn");
      if (onlinePeerLeft) { ob.textContent = "New game"; ob.style.display = ""; }
      else { ob.textContent = "Rematch"; ob.style.display = (mySide === 1 ? "" : "none"); }
    } else {
      var ob2 = document.getElementById("againBtn");
      ob2.textContent = "Play Again"; ob2.style.display = "";
    }
    setTimeout(function () { overlay.classList.add("show"); beepEnd(); }, 350);
  }

  // ---- Turn flow ----
  function humanMove(e) {
    if (busy || gameOver || !isHumanTurn()) return;
    if (edgeDrawn(e)) return;
    var mover = current;
    // Broadcast BEFORE committing so every peer applies the exact same edge and
    // runs the identical commitMove() logic (extra-turn/score/turn-advance),
    // keeping `current` in sync on all peers.
    if (mode === "online") {
      GameMP.send({ action: "edge", seat: GameMP.seat(), side: mover, t: e.type, r: e.r, c: e.c });
    }
    commitMove(e, mover);
  }

  // Advance to the next seat (player number) in 1..playerCount, wrapping.
  function nextPlayer(p) { return (p % playerCount) + 1; }

  // Apply an edge for `mover` and run the shared turn-flow. Used by both the
  // local tap and the remote (networked) move so both peers stay identical.
  // The extra-turn-on-box-completion rule lives entirely here: completing a box
  // does NOT switch `current`; only a non-completing move hands off the turn.
  function commitMove(e, mover) {
    var got = applyMove(e, mover);
    blip(got > 0);
    draw();
    updateUI();
    if (isFull()) { finish(); return; }
    if (got > 0) {
      // completing a box grants another turn — same player goes again
      updateUI();
    } else if (mode === "2p" || mode === "online") {
      // pass-and-play / networked: hand off to the next player in seat order
      current = nextPlayer(mover);
      updateUI();
    } else {
      current = 2;
      updateUI();
      busy = true;
      setTimeout(cpuTurn, 420);
    }
  }

  // ---- Online multiplayer (drop-in via game-multiplayer.js) ----
  // Apply a remote player's edge. The board is deterministic with no hidden info,
  // so every client runs the identical commitMove() (same edge -> same box check,
  // scores, and turn-advance), keeping `current` in lock-step across all peers.
  // Guards (generalized from 2 to N players):
  //   (a) ignore our own echoed message (GameMP mirrors our send back);
  //   (b) only the player whose turn it currently is may draw — drop anything
  //       tagged with a different side (stale / out-of-turn / duplicate);
  //   (c) ignore an edge that's already drawn (double-apply).
  // Because completing a box keeps the turn, the active side does NOT alternate
  // predictably — so the m.side === current check (not seat parity) is the robust
  // gate that works for any player count.
  function applyRemoteMove(m) {
    if (mode !== "online" || gameOver) return;
    var mover = m.side;
    if (mover === mySide) return;          // our own echo — ignore
    if (mover !== current) return;         // out-of-turn / stale — ignore
    var e = { type: m.t, r: m.r, c: m.c };
    if (edgeDrawn(e)) return;              // already applied — avoid double-apply
    commitMove(e, mover);
  }

  function cpuTurn() {
    if (gameOver) { busy = false; return; }
    var e = chooseCpuMove();
    if (!e) { busy = false; return; }
    var got = applyMove(e, 2);
    blip(got > 0);
    draw();
    updateUI();
    if (isFull()) { finish(); busy = false; return; }
    if (got > 0) {
      // cpu plays again
      setTimeout(cpuTurn, 420);
    } else {
      current = 1;
      busy = false;
      updateUI();
    }
  }

  // ---- CPU strategy ----
  // 1. Take any edge that completes a box (free box). Prefer chains.
  // 2. Otherwise play a "safe" edge: one that does NOT create a box with 3 sides.
  // 3. If no safe edge, give away the smallest sacrifice (random among least-bad).
  function chooseCpuMove() {
    var edges = freeEdges();
    if (edges.length === 0) return null;

    var capturing = [];
    var safe = [];
    var unsafe = [];

    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      var boxes = adjacentBoxes(e);
      var completes = false;
      var creates3 = false;
      for (var j = 0; j < boxes.length; j++) {
        var sides = boxSides(boxes[j].r, boxes[j].c);
        if (sides === 3) completes = true;      // drawing 4th side -> capture
        if (sides === 2) creates3 = true;       // drawing makes it a 3-sided box (gift)
      }
      if (completes) capturing.push(e);
      else if (creates3) unsafe.push(e);
      else safe.push(e);
    }

    if (capturing.length > 0) {
      return capturing[Math.floor(Math.random() * capturing.length)];
    }
    if (safe.length > 0) {
      return safe[Math.floor(Math.random() * safe.length)];
    }
    // All remaining moves give something away: pick the one opening the smallest chain.
    var best = null, bestCost = Infinity;
    for (var k = 0; k < unsafe.length; k++) {
      var cost = sacrificeCost(unsafe[k]);
      if (cost < bestCost) { bestCost = cost; best = unsafe[k]; }
    }
    return best || unsafe[0] || edges[0];
  }

  // Estimate how many boxes the opponent could grab through the chain
  // opened by playing edge e. Cheap heuristic: walk the chain of 3-sided boxes.
  function sacrificeCost(e) {
    // simulate drawing e, then count consecutive capturable boxes
    var snapshotH = cloneBool(hEdges);
    var snapshotV = cloneBool(vEdges);
    var snapshotO = cloneNum(owner);

    setEdge(e, 0);
    var count = 0;
    var guard = 0;
    while (guard++ < N * N * 2) {
      // find a box with exactly 3 sides not yet owned, capture it (draw its missing edge)
      var found = null, miss = null;
      for (var r = 0; r < N && !found; r++) {
        for (var c = 0; c < N; c++) {
          if (owner[r][c] === 0 && boxSides(r, c) === 3) {
            miss = missingEdge(r, c);
            found = { r: r, c: c };
            break;
          }
        }
      }
      if (!found) break;
      setEdge(miss, 0);
      owner[found.r][found.c] = 1; // mark as taken (any non-zero) so loop progresses
      count++;
    }

    // restore
    hEdges = snapshotH; vEdges = snapshotV; owner = snapshotO;
    return count;
  }

  function missingEdge(r, c) {
    if (!hEdges[r][c]) return { type: "h", r: r, c: c };
    if (!hEdges[r + 1][c]) return { type: "h", r: r + 1, c: c };
    if (!vEdges[r][c]) return { type: "v", r: r, c: c };
    return { type: "v", r: r, c: c + 1 };
  }

  function cloneBool(a) { return a.map(function (row) { return row.slice(); }); }
  function cloneNum(a) { return a.map(function (row) { return row.slice(); }); }

  // ---- Hit testing (pointer -> nearest edge) ----
  function hitEdge(px, py) {
    var bestE = null, bestD = Infinity;
    var r, c, a, b, d, mid;
    var tol = Math.max(18, cellPx * 0.45); // generous hit radius

    // horizontal edges
    for (r = 0; r <= N; r++) {
      for (c = 0; c < N; c++) {
        a = dotXY(r, c); b = dotXY(r, c + 1);
        d = distToSeg(px, py, a.x, a.y, b.x, b.y);
        if (d < bestD) { bestD = d; bestE = { type: "h", r: r, c: c }; }
      }
    }
    // vertical edges
    for (r = 0; r < N; r++) {
      for (c = 0; c <= N; c++) {
        a = dotXY(r, c); b = dotXY(r + 1, c);
        d = distToSeg(px, py, a.x, a.y, b.x, b.y);
        if (d < bestD) { bestD = d; bestE = { type: "v", r: r, c: c }; }
      }
    }
    if (bestD <= tol) return bestE;
    return null;
  }

  function distToSeg(px, py, x1, y1, x2, y2) {
    var dx = x2 - x1, dy = y2 - y1;
    var len2 = dx * dx + dy * dy;
    var t = len2 ? ((px - x1) * dx + (py - y1) * dy) / len2 : 0;
    t = Math.max(0, Math.min(1, t));
    var cx = x1 + t * dx, cy = y1 + t * dy;
    return Math.hypot(px - cx, py - cy);
  }

  function pointerPos(ev) {
    var rect = canvas.getBoundingClientRect();
    var pt = ev.touches && ev.touches.length ? ev.touches[0] : ev;
    return { x: pt.clientX - rect.left, y: pt.clientY - rect.top };
  }

  function onTap(ev) {
    ev.preventDefault();
    if (busy || gameOver || !isHumanTurn()) return;
    var p = pointerPos(ev);
    var e = hitEdge(p.x, p.y);
    if (e && !edgeDrawn(e)) humanMove(e);
  }

  canvas.addEventListener("touchstart", onTap, { passive: false });
  canvas.addEventListener("mousedown", function (ev) {
    if (ev.button === 0) onTap(ev);
  });

  // ---- Sound (WebAudio) ----
  var actx = null;
  function ac() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    return actx;
  }
  function tone(freq, dur, type, vol) {
    var a = ac(); if (!a) return;
    var o = a.createOscillator(), g = a.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(a.destination);
    var t = a.currentTime;
    g.gain.exponentialRampToValueAtTime(vol || 0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function blip(captured) {
    if (captured) { tone(660, 0.12, "triangle", 0.22); tone(990, 0.14, "triangle", 0.16); }
    else { tone(300, 0.06, "square", 0.12); }
  }
  function beepEnd() {
    tone(523, 0.16, "sine", 0.2);
    setTimeout(function () { tone(784, 0.22, "sine", 0.2); }, 130);
  }

  // ---- Controls ----
  function newGame() {
    if (ac()) { try { actx.resume(); } catch (e) {} }
    // Online matches use the host-chosen size (shared by all clients); local
    // modes use the selector directly.
    var n = (mode === "online") ? onlineSize : parseInt(sizeSel.value, 10);
    init(n);
  }
  // ---- Mode selection ----
  function showModeSelect() { modeOverlay.classList.add("show"); }
  function startMode(m) {
    if (ac()) { try { actx.resume(); } catch (e) {} }
    mode = m;
    playerCount = 2;       // local modes are always 2 players
    sizeSel.disabled = false;
    onlinePeerLeft = false;
    modeOverlay.classList.remove("show");
    newGame();
  }
  document.getElementById("modeAi").addEventListener("click", function () { startMode("ai"); });
  document.getElementById("modeTwo").addEventListener("click", function () { startMode("2p"); });

  // "New Game" returns to the mode picker so you can switch AI / 2-player.
  // When online, the host restarts the shared board and tells everyone; non-host
  // seats can't unilaterally restart (it would desync), so it's a no-op for them.
  function newOrModeSelect() {
    if (mode === "online") {
      if (onlinePeerLeft) { leaveOnline(); showModeSelect(); return; }
      if (mySide === 1) { newGame(); GameMP.sendReset(); }
      return;
    }
    showModeSelect();
  }
  document.getElementById("newBtn").addEventListener("click", newOrModeSelect);
  // "Play Again" restarts the same mode. Online: host-only rematch.
  document.getElementById("againBtn").addEventListener("click", function () {
    if (mode === "online") {
      if (onlinePeerLeft) { leaveOnline(); showModeSelect(); return; }
      if (mySide === 1) { newGame(); GameMP.sendReset(); }
      return;
    }
    newGame();
  });
  // Changing size restarts the current mode at the new size. Online: only the
  // host may pick the size (broadcast so every client matches); other seats can't
  // change it mid-match (would desync), so we snap their selector back.
  sizeSel.addEventListener("change", function () {
    if (mode === "online") {
      if (mySide === 1) {
        onlineSize = parseInt(sizeSel.value, 10);
        newGame();
        // Broadcast the new size; every other client re-inits on receipt.
        GameMP.send({ action: "size", seat: GameMP.seat(), size: onlineSize });
      } else {
        sizeSel.value = String(onlineSize);
      }
      return;
    }
    newGame();
  });

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 200); });

  // ---- Online wiring (game-multiplayer.js) ----
  // Reset back to local play (used after leaving / a peer dropping out).
  function leaveOnline() {
    mode = "ai";
    mySide = 1;
    playerCount = 2;
    onlinePeerLeft = false;
    var ob = document.getElementById("againBtn");
    ob.textContent = "Play Again"; ob.style.display = "";
    sizeSel.disabled = false;
  }

  // Up to 4 players gather in the waiting room, press Ready, and the match
  // starts on a majority. seat 0 = host = player 1 (moves first); seat S maps to
  // player number S+1. The host's board size (onlineSize) is shared by everyone.
  GameMP.setup({ gameName: "Dots & Boxes", minPlayers: 2, maxPlayers: 4 });
  GameMP.onReady(function (seat, count) {
    mode = "online";
    onlinePeerLeft = false;
    playerCount = count;
    mySide = seat + 1;          // seat 0 -> player 1 (host, first), etc.
    // Host's selector defines the size; everyone else adopts it (host will also
    // re-broadcast on the first reset, but starting from the selector is fine
    // since the same default is shared). Lock the selector for non-hosts.
    onlineSize = (mySide === 1) ? parseInt(sizeSel.value, 10) : onlineSize;
    sizeSel.value = String(onlineSize);
    sizeSel.disabled = (mySide !== 1);
    modeOverlay.classList.remove("show");
    newGame();
    // Host announces the agreed board size so every client (including late
    // joiners whose default differed) re-inits to the same dimensions.
    if (mySide === 1) GameMP.send({ action: "size", seat: GameMP.seat(), size: onlineSize });
  });
  GameMP.onMove(function (m) {
    if (mode !== "online") return;
    if (m.action === "size") {
      // Host set/changed the board size — adopt it and re-init to match.
      // Ignore our own echoed message.
      if (m.seat !== GameMP.seat() && m.size !== N) {
        onlineSize = m.size;
        sizeSel.value = String(onlineSize);
        newGame();
      }
      return;
    }
    if (m.action === "edge") applyRemoteMove(m);
  });
  GameMP.onReset(function () {
    if (mode !== "online") return;
    onlinePeerLeft = false;
    newGame();
  });
  GameMP.onPeerLeft(function () {
    // No authoritative server: a mid-match drop breaks the deterministic turn
    // order, so end cleanly and offer a fresh game (anyone can start one).
    if (mode !== "online" || onlinePeerLeft) return;
    onlinePeerLeft = true;
    gameOver = true;
    busy = false;
    updateUI();
    turnEl.textContent = "A player left.";
    resTitle.textContent = "Player left";
    resTitle.style.color = "#e8edf2";
    resText.textContent = "Someone disconnected, so this match can't continue.";
    var ob = document.getElementById("againBtn");
    ob.textContent = "New game"; ob.style.display = "";
    overlay.classList.add("show");
  });

  // start: render an idle board behind the mode picker, then ask for a mode.
  init(parseInt(sizeSel.value, 10));
  showModeSelect();
})();
</script>
</body>
</html>
