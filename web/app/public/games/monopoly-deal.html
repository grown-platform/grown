// ---------- Privacy handoff (2-player pass & play) ----------
// Full-screen OPAQUE overlay covering the board + hand. Revealing the next
// player's hand requires a deliberate slide-all-the-way gesture, so the hand
// is never exposed by an accidental tap when handing over the device.
let slideMove = null, slideUp = null; // active window listeners (cleaned on reveal)
function showHandoff(title, sub, cb){
  document.getElementById('mdHandoffTitle').textContent = title;
  document.getElementById('mdHandoffSub').textContent = sub;
  document.getElementById('mdHandoff').classList.add('show');
  initSlider(function(){ hideHandoff(); cb(); });
}
function hideHandoff(){
  document.getElementById('mdHandoff').classList.remove('show');
}
function initSlider(onReveal){
  const track  = document.getElementById('mdRevealTrack');
  const handle = document.getElementById('mdRevealHandle');
  const fill   = document.getElementById('mdRevealFill');
  const text   = document.getElementById('mdRevealText');
  let dragging = false, done = false, grabDX = 0, x = 0, maxX = 0;
  function layout(){ maxX = Math.max(0, track.clientWidth - handle.offsetWidth - 8); }
  function paint(px){
    x = Math.max(0, Math.min(maxX, px));
    handle.style.left = (4 + x) + 'px';
    fill.style.width  = (handle.offsetWidth + 4 + x) + 'px';
    text.style.opacity = maxX ? String(Math.max(0, 1 - x / maxX)) : '1';
  }
  function animate(on){
    handle.style.transition = on ? 'left .2s' : '';
    fill.style.transition   = on ? 'width .2s' : '';
  }
  function cleanup(){
    window.removeEventListener('pointermove', slideMove);
    window.removeEventListener('pointerup', slideUp);
    window.removeEventListener('pointercancel', slideUp);
    slideMove = slideUp = null;
  }
  function reset(){ animate(true); paint(0); setTimeout(function(){ animate(false); }, 210); }
  function complete(){ done = true; animate(true); paint(maxX); cleanup(); setTimeout(onReveal, 190); }
  function ptX(e){ return e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0); }
  function down(e){ if(done) return; layout(); dragging = true; animate(false); grabDX = ptX(e) - x; e.preventDefault(); }
  slideMove = function(e){ if(!dragging || done) return; e.preventDefault(); paint(ptX(e) - grabDX); };
  slideUp = function(){ if(!dragging || done) return; dragging = false; if(x >= maxX - 4) complete(); else reset(); };
  cleanup();
  done = false; dragging = false;
  layout(); animate(false); paint(0); text.style.opacity = '1';
  track.onpointerdown = down;
  window.addEventListener('pointermove', slideMove, { passive: false });
  window.addEventListener('pointerup', slideUp);
  window.addEventListener('pointercancel', slideUp);
}

/* ============================================================================
 * ONLINE MULTIPLAYER (GameMP) — seed-based deterministic LOCKSTEP, 2–5 players
 * ----------------------------------------------------------------------------
 * There is NO authoritative server. Every client runs the IDENTICAL engine from
 * the same inputs (same as crazy-eights / liars-dice):
 *   • seat 0 (host) picks a 32-bit seed and broadcasts {action:"start", seed}.
 *   • EVERY client (incl. seat 0) rebuilds the same deck, shuffles it with the
 *     same seeded PRNG, and deals 5 cards each round-robin + the draw pile, all
 *     deterministically by seat. From then on every action is broadcast and
 *     applied identically on every client, so all clients stay in lockstep.
 *   • All clients track the FULL game state (every hand, bank, props, deck,
 *     discard). Hands are SOFT-HIDDEN: a determined cheater could recompute the
 *     deal locally, but the UI only renders YOUR hand face-up and opponents as
 *     counts. Acceptable for casual play.
 *
 * Determinism notes:
 *   • Card ids must match on every client (they appear in action descriptors:
 *     cardId / targetCardId). So online deals RESET the UID counter and build the
 *     deck the same way everywhere — see onlineBuildDeck().
 *   • drawCard()'s local reshuffle is non-deterministic; online draws use the
 *     deterministic onlineDraw() which broadcasts a reshuffle seed when the deck
 *     empties (every client applies the same seed), like crazy-eights.
 *
 * Turn gating: only the seat whose turn it is may act, EXCEPT forced responses
 * (payment by an ower, Just Say No by a target). Those are modelled as bounded,
 * turn-gated broadcast exchanges so all clients resolve them identically.
 * ========================================================================== */

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function seededShuffle(arr,rng){for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}

// Online session state (this client's view of the lockstep match).
let on = {
  active: false,        // are we currently in an online match?
  seed: 0,              // current deal seed
  reshuffleCounter: 0,  // # of deterministic deck reshuffles so far (seed deriv.)
  pendingPay: null,     // active payment round: {payee, amount, reason, owe:{seat:bool}, resume}
  jsn: null             // active Just Say No exchange (see onlineTargeted)
};

// Network identity comes from GameMP (seat index + player count).
function onSeat(){ return GameMP.seat(); }
function onCount(){ return GameMP.players(); }
function onSend(payload){ GameMP.send(Object.assign({ seat: GameMP.seat() }, payload)); }

// ---- Deterministic deck + deal ------------------------------------------
// Build the deck with a RESET id counter so every client's card ids match.
function onlineBuildDeck(){
  UID = 1;
  return buildDeck();
}

// onlineBeginMatch(seed): every client deals identically from `seed`.
function onlineBeginMatch(seed){
  mode = 'online';
  on.active = true;
  on.seed = seed >>> 0;
  on.reshuffleCounter = 0;
  on.pendingPay = null;
  on.jsn = null;
  mySeatOnline = onSeat();
  numSeats = onCount();
  seatLabels = [];
  for(let i=0;i<numSeats;i++) seatLabels[i] = (i===mySeatOnline) ? 'You' : ('Player '+(i+1));
  // Identical deck + shuffle on every client.
  const rng = mulberry32(on.seed);
  const deck = seededShuffle(onlineBuildDeck(), rng); // top = end (we pop)
  G = {
    deck, discard: [], players: buildPlayers(), turn: 0, playsLeft: 0,
    drawnThisTurn: false, over: false, selected: null, busy: false, viewSeat: null,
    _renderedLocal: mySeatOnline
  };
  // Deal 5 each, round-robin starting at seat 0 (mirrors a real deal).
  for(let n=0;n<5;n++){ for(let s=0;s<numSeats;s++){ G.players[s].hand.push(G.deck.pop()); } }
  closeModal(); hideHandoff();
  document.getElementById('overlay').classList.remove('show');
  buildOppZones();
  log('Online game started ('+numSeats+' players). '+seatName(0)+' goes first!', 'sys');
  onlineStartTurn(0);
}

// onlineStartTurn(seat): every client advances the turn identically. The active
// seat draws 2 (or 5 if their hand is empty) from the SHARED deterministic deck.
function onlineStartTurn(seat){
  G.turn = seat;
  G.playsLeft = 3;
  G.selected = null;
  G.busy = false;
  G.drawnThisTurn = false;
  const p = G.players[seat];
  const n = (p.hand.length===0) ? 5 : 2;
  for(let i=0;i<n;i++){ const c=onlineDraw(); if(c) p.hand.push(c); }
  if(checkWin()) return;
  render();
  onlineStatus();
}

// onlineDraw(): pop one card from the shared deck. When the deck empties we
// reshuffle the discard into a fresh deck DETERMINISTICALLY — NO broadcast: the
// reshuffle seed is derived purely from on.seed + on.reshuffleCounter, and every
// client replays the exact same sequence of draws/discards, so each client
// reshuffles at the same logical moment with the same seed and gets an identical
// deck. (Draws at turn start happen on every client, so a broadcast-based
// reshuffle would desync clients that aren't the turn owner.)
function onlineReshuffle(){
  if(G.discard.length===0) return;
  const seed = (on.seed ^ (0x9E3779B9 * (on.reshuffleCounter+1))) >>> 0;
  on.reshuffleCounter++;
  const rng = mulberry32(seed >>> 0);
  G.deck = seededShuffle(G.discard.splice(0), rng);
  log('Reshuffled discard into deck.', 'sys');
}
function onlineDraw(){
  if(G.deck.length===0){
    if(G.discard.length===0) return null;
    onlineReshuffle();
  }
  return G.deck.pop();
}

// onlineStatus: refresh the top status line for online mode.
function onlineStatus(){
  if(mode!=='online' || !G || G.over) return;
  if(on.pendingPay){
    if(on.pendingPay.owe[mySeatOnline]) setStatus('cpu', 'You owe $'+on.pendingPay.amount+'M ('+on.pendingPay.reason+').');
    else setStatus('cpu', 'Waiting for payment…');
    return;
  }
  if(on.jsn){ setStatus('cpu', 'Resolving Just Say No…'); return; }
  if(G.turn===mySeatOnline) setStatus('you', 'Your turn — play up to 3 cards.');
  else setStatus('cpu', seatName(G.turn)+"'s turn…");
}

// activeOpponentsLocal: opponents from THIS client's view (online has no gone).
function activeOpponentsLocal(seat){ return opponentSeats(seat).filter(o=>!(G.players[o]&&G.players[o].gone)); }

// ======================= Acting (the active seat) ============================
// Only fire when it's our turn and no forced exchange is pending.
function onlineCanAct(){ return mode==='online' && G && !G.over && G.turn===mySeatOnline && !on.pendingPay && !on.jsn; }

// submitOnlineAction / submitOnlineEndTurn / playOnlineCard keep their names so
// the shared button handlers (youBankCard/youPlayCard/endTurn) call straight in.

// A non-interactive action (bank/lay/passgo/addon/rent/debt/birthday): apply
// locally AND broadcast; peers apply the identical descriptor in onMove.
function submitOnlineAction(action){
  if(!onlineCanAct()) return;
  onApplyAction(mySeatOnline, action);
  onSend({ action:'act', act: action });
}
function submitOnlineEndTurn(){
  if(!onlineCanAct()) return;
  const me = G.players[mySeatOnline];
  if(me.hand.length>7){
    // Discard down LOCALLY, then broadcast the resolved discard + end-turn.
    promptDiscardOnline(mySeatOnline, (cardIds)=>{
      onApplyDiscard(mySeatOnline, cardIds);
      onSend({ action:'discard', cardIds });
      onApplyEndTurn(mySeatOnline);
      onSend({ action:'endturn' });
    });
    return;
  }
  onApplyEndTurn(mySeatOnline);
  onSend({ action:'endturn' });
}

// playOnlineCard: resolve the selected card's targets locally using PUBLIC board
// info + the existing choosers, then submit a fully-resolved descriptor.
function playOnlineCard(c){
  if(!onlineCanAct()) return;
  const me = G.players[mySeatOnline];
  const opps = activeOpponentsLocal(mySeatOnline);
  G.selected = null;
  if(c.type==='property'){ submitOnlineAction({kind:'lay', cardId:c.id, group:c.group}); render(); return; }
  if(c.type==='wildcard'){ chooseWildGroup(c, (g)=>{ submitOnlineAction({kind:'lay', cardId:c.id, group:g}); render(); }); return; }
  switch(c.act){
    case 'passgo': submitOnlineAction({kind:'passgo', cardId:c.id}); render(); break;
    case 'birthday': submitOnlineAction({kind:'birthday', cardId:c.id}); render(); break;
    case 'debt':
      pickOpponent(opps, 'Debt Collector — charge whom $5M?', (v)=>{ submitOnlineAction({kind:'debt', cardId:c.id, victim:v}); render(); });
      break;
    case 'rent':
    case 'rent_any': {
      const owned = GROUP_KEYS.filter(g=> me.props[g] && countPropsInGroup(me.props[g])>0);
      if(owned.length===0){ toast('You have no properties to charge rent for.'); G.selected=c.id; render(); return; }
      chooseColorForRent(owned, (g)=>{ submitOnlineAction({kind:'rent', cardId:c.id, group:g}); render(); });
      break;
    }
    case 'slydeal': {
      const valid = opps.filter(o=> stealableProps(G.players[o], false).length>0);
      if(valid.length===0){ toast('No opponent has a stealable property.'); G.selected=c.id; render(); return; }
      pickOpponent(valid, 'Sly Deal — steal from whom?', (v)=>{
        chooseStealTarget(stealableProps(G.players[v],false), 'Sly Deal — steal a property', v, (pick)=>{
          submitOnlineAction({kind:'sly', cardId:c.id, victim:v, group:pick.group, targetCardId:pick.card.id}); render();
        });
      });
      break;
    }
    case 'forceddeal': {
      const mine = stealableProps(me, false);
      if(mine.length===0){ toast('You have no property to swap.'); G.selected=c.id; render(); return; }
      const valid = opps.filter(o=> stealableProps(G.players[o], false).length>0);
      if(valid.length===0){ toast('No opponent has a property to swap.'); G.selected=c.id; render(); return; }
      pickOpponent(valid, 'Forced Deal — swap with whom?', (v)=>{
        chooseForcedDeal(mine, stealableProps(G.players[v],false), v, (myPick, theirPick)=>{
          submitOnlineAction({kind:'forced', cardId:c.id, victim:v, myGroup:myPick.group, myCardId:myPick.card.id, theirGroup:theirPick.group, theirCardId:theirPick.card.id}); render();
        });
      });
      break;
    }
    case 'dealbreaker': {
      const valid = opps.filter(o=> completeSetsList(G.players[o]).length>0);
      if(valid.length===0){ toast('No opponent has a complete set to steal.'); G.selected=c.id; render(); return; }
      pickOpponent(valid, 'Deal Breaker — steal from whom?', (v)=>{
        chooseSetTarget(completeSetsList(G.players[v]), (g)=>{ submitOnlineAction({kind:'dealbreaker', cardId:c.id, victim:v, group:g}); render(); });
      });
      break;
    }
    case 'house':
    case 'hotel': {
      const sets = completeSetsList(me).filter(g=>g!=='railroad' && g!=='utility');
      if(sets.length===0){ toast((c.act==='house'?'House':'Hotel')+' needs a complete (non-RR/util) set.'); G.selected=c.id; render(); return; }
      const elig = (c.act==='hotel')
        ? sets.filter(g=> me.props[g].some(x=>x.act==='house') && !me.props[g].some(x=>x.act==='hotel'))
        : sets.filter(g=> !me.props[g].some(x=>x.act==='house'));
      if(elig.length===0){ toast(c.act==='hotel'?'Need a set with a House and no Hotel.':'All your sets already have a House.'); G.selected=c.id; render(); return; }
      chooseSetTarget(elig, (g)=>{ submitOnlineAction({kind:'addon', cardId:c.id, group:g}); render(); });
      break;
    }
    case 'sayno': toast('Just Say No is played automatically to cancel actions against you.'); G.selected=c.id; render(); break;
    default: toast('Cannot play that now.'); G.selected=c.id; render();
  }
}

// ======================= Applying actions (every client) =====================
// onApplyAction runs the SAME mutation on every client for a resolved descriptor.
// Non-charge, non-targeted actions resolve immediately. Charges open a payment
// round (onlineCharge); targeted steals open a Just Say No exchange (onlineTargeted).
function onApplyAction(seat, a){
  const p = G.players[seat];
  const card = (a.cardId!=null) ? p.hand.find(c=>c.id===a.cardId) : null;
  if(a.kind!=='__none' && a.cardId!=null && !card) return; // out of sync guard
  const afterSimple = ()=>{ G.playsLeft--; if(!checkWin()){ render(); onlineStatus(); } };
  switch(a.kind){
    case 'bank':
      removeFromHand(seat, card.id);
      p.bank.push(card.type==='action'?{id:card.id,type:'action',name:card.name,value:card.value,act:card.act}:card);
      snd.bank(); log(seatName(seat)+' banked '+card.name+'.', seat===mySeatOnline?'you':'cpu');
      afterSimple(); break;
    case 'lay':
      layProperty(seat, card, a.group||card.group);
      snd.prop(); log(seatName(seat)+' laid '+GROUPS[a.group||card.group].name+' property.', seat===mySeatOnline?'you':'cpu');
      afterSimple(); break;
    case 'passgo':
      removeFromHand(seat, card.id); G.discard.push(card);
      for(let i=0;i<2;i++){ const d=onlineDraw(); if(d) p.hand.push(d); }
      snd.action(); log(seatName(seat)+' played Pass Go (drew 2).', seat===mySeatOnline?'you':'cpu');
      afterSimple(); break;
    case 'addon':
      if(!p.props[a.group]) { afterSimple(); break; }
      removeFromHand(seat, card.id);
      p.props[a.group].push(Object.assign({},card,{assignedGroup:a.group}));
      snd.action(); log(seatName(seat)+' added '+card.name+' to '+GROUPS[a.group].name+'.', seat===mySeatOnline?'you':'cpu');
      afterSimple(); break;
    case 'rent': {
      const g=a.group;
      const cnt=Math.min(countPropsInGroup(p.props[g]||[]),GROUPS[g].rent.length);
      let amt=(GROUPS[g].rent[cnt-1]||0)+addonBonus(p.props[g]||[]);
      removeFromHand(seat, card.id); G.discard.push(card); G.playsLeft--;
      snd.action(); log(seatName(seat)+' played Rent on '+GROUPS[g].name+' — everyone owes $'+amt+'M.', seat===mySeatOnline?'you':'cpu');
      render();
      onlineCharge(activeOpponentsLocal(seat), seat, amt, 'Rent ('+GROUPS[g].name+')');
      break;
    }
    case 'debt': {
      removeFromHand(seat, card.id); G.discard.push(card); G.playsLeft--;
      snd.action(); log(seatName(seat)+' played Debt Collector — '+seatName(a.victim)+' owes $5M.', seat===mySeatOnline?'you':'cpu');
      render();
      onlineCharge([a.victim], seat, 5, 'Debt Collector');
      break;
    }
    case 'birthday': {
      removeFromHand(seat, card.id); G.discard.push(card); G.playsLeft--;
      snd.action(); log(seatName(seat)+" played It's My Birthday — everyone pays $2M.", seat===mySeatOnline?'you':'cpu');
      render();
      onlineCharge(activeOpponentsLocal(seat), seat, 2, "It's My Birthday");
      break;
    }
    case 'sly':
      onlineTargeted(seat, a, 'Sly Deal', ()=>{
        const arr=G.players[a.victim].props[a.group];
        const tc=arr && arr.find(c=>c.id===a.targetCardId);
        if(tc){ doSteal(a.victim, seat, a.group, tc); log(seatName(seat)+' stole '+GROUPS[a.group].name+' from '+seatName(a.victim)+'.', seat===mySeatOnline?'you':'cpu'); }
      });
      break;
    case 'forced':
      onlineTargeted(seat, a, 'Forced Deal', ()=>{
        const tArr=G.players[a.victim].props[a.theirGroup];
        const mArr=G.players[seat].props[a.myGroup];
        const tc=tArr && tArr.find(c=>c.id===a.theirCardId);
        const mc=mArr && mArr.find(c=>c.id===a.myCardId);
        if(tc) doSteal(a.victim, seat, a.theirGroup, tc);
        if(mc) doSteal(seat, a.victim, a.myGroup, mc);
        log(seatName(seat)+' swapped properties with '+seatName(a.victim)+'.', seat===mySeatOnline?'you':'cpu');
      });
      break;
    case 'dealbreaker':
      onlineTargeted(seat, a, 'Deal Breaker', ()=>{
        stealWholeSet(a.victim, seat, a.group);
        log(seatName(seat)+' stole '+seatName(a.victim)+"'s "+GROUPS[a.group].name+' set!', seat===mySeatOnline?'you':'cpu');
      });
      break;
    default: break;
  }
}

function onApplyEndTurn(seat){
  if(!G || G.over || G.turn!==seat) return;
  log(seatName(seat)+' ended their turn.', seat===mySeatOnline?'you':'cpu');
  if(checkWin()) return;
  onlineStartTurn(nextSeat(seat));
}

function onApplyDiscard(seat, cardIds){
  const p=G.players[seat]; const set=new Set(cardIds||[]);
  p.hand = p.hand.filter(c=>{ if(set.has(c.id)){ G.discard.push(c); return false; } return true; });
  render();
}

// ======================= Payment (forced response) ===========================
// onlineCharge opens a payment ROUND for `payers`. Every client tracks who still
// owes; each ower's OWN client lets them pick cards and broadcasts {action:'pay'}.
// All clients apply the same transfer. When every ower has paid, the actor's turn
// resumes (their playsLeft was already spent). If a payer has no assets, they're
// auto-cleared (deterministic) with no cards moved.
function onlineCharge(payers, payeeSeat, amount, reason){
  const owe = {};
  payers.forEach(s=>{
    const payer=G.players[s];
    const total=bankTotal(payer)+propAssetValue(payer);
    if(amount>0 && total>0){ owe[s]=true; }
    else { log(seatName(s)+' had nothing to pay.', s===mySeatOnline?'you':'cpu'); }
  });
  if(Object.keys(owe).length===0){ onlineResumeAfterCharge(); return; }
  on.pendingPay = { payee: payeeSeat, amount, reason, owe };
  render(); onlineStatus();
  // It's MY debt → open the payment picker; my choice is broadcast to all.
  if(owe[mySeatOnline]){ onlinePromptPay(); }
}
function onlinePromptPay(){
  const pp = on.pendingPay; if(!pp) return;
  showPaymentModalOnline(mySeatOnline, pp.payee, pp.amount, pp.reason, (cardIds)=>{
    onApplyPay(mySeatOnline, cardIds);
    onSend({ action:'pay', payerSeat: mySeatOnline, cards: cardIds });
  });
}
// onApplyPay: transfer the chosen cards from payerSeat to the current payee on
// every client, then clear that payer's debt. Validated against assets; an
// invalid/short pick falls back to a deterministic auto-pick so all clients agree.
function onApplyPay(payerSeat, cardIds){
  const pp = on.pendingPay; if(!pp || !pp.owe[payerSeat]) return;
  const payer=G.players[payerSeat], payee=G.players[pp.payee];
  let chosen=new Set(cardIds||[]);
  // verify the selection covers min(amount, all assets)
  let sum=0;
  for(const c of payer.bank){ if(chosen.has(c.id)) sum+=(c.value||0); }
  for(const g of GROUP_KEYS){ if(payer.props[g]) for(const c of payer.props[g]){ if(chosen.has(c.id)) sum+=(c.value||0); } }
  const need=Math.min(pp.amount, bankTotal(payer)+propAssetValue(payer));
  if(sum<need){ const auto=onlineAutoPay(payerSeat, need); chosen=new Set(auto); }
  let transferred=0;
  for(const c of payer.bank.slice()){ if(chosen.has(c.id)){ const i=payer.bank.findIndex(x=>x.id===c.id); if(i>=0){ payee.bank.push(payer.bank.splice(i,1)[0]); transferred+=(c.value||0); } } }
  for(const g of GROUP_KEYS){ if(payer.props[g]) for(const c of payer.props[g].slice()){ if(chosen.has(c.id)){ doStealCardObj(payerSeat, pp.payee, g, c); transferred+=(c.value||0); } } }
  snd.pay();
  log(seatName(payerSeat)+' paid $'+transferred+'M to '+seatName(pp.payee)+' for '+pp.reason+'.', payerSeat===mySeatOnline?'you':'cpu');
  delete pp.owe[payerSeat];
  if(Object.keys(pp.owe).length===0){ on.pendingPay=null; onlineResumeAfterCharge(); }
  else { render(); onlineStatus(); }
}
// onlineAutoPay: deterministic fallback selection (greedy smallest money, then
// properties) — identical on every client.
function onlineAutoPay(payerSeat, amount){
  const p=G.players[payerSeat]; const ids=[]; let acc=0;
  const money=p.bank.slice().sort((a,b)=>(a.value||0)-(b.value||0)||(a.id-b.id));
  for(const c of money){ if(acc>=amount) break; ids.push(c.id); acc+=(c.value||0); }
  if(acc<amount){ for(const g of GROUP_KEYS){ if(p.props[g]) for(const c of p.props[g]){ if(acc>=amount) break; if(c.type==='property'||c.type==='wildcard'){ ids.push(c.id); acc+=(c.value||0); } } } }
  return ids;
}
function onlineResumeAfterCharge(){
  if(checkWin()) return;
  render(); onlineStatus();
}

// ======================= Just Say No (forced response) =======================
// A targeted steal (sly/forced/dealbreaker) first spends the card, then runs a
// BOUNDED JSN ping-pong: the victim may cancel, the actor may counter, the victim
// may counter again, and so on. Each step is decided by exactly one seat (the one
// who currently may respond) and broadcast; the action's effect lands iff the
// number of JSNs played is EVEN. The exchange ends when the responsible seat has
// no Just Say No card, declines, or times out.
function onlineTargeted(actor, a, label, effect){
  const card = G.players[actor].hand.find(c=>c.id===a.cardId);
  if(card){ removeFromHand(actor, card.id); G.discard.push(card); }
  G.playsLeft--;
  snd.action();
  render();
  on.jsn = { actor, victim:a.victim, label, effect, count:0, responder:a.victim };
  onlineJsnStep();
}
// onlineJsnStep: it's `responder`'s decision. If that seat is US and we hold a
// JSN, prompt; otherwise (no card, or someone else's decision) wait/auto-resolve.
function onlineJsnStep(){
  const j = on.jsn; if(!j) return;
  const resp = j.responder;
  const has = G.players[resp].hand.some(c=>c.act==='sayno');
  if(!has){ onlineJsnResolve(); return; }   // deterministic: no card -> can't respond
  render(); onlineStatus();
  if(resp===mySeatOnline){
    const other = (resp===j.victim) ? j.actor : j.victim;
    const prompt = (j.count===0) ? j.label : ('counter '+j.label);
    askYouSayNo(prompt, seatName(other), ()=>{
      onApplyJsn(resp);
      onSend({ action:'jsn', responder: resp });
    }, ()=>{
      onApplyJsnDecline(resp);
      onSend({ action:'jsndecline', responder: resp });
    });
  }
  // If responder is a remote seat, we just wait for their jsn / jsndecline.
}
// onApplyJsn: `resp` played a Just Say No — consume it, flip the count, and pass
// the decision to the OTHER party (who may counter).
function onApplyJsn(resp){
  const j = on.jsn; if(!j || j.responder!==resp) return;
  const p=G.players[resp];
  const i=p.hand.findIndex(c=>c.act==='sayno');
  if(i>=0){ G.discard.push(p.hand.splice(i,1)[0]); }
  snd.no();
  log(seatName(resp)+' played Just Say No!', resp===mySeatOnline?'you':'cpu');
  j.count++;
  j.responder = (resp===j.victim) ? j.actor : j.victim;
  render();
  onlineJsnStep();
}
// onApplyJsnDecline: `resp` declined to (counter-)JSN → the exchange ends now.
function onApplyJsnDecline(resp){
  const j = on.jsn; if(!j || j.responder!==resp) return;
  onlineJsnResolve();
}
function onlineJsnResolve(){
  const j = on.jsn; if(!j) return;
  on.jsn = null;
  if(j.count % 2 === 0){ j.effect(); }     // even # of JSNs → action proceeds
  else { log('Action cancelled by Just Say No.', 'sys'); }
  if(checkWin()) return;
  render(); onlineStatus();
}

// ====================== Online card-picker modals ============================
// Payment picker — same UI as local, returns chosen ids.
function showPaymentModalOnline(payerSeat, payeeSeat, amount, reason, cb){
  const src = G.players[payerSeat];
  const items=[]; const selected=new Set();
  src.bank.forEach(c=> items.push({id:c.id, kind:'bank', value:c.value||0, label:'$'+(c.value||0)+'M'+(c.type==='action'?' ('+c.name.split(' ')[0]+')':'')}));
  for(const g of GROUP_KEYS){ if(src.props[g]) src.props[g].forEach(c=>{ if(c.type==='property'||c.type==='wildcard') items.push({id:c.id, kind:'prop', group:g, value:c.value||0, label:GROUPS[g].name+(c.type==='wildcard'?'*':'')+' $'+(c.value||0)+'M'}); }); }
  const totalAvail=items.reduce((s,i)=>s+i.value,0);
  const mustPay=Math.min(amount, totalAvail);
  function draw(){
    modal.innerHTML='<h2>Pay $'+amount+'M</h2><p>'+reason+' — select cards to pay. You owe <b style="color:#ffcf33">$'+amount+'M</b>.'+(totalAvail<amount?' (You only have $'+totalAvail+'M — pay all.)':'')+'</p>';
    const grid=document.createElement('div'); grid.className='pay-grid';
    items.forEach(it=>{ const d=document.createElement('button'); d.className='pay-item '+(it.kind==='bank'?'money':'prop')+(selected.has(it.id)?' sel':''); d.textContent=it.label; d.onclick=()=>{ if(selected.has(it.id)) selected.delete(it.id); else selected.add(it.id); draw(); }; grid.appendChild(d); });
    modal.appendChild(grid);
    let sum=0; items.forEach(it=>{ if(selected.has(it.id)) sum+=it.value; });
    const tot=document.createElement('div'); tot.className='pay-total'; tot.innerHTML='Selected: <b>$'+sum+'M</b> / $'+mustPay+'M needed'; modal.appendChild(tot);
    const btns=document.createElement('div'); btns.className='mbtns'; const go=document.createElement('button'); go.className='go'; go.textContent='Pay'; go.disabled=sum<mustPay;
    go.onclick=()=>{ closeModal(); cb([...selected]); }; btns.appendChild(go); modal.appendChild(btns);
  }
  draw(); overlay.classList.add('show');
}

// Discard picker — returns chosen ids.
function promptDiscardOnline(seat, cb, needOverride){
  const src = G.players[seat];
  const need = needOverride!=null ? needOverride : (src.hand.length-7);
  const sel=new Set();
  function draw(){
    modal.innerHTML='<h2>Discard '+need+'</h2><p>Hand limit is 7. Choose '+need+' card(s) to discard.</p>';
    const grid=document.createElement('div'); grid.className='pay-grid';
    src.hand.forEach(c=>{ const d=document.createElement('button'); d.className='pay-item '+(c.type==='money'?'money':'prop')+(sel.has(c.id)?' sel':''); d.textContent=c.name; d.onclick=()=>{ if(sel.has(c.id)) sel.delete(c.id); else if(sel.size<need) sel.add(c.id); draw(); }; grid.appendChild(d); });
    modal.appendChild(grid);
    const tot=document.createElement('div'); tot.className='pay-total'; tot.innerHTML='Selected <b>'+sel.size+'</b> / '+need; modal.appendChild(tot);
    const btns=document.createElement('div'); btns.className='mbtns'; const go=document.createElement('button'); go.className='go'; go.textContent='Discard'; go.disabled=sel.size!==need;
    go.onclick=()=>{ closeModal(); cb([...sel]); }; btns.appendChild(go); modal.appendChild(btns);
  }
  draw(); overlay.classList.add('show');
}

// ====================== GameMP wiring (lockstep transport) ===================
function netDisconnect(){ on.active=false; on.pendingPay=null; on.jsn=null; }

GameMP.setup({ gameName: 'Monopoly Deal', minPlayers: 2, maxPlayers: 5 });

// Match starts: seat 0 generates the seed and broadcasts it; everyone deals.
GameMP.onReady(function(seat, count){
  try{ if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); }catch(e){}
  mode = 'online';
  mySeatOnline = seat; numSeats = count;
  if(seat===0){
    const seed = (Math.floor(Math.random()*0xFFFFFFFF)) >>> 0;
    onSend({ action:'start', seed });
    onlineBeginMatch(seed);
  } else {
    setStatus('cpu', 'Waiting for the deal…');
  }
});

// Apply every peer broadcast identically. (Our own actions were already applied
// locally before broadcasting, so we ignore echoes of our own seat.)
GameMP.onMove(function(m){
  if(m.seat===mySeatOnline) return;   // our own move — already applied locally
  // start: (re)deal a fresh match from the host's seed. Always honored (covers
  // the first deal AND host rematches), since seat 0 broadcasts a new seed.
  if(m.action==='start'){ onlineBeginMatch(m.seed); return; }
  if(!on.active || !G || G.over) return;
  switch(m.action){
    case 'act':         onApplyAction(m.seat, m.act); break;
    case 'endturn':     onApplyEndTurn(m.seat); break;
    case 'discard':     onApplyDiscard(m.seat, m.cardIds); break;
    case 'pay':         onApplyPay(m.payerSeat, m.cards); break;
    case 'jsn':         onApplyJsn(m.responder); break;
    case 'jsndecline':  onApplyJsnDecline(m.responder); break;
  }
});

// Host rematch: seat 0 re-seeds; onReset re-deals everyone from a fresh match.
GameMP.onReset(function(){
  closeModal();
  setStatus('cpu', 'New deal coming…');
});

// A peer dropping breaks the deterministic turn order — end the match cleanly.
GameMP.onPeerLeft(function(){
  if(mode!=='online' || !on.active || (G && G.over)) return;
  if(G) G.over = true;
  on.active = false; on.pendingPay=null; on.jsn=null;
  hideHandoff(); closeModal();
  modal.innerHTML='<div class="win-emoji">🔌</div><h2 style="text-align:center">Player left</h2>'+
    '<p style="text-align:center">Someone disconnected, so this match can\'t continue. Start a new online game to play again.</p>';
  const btns=document.createElement('div'); btns.className='mbtns';
  const go=document.createElement('button'); go.className='go'; go.textContent='New game';
  go.onclick=()=>{ closeModal(); netDisconnect(); GameMP.openCreate(); };
  btns.appendChild(go); modal.appendChild(btns);
  overlay.classList.add('show');
});

// onlineRematch: host-only re-deal after a win (wired into the win overlay).
function onlineRematch(){
  if(onSeat()!==0) return;
  GameMP.sendReset();
  const seed = (Math.floor(Math.random()*0xFFFFFFFF)) >>> 0;
  onSend({ action:'start', seed });
  onlineBeginMatch(seed);
}

function showModeSelect(){
  netDisconnect();
  document.getElementById('aiSetupOverlay').classList.remove('show');
  modeOverlay.classList.add('show');
}
function startMode(m, seats){
  mode = m;
  seatLabels = [];
  numSeats = seats || 2;
  modeOverlay.classList.remove('show');
  document.getElementById('aiSetupOverlay').classList.remove('show');

}

// ---------- Wire up buttons ----------
// "New Game" returns to the mode picker so you can switch AI / 2-player.
document.getElementById('newGameBtn').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); showModeSelect(); });
function localTurnControllable(){
  if(!G) return false;
  if(mode==='online') return G.turn===mySeatOnline && !G.over;
  return isHumanSeat(G.turn) && !G.over;
}
document.getElementById('playBtn').addEventListener('click', ()=>{ if(!G||G.busy) return; youPlayCard(); });
document.getElementById('bankBtn').addEventListener('click', ()=>{ if(!G||G.busy) return; youBankCard(); });
document.getElementById('endBtn').addEventListener('click', ()=>{ if(!G||G.busy||!localTurnControllable()) return; endTurn(); });
document.getElementById('logToggle').addEventListener('click', (e)=>{
  const el=document.getElementById('log'); el.classList.toggle('show');
  e.target.textContent = el.classList.contains('show')?'hide log':'show log';
});
document.getElementById('modeAi').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); showAiSetup(); });
document.getElementById('modeTwo').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); startMode('2p', 2); });
// The "🌐 Online Game" button is auto-injected by GameMP after #modeTwo and opens
// the GameMP create/join panel + waiting room (no bespoke connect overlay here).

}
document.querySelectorAll('#aiCountOpts button').forEach(b=>{

// prevent double-tap zoom on buttons
document.addEventListener('dblclick', e=>e.preventDefault(), {passive:false});

// mode. If arriving via a ?room= share link, GameMP.setup() auto-opens its join
// panel; otherwise we show the local mode picker.

newGame();
if(!urlRoom) showModeSelect();
