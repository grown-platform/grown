<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monopoly Deal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f1626;
    --panel: #18233b;
    --panel2: #1f2c49;
    --line: #2c3a5c;
    --text: #e8edf7;
    --muted: #94a3c4;
    --accent: #ffcf33;
    --good: #38d39f;
    --bad: #ff5d6c;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    touch-action: manipulation;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
  }
  body {
    display: flex;
    flex-direction: column;
    max-width: 520px;
    margin: 0 auto;
    height: 100dvh;
    overflow: hidden;
  }
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: linear-gradient(90deg,#c0392b,#e74c3c);
    border-bottom: 2px solid #7a2018;
  }
  header h1 {
    font-size: 16px;
    letter-spacing: .5px;
    text-shadow: 1px 1px 0 rgba(0,0,0,.35);
  }
  header h1 span { color: var(--accent); }
  .newbtn {
    background: #fff;
    color: #c0392b;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    font-size: 12px;
    padding: 6px 10px;
  }
  .newbtn:active { transform: scale(.95); }

  #status {
    flex: 0 0 auto;
    padding: 5px 10px;
    font-size: 12px;
    background: var(--panel2);
    border-bottom: 1px solid var(--line);
    min-height: 26px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #status .turn { font-weight: 700; }
  #status .turn.you { color: var(--good); }
  #status .turn.cpu { color: var(--bad); }
  #status .msg { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .board {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .player-zone {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 8px;
  }
  .player-zone.cpu { border-color: #5b2730; }
  .player-zone.you { border-color: #2a4f43; }
  /* Active player's zone gets an accent glow so it's clear whose turn it is. */
  .player-zone.active { box-shadow: 0 0 0 2px var(--accent); }
  .pz-head .name.opp { color: var(--bad); }
  /* Lobby list (online mode) */
  .lobby-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
  .lobby-row {
    display:flex; align-items:center; gap:8px; padding:9px 11px;
    background: var(--panel2); border:1px solid var(--line); border-radius:8px;
    font-size:13px; font-weight:600;
  }
  .lobby-row .badge { font-size:10px; color:#3a2c00; background:var(--accent); border-radius:4px; padding:1px 5px; font-weight:700; }
  .share-box {
    font:12px ui-monospace,monospace; word-break:break-all;
    background: var(--bg); border:1px solid var(--line); border-radius:8px;
    padding:8px; margin:8px 0;
  }
  .pz-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .pz-head .name.cpu { color: var(--bad); }
  .pz-head .name.you { color: var(--good); }
  .pz-stats { font-size: 11px; color: var(--muted); font-weight: 400; }
  .pz-stats b { color: var(--accent); }
  .sets-line { font-size: 11px; color: var(--muted); }
  .sets-line b { color: var(--good); }

  .props {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 8px;
  }
  .pile {
    display: flex;
    flex-direction: column;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,.4);
    min-width: 34px;
  }
  .pile.complete { box-shadow: 0 0 0 2px var(--accent); }
  .pile-head {
    font-size: 9px;
    text-align: center;
    padding: 1px 2px;
    color: #fff;
    font-weight: 700;
    text-shadow: 0 1px 1px rgba(0,0,0,.5);
    line-height: 1.3;
  }
  .pile-cards { display: flex; flex-direction: column; }
  .pcard {
    height: 12px;
    border-top: 1px solid rgba(255,255,255,.25);
    position: relative;
  }
  .pcard.wild::after {
    content: "★";
    position: absolute;
    right: 1px; top: -2px;
    font-size: 8px;
    color: rgba(255,255,255,.85);
  }
  .pcard.house::after { content:"H"; position:absolute; left:2px; top:-1px; font-size:8px; color:#fff; font-weight:700;}
  .pcard.hotel::after { content:"+"; position:absolute; left:2px; top:-2px; font-size:9px; color:#fff; font-weight:700;}

  .bank-line {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 4px;
    align-items: center;
  }
  .bank-label { font-size: 10px; color: var(--muted); margin-right: 2px; }
  .money-chip {
    font-size: 10px;
    background: #2e7d4f;
    color: #fff;
    border-radius: 3px;
    padding: 1px 4px;
    font-weight: 700;
    border: 1px solid #1d5234;
  }
  .money-chip.act { background:#5a4b8a; border-color:#3d3263; }

  /* Hand */
  .hand-panel {
    flex: 0 0 auto;
    background: var(--panel2);
    border-top: 2px solid var(--line);
    padding: 6px;
  }
  .hand-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .hand-info .lbl { font-size: 12px; font-weight: 700; }
  .hand-info .plays { font-size: 11px; color: var(--muted); }
  .hand-info .plays b { color: var(--accent); }
  .hand-scroll {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
    min-height: 92px;
  }
  .card {
    flex: 0 0 auto;
    width: 60px;
    height: 84px;
    border-radius: 7px;
    border: 1px solid rgba(0,0,0,.5);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #2a3654;
    transition: transform .08s;
    cursor: pointer;
  }
  .card:active { transform: translateY(-3px) scale(1.02); }
  .card.selected { box-shadow: 0 0 0 2px var(--accent); transform: translateY(-5px); }
  .card .ctop {
    font-size: 8px;
    padding: 2px 3px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 1px rgba(0,0,0,.5);
    line-height: 1.15;
  }
  .card .cbody {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2px;
    font-size: 8px;
    font-weight: 600;
    line-height: 1.2;
  }
  .card .cval {
    position: absolute;
    bottom: 2px; right: 3px;
    font-size: 9px;
    font-weight: 800;
    background: rgba(0,0,0,.45);
    border-radius: 3px;
    padding: 0 3px;
    color: var(--accent);
  }
  .card.money { background: linear-gradient(160deg,#2e7d4f,#1d5234); }
  .card.money .cbody { font-size: 22px; color:#eafff2; }
  .card.action { background: linear-gradient(160deg,#5a4b8a,#3d3263); }
  .card.action .cbody { font-size:8px; }
  .card.prop .cbody { font-size:8px; color:#fff; }
  .card.wildcard { background: linear-gradient(160deg,#444,#222); }

  /* Action buttons under hand */
  .actions-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .actions-row button {
    flex: 1;
    min-width: 70px;
    padding: 9px 6px;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 700;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .actions-row button:active { transform: scale(.97); }
  .actions-row button.primary { background: var(--accent); color:#3a2c00; border-color:#caa400; }
  .actions-row button.primary:disabled { opacity:.4; }
  .actions-row button:disabled { opacity:.4; }

  /* Modal / overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,8,16,.78);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    max-width: 380px;
    width: 100%;
    max-height: 88dvh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 17px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height:1.4; }
  .modal .opts { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
  .modal .opt {
    text-align: left;
    padding: 10px;
    background: var(--panel2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
  }
  .modal .opt:active { transform: scale(.98); }
  .modal .opt.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .modal .mbtns { display:flex; gap:8px; }
  .modal .mbtns button {
    flex:1; padding:11px; border:none; border-radius:8px; font-weight:700; font-size:13px;
  }
  .modal .mbtns .go { background: var(--accent); color:#3a2c00; }
  .modal .mbtns .cancel { background: var(--panel2); color: var(--text); border:1px solid var(--line); }
  .modal .mbtns button:disabled { opacity:.4; }

  .pay-grid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
  .pay-item {
    font-size:11px; padding:6px 8px; border-radius:6px; border:1px solid var(--line);
    background: var(--panel2); font-weight:700;
  }
  .pay-item.sel { border-color: var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .pay-item.money { color:#7bdca8; }
  .pay-item.prop { color:#ffd; }
  .pay-total { font-size:13px; margin-bottom:8px; }
  .pay-total b { color: var(--accent); }

  .win-emoji { font-size: 40px; text-align:center; margin-bottom:8px; }

  .log-toggle {
    font-size: 10px; color: var(--muted); text-decoration: underline; background:none;
    border:none; padding:0;
  }
  #log {
    display:none;
    max-height: 120px; overflow-y:auto; font-size:11px; color:var(--muted);
    background: var(--bg); border:1px solid var(--line); border-radius:6px; padding:6px; margin-top:6px;
  }
  #log.show { display:block; }
  #log div { padding:1px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  #log div.you { color:#9fe6c7; }
  #log div.cpu { color:#ffb3bb; }

  /* Mode-select buttons (reuse modal styling) */
  .mode-opts { display:flex; flex-direction:column; gap:10px; }
  .mode-opts button {
    padding:14px 16px; border:1px solid var(--line); border-radius:10px;
    background: var(--panel2); color: var(--text); font-size:15px; font-weight:700;
  }
  .mode-opts button:active { transform: scale(.98); }

  /* Privacy handoff overlay (2-player pass & play). Fully OPAQUE so the player
     taking the device cannot glimpse the previous player's hidden hand. Sits
     just below the injected top-right menu (z 2147483646). */
  #mdHandoff {
    position: fixed; inset: 0; z-index: 2147483640;
    background: var(--bg);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  #mdHandoff.show { display: flex; }
  .md-handoff-card {
    text-align: center; display: flex; flex-direction: column;
    gap: 18px; align-items: center;
  }
  #mdHandoffTitle { font-size: 24px; font-weight: 700; color: var(--accent); text-shadow: 0 0 8px rgba(255,207,51,.4); }
  #mdHandoffSub { font-size: 14px; color: var(--text); max-width: 280px; line-height: 1.4; }
  /* Slide-to-reveal: a deliberate drag-all-the-way gesture so the hand is never
     exposed by an accidental tap during a handoff. */
  .reveal-track {
    position: relative;
    width: min(320px, 78vw);
    height: 60px;
    border-radius: 30px;
    background: var(--panel);
    border: 1px solid var(--line);
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  .reveal-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 56px;
    background: var(--accent);
    border-radius: 30px;
  }
  .reveal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font: 600 14px system-ui, sans-serif;
    color: var(--muted);
    letter-spacing: 1px;
    pointer-events: none;
    padding-left: 40px;
  }
  .reveal-handle {
    position: absolute; left: 4px; top: 4px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent); color: #3a2c00;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    touch-action: none;
  }
</style>

<body>
  <header>
    <h1>MONOPOLY <span>DEAL</span></h1>
    <button class="newbtn" id="newGameBtn">New Game</button>
  </header>

  <div id="status">
    <span class="turn" id="turnLabel">—</span>
    <span class="msg" id="statusMsg">Tap New Game to start.</span>
  </div>

  <div class="board" id="board">
    <!-- Opponent zones (1-4 of them) are rendered dynamically into here. Each is a
         public tableau (name, hand count, sets, bank, properties). -->
    <div id="oppZones"></div>

    <!-- Local player's zone (You / the seat at this device). Public tableau. -->
    <div class="player-zone you" id="youZone">
      <div class="pz-head">
        <span class="name you" id="youName">😎 You</span>
        <span class="pz-stats"><span id="youHandWrap" style="display:none">Hand: <b id="youHandCount">0</b> · </span>Sets: <b id="youSets">0</b>/3</span>
      </div>
      <div class="props" id="youProps"></div>
      <div class="bank-line"><span class="bank-label">Bank:</span><span id="youBank"></span><span class="money-chip" id="youBankTotal">$0M</span></div>
    </div>
    <button class="log-toggle" id="logToggle">show log</button>
    <div id="log"></div>
  </div>

  <div class="hand-panel">
    <div class="hand-info">
      <span class="lbl">Your Hand</span>
      <span class="plays">Plays left: <b id="playsLeft">0</b> · Cards: <span id="handCount">0</span>/7</span>
    </div>
    <div class="hand-scroll" id="hand"></div>
    <div class="actions-row">
      <button id="playBtn" class="primary" disabled>Play Card</button>
      <button id="bankBtn" disabled>Bank It</button>
      <button id="endBtn" disabled>End Turn</button>
    </div>
  </div>

  <!-- Generic choice overlay -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>

  <!-- Mode-select overlay (shown on load) -->
  <div class="overlay" id="modeOverlay">
    <div class="modal">
      <h2>Monopoly Deal</h2>
      <p>Choose a mode</p>
      <div class="mode-opts">
        <button id="modeAi">🤖 vs Computer</button>
        <button id="modeTwo">👥 2 Players (pass &amp; play)</button>
        <button id="modeOnline">🌐 Online (2–5 players)</button>
      </div>
    </div>
  </div>

  <!-- vs-Computer setup: pick how many CPU opponents (1-4). -->
  <div class="overlay" id="aiSetupOverlay">
    <div class="modal">
      <h2>vs Computer</h2>
      <p>How many CPU opponents?</p>
      <div class="mode-opts" id="aiCountOpts">
        <button data-n="1">1 CPU</button>
        <button data-n="2">2 CPUs</button>
        <button data-n="3">3 CPUs</button>
        <button data-n="4">4 CPUs</button>
      </div>
    </div>
  </div>

  <!-- Online connect (create / join) -->
  <div class="overlay" id="onlineOverlay">
    <div class="modal" id="onlineModal"></div>
  </div>

  <!-- Online lobby (waiting room before host starts) -->
  <div class="overlay" id="lobbyOverlay">
    <div class="modal" id="lobbyModal"></div>
  </div>

  <!-- Privacy handoff overlay (2-player pass & play). Opaque; drag the handle
       all the way across to reveal the next player's hand. -->
  <div id="mdHandoff">
    <div class="md-handoff-card">
      <div id="mdHandoffTitle">Pass the device</div>
      <div id="mdHandoffSub"></div>
      <div id="mdRevealTrack" class="reveal-track">
        <div id="mdRevealFill" class="reveal-fill"></div>
        <div id="mdRevealText" class="reveal-text">slide to reveal</div>
        <div id="mdRevealHandle" class="reveal-handle">›</div>
      </div>
    </div>
  </div>

<script>
"use strict";
(function(){

// ---------- Audio ----------
let audioCtx = null;
function beep(freq, dur, type, vol){
  try {
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type||'sine';
    o.frequency.value = freq;
    g.gain.value = vol||0.06;
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur||0.12));
    o.start(t); o.stop(t + (dur||0.12));
  } catch(e){}
}
const snd = {
  play:   ()=>beep(520,0.08,'triangle',0.05),
  bank:   ()=>beep(330,0.10,'sine',0.05),
  prop:   ()=>beep(440,0.08,'square',0.04),
  action: ()=>{beep(660,0.07,'sawtooth',0.04); setTimeout(()=>beep(880,0.07,'sawtooth',0.04),70);},
  pay:    ()=>beep(220,0.14,'sine',0.06),
  win:    ()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.07),i*120));},
  lose:   ()=>{[400,300,200].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'sawtooth',0.06),i*150));},
  no:     ()=>beep(160,0.18,'square',0.06)
};

// ---------- Color group definitions ----------
// req = cards needed for a complete set. rent[] = rent value by # owned.
const GROUPS = {
  brown:    {name:'Brown',     color:'#8B4513', req:2, rent:[1,2] },
  lblue:    {name:'L.Blue',    color:'#87CEEB', req:3, rent:[1,2,3] },
  pink:     {name:'Pink',      color:'#FF69B4', req:3, rent:[1,2,4] },
  orange:   {name:'Orange',    color:'#FF8C00', req:3, rent:[1,3,5] },
  red:      {name:'Red',       color:'#E0152B', req:3, rent:[2,3,6] },
  yellow:   {name:'Yellow',    color:'#F2C200', req:3, rent:[2,4,6] },
  green:    {name:'Green',     color:'#1FA84C', req:3, rent:[2,4,7] },
  blue:     {name:'Blue',      color:'#1E5FD0', req:2, rent:[3,8] },
  railroad: {name:'Railroad',  color:'#333333', req:4, rent:[1,2,3,4] },
  utility:  {name:'Utility',   color:'#6B7A3A', req:2, rent:[1,2] }
};
const GROUP_KEYS = Object.keys(GROUPS);
// text color for pile head (dark groups need light text - all use white already, but light-blue/pink/yellow need dark)
function headTextColor(k){
  return (['lblue','yellow'].includes(k)) ? '#222' : '#fff';
}

// ---------- Build deck ----------
let UID = 1;
function mk(o){ o.id = UID++; return o; }

function buildDeck(){
  const deck = [];
  // Money cards: value:count
  const money = {1:6, 2:5, 3:3, 4:3, 5:2, 10:1};
  for(const v in money){
    for(let i=0;i<money[v];i++) deck.push(mk({type:'money', value:+v, name:'$'+v+'M'}));
  }
  // Property cards. value = bank value if used as money.
  const propVals = { brown:1, lblue:1, pink:2, orange:2, red:3, yellow:3, green:4, blue:4, railroad:2, utility:2 };
  for(const g of GROUP_KEYS){
    const cnt = GROUPS[g].req; // one full set's worth per group (enough to win)
    // add a bit extra so both players can compete: 2 sets worth for smaller groups
    const total = cnt; // one set each is plenty for 3-set win; we add wildcards for flex
    for(let i=0;i<total;i++){
      deck.push(mk({type:'property', group:g, value:propVals[g], name:GROUPS[g].name}));
    }
    // add a second copy of each so two players can both build
    for(let i=0;i<total;i++){
      deck.push(mk({type:'property', group:g, value:propVals[g], name:GROUPS[g].name}));
    }
  }
  // Property wildcards (any color)
  for(let i=0;i<4;i++) deck.push(mk({type:'wildcard', groups:'any', value:0, name:'Wild (any)'}));
  // Dual wildcards (two specific colors)
  const duals = [['brown','lblue'],['pink','orange'],['red','yellow'],['green','blue'],['railroad','utility'],['lblue','railroad'],['green','railroad']];
  for(const d of duals){
    deck.push(mk({type:'wildcard', groups:d, value:0, name:GROUPS[d[0]].name+'/'+GROUPS[d[1]].name}));
  }
  // Action cards
  function action(act, name, value, n, extra){
    for(let i=0;i<n;i++) deck.push(mk(Object.assign({type:'action', act, name, value}, extra||{})));
  }
  action('passgo','Pass Go',1,4);
  action('rent_any','Rent (any color)',3,2);  // wild rent: any property color
  action('rent','Rent',1,5);                   // colored rent (we treat all as choose-color)
  action('debt','Debt Collector',3,3);
  action('birthday',"It's My Birthday",2,3);
  action('dealbreaker','Deal Breaker',5,2);
  action('slydeal','Sly Deal',3,3);
  action('forceddeal','Forced Deal',3,3);
  action('sayno','Just Say No',4,3);
  action('house','House',3,3);
  action('hotel','Hotel',4,2);
  return deck;
}

// ---------- Game State ----------
let G = null;
// mode:
//  'ai'     = seat 0 is You; seats 1..N are CPUs (1-4 of them).
//  '2p'     = N human seats sharing the device via privacy pass-and-play.
//  'online' = N human seats over the relay; the HOST holds authoritative state
//             and thin clients render the public board + their private hand.
let mode = 'ai';
// numSeats: total players this game (2-5). Defaults to 2 (back-compat).
let numSeats = 2;
// In online mode, the seat THIS device controls (host is usually 0, but any).
let mySeatOnline = 0;
// Seat display names (used in 2p/online). Index by seat. Falls back to Player N.
let seatLabels = [];

// Perspective helpers.
//  meSeat()  = the seat whose hand/controls are face-up on THIS device.
//    - ai:     always seat 0 (You).
//    - 2p:     the seat to move (or viewSeat during a payment handoff).
//    - online: mySeatOnline (this device always controls its own seat).
function meSeat(){
  if(mode === 'online') return mySeatOnline;
  if(mode !== '2p') return 0;
  return (G && G.viewSeat != null) ? G.viewSeat : G.turn;
}
// opponentSeats(): every seat that is NOT `pi` (defaults to meSeat()).
function opponentSeats(pi){
  if(pi==null) pi = meSeat();
  const out=[];
  for(let i=0;i<numSeats;i++) if(i!==pi) out.push(i);
  return out;
}
// oppSeat(): legacy single-opponent helper (only meaningful with 2 seats).
function oppSeat(){ const o=opponentSeats(); return o.length?o[0]:(1-meSeat()); }
// nextSeat(): turn rotation.
function nextSeat(pi){ return (pi+1) % numSeats; }
// A seat is human-controlled if it's not a CPU.
function isHumanSeat(pi){
  if(!G || !G.players[pi]) return mode!=='ai' || pi===0;
  return !G.players[pi].cpu;
}
// In online mode the ACTIVE local player can only act on their OWN seat.
function isMyControllableSeat(pi){
  if(mode==='online') return pi===mySeatOnline;
  return isHumanSeat(pi);
}
// Display name for a seat.
function seatName(pi){
  if(seatLabels[pi]) return seatLabels[pi];
  if(mode === 'ai') return pi === 0 ? 'You' : 'CPU '+pi;
  if(mode === 'online') return pi===mySeatOnline ? 'You' : 'Player '+(pi+1);
  return 'Player ' + (pi + 1);
}

function freshPlayer(isCPU){
  return {
    cpu: isCPU,
    hand: [],
    bank: [],            // money + banked action cards
    props: {},           // group -> array of cards (property or wildcard assigned)
  };
}

// buildPlayers(): create the seat array for the current mode/numSeats.
function buildPlayers(){
  const arr=[];
  for(let i=0;i<numSeats;i++){
    // ai mode: seat 0 human, rest CPU. 2p/online: all human.
    const isCPU = (mode==='ai') && i!==0;
    arr.push(freshPlayer(isCPU));
  }
  return arr;
}

function newGame(){
  const deck = shuffle(buildDeck());
  G = {
    deck,
    discard: [],
    players: buildPlayers(),
    turn: 0,
    playsLeft: 0,
    drawnThisTurn: false,
    over: false,
    selected: null,
    busy: false,
    viewSeat: null      // 2p: temporary perspective override (e.g. during payment)
  };
  hideHandoff();
  buildOppZones();
  // deal 5 each
  for(let i=0;i<5;i++){ for(const p of G.players){ p.hand.push(drawCard()); } }
  log('New game started ('+numSeats+' players). '+seatName(0)+' goes first!', 'sys');
  startTurn(0);
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function drawCard(){
  if(G.deck.length===0){
    if(G.discard.length===0) return null;
    G.deck = shuffle(G.discard.splice(0));
    log('Reshuffled discard into deck.', 'sys');
  }
  return G.deck.pop();
}

// ---------- Turn flow ----------
function startTurn(pi){
  G.turn = pi;
  G.playsLeft = 3;
  G.selected = null;
  G.busy = false;
  const p = G.players[pi];
  const n = (p.hand.length===0) ? 5 : 2;
  for(let i=0;i<n;i++){ const c=drawCard(); if(c) p.hand.push(c); }
  if(mode==='online'){
    // Host drives online turns; see hostStartTurn(). This branch only runs for
    // the host's local engine — broadcast the new public state.
    if(checkWin()) return;
    broadcastState();
    render();
    return;
  }
  if(isHumanSeat(pi)){
    const isYou = (mode==='ai' && pi===0);
    setStatus('you', (isYou ? 'Your turn — ' : seatName(pi)+': ')+'play up to 3 cards.');
    render();
    if(checkWin()) return;
  } else {
    setStatus('cpu', seatName(pi)+" is thinking…");
    render();
    if(checkWin()) return;
    G.busy = true;
    setTimeout(()=>cpuTurn(pi), 700);
  }
}

function endTurn(){
  if(mode==='online'){ submitOnlineEndTurn(); return; }
  const pi = G.turn;
  const p = G.players[pi];
  // hand limit 7 — the active human discards down via the modal.
  if(p.hand.length > 7){
    promptDiscard();
    return;
  }
  finishEndTurn();
}

function finishEndTurn(){
  if(checkWin()) return;
  const next = nextSeat(G.turn);
  if(mode==='2p'){
    // Lock input and cover the screen BEFORE rendering for the next player, so
    // the player handing over the device can't glimpse the incoming hand.
    G.busy = true;
    showHandoff('Pass to '+seatName(next), seatName(next)+': take the device. '+seatName(G.turn)+', look away!', function(){
      startTurn(next);
    });
  } else {
    startTurn(next);
  }
}

// ---------- Win check ----------
function completeSets(p){
  let c = 0;
  for(const g of GROUP_KEYS){
    const arr = p.props[g];
    if(arr && countPropsInGroup(arr) >= GROUPS[g].req) c++;
  }
  return c;
}
function countPropsInGroup(arr){
  // count only property/wildcard cards (exclude house/hotel addons)
  return arr.filter(c=>c.type==='property'||c.type==='wildcard').length;
}
function checkWin(){
  for(let i=0;i<numSeats;i++){
    if(completeSets(G.players[i]) >= 3){
      G.over = true;
      if(mode==='online'){ hostGameOver(i); }
      showWin(i);
      return true;
    }
  }
  return false;
}

// ---------- Rendering ----------
function setStatus(who, msg){
  const tl = document.getElementById('turnLabel');
  tl.className = 'turn ' + who;
  const localSeat = meSeat();
  if(who==='you' && G && G.turn===localSeat){
    tl.textContent = 'YOUR TURN';
  } else if(who==='you' || who==='cpu'){
    tl.textContent = G ? seatName(G.turn).toUpperCase()+' TURN' : '';
  } else {
    tl.textContent = '';
  }
  document.getElementById('statusMsg').textContent = msg;
}

function bankTotal(p){ return p.bank.reduce((s,c)=>s+(c.value||0),0); }

// buildOppZones(): (re)create one public tableau panel per opponent seat. Called
// on new game / start so the DOM matches numSeats. Each panel exposes elements
// id'd by seat index so render() can update counts/props/bank cheaply.
function buildOppZones(){
  const wrap = document.getElementById('oppZones');
  if(!wrap) return;
  wrap.innerHTML='';
  const local = meSeat();
  for(let i=0;i<numSeats;i++){
    if(i===local) continue;               // local seat is the dedicated youZone
    const z=document.createElement('div');
    z.className='player-zone cpu';
    z.id='oppZone_'+i;
    z.innerHTML =
      '<div class="pz-head">'+
        '<span class="name opp" id="oppName_'+i+'"></span>'+
        '<span class="pz-stats">Hand: <b id="oppHand_'+i+'">0</b> · Sets: <b id="oppSets_'+i+'">0</b>/3</span>'+
      '</div>'+
      '<div class="props" id="oppProps_'+i+'"></div>'+
      '<div class="bank-line"><span class="bank-label">Bank:</span><span id="oppBank_'+i+'"></span><span class="money-chip" id="oppBankTotal_'+i+'">$0M</span></div>';
    wrap.appendChild(z);
  }
}

function render(){
  if(!G) return;
  const local = meSeat();
  // If the local seat changed (2p handoff), rebuild the opponent zones so the
  // current device-holder is the youZone and everyone else is an opponent panel.
  if(G._renderedLocal !== local){ buildOppZones(); G._renderedLocal = local; }

  // Local (you) zone.
  const you = G.players[local];
  document.getElementById('youName').textContent =
    (mode==='ai') ? '😎 You' : '🙂 '+seatName(local);
  document.getElementById('youSets').textContent = completeSets(you);
  document.getElementById('youHandCount').textContent = you.hand.length;
  // Local hand is face-up below, so only show the count badge in 2p (privacy).
  document.getElementById('youHandWrap').style.display = 'none';
  document.getElementById('youZone').classList.toggle('active', G.turn===local && !G.over);
  renderProps('youProps', you);
  renderBank('youBank','youBankTotal', you);

  // Opponent zones.
  for(let i=0;i<numSeats;i++){
    if(i===local) continue;
    const p=G.players[i];
    const nm=document.getElementById('oppName_'+i);
    if(!nm) continue; // zones not built for this seat
    const icon = p.cpu ? '🤖 ' : '🙂 ';
    nm.textContent = icon + seatName(i);
    document.getElementById('oppSets_'+i).textContent = completeSets(p);
    document.getElementById('oppHand_'+i).textContent = p.hand.length;
    document.getElementById('oppZone_'+i).classList.toggle('active', G.turn===i && !G.over);
    renderProps('oppProps_'+i, p);
    renderBank('oppBank_'+i,'oppBankTotal_'+i, p);
  }

  document.getElementById('handCount').textContent = you.hand.length;
  const myTurnPlays = (!G.over && G.turn===local && isMyControllableSeat(local));
  document.getElementById('playsLeft').textContent = myTurnPlays ? G.playsLeft : 0;

  renderHand();
  updateActionButtons();
}

function renderProps(elId, p){
  const el = document.getElementById(elId);
  el.innerHTML = '';
  for(const g of GROUP_KEYS){
    const arr = p.props[g];
    if(!arr || arr.length===0) continue;
    const propCount = countPropsInGroup(arr);
    const req = GROUPS[g].req;
    const complete = propCount >= req;
    const pile = document.createElement('div');
    pile.className = 'pile' + (complete?' complete':'');
    const head = document.createElement('div');
    head.className = 'pile-head';
    head.style.background = GROUPS[g].color;
    head.style.color = headTextColor(g);
    head.textContent = GROUPS[g].name + ' ' + propCount + '/' + req;
    pile.appendChild(head);
    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'pile-cards';
    for(const c of arr){
      const pc = document.createElement('div');
      pc.className = 'pcard';
      if(c.type==='wildcard') pc.className += ' wild';
      if(c.type==='action' && c.act==='house') pc.className += ' house';
      if(c.type==='action' && c.act==='hotel') pc.className += ' hotel';
      pc.style.background = GROUPS[g].color;
      cardsWrap.appendChild(pc);
    }
    pile.appendChild(cardsWrap);
    el.appendChild(pile);
  }
  if(el.innerHTML===''){
    el.innerHTML = '<span style="font-size:10px;color:#6b7794">no properties yet</span>';
  }
}

function renderBank(listId, totId, p){
  const el = document.getElementById(listId);
  el.innerHTML = '';
  // group money chips compactly
  for(const c of p.bank){
    const chip = document.createElement('span');
    chip.className = 'money-chip' + (c.type==='action'?' act':'');
    chip.textContent = c.type==='action' ? c.name.split(' ')[0]+'·$'+c.value : '$'+c.value;
    el.appendChild(chip);
  }
  document.getElementById(totId).textContent = '$'+bankTotal(p)+'M';
}

function cardLabel(c){
  if(c.type==='money') return {top:'MONEY', body:'$'+c.value+'M', cls:'money', val:''};
  if(c.type==='property') return {top:GROUPS[c.group].name, body:GROUPS[c.group].name+' property', cls:'prop', val:'$'+c.value+'M', bg:GROUPS[c.group].color};
  if(c.type==='wildcard'){
    const txt = c.groups==='any' ? 'WILD\nany color' : c.name;
    return {top:'WILD', body:txt, cls:'wildcard', val:''};
  }
  // action
  return {top:'ACTION', body:c.name, cls:'action', val:'$'+c.value+'M'};
}

function renderHand(){
  const el = document.getElementById('hand');
  el.innerHTML = '';
  const you = G.players[meSeat()]; // active player's hand is face-up here
  document.querySelector('.hand-info .lbl').textContent =
    (mode==='2p') ? seatName(meSeat())+"'s Hand" : 'Your Hand';
  you.hand.forEach((c, idx)=>{
    const info = cardLabel(c);
    const card = document.createElement('div');
    card.className = 'card ' + info.cls + (G.selected===c.id ? ' selected':'');
    if(info.bg){ card.style.background = info.bg; }
    const top = document.createElement('div');
    top.className = 'ctop';
    top.textContent = info.top;
    if(c.type==='property') top.style.background = GROUPS[c.group].color;
    const body = document.createElement('div');
    body.className = 'cbody';
    body.textContent = info.body;
    card.appendChild(top);
    card.appendChild(body);
    if(info.val){
      const v = document.createElement('div');
      v.className = 'cval';
      v.textContent = info.val;
      card.appendChild(v);
    }
    card.addEventListener('click', ()=> onSelectCard(c.id));
    el.appendChild(card);
  });
  if(you.hand.length===0){
    el.innerHTML = '<span style="font-size:11px;color:#6b7794;align-self:center;padding:30px 8px">Hand empty</span>';
  }
}

function selectedCard(){
  if(G.selected==null) return null;
  return G.players[meSeat()].hand.find(c=>c.id===G.selected) || null;
}

function onSelectCard(id){
  if(G.over || G.busy) return;
  // You can only act on your own turn (online: only your own seat).
  if(mode==='online'){ if(G.turn!==mySeatOnline) return; }
  else if(!isHumanSeat(G.turn)) return;
  G.selected = (G.selected===id) ? null : id;
  renderHand();
  updateActionButtons();
}

function updateActionButtons(){
  const playBtn = document.getElementById('playBtn');
  const bankBtn = document.getElementById('bankBtn');
  const endBtn  = document.getElementById('endBtn');
  const controllable = (mode==='online') ? (G.turn===mySeatOnline) : isHumanSeat(G.turn);
  const myTurn = (controllable && !G.over && !G.busy);
  const c = selectedCard();
  endBtn.disabled = !myTurn;
  if(!myTurn || !c || G.playsLeft<=0){
    playBtn.disabled = true; bankBtn.disabled = true;
    // money/property cards can't bank if no plays
  }
  if(myTurn && c && G.playsLeft>0){
    bankBtn.disabled = false; // any card can be banked (money or as money)
    // play depends on type
    if(c.type==='money'){
      playBtn.disabled = true; // money is only banked
      playBtn.textContent = 'Play Card';
    } else if(c.type==='property' || c.type==='wildcard'){
      playBtn.disabled = false;
      playBtn.textContent = 'Lay Property';
    } else {
      playBtn.disabled = false;
      playBtn.textContent = 'Play Action';
    }
  } else {
    playBtn.textContent = 'Play Card';
  }
  // If money card selected, relabel bank? keep "Bank It"
}

// ---------- Playing cards (YOU) ----------
function youBankCard(){
  const c = selectedCard();
  if(!c || G.playsLeft<=0) return;
  if(mode==='online'){ G.selected=null; submitOnlineAction({kind:'bank', cardId:c.id}); return; }
  const myPi = meSeat();
  removeFromHand(myPi, c.id);
  G.players[myPi].bank.push(c.type==='action' ? {id:c.id,type:'action',name:c.name,value:c.value,act:c.act} : c);
  snd.bank();
  log(seatName(myPi)+' banked '+c.name+' ($'+(c.value||0)+'M).', 'you');
  G.selected = null;
  G.playsLeft--;
  render();
  checkWin();
}

function youPlayCard(){
  const c = selectedCard();
  if(!c || G.playsLeft<=0) return;
  if(mode==='online'){ playOnlineCard(c); return; }
  const myPi = meSeat();
  if(c.type==='property'){
    layProperty(myPi, c, c.group);
    snd.prop();
    log(seatName(myPi)+' laid '+GROUPS[c.group].name+' property.', 'you');
    afterYouPlay();
  } else if(c.type==='wildcard'){
    chooseWildGroup(c, (g)=>{
      layProperty(myPi, c, g);
      snd.prop();
      log(seatName(myPi)+' played wildcard into '+GROUPS[g].name+'.', 'you');
      afterYouPlay();
    });
  } else if(c.type==='action'){
    playYouAction(c);
  }
}

function afterYouPlay(){
  G.selected = null;
  G.playsLeft--;
  render();
  if(checkWin()) return;
}

function removeFromHand(pi, id){
  const p = G.players[pi];
  const i = p.hand.findIndex(c=>c.id===id);
  if(i>=0) p.hand.splice(i,1);
}

function layProperty(pi, card, group){
  const p = G.players[pi];
  removeFromHand(pi, card.id);
  if(!p.props[group]) p.props[group]=[];
  // store the card with assigned group (wildcards remember assignment)
  const stored = Object.assign({}, card, {assignedGroup:group});
  p.props[group].push(stored);
}

// ---------- Action handling (active human player) ----------
// Shared by 'ai' and '2p' modes (online routes actions through the host
// validator). The actor is whichever seat is to move; targets are chosen among
// the N opponents. When there is exactly one valid opponent we skip the chooser.
//
// pickOpponent(valid, title, cb): valid is a list of seat indices that are
// legal targets; auto-resolves when only one, else opens a chooser modal.
function pickOpponent(valid, title, cb){
  if(valid.length===0){ toast('No valid target.'); return; }
  if(valid.length===1){ cb(valid[0]); return; }
  chooseOpponentTarget(valid, title, cb);
}

function playYouAction(c){
  const myPi = meSeat();
  const me = G.players[myPi];
  const ME = seatName(myPi);
  const opps = opponentSeats(myPi);
  switch(c.act){
    case 'passgo': {
      removeFromHand(myPi, c.id);
      G.discard.push(c);
      for(let i=0;i<2;i++){ const d=drawCard(); if(d) me.hand.push(d); }
      snd.action();
      log(ME+' played Pass Go — drew 2 cards.', 'you');
      afterYouPlay();
      break;
    }
    case 'birthday': {
      // Every opponent pays $2M.
      removeFromHand(myPi, c.id);
      G.discard.push(c);
      snd.action();
      log(ME+" played It's My Birthday — everyone pays $2M.", 'you');
      G.selected=null; G.playsLeft--; render();
      chargeMany(opps, myPi, 2, "It's My Birthday", ()=>{ if(!checkWin()) render(); });
      break;
    }
    case 'debt': {
      // Debt Collector targets ONE chosen opponent for $5M.
      pickOpponent(opps, 'Debt Collector — charge whom $5M?', (oppPi)=>{
        const OPP=seatName(oppPi);
        removeFromHand(myPi, c.id);
        G.discard.push(c);
        snd.action();
        log(ME+' played Debt Collector — '+OPP+' owes $5M.', 'you');
        G.selected=null; G.playsLeft--; render();
        requestPayment(oppPi, myPi, 5, 'Debt Collector', ()=>{ if(!checkWin()) render(); });
      });
      break;
    }
    case 'rent':
    case 'rent_any': {
      // choose a color you own to charge rent for; ALL opponents pay it.
      const owned = GROUP_KEYS.filter(g=> me.props[g] && countPropsInGroup(me.props[g])>0);
      if(owned.length===0){ toast('You have no properties to charge rent for.'); return; }
      chooseColorForRent(owned, (g)=>{
        const cnt = Math.min(countPropsInGroup(me.props[g]), GROUPS[g].rent.length);
        let amount = GROUPS[g].rent[cnt-1] || GROUPS[g].rent[GROUPS[g].rent.length-1];
        amount += addonBonus(me.props[g]);
        removeFromHand(myPi, c.id);
        G.discard.push(c);
        snd.action();
        log(ME+' played Rent on '+GROUPS[g].name+' — everyone owes $'+amount+'M.', 'you');
        G.selected=null; G.playsLeft--; render();
        chargeMany(opps, myPi, amount, 'Rent ('+GROUPS[g].name+')', ()=>{ if(!checkWin()) render(); });
      });
      break;
    }
    case 'slydeal': {
      // pick a victim that has a stealable property, then a property.
      const valid = opps.filter(o=> stealableProps(G.players[o], false).length>0);
      if(valid.length===0){ toast('No opponent has a stealable property.'); return; }
      pickOpponent(valid, 'Sly Deal — steal from whom?', (oppPi)=>{
        const opp=G.players[oppPi], OPP=seatName(oppPi);
        const stealable = stealableProps(opp, false);
        chooseStealTarget(stealable, 'Sly Deal — steal a property', oppPi, (pick)=>{
          attemptAction(c, myPi, oppPi, 'Sly Deal', ()=>{
            doSteal(oppPi, myPi, pick.group, pick.card);
            log(ME+' stole '+GROUPS[pick.group].name+' from '+OPP+'.', 'you');
          });
        });
      });
      break;
    }
    case 'forceddeal': {
      const mine = stealableProps(me, false);
      if(mine.length===0){ toast('You have no property to swap.'); return; }
      const valid = opps.filter(o=> stealableProps(G.players[o], false).length>0);
      if(valid.length===0){ toast('No opponent has a property to swap.'); return; }
      pickOpponent(valid, 'Forced Deal — swap with whom?', (oppPi)=>{
        const opp=G.players[oppPi], OPP=seatName(oppPi);
        const theirs = stealableProps(opp, false);
        chooseForcedDeal(mine, theirs, oppPi, (myPick, theirPick)=>{
          attemptAction(c, myPi, oppPi, 'Forced Deal', ()=>{
            doSteal(oppPi, myPi, theirPick.group, theirPick.card);
            doSteal(myPi, oppPi, myPick.group, myPick.card);
            log(ME+' swapped properties with '+OPP+'.', 'you');
          });
        });
      });
      break;
    }
    case 'dealbreaker': {
      const valid = opps.filter(o=> completeSetsList(G.players[o]).length>0);
      if(valid.length===0){ toast('No opponent has a complete set to steal.'); return; }
      pickOpponent(valid, 'Deal Breaker — steal from whom?', (oppPi)=>{
        const opp=G.players[oppPi], OPP=seatName(oppPi);
        const sets = completeSetsList(opp);
        chooseSetTarget(sets, (g)=>{
          attemptAction(c, myPi, oppPi, 'Deal Breaker', ()=>{
            stealWholeSet(oppPi, myPi, g);
            log(ME+' stole '+OPP+"'s "+GROUPS[g].name+' set!', 'you');
          });
        });
      });
      break;
    }
    case 'house':
    case 'hotel': {
      // add to a complete set you own
      const sets = completeSetsList(me).filter(g=>g!=='railroad' && g!=='utility');
      if(sets.length===0){ toast((c.act==='house'?'House':'Hotel')+' needs a complete (non-RR/util) set.'); return; }
      if(c.act==='hotel'){
        // hotel needs a house already
        const withHouse = sets.filter(g=> me.props[g].some(x=>x.act==='house'));
        if(withHouse.length===0){ toast('Hotel needs a set that already has a House.'); return; }
        chooseSetTarget(withHouse, (g)=>{
          removeFromHand(myPi,c.id);
          me.props[g].push(Object.assign({},c,{assignedGroup:g}));
          snd.action(); log(ME+' added a Hotel to '+GROUPS[g].name+'.', 'you');
          afterYouPlay();
        });
      } else {
        const noHouse = sets.filter(g=> !me.props[g].some(x=>x.act==='house'));
        if(noHouse.length===0){ toast('All your complete sets already have a House.'); return; }
        chooseSetTarget(noHouse, (g)=>{
          removeFromHand(myPi,c.id);
          me.props[g].push(Object.assign({},c,{assignedGroup:g}));
          snd.action(); log(ME+' added a House to '+GROUPS[g].name+'.', 'you');
          afterYouPlay();
        });
      }
      break;
    }
    case 'sayno': {
      toast('Just Say No is played automatically to cancel actions against you.');
      return;
    }
    default:
      toast('Cannot play that now.');
  }
}

function addonBonus(arr){
  let b=0;
  for(const c of arr){ if(c.act==='house') b+=3; if(c.act==='hotel') b+=4; }
  return b;
}

// attemptAction: handles Just Say No exchange, then onSuccess
function attemptAction(card, fromPi, toPi, label, onSuccess){
  // remove card from hand & discard
  removeFromHand(fromPi, card.id);
  G.discard.push(card);
  G.selected = null;
  G.playsLeft--;
  snd.action();
  // does target have Just Say No? (only auto-resolved when the target is a CPU)
  const target = G.players[toPi];
  const jsnIdx = target.hand.findIndex(c=>c.act==='sayno');
  if(jsnIdx>=0 && target.cpu){
    // CPU decides whether to say no
    if(cpuWantsSayNo(label)){
      const jsn = target.hand.splice(jsnIdx,1)[0];
      G.discard.push(jsn);
      snd.no();
      log(seatName(toPi)+' played Just Say No! Action cancelled.', 'cpu');
      // the actor (fromPi) may counter with their own JSN
      const myJsn = G.players[fromPi].hand.findIndex(c=>c.act==='sayno');
      if(myJsn>=0 && !G.players[fromPi].cpu){
        askYouCounterNo(()=>{
          const j = G.players[fromPi].hand.splice(myJsn,1)[0];
          G.discard.push(j);
          snd.no();
          log(seatName(fromPi)+' countered with Just Say No! Action proceeds.', 'you');
          onSuccess(); render(); checkWin();
        }, ()=>{ render(); checkWin(); });
        return;
      }
      render(); checkWin();
      return;
    }
  }
  onSuccess();
  render();
  checkWin();
}

// chargeMany: charge a list of payer seats `amount` each, paid to `payeePi`,
// sequentially (so 2p/online handoffs don't overlap). Calls done() at the end.
function chargeMany(payerSeats, payeePi, amount, reason, done){
  let i=0;
  function next(){
    if(i>=payerSeats.length){ if(done) done(); return; }
    const payer=payerSeats[i++];
    requestPayment(payer, payeePi, amount, reason, next);
  }
  next();
}

function cpuWantsSayNo(label){
  // CPU says no to high-impact actions
  return ['Deal Breaker','Sly Deal','Forced Deal'].includes(label) || Math.random()<0.4;
}

// ---------- steal helpers ----------
function stealableProps(p, fromCompleteOK){
  // returns [{group, card}] for individual props. Exclude cards in complete sets unless fromCompleteOK.
  const out=[];
  for(const g of GROUP_KEYS){
    const arr=p.props[g];
    if(!arr) continue;
    const complete = countPropsInGroup(arr) >= GROUPS[g].req;
    if(complete && !fromCompleteOK) continue;
    for(const c of arr){
      if(c.type==='property'||c.type==='wildcard') out.push({group:g, card:c});
    }
  }
  return out;
}
function completeSetsList(p){
  return GROUP_KEYS.filter(g=> p.props[g] && countPropsInGroup(p.props[g])>=GROUPS[g].req);
}
function doSteal(fromPi, toPi, group, card){
  const from=G.players[fromPi], to=G.players[toPi];
  const arr=from.props[group];
  const i=arr.findIndex(c=>c.id===card.id);
  if(i<0) return;
  const stolen=arr.splice(i,1)[0];
  if(arr.length===0) delete from.props[group];
  // re-assign to same group for receiver (or 'any' for wild keeps flexibility)
  const targetGroup = group;
  if(!to.props[targetGroup]) to.props[targetGroup]=[];
  stolen.assignedGroup=targetGroup;
  to.props[targetGroup].push(stolen);
}
function stealWholeSet(fromPi, toPi, group){
  const from=G.players[fromPi], to=G.players[toPi];
  const arr=from.props[group]||[];
  if(!to.props[group]) to.props[group]=[];
  for(const c of arr){ c.assignedGroup=group; to.props[group].push(c); }
  delete from.props[group];
}

// ---------- Payment ----------
// payer pays amount to payee, using money bank first; if insufficient money, must give properties.
function requestPayment(payerPi, payeePi, amount, reason, done){
  const payer = G.players[payerPi];
  const totalAssets = bankTotal(payer) + propAssetValue(payer);
  if(amount<=0 || totalAssets===0){
    log(seatName(payerPi)+' could not pay (no assets).', payer.cpu?'cpu':'you');
    if(done) done();
    return;
  }
  if(payer.cpu){
    // CPU auto-pays
    const paid = cpuPay(payerPi, payeePi, amount);
    log(seatName(payerPi)+' paid $'+paid+'M for '+reason+'.', 'cpu');
    snd.pay();
    if(done) done();
  } else if(mode==='2p' && payerPi !== G.turn){
    // The player who owes is NOT the one at the device. Hand over so they can
    // choose what to pay privately, then hand back to continue the turn.
    G.busy = true;
    showHandoff('Pass to '+seatName(payerPi), seatName(payerPi)+': you owe $'+amount+'M ('+reason+'). Choose what to pay.', function(){
      G.viewSeat = payerPi;          // show payer's hand/controls
      render();
      showPaymentModal(amount, payeePi, reason, function(){
        // Payment done — hand the device back to the active player.
        G.viewSeat = null;
        showHandoff('Pass to '+seatName(G.turn), seatName(G.turn)+': back to your turn.', function(){
          G.busy = false;
          render();
          if(done) done();
        });
      }, payerPi);
    });
  } else {
    // Active human (or ai-mode seat 0) chooses what to pay.
    showPaymentModal(amount, payeePi, reason, done, payerPi);
  }
}
function propAssetValue(p){
  let v=0;
  for(const g of GROUP_KEYS){ if(p.props[g]) for(const c of p.props[g]){ v+=(c.value||0); } }
  return v;
}

function cpuPay(payerPi, payeePi, amount){
  const payer = G.players[payerPi];
  const payee = G.players[payeePi];
  let remaining = amount;
  let paid = 0;
  // pay with money cards: prefer to overpay minimally — sort ascending, but Monopoly Deal has no change.
  // Strategy: use smallest combination that meets/exceeds, but keep it simple: sort ascending and add until >=.
  const moneyCards = payer.bank.filter(c=>true).slice().sort((a,b)=>(a.value||0)-(b.value||0));
  // Greedy: take from smallest until covered
  const toGive = [];
  let acc=0;
  for(const c of moneyCards){
    if(acc>=remaining) break;
    toGive.push(c); acc+=(c.value||0);
  }
  if(acc<remaining){
    // not enough money — give all bank then properties
  }
  // transfer chosen money
  for(const c of toGive){
    const i=payer.bank.findIndex(x=>x.id===c.id);
    if(i>=0){ const m=payer.bank.splice(i,1)[0]; payee.bank.push(m); paid+=(m.value||0); }
  }
  remaining = amount - paid;
  if(remaining>0){
    // give properties (lowest value first, prefer incomplete-set props)
    let props=[];
    for(const g of GROUP_KEYS){ if(payer.props[g]) for(const c of payer.props[g]){ if(c.type==='property'||c.type==='wildcard') props.push({g,c}); } }
    props.sort((a,b)=>(a.c.value||0)-(b.c.value||0));
    for(const pr of props){
      if(remaining<=0) break;
      // move property to payee bank? In real game props given go to property area; simplify: payee receives into props
      doSteal(payerPi, payeePi, pr.g, pr.c);
      paid += (pr.c.value||0);
      remaining -= (pr.c.value||0);
    }
  }
  return paid;
}

// ---------- CPU TURN ----------
// Generalized to N seats: `ci` is the CPU's seat. Targeted actions pick the most
// threatening human/CPU opponent (the one closest to winning / richest).
function cpuTurn(ci){
  let safety=0;
  function step(){
    safety++;
    if(G.over){ G.busy=false; return; }
    if(G.playsLeft<=0 || safety>20){ cpuEndTurn(ci); return; }
    const move = cpuChooseMove(ci);
    if(!move){ cpuEndTurn(ci); return; }
    cpuDoMove(ci, move, ()=>{
      render();
      if(checkWin()){ G.busy=false; return; }
      setTimeout(step, 650);
    });
  }
  step();
}

// cpuPickOpponent: choose a target seat among opponents, by a scoring fn.
// Default score = completeSets*10 + asset value (deny the leader).
function cpuPickOpponent(ci, scoreFn){
  let best=null, bestScore=-Infinity;
  for(const o of opponentSeats(ci)){
    const p=G.players[o];
    const s = scoreFn ? scoreFn(p,o) : (completeSets(p)*10 + bankTotal(p) + propAssetValue(p));
    if(s>bestScore){ bestScore=s; best=o; }
  }
  return best;
}

function cpuChooseMove(ci){
  const cpu = G.players[ci];
  // priority: win-enabling property plays, deal breaker, then build, rent, bank
  // 1) Lay properties that progress sets
  for(const c of cpu.hand){
    if(c.type==='property'){ return {kind:'lay', card:c, group:c.group}; }
  }
  // 2) Wildcards into the most useful group
  for(const c of cpu.hand){
    if(c.type==='wildcard'){
      const g = cpuBestWildGroup(ci, c);
      return {kind:'lay', card:c, group:g};
    }
  }
  // 3) Deal Breaker against the opponent with the best complete set
  const dbCard = cpu.hand.find(c=>c.act==='dealbreaker');
  if(dbCard){
    const vics = opponentSeats(ci).filter(o=>completeSetsList(G.players[o]).length>0);
    if(vics.length){ const v=cpuPickOpponent(ci,(p,o)=>vics.includes(o)?completeSets(p):-1); const sets=completeSetsList(G.players[v]); return {kind:'action', card:dbCard, victim:v, target:sets[0]}; }
  }
  // 4) Sly Deal a near-complete-set property from the leader
  const slyCard = cpu.hand.find(c=>c.act==='slydeal');
  if(slyCard){
    const vics = opponentSeats(ci).filter(o=>stealableProps(G.players[o],false).length>0);
    if(vics.length){ const v=vics[0]; const st=stealableProps(G.players[v],false); return {kind:'action', card:slyCard, victim:v, target:bestStealTarget(v, st)}; }
  }
  // 5) Rent if profitable (charges all opponents)
  const rentCard = cpu.hand.find(c=>c.act==='rent'||c.act==='rent_any');
  if(rentCard){
    const owned = GROUP_KEYS.filter(g=> cpu.props[g] && countPropsInGroup(cpu.props[g])>0);
    const someoneRich = opponentSeats(ci).some(o=> bankTotal(G.players[o])>0 || propAssetValue(G.players[o])>0);
    if(owned.length>0 && someoneRich){
      let best=owned[0], bestAmt=-1;
      for(const g of owned){
        const cnt=Math.min(countPropsInGroup(cpu.props[g]),GROUPS[g].rent.length);
        const amt=(GROUPS[g].rent[cnt-1]||0)+addonBonus(cpu.props[g]);
        if(amt>bestAmt){bestAmt=amt;best=g;}
      }
      return {kind:'action', card:rentCard, rentGroup:best};
    }
  }
  // 6) Debt collector / birthday if an opponent has money
  const debtCard = cpu.hand.find(c=>c.act==='debt');
  if(debtCard){ const v=cpuPickOpponent(ci); if(v!=null && (bankTotal(G.players[v])>=3 || propAssetValue(G.players[v])>=3)) return {kind:'action', card:debtCard, victim:v}; }
  const bdayCard = cpu.hand.find(c=>c.act==='birthday');
  if(bdayCard && opponentSeats(ci).some(o=> bankTotal(G.players[o])>=2 || propAssetValue(G.players[o])>=2)) return {kind:'action', card:bdayCard};
  // 7) Pass Go to draw
  const pg = cpu.hand.find(c=>c.act==='passgo');
  if(pg) return {kind:'action', card:pg};
  // 8) House/Hotel onto a complete set
  const houseCard = cpu.hand.find(c=>c.act==='house');
  if(houseCard){ const s=completeSetsList(cpu).filter(g=>g!=='railroad'&&g!=='utility'&&!cpu.props[g].some(x=>x.act==='house')); if(s.length) return {kind:'addon', card:houseCard, group:s[0]}; }
  const hotelCard = cpu.hand.find(c=>c.act==='hotel');
  if(hotelCard){ const s=completeSetsList(cpu).filter(g=>cpu.props[g].some(x=>x.act==='house')&&!cpu.props[g].some(x=>x.act==='hotel')); if(s.length) return {kind:'addon', card:hotelCard, group:s[0]}; }
  // 9) bank a card (money first, then least-useful action like sayno-keep)
  let bankCandidate = cpu.hand.find(c=>c.type==='money');
  if(!bankCandidate){
    bankCandidate = cpu.hand.find(c=>c.type==='action' && c.act!=='sayno');
  }
  if(!bankCandidate && cpu.hand.length>0){
    bankCandidate = cpu.hand.find(c=>c.act!=='sayno') || null;
  }
  if(bankCandidate) return {kind:'bank', card:bankCandidate};
  return null;
}

function cpuBestWildGroup(ci, c){
  const cpu=G.players[ci];
  const opts = c.groups==='any' ? GROUP_KEYS : c.groups;
  let best=opts[0], bestScore=-1;
  for(const g of opts){
    const have = cpu.props[g] ? countPropsInGroup(cpu.props[g]) : 0;
    if(have>=GROUPS[g].req) continue;
    const score = have / GROUPS[g].req + (have>0?0.5:0);
    if(score>bestScore){bestScore=score;best=g;}
  }
  return best;
}
function bestStealTarget(victimSeat, list){
  // prefer property in a group where the victim is close to complete
  const v=G.players[victimSeat];
  list.sort((a,b)=>{
    const av=(v.props[a.group]?countPropsInGroup(v.props[a.group]):0);
    const bv=(v.props[b.group]?countPropsInGroup(v.props[b.group]):0);
    return bv-av;
  });
  return list[0];
}

function cpuDoMove(ci, move, done){
  const cpu=G.players[ci];
  if(move.kind==='lay'){
    layProperty(ci, move.card, move.group);
    snd.prop();
    log(seatName(ci)+' laid '+GROUPS[move.group].name+' property.', 'cpu');
    done();
  } else if(move.kind==='bank'){
    removeFromHand(ci, move.card.id);
    cpu.bank.push(move.card);
    snd.bank();
    log(seatName(ci)+' banked '+move.card.name+'.', 'cpu');
    done();
  } else if(move.kind==='addon'){
    removeFromHand(ci, move.card.id);
    cpu.props[move.group].push(Object.assign({},move.card,{assignedGroup:move.group}));
    snd.action();
    log(seatName(ci)+' added '+move.card.name+' to '+GROUPS[move.group].name+'.', 'cpu');
    done();
  } else if(move.kind==='action'){
    cpuDoAction(ci, move, done);
  } else { done(); }
}

function cpuDoAction(ci, move, done){
  const c=move.card;
  const cpu=G.players[ci];
  const ME=seatName(ci);
  switch(c.act){
    case 'passgo':
      removeFromHand(ci,c.id); G.discard.push(c);
      for(let i=0;i<2;i++){ const d=drawCard(); if(d) cpu.hand.push(d); }
      G.playsLeft--; snd.action();
      log(ME+' played Pass Go (drew 2).', 'cpu');
      done(); break;
    case 'birthday':
      removeFromHand(ci,c.id); G.discard.push(c); G.playsLeft--; snd.action();
      log(ME+" played It's My Birthday — everyone owes $2M.", 'cpu');
      render();
      chargeMany(opponentSeats(ci), ci, 2, ME+"'s Birthday", done);
      break;
    case 'debt': {
      const v=move.victim;
      removeFromHand(ci,c.id); G.discard.push(c); G.playsLeft--; snd.action();
      log(ME+' played Debt Collector — '+seatName(v)+' owes $5M.', 'cpu');
      render();
      requestPayment(v,ci,5,'Debt Collector', done);
      break;
    }
    case 'rent':
    case 'rent_any': {
      const g=move.rentGroup;
      const cnt=Math.min(countPropsInGroup(cpu.props[g]),GROUPS[g].rent.length);
      let amt=(GROUPS[g].rent[cnt-1]||0)+addonBonus(cpu.props[g]);
      removeFromHand(ci,c.id); G.discard.push(c); G.playsLeft--; snd.action();
      log(ME+' played Rent on '+GROUPS[g].name+' — everyone owes $'+amt+'M.', 'cpu');
      render();
      chargeMany(opponentSeats(ci), ci, amt, 'Rent', done);
      break;
    }
    case 'slydeal':
      cpuAttempt(ci, move.victim, c, 'Sly Deal', ()=>{ doSteal(move.victim,ci,move.target.group,move.target.card); log(ME+' stole '+seatName(move.victim)+"'s "+GROUPS[move.target.group].name+' property.', 'cpu'); }, done);
      break;
    case 'dealbreaker':
      cpuAttempt(ci, move.victim, c, 'Deal Breaker', ()=>{ stealWholeSet(move.victim,ci,move.target); log(ME+' stole '+seatName(move.victim)+"'s "+GROUPS[move.target].name+' SET!', 'cpu'); }, done);
      break;
    default:
      removeFromHand(ci,c.id); cpu.bank.push(c); G.playsLeft--; done();
  }
}

// CPU (seat ci) plays an action against `victim` who might Just Say No.
function cpuAttempt(ci, victim, card, label, effect, done){
  removeFromHand(ci, card.id);
  G.discard.push(card);
  G.playsLeft--;
  snd.action();
  const vp=G.players[victim];
  const vJsnIdx = vp.hand.findIndex(c=>c.act==='sayno');
  // If the victim is a human (ai-mode seat 0), ask them; if a CPU, auto-decide.
  function counterMaybe(after){
    // CPU actor may counter the victim's JSN.
    const cjsn = G.players[ci].hand.findIndex(c=>c.act==='sayno');
    if(cjsn>=0 && Math.random()<0.6){
      const cj=G.players[ci].hand.splice(cjsn,1)[0]; G.discard.push(cj); snd.no();
      log(seatName(ci)+' countered with Just Say No! Action proceeds.', 'cpu');
      effect();
    }
    after();
  }
  if(vJsnIdx>=0 && !vp.cpu){
    askYouSayNo(label, seatName(ci), ()=>{
      const j=vp.hand.splice(vJsnIdx,1)[0]; G.discard.push(j); snd.no();
      log(seatName(victim)+' played Just Say No! '+seatName(ci)+' action cancelled.', 'you');
      counterMaybe(()=>{ render(); done(); });
    }, ()=>{ effect(); render(); done(); });
  } else if(vJsnIdx>=0 && vp.cpu && cpuWantsSayNo(label)){
    const j=vp.hand.splice(vJsnIdx,1)[0]; G.discard.push(j); snd.no();
    log(seatName(victim)+' played Just Say No! Action cancelled.', 'cpu');
    counterMaybe(()=>{ render(); done(); });
  } else {
    effect(); render(); done();
  }
}

function cpuEndTurn(ci){
  const cpu=G.players[ci];
  while(cpu.hand.length>7){
    const idx=cpuDiscardChoice(cpu);
    G.discard.push(cpu.hand.splice(idx,1)[0]);
  }
  log(seatName(ci)+' ended its turn.', 'cpu');
  G.busy=false;
  if(checkWin()) return;
  startTurn(nextSeat(ci));
}

function cpuDiscardChoice(p){
  // discard the least useful: prefer low money, then duplicate actions, keep properties & sayno
  let idx=0, worst=Infinity;
  p.hand.forEach((c,i)=>{
    let score;
    if(c.type==='property'||c.type==='wildcard') score=100;
    else if(c.act==='sayno') score=90;
    else if(c.type==='action') score=30+(c.value||0);
    else score=(c.value||0); // money
    if(score<worst){worst=score;idx=i;}
  });
  return idx;
}

// payment modal (the payer chooses what to pay)
function showPaymentModal(amount, payeePi, reason, done, payerPi){
  if(payerPi==null) payerPi = 0;
  const me=G.players[payerPi];
  const selected = new Set();
  // gather payable items: money bank + property cards
  const items=[];
  me.bank.forEach(c=> items.push({id:c.id, kind:'bank', value:c.value||0, label:'$'+(c.value||0)+'M'+(c.type==='action'?' ('+c.name.split(' ')[0]+')':'')}));
  for(const g of GROUP_KEYS){ if(me.props[g]) me.props[g].forEach(c=>{ if(c.type==='property'||c.type==='wildcard') items.push({id:c.id, kind:'prop', group:g, value:c.value||0, label:GROUPS[g].name+(c.type==='wildcard'?'*':'')+' $'+(c.value||0)+'M'}); }); }
  const totalAvail = items.reduce((s,i)=>s+i.value,0);
  const mustPay = Math.min(amount, totalAvail);

  function render(){
    modal.innerHTML='<h2>Pay $'+amount+'M</h2><p>'+reason+' — select cards to pay. You owe <b style="color:#ffcf33">$'+amount+'M</b>.'+(totalAvail<amount?' (You only have $'+totalAvail+'M — pay all.)':'')+'</p>';
    const grid=document.createElement('div'); grid.className='pay-grid';
    items.forEach(it=>{
      const d=document.createElement('button');
      d.className='pay-item '+(it.kind==='bank'?'money':'prop')+(selected.has(it.id)?' sel':'');
      d.textContent=it.label;
      d.onclick=()=>{ if(selected.has(it.id)) selected.delete(it.id); else selected.add(it.id); render(); };
      grid.appendChild(d);
    });
    modal.appendChild(grid);
    let sum=0; items.forEach(it=>{ if(selected.has(it.id)) sum+=it.value; });
    const tot=document.createElement('div'); tot.className='pay-total'; tot.innerHTML='Selected: <b>$'+sum+'M</b> / $'+mustPay+'M needed';
    modal.appendChild(tot);
    const btns=document.createElement('div'); btns.className='mbtns';
    const go=document.createElement('button'); go.className='go'; go.textContent='Pay';
    go.disabled = sum<mustPay;
    go.onclick=()=>{ doPay(); };
    btns.appendChild(go);
    modal.appendChild(btns);
  }
  function doPay(){
    const payee=G.players[payeePi];
    let paidProps=false;
    items.forEach(it=>{
      if(!selected.has(it.id)) return;
      if(it.kind==='bank'){
        const i=me.bank.findIndex(c=>c.id===it.id);
        if(i>=0) payee.bank.push(me.bank.splice(i,1)[0]);
      } else {
        const arr=me.props[it.group];
        const i=arr.findIndex(c=>c.id===it.id);
        if(i>=0){ doStealCardObj(payerPi, payeePi, it.group, arr[i]); paidProps=true; }
      }
    });
    snd.pay();
    log(seatName(payerPi)+' paid $'+[...selected].reduce((s,id)=>{const it=items.find(x=>x.id===id);return s+(it?it.value:0);},0)+'M for '+reason+'.', payerPi===0?'you':'cpu');
    closeModal();
    if(done) done();
  }
  render();
  overlay.classList.add('show');
}
// helper used by payment to move a specific prop card
function doStealCardObj(fromPi, toPi, group, card){
  const from=G.players[fromPi], to=G.players[toPi];
  const arr=from.props[group];
  const i=arr.findIndex(c=>c.id===card.id);
  if(i<0) return;
  const moved=arr.splice(i,1)[0];
  if(arr.length===0) delete from.props[group];
  if(!to.props[group]) to.props[group]=[];
  moved.assignedGroup=group;
  to.props[group].push(moved);
}
