// ---------- Privacy handoff (2-player pass & play) ----------
// Full-screen OPAQUE overlay covering the board + hand. Revealing the next
// player's hand requires a deliberate slide-all-the-way gesture, so the hand
// is never exposed by an accidental tap when handing over the device.
let slideMove = null, slideUp = null; // active window listeners (cleaned on reveal)
function showHandoff(title, sub, cb){
  document.getElementById('mdHandoffTitle').textContent = title;
  document.getElementById('mdHandoffSub').textContent = sub;
  document.getElementById('mdHandoff').classList.add('show');
  initSlider(function(){ hideHandoff(); cb(); });
}
function hideHandoff(){
  document.getElementById('mdHandoff').classList.remove('show');
}
function initSlider(onReveal){
  const track  = document.getElementById('mdRevealTrack');
  const handle = document.getElementById('mdRevealHandle');
  const fill   = document.getElementById('mdRevealFill');
  const text   = document.getElementById('mdRevealText');
  let dragging = false, done = false, grabDX = 0, x = 0, maxX = 0;
  function layout(){ maxX = Math.max(0, track.clientWidth - handle.offsetWidth - 8); }
  function paint(px){
    x = Math.max(0, Math.min(maxX, px));
    handle.style.left = (4 + x) + 'px';
    fill.style.width  = (handle.offsetWidth + 4 + x) + 'px';
    text.style.opacity = maxX ? String(Math.max(0, 1 - x / maxX)) : '1';
  }
  function animate(on){
    handle.style.transition = on ? 'left .2s' : '';
    fill.style.transition   = on ? 'width .2s' : '';
  }
  function cleanup(){
    window.removeEventListener('pointermove', slideMove);
    window.removeEventListener('pointerup', slideUp);
    window.removeEventListener('pointercancel', slideUp);
    slideMove = slideUp = null;
  }
  function reset(){ animate(true); paint(0); setTimeout(function(){ animate(false); }, 210); }
  function complete(){ done = true; animate(true); paint(maxX); cleanup(); setTimeout(onReveal, 190); }
  function ptX(e){ return e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0); }
  function down(e){ if(done) return; layout(); dragging = true; animate(false); grabDX = ptX(e) - x; e.preventDefault(); }
  slideMove = function(e){ if(!dragging || done) return; e.preventDefault(); paint(ptX(e) - grabDX); };
  slideUp = function(){ if(!dragging || done) return; dragging = false; if(x >= maxX - 4) complete(); else reset(); };
  cleanup();
  done = false; dragging = false;
  layout(); animate(false); paint(0); text.style.opacity = '1';
  track.onpointerdown = down;
  window.addEventListener('pointermove', slideMove, { passive: false });
  window.addEventListener('pointerup', slideUp);
  window.addEventListener('pointercancel', slideUp);
}

/* ============================================================================
 * ONLINE MULTIPLAYER (authoritative host) — Part B
 * ----------------------------------------------------------------------------
 * Transport: the game-room relay at /api/v1/gamerooms/ws. Messages are JSON;
 * the server stamps `from` (peerId) + `name`, sends roster/join/leave, supports
 * BROADCAST (no `to`) and PRIVATE (`to:"<peerId>"`).
 *
 * Roles: the HOST is the earliest peer in the room. The host holds the FULL
 * authoritative game state (deck + every hand + every board). Thin clients keep
 * only their own private hand + the public board, and submit ACTION INTENTS to
 * the host. The host VALIDATES every action against the real state, applies it,
 * then broadcasts the new public state and privately re-deals any changed hands.
 *
 * Hidden-info privacy: each player's hand is sent ONLY to that player via a
 * private `{to:peerId, type:"deal"|"hand", hand:[...]}` message. The public
 * broadcast contains only counts + face-up tableaus (props/banks/sets).
 *
 * Interactive cards implemented end-to-end:
 *   • Rent / Debt / Birthday  → host charges each payer; payer's client picks
 *     cards (pay_req → pay_resp); host validates + transfers.
 *   • Sly Deal / Forced Deal / Deal Breaker → actor resolves targets locally
 *     (all target info is public), submits a resolved descriptor; host applies.
 *   • Just Say No → one exchange: host asks the victim (jsn_ask → jsn_resp); if
 *     the victim says no, the host asks the ACTOR to counter. (See GAPS for the
 *     documented simplifications around longer JSN chains.)
 * ========================================================================== */

let net = {
  ws: null,
  myId: null,           // our peerId (from roster.you)
  hostId: null,         // peerId of the host (earliest peer)
  isHost: false,
  roster: [],           // [{id,name}] in join order
  seatOf: {},           // peerId -> seat index (assigned at game start)
  idOfSeat: [],         // seat index -> peerId
  started: false,
  code: null,
  pendingReplies: {}    // requestId -> callback (host-side, for pay/jsn round-trips)
};

function netSend(obj){ if(net.ws && net.ws.readyState===1) net.ws.send(JSON.stringify(obj)); }
function netSendTo(peerId, obj){ obj.to = peerId; netSend(obj); }

function netDisconnect(){
  net.started = false;
  if(net.ws){ try{ net.ws.onclose=null; net.ws.close(); }catch(e){} }
  net.ws = null;
}

// ---- Connect ----
function netConnect(code, pass, name, isCreate, onErr){
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  let url = proto + location.host + '/api/v1/gamerooms/ws?room=' + encodeURIComponent(code) +
    '&password=' + encodeURIComponent(pass||'') + '&name=' + encodeURIComponent(name) +
    '&game=' + encodeURIComponent('Monopoly Deal');
  if(isCreate) url += '&public=1';
  net.code = code;
  try { net.ws = new WebSocket(url); } catch(e){ if(onErr) onErr('Connection failed.'); return; }
  net.ws.onmessage = (ev)=>{ let m; try{ m=JSON.parse(ev.data); }catch(e){ return; } onNetMessage(m); };
  net.ws.onerror = ()=>{ if(onErr) onErr('Connection error.'); };
  net.ws.onclose = ()=>{ onNetClose(); };
}

function onNetClose(){
  if(!net.started) return;          // closed before/around lobby — ignore
  // If we lost the connection mid-game, end the game with a message.
  if(mode==='online'){
    setStatus('cpu','Disconnected from the room.');
    if(!G || !G.over){ announceFatal('Connection lost. Game ended.'); }
  }
}

function announceFatal(msg){
  if(G) G.over = true;
  hideHandoff(); closeModal();
  modal.innerHTML = '<div class="win-emoji">🔌</div><h2 style="text-align:center">Game ended</h2><p style="text-align:center">'+msg+'</p>';
  const btns=document.createElement('div'); btns.className='mbtns';
  const go=document.createElement('button'); go.className='go'; go.textContent='Back to menu';
  go.onclick=()=>{ closeModal(); netDisconnect(); showModeSelect(); };
  btns.appendChild(go); modal.appendChild(btns);
  overlay.classList.add('show');
}

// ---- Incoming messages ----
function onNetMessage(m){
  switch(m.type){
    case 'roster':
      net.myId = m.you;
      net.roster = m.peers || [];
      recomputeHost();
      if(!net.started) renderLobby();
      else if(net.isHost) hostHandlePresence();
      break;
    case 'join':
      if(!net.roster.find(p=>p.id===m.from)) net.roster.push({id:m.from, name:m.name});
      recomputeHost();
      if(!net.started) renderLobby();
      break;
    case 'leave': {
      // Capture host identity BEFORE recompute so we can detect a host departure
      // (after recompute the next peer would wrongly look like the host).
      const leftWasHost = (m.from === net.hostId);
      net.roster = net.roster.filter(p=>p.id!==m.from);
      if(!net.started){ recomputeHost(); renderLobby(); }
      else { handlePeerLeave(m.from, leftWasHost); }
      break;
    }
    // ---- lobby/start ----
    case 'start':        // host -> all: game begins (public seat assignment)
      clientOnStart(m); break;
    case 'deal':         // host -> me (private): my starting hand
    case 'hand':         // host -> me (private): my updated hand
      clientOnHand(m); break;
    case 'state':        // host -> all: public board snapshot
      clientOnState(m); break;
    case 'gameover':
      clientOnGameOver(m); break;
    // ---- host-bound from clients ----
    case 'action':       // client -> host: an action intent
      if(net.isHost) hostOnAction(m); break;
    case 'endturn':
      if(net.isHost) hostOnEndTurn(m); break;
    case 'discard':
      if(net.isHost) hostOnDiscard(m); break;
    // ---- round-trip replies ----
    case 'pay_req':      clientOnPayReq(m); break;
    case 'pay_resp':     if(net.isHost) hostOnReply(m); break;
    case 'jsn_ask':      clientOnJsnAsk(m); break;
    case 'jsn_resp':     if(net.isHost) hostOnReply(m); break;
    case 'log':          if(m.msg) log(m.msg, m.who||'sys'); break;
  }
}

function recomputeHost(){
  // Host = earliest peer in roster order (index 0). The relay preserves order.
  if(net.roster.length===0){ net.hostId=null; return; }
  net.hostId = net.roster[0].id;
  net.isHost = (net.hostId === net.myId);
}

// ============================ LOBBY ===========================================
let lobbyOverlay = document.getElementById('lobbyOverlay');
let lobbyModal = document.getElementById('lobbyModal');
function renderLobby(){
  document.getElementById('onlineOverlay').classList.remove('show');
  lobbyOverlay.classList.add('show');
  const n = net.roster.length;
  let html = '<h2>Lobby</h2>';
  html += '<p>Room code <b style="color:#ffcf33">'+(net.code||'')+'</b> · '+n+'/5 players'+(net.isHost?' · you are host':'')+'</p>';
  html += '<div class="lobby-list">';
  net.roster.slice(0,5).forEach((p,i)=>{
    const youTag = p.id===net.myId ? ' <span class="badge">YOU</span>' : '';
    const hostTag = (i===0) ? ' <span class="badge">HOST</span>' : '';
    html += '<div class="lobby-row">'+ (i+1) +'. '+escapeHtml(p.name||('Player '+(i+1)))+youTag+hostTag+'</div>';
  });
  html += '</div>';
  lobbyModal.innerHTML = html;
  const link = location.origin + location.pathname + '?room=' + (net.code||'');
  const share = document.createElement('div'); share.className='share-box'; share.textContent = link;
  lobbyModal.appendChild(share);
  const btns=document.createElement('div'); btns.className='mbtns';
  if(net.isHost){
    const start=document.createElement('button'); start.className='go'; start.textContent='Start game ('+n+')';
    start.disabled = n<2 || n>5;
    start.onclick=()=> hostStartGame();
    btns.appendChild(start);
    const copy=document.createElement('button'); copy.className='cancel'; copy.textContent='Copy link';
    copy.onclick=()=>{ try{ navigator.clipboard.writeText(link); copy.textContent='Copied!'; }catch(e){} };
    btns.appendChild(copy);
  } else {
    const wait=document.createElement('div'); wait.style.cssText='font-size:13px;color:#94a3c4;flex:1;text-align:center;padding:8px';
    wait.textContent='Waiting for host to start…';
    btns.appendChild(wait);
  }
  lobbyModal.appendChild(btns);
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ======================== HOST: start & deal =================================
function hostStartGame(){
  const peers = net.roster.slice(0,5);
  if(peers.length<2){ return; }
  numSeats = peers.length;
  mode = 'online';
  net.started = true;
  // Assign seats in roster order; host takes its own seat too.
  net.idOfSeat = peers.map(p=>p.id);
  net.seatOf = {};
  seatLabels = [];
  peers.forEach((p,i)=>{ net.seatOf[p.id]=i; seatLabels[i]=p.name||('Player '+(i+1)); });
  mySeatOnline = net.seatOf[net.myId];
  // Build the authoritative game.
  const deck = shuffle(buildDeck());
  G = { deck, discard:[], players:buildPlayers(), turn:0, playsLeft:0, over:false, selected:null, busy:false, viewSeat:null };
  for(let i=0;i<5;i++){ for(const p of G.players){ p.hand.push(drawCard()); } }
  // Tell everyone the game started + seat map (public).
  netSend({ type:'start', seats: peers.map(p=>({id:p.id, name:p.name})), numSeats });
  // Deal each player their private hand.
  for(let s=0;s<numSeats;s++){ dealPrivateHand(s, 'deal'); }
  // Local host UI setup.
  lobbyOverlay.classList.remove('show');
  buildOppZones();
  G._renderedLocal = mySeatOnline;
  log('Online game started ('+numSeats+' players).', 'sys');
  hostStartTurn(0);
}

// dealPrivateHand: send seat s's hand to its peer privately (host's own seat is
// applied directly to its local thin-view hand mirror).
function dealPrivateHand(seat, kind){
  const pid = net.idOfSeat[seat];
  const hand = G.players[seat].hand;
  if(pid===net.myId){ /* host renders from G directly */ return; }
  netSendTo(pid, { type:kind||'hand', hand: hand });
}

// Public snapshot: everything EXCEPT hidden hands (hands -> counts only).
function publicSnapshot(){
  return {
    turn: G.turn,
    playsLeft: G.playsLeft,
    over: G.over,
    deckCount: G.deck.length,
    players: G.players.map(p=>({
      cpu: false,
      handCount: p.hand.length,
      bank: p.bank,
      props: p.props
    }))
  };
}
function broadcastState(){
  if(mode!=='online' || !net.isHost) return;
  netSend({ type:'state', pub: publicSnapshot() });
}

// hostStartTurn: advance the authoritative turn, draw, broadcast.
function hostStartTurn(seat){
  G.turn = seat;
  G.playsLeft = 3;
  G.selected = null;
  G.busy = false;
  const p = G.players[seat];
  const n = (p.hand.length===0) ? 5 : 2;
  for(let i=0;i<n;i++){ const c=drawCard(); if(c) p.hand.push(c); }
  if(checkWin()) return;             // checkWin -> hostGameOver + broadcast
  dealPrivateHand(seat,'hand');      // the active player drew — update their hand
  broadcastState();
  hostRenderLocal();
  netBroadcastLog(seatName(seat)+"'s turn.");
}

function netBroadcastLog(msg, who){
  log(msg, who||'sys');
  if(net.isHost) netSend({ type:'log', msg, who:'sys' });
}

// hostGameOver: announce winner to all.
function hostGameOver(winnerSeat){
  netSend({ type:'gameover', winner: winnerSeat });
  broadcastState();
}

// hostHandlePresence / handlePeerLeave: disconnect handling. `leftWasHost` is
// computed by the caller before the host is recomputed.
function hostHandlePresence(){ /* roster already updated; nothing extra here */ }
function handlePeerLeave(peerId, leftWasHost){
  if(leftWasHost){
    // The HOST left — game ends for everyone (mid-game, authoritative state is
    // gone). Non-hosts simply cannot continue.
    announceFatal('The host left the game.');
    return;
  }
  // A non-host left. Only the (still-present) host mutates authoritative state.
  if(net.isHost && G){
    const seat = net.seatOf[peerId];
    if(seat==null || !G.players[seat]) return;
    netBroadcastLog(seatName(seat)+' disconnected — their assets are frozen.');
    G.players[seat].gone = true;
    broadcastState(); hostRenderLocal();
    if(G.turn===seat && !G.over){ hostStartTurn(hostNextActiveSeat(seat)); }
  }
}
function hostNextActiveSeat(seat){
  let s=seat, guard=0;
  do { s=nextSeat(s); guard++; } while(G.players[s] && G.players[s].gone && guard<numSeats);
  return s;
}

// ======================== HOST: apply actions ================================
// hostOnAction: a client (or the host's own UI) submitted a resolved action.
// `m.seat` is the acting seat (host re-validates it's that peer's turn).
function hostOnAction(m){
  if(!validateActor(m)) return;
  applyHostAction(m.seat, m.action);
}
function validateActor(m){
  if(!net.isHost || !G || G.over) return false;
  const seat = m.seat!=null ? m.seat : net.seatOf[m.from];
  if(seat==null || seat!==G.turn) return false;            // not their turn
  if(m.from!=null && net.seatOf[m.from]!==seat) return false; // spoofed seat
  if(G.playsLeft<=0 && m.action && m.action.kind!=='__none') return false;
  return true;
}

// applyHostAction: execute a validated action on the authoritative G.
// action shapes:
//   {kind:'bank', cardId}
//   {kind:'lay', cardId, group}            (group chosen for wildcards)
//   {kind:'passgo', cardId}
//   {kind:'addon', cardId, group}          (house/hotel)
//   {kind:'rent', cardId, group}           (charge all opponents)
//   {kind:'debt', cardId, victim}
//   {kind:'birthday', cardId}
//   {kind:'sly', cardId, victim, group, targetCardId}
//   {kind:'forced', cardId, victim, myGroup, myCardId, theirGroup, theirCardId}
//   {kind:'dealbreaker', cardId, victim, group}
function applyHostAction(seat, a){
  const p = G.players[seat];
  const card = p.hand.find(c=>c.id===a.cardId);
  if(!card && a.kind!=='__none') return;                   // card not in hand
  const finish = ()=>{ if(!checkWin()){ broadcastState(); hostRenderLocal(); } };
  const afterPlay = ()=>{ G.playsLeft--; dealPrivateHand(seat,'hand'); finish(); };
  switch(a.kind){
    case 'bank':
      removeFromHand(seat, card.id);
      p.bank.push(card.type==='action'?{id:card.id,type:'action',name:card.name,value:card.value,act:card.act}:card);
      netBroadcastLog(seatName(seat)+' banked '+card.name+'.');
      afterPlay(); break;
    case 'lay':
      layProperty(seat, card, a.group||card.group);
      netBroadcastLog(seatName(seat)+' laid a '+GROUPS[a.group||card.group].name+' property.');
      afterPlay(); break;
    case 'passgo':
      removeFromHand(seat, card.id); G.discard.push(card);
      for(let i=0;i<2;i++){ const d=drawCard(); if(d) p.hand.push(d); }
      netBroadcastLog(seatName(seat)+' played Pass Go (drew 2).');
      afterPlay(); break;
    case 'addon': {
      if(!G.players[seat].props[a.group]) return;
      removeFromHand(seat, card.id);
      p.props[a.group].push(Object.assign({},card,{assignedGroup:a.group}));
      netBroadcastLog(seatName(seat)+' added '+card.name+' to '+GROUPS[a.group].name+'.');
      afterPlay(); break;
    }
    case 'rent': {
      const g=a.group;
      if(!p.props[g]) return;
      const cnt=Math.min(countPropsInGroup(p.props[g]),GROUPS[g].rent.length);
      let amt=(GROUPS[g].rent[cnt-1]||0)+addonBonus(p.props[g]);
      removeFromHand(seat, card.id); G.discard.push(card); G.playsLeft--;
      dealPrivateHand(seat,'hand');
      netBroadcastLog(seatName(seat)+' played Rent on '+GROUPS[g].name+' — everyone owes $'+amt+'M.');
      broadcastState(); hostRenderLocal();
      hostChargeSeats(activeOpponents(seat), seat, amt, 'Rent ('+GROUPS[g].name+')', finish);
      break;
    }
    case 'debt': {
      removeFromHand(seat, card.id); G.discard.push(card); G.playsLeft--;
      dealPrivateHand(seat,'hand');
      netBroadcastLog(seatName(seat)+' played Debt Collector — '+seatName(a.victim)+' owes $5M.');
      broadcastState(); hostRenderLocal();
      hostChargeSeats([a.victim], seat, 5, 'Debt Collector', finish);
      break;
    }
    case 'birthday': {
      removeFromHand(seat, card.id); G.discard.push(card); G.playsLeft--;
      dealPrivateHand(seat,'hand');
      netBroadcastLog(seatName(seat)+" played It's My Birthday — everyone pays $2M.");
      broadcastState(); hostRenderLocal();
      hostChargeSeats(activeOpponents(seat), seat, 2, "It's My Birthday", finish);
      break;
    }
    case 'sly': {
      hostTargetedAction(seat, a, 'Sly Deal', ()=>{
        const arr=G.players[a.victim].props[a.group];
        const tc=arr && arr.find(c=>c.id===a.targetCardId);
        if(tc){ doSteal(a.victim, seat, a.group, tc); netBroadcastLog(seatName(seat)+' stole '+GROUPS[a.group].name+' from '+seatName(a.victim)+'.'); }
      }, finish);
      break;
    }
    case 'forced': {
      hostTargetedAction(seat, a, 'Forced Deal', ()=>{
        const tArr=G.players[a.victim].props[a.theirGroup];
        const mArr=G.players[seat].props[a.myGroup];
        const tc=tArr && tArr.find(c=>c.id===a.theirCardId);
        const mc=mArr && mArr.find(c=>c.id===a.myCardId);
        if(tc) doSteal(a.victim, seat, a.theirGroup, tc);
        if(mc) doSteal(seat, a.victim, a.myGroup, mc);
        netBroadcastLog(seatName(seat)+' swapped properties with '+seatName(a.victim)+'.');
      }, finish);
      break;
    }
    case 'dealbreaker': {
      hostTargetedAction(seat, a, 'Deal Breaker', ()=>{
        stealWholeSet(a.victim, seat, a.group);
        netBroadcastLog(seatName(seat)+' stole '+seatName(a.victim)+"'s "+GROUPS[a.group].name+' set!');
      }, finish);
      break;
    }
    default: break;
  }
}

function activeOpponents(seat){ return opponentSeats(seat).filter(o=>!G.players[o].gone); }

// hostTargetedAction: spend the card, run a single Just Say No exchange with the
// victim, then apply `effect` if not cancelled.
function hostTargetedAction(actor, a, label, effect, done){
  const card = G.players[actor].hand.find(c=>c.id===a.cardId);
  if(card){ removeFromHand(actor, card.id); G.discard.push(card); }
  G.playsLeft--;
  dealPrivateHand(actor,'hand');
  broadcastState(); hostRenderLocal();
  hostAskJsn(a.victim, label, actor, (victimSaidNo)=>{
    if(!victimSaidNo){ effect(); done(); return; }
    netBroadcastLog(seatName(a.victim)+' played Just Say No!');
    // offer the actor a counter
    hostAskJsn(actor, 'counter '+label, a.victim, (actorCountered)=>{
      if(actorCountered){ netBroadcastLog(seatName(actor)+' countered with Just Say No!'); effect(); }
      done();
    });
  });
}

// hostAskJsn: ask `seat` whether to use Just Say No. If that seat has no JSN, or
// is gone, auto-resolve to "no". Round-trips to a remote player; CPU n/a online.
function hostAskJsn(seat, label, otherSeat, cb){
  const p=G.players[seat];
  const has = p.hand.some(c=>c.act==='sayno');
  if(!has || p.gone){ cb(false); return; }
  const pid = net.idOfSeat[seat];
  if(pid===net.myId){
    // host's own seat — ask locally
    askYouSayNo(label, seatName(otherSeat), ()=>{ hostConsumeJsn(seat); cb(true); }, ()=>cb(false));
    return;
  }
  const rid = 'jsn_'+(UID++);
  net.pendingReplies[rid] = (resp)=>{
    if(resp && resp.useNo){ hostConsumeJsn(seat); cb(true); } else cb(false);
  };
  netSendTo(pid, { type:'jsn_ask', rid, label, by: seatName(otherSeat) });
  // safety timeout: if no reply in 20s, treat as "allow".
  setTimeout(()=>{ if(net.pendingReplies[rid]){ const f=net.pendingReplies[rid]; delete net.pendingReplies[rid]; f({useNo:false}); } }, 20000);
}
function hostConsumeJsn(seat){
  const p=G.players[seat];
  const i=p.hand.findIndex(c=>c.act==='sayno');
  if(i>=0){ G.discard.push(p.hand.splice(i,1)[0]); dealPrivateHand(seat,'hand'); }
}

// hostChargeSeats: charge each seat `amount`, sequentially.
function hostChargeSeats(seats, payeeSeat, amount, reason, done){
  let i=0;
  function next(){
    if(i>=seats.length){ if(done) done(); return; }
    const s=seats[i++];
    hostChargeOne(s, payeeSeat, amount, reason, next);
  }
  next();
}
function hostChargeOne(payerSeat, payeeSeat, amount, reason, done){
  const payer=G.players[payerSeat];
  if(payer.gone){ done(); return; }
  const total = bankTotal(payer)+propAssetValue(payer);
  if(amount<=0 || total===0){ netBroadcastLog(seatName(payerSeat)+' had nothing to pay.'); done(); return; }
  const pid=net.idOfSeat[payerSeat];
  if(pid===net.myId){
    // host's own seat pays via the local payment modal
    showPaymentModalOnline(payerSeat, payeeSeat, amount, reason, (cardIds)=>{ hostApplyPayment(payerSeat,payeeSeat,cardIds,amount,reason); done(); });
    return;
  }
  const rid='pay_'+(UID++);
  net.pendingReplies[rid]=(resp)=>{ hostApplyPayment(payerSeat, payeeSeat, (resp&&resp.cardIds)||[], amount, reason); done(); };
  netSendTo(pid, { type:'pay_req', rid, amount, reason });
  setTimeout(()=>{ if(net.pendingReplies[rid]){ const f=net.pendingReplies[rid]; delete net.pendingReplies[rid]; f({cardIds:hostAutoPayPick(payerSeat,amount)}); } }, 30000);
}
// hostAutoPayPick: fallback selection if a payer times out (greedy smallest).
function hostAutoPayPick(payerSeat, amount){
  const p=G.players[payerSeat]; const ids=[]; let acc=0;
  const money=p.bank.slice().sort((a,b)=>(a.value||0)-(b.value||0));
  for(const c of money){ if(acc>=amount) break; ids.push(c.id); acc+=(c.value||0); }
  if(acc<amount){ for(const g of GROUP_KEYS){ if(p.props[g]) for(const c of p.props[g]){ if(acc>=amount) break; if(c.type==='property'||c.type==='wildcard'){ ids.push(c.id); acc+=(c.value||0); } } } }
  return ids;
}
// hostApplyPayment: validate the payer's chosen cards cover the debt (or are
// all their assets), then transfer them to the payee.
function hostApplyPayment(payerSeat, payeeSeat, cardIds, amount, reason){
  const payer=G.players[payerSeat], payee=G.players[payeeSeat];
  const chosen=new Set(cardIds||[]);
  let sum=0, transferred=0;
  // money bank
  for(const c of payer.bank.slice()){ if(chosen.has(c.id)){ sum+=(c.value||0); } }
  for(const g of GROUP_KEYS){ if(payer.props[g]) for(const c of payer.props[g]){ if(chosen.has(c.id)) sum+=(c.value||0); } }
  const totalAvail=bankTotal(payer)+propAssetValue(payer);
  const need=Math.min(amount, totalAvail);
  if(sum<need){
    // invalid/short selection — fall back to auto-pick to keep the game moving.
    cardIds=hostAutoPayPick(payerSeat, need); chosen.clear(); cardIds.forEach(id=>chosen.add(id));
  }
  // transfer money cards
  for(const c of payer.bank.slice()){ if(chosen.has(c.id)){ const i=payer.bank.findIndex(x=>x.id===c.id); if(i>=0){ payee.bank.push(payer.bank.splice(i,1)[0]); transferred+=(c.value||0); } } }
  // transfer property cards
  for(const g of GROUP_KEYS){ if(payer.props[g]) for(const c of payer.props[g].slice()){ if(chosen.has(c.id)){ doStealCardObj(payerSeat, payeeSeat, g, c); transferred+=(c.value||0); } } }
  netBroadcastLog(seatName(payerSeat)+' paid $'+transferred+'M to '+seatName(payeeSeat)+' for '+reason+'.');
  dealPrivateHand(payerSeat,'hand'); dealPrivateHand(payeeSeat,'hand');
  broadcastState(); hostRenderLocal();
}

// hostOnReply: route a pay_resp / jsn_resp back to its pending callback.
function hostOnReply(m){
  const f=net.pendingReplies[m.rid];
  if(f){ delete net.pendingReplies[m.rid]; f(m); }
}

// hostOnEndTurn: the active player ended their turn.
function hostOnEndTurn(m){
  if(!net.isHost || !G || G.over) return;
  const seat = m.seat!=null?m.seat:net.seatOf[m.from];
  if(seat!==G.turn) return;
  const p=G.players[seat];
  if(p.hand.length>7){
    // ask the player to discard down (handled client-side via discard message)
    netSendTo(net.idOfSeat[seat], { type:'pay_req', rid:'discard', amount:0, reason:'__discard', discard:p.hand.length-7 });
    // We reuse a discard round-trip below instead:
    hostRequestDiscard(seat);
    return;
  }
  hostStartTurn(hostNextActiveSeat(seat));
}
function hostRequestDiscard(seat){
  const need=G.players[seat].hand.length-7;
  const pid=net.idOfSeat[seat];
  if(pid===net.myId){ promptDiscardOnline(seat, ()=>hostStartTurn(hostNextActiveSeat(seat))); return; }
  const rid='disc_'+(UID++);
  net.pendingReplies[rid]=(resp)=>{ hostApplyDiscard(seat,(resp&&resp.cardIds)||[]); hostStartTurn(hostNextActiveSeat(seat)); };
  netSendTo(pid, { type:'pay_req', rid, amount:0, reason:'__discard', discard:need, isDiscard:true });
  setTimeout(()=>{ if(net.pendingReplies[rid]){ const f=net.pendingReplies[rid]; delete net.pendingReplies[rid]; f({cardIds:G.players[seat].hand.slice(0,need).map(c=>c.id)}); } }, 30000);
}
function hostOnDiscard(m){ /* discard arrives via hostOnReply (pay_resp w/ isDiscard) */ }
function hostApplyDiscard(seat, cardIds){
  const p=G.players[seat]; const set=new Set(cardIds);
  p.hand = p.hand.filter(c=>{ if(set.has(c.id)){ G.discard.push(c); return false; } return true; });
  dealPrivateHand(seat,'hand');
}

// ======================== CLIENT (thin) side =================================
// Thin clients keep their own hand + a public snapshot, and synthesize a G-like
// object so the existing render() can draw the board.
let clientHand = [];
let clientPub = null;

function clientOnStart(m){
  mode='online'; net.started=true;
  const seats = m.seats||[];
  numSeats = m.numSeats || seats.length;
  net.idOfSeat = seats.map(s=>s.id);
  net.seatOf={}; seatLabels=[];
  seats.forEach((s,i)=>{ net.seatOf[s.id]=i; seatLabels[i]=s.name||('Player '+(i+1)); });
  mySeatOnline = net.seatOf[net.myId];
  clientHand=[]; clientPub=null;
  lobbyOverlay.classList.remove('show');
  document.getElementById('onlineOverlay').classList.remove('show');
  if(!net.isHost){ buildClientG(); buildOppZones(); G._renderedLocal=mySeatOnline; render(); onlineStatus(); }
}
function clientOnHand(m){
  if(net.isHost) return;            // host renders from G
  clientHand = m.hand||[];
  if(G){ G.players[mySeatOnline].hand = clientHand.slice(); render(); }
}
function clientOnState(m){
  if(net.isHost) return;
  clientPub = m.pub;
  buildClientG();
  render();
  onlineStatus();
}
function clientOnGameOver(m){ if(!net.isHost){ if(G) G.over=true; showWin(m.winner); } }

// buildClientG: fold the public snapshot + our private hand into a G object the
// renderer understands. Opponent hands are placeholders (count only).
function buildClientG(){
  if(!clientPub){
    G = { players: [], turn:0, playsLeft:0, over:false, selected:null, busy:false, viewSeat:null };
    for(let i=0;i<numSeats;i++) G.players.push(freshPlayer(false));
    G.players[mySeatOnline].hand = clientHand.slice();
    return;
  }
  const prevSel = G && G.selected;
  G = { players: [], turn:clientPub.turn, playsLeft:clientPub.playsLeft, over:clientPub.over, selected:prevSel, busy:false, viewSeat:null, _renderedLocal: mySeatOnline };
  clientPub.players.forEach((pp,i)=>{
    const pl = freshPlayer(false);
    pl.bank = pp.bank||[];
    pl.props = pp.props||{};
    if(i===mySeatOnline){ pl.hand = clientHand.slice(); }
    else { pl.hand = new Array(pp.handCount||0).fill(0).map(()=>({id:-1,type:'money',value:0,name:'?'})); } // placeholders for count
    G.players[i]=pl;
  });
}

// ---- Client: respond to host requests ----
function clientOnPayReq(m){
  if(net.isHost) return;            // host charges itself via local modal
  if(m.reason==='__discard' || m.isDiscard){
    promptDiscardOnline(mySeatOnline, (cardIds)=>{ netSendTo(net.hostId, { type:'pay_resp', rid:m.rid, cardIds, isDiscard:true }); }, m.discard);
    return;
  }
  showPaymentModalOnline(mySeatOnline, null, m.amount, m.reason, (cardIds)=>{
    netSendTo(net.hostId, { type:'pay_resp', rid:m.rid, cardIds });
  });
}
function clientOnJsnAsk(m){
  if(net.isHost) return;
  // Does my hand actually contain a Just Say No? If not, auto-allow.
  if(!clientHand.some(c=>c.act==='sayno')){ netSendTo(net.hostId, { type:'jsn_resp', rid:m.rid, useNo:false }); return; }
  askYouSayNo(m.label, m.by||'Opponent',
    ()=>netSendTo(net.hostId, { type:'jsn_resp', rid:m.rid, useNo:true }),
    ()=>netSendTo(net.hostId, { type:'jsn_resp', rid:m.rid, useNo:false }));
}

// hostRenderLocal: the host is also a player — refresh its own board view from G.
function hostRenderLocal(){ if(net.isHost){ G._renderedLocal=mySeatOnline; render(); onlineStatus(); } }

// onlineStatus: refresh the top status line for online mode.
function onlineStatus(){
  if(mode!=='online' || !G || G.over) return;
  if(G.turn===mySeatOnline) setStatus('you', 'Your turn — play up to 3 cards.');
  else setStatus('cpu', seatName(G.turn)+"'s turn…");
}

// ======================= ONLINE: local action submission =====================
// In online mode the player's UI builds a resolved action descriptor and submits
// it to the host (the host submits to itself). The host is the single source of
// truth, so we DON'T mutate G here — we wait for the rebroadcast.
function submitOnlineAction(action){
  const msg = { type:'action', seat:mySeatOnline, action };
  if(net.isHost){ hostOnAction(Object.assign({from:net.myId}, msg)); }
  else netSendTo(net.hostId, msg);
}
function submitOnlineEndTurn(){
  if(net.isHost) hostOnEndTurn({from:net.myId, seat:mySeatOnline});
  else netSendTo(net.hostId, { type:'endturn', seat:mySeatOnline });
}

// playOnlineCard: build a resolved action descriptor for the selected card using
// PUBLIC board info (all target info is public) + the local choosers, then
// submit it to the host. The host re-validates everything.
function playOnlineCard(c){
  const me = G.players[mySeatOnline];
  const opps = activeOpponentsLocal(mySeatOnline);
  G.selected = null;
  if(c.type==='property'){ submitOnlineAction({kind:'lay', cardId:c.id, group:c.group}); render(); return; }
  if(c.type==='wildcard'){ chooseWildGroup(c, (g)=>{ submitOnlineAction({kind:'lay', cardId:c.id, group:g}); }); return; }
  // action
  switch(c.act){
    case 'passgo': submitOnlineAction({kind:'passgo', cardId:c.id}); render(); break;
    case 'birthday': submitOnlineAction({kind:'birthday', cardId:c.id}); render(); break;
    case 'debt':
      pickOpponent(opps, 'Debt Collector — charge whom $5M?', (v)=> submitOnlineAction({kind:'debt', cardId:c.id, victim:v}));
      break;
    case 'rent':
    case 'rent_any': {
      const owned = GROUP_KEYS.filter(g=> me.props[g] && countPropsInGroup(me.props[g])>0);
      if(owned.length===0){ toast('You have no properties to charge rent for.'); G.selected=c.id; render(); return; }
      chooseColorForRent(owned, (g)=> submitOnlineAction({kind:'rent', cardId:c.id, group:g}));
      break;
    }
    case 'slydeal': {
      const valid = opps.filter(o=> stealableProps(G.players[o], false).length>0);
      if(valid.length===0){ toast('No opponent has a stealable property.'); G.selected=c.id; render(); return; }
      pickOpponent(valid, 'Sly Deal — steal from whom?', (v)=>{
        chooseStealTarget(stealableProps(G.players[v],false), 'Sly Deal — steal a property', v, (pick)=>{
          submitOnlineAction({kind:'sly', cardId:c.id, victim:v, group:pick.group, targetCardId:pick.card.id});
        });
      });
      break;
    }
    case 'forceddeal': {
      const mine = stealableProps(me, false);
      if(mine.length===0){ toast('You have no property to swap.'); G.selected=c.id; render(); return; }
      const valid = opps.filter(o=> stealableProps(G.players[o], false).length>0);
      if(valid.length===0){ toast('No opponent has a property to swap.'); G.selected=c.id; render(); return; }
      pickOpponent(valid, 'Forced Deal — swap with whom?', (v)=>{
        chooseForcedDeal(mine, stealableProps(G.players[v],false), v, (myPick, theirPick)=>{
          submitOnlineAction({kind:'forced', cardId:c.id, victim:v, myGroup:myPick.group, myCardId:myPick.card.id, theirGroup:theirPick.group, theirCardId:theirPick.card.id});
        });
      });
      break;
    }
    case 'dealbreaker': {
      const valid = opps.filter(o=> completeSetsList(G.players[o]).length>0);
      if(valid.length===0){ toast('No opponent has a complete set to steal.'); G.selected=c.id; render(); return; }
      pickOpponent(valid, 'Deal Breaker — steal from whom?', (v)=>{
        chooseSetTarget(completeSetsList(G.players[v]), (g)=> submitOnlineAction({kind:'dealbreaker', cardId:c.id, victim:v, group:g}));
      });
      break;
    }
    case 'house':
    case 'hotel': {
      const sets = completeSetsList(me).filter(g=>g!=='railroad' && g!=='utility');
      if(sets.length===0){ toast((c.act==='house'?'House':'Hotel')+' needs a complete (non-RR/util) set.'); G.selected=c.id; render(); return; }
      const elig = (c.act==='hotel')
        ? sets.filter(g=> me.props[g].some(x=>x.act==='house') && !me.props[g].some(x=>x.act==='hotel'))
        : sets.filter(g=> !me.props[g].some(x=>x.act==='house'));
      if(elig.length===0){ toast(c.act==='hotel'?'Need a set with a House and no Hotel.':'All your sets already have a House.'); G.selected=c.id; render(); return; }
      chooseSetTarget(elig, (g)=> submitOnlineAction({kind:'addon', cardId:c.id, group:g}));
      break;
    }
    case 'sayno': toast('Just Say No is played automatically to cancel actions against you.'); G.selected=c.id; render(); break;
    default: toast('Cannot play that now.'); G.selected=c.id; render();
  }
}
// activeOpponentsLocal: opponents from THIS client's view (skips disconnected).
function activeOpponentsLocal(seat){
  return opponentSeats(seat).filter(o=> !(G.players[o] && G.players[o].gone));
}

// Online payment modal — reuses the same card-picker UI but returns chosen ids.
function showPaymentModalOnline(payerSeat, payeeSeat, amount, reason, cb){
  const me = (payerSeat===mySeatOnline) ? G.players[mySeatOnline] : G.players[payerSeat];
  // Build the item list from the payer's OWN assets (host has full G; client has
  // its own hand + public board which includes its own bank/props).
  const src = (net.isHost) ? G.players[payerSeat] : G.players[mySeatOnline];
  const items=[]; const selected=new Set();
  src.bank.forEach(c=> items.push({id:c.id, kind:'bank', value:c.value||0, label:'$'+(c.value||0)+'M'+(c.type==='action'?' ('+c.name.split(' ')[0]+')':'')}));
  for(const g of GROUP_KEYS){ if(src.props[g]) src.props[g].forEach(c=>{ if(c.type==='property'||c.type==='wildcard') items.push({id:c.id, kind:'prop', group:g, value:c.value||0, label:GROUPS[g].name+(c.type==='wildcard'?'*':'')+' $'+(c.value||0)+'M'}); }); }
  const totalAvail=items.reduce((s,i)=>s+i.value,0);
  const mustPay=Math.min(amount, totalAvail);
  function draw(){
    modal.innerHTML='<h2>Pay $'+amount+'M</h2><p>'+reason+' — select cards to pay. You owe <b style="color:#ffcf33">$'+amount+'M</b>.'+(totalAvail<amount?' (You only have $'+totalAvail+'M — pay all.)':'')+'</p>';
    const grid=document.createElement('div'); grid.className='pay-grid';
    items.forEach(it=>{ const d=document.createElement('button'); d.className='pay-item '+(it.kind==='bank'?'money':'prop')+(selected.has(it.id)?' sel':''); d.textContent=it.label; d.onclick=()=>{ if(selected.has(it.id)) selected.delete(it.id); else selected.add(it.id); draw(); }; grid.appendChild(d); });
    modal.appendChild(grid);
    let sum=0; items.forEach(it=>{ if(selected.has(it.id)) sum+=it.value; });
    const tot=document.createElement('div'); tot.className='pay-total'; tot.innerHTML='Selected: <b>$'+sum+'M</b> / $'+mustPay+'M needed'; modal.appendChild(tot);
    const btns=document.createElement('div'); btns.className='mbtns'; const go=document.createElement('button'); go.className='go'; go.textContent='Pay'; go.disabled=sum<mustPay;
    go.onclick=()=>{ closeModal(); cb([...selected]); }; btns.appendChild(go); modal.appendChild(btns);
  }
  draw(); overlay.classList.add('show');
}

// Online discard modal — returns chosen ids.
function promptDiscardOnline(seat, cb, needOverride){
  const src = (net.isHost) ? G.players[seat] : G.players[mySeatOnline];
  const need = needOverride!=null ? needOverride : (src.hand.length-7);
  const sel=new Set();
  function draw(){
    modal.innerHTML='<h2>Discard '+need+'</h2><p>Hand limit is 7. Choose '+need+' card(s) to discard.</p>';
    const grid=document.createElement('div'); grid.className='pay-grid';
    src.hand.forEach(c=>{ const d=document.createElement('button'); d.className='pay-item '+(c.type==='money'?'money':'prop')+(sel.has(c.id)?' sel':''); d.textContent=c.name; d.onclick=()=>{ if(sel.has(c.id)) sel.delete(c.id); else if(sel.size<need) sel.add(c.id); draw(); }; grid.appendChild(d); });
    modal.appendChild(grid);
    const tot=document.createElement('div'); tot.className='pay-total'; tot.innerHTML='Selected <b>'+sel.size+'</b> / '+need; modal.appendChild(tot);
    const btns=document.createElement('div'); btns.className='mbtns'; const go=document.createElement('button'); go.className='go'; go.textContent='Discard'; go.disabled=sel.size!==need;
    go.onclick=()=>{ closeModal(); if(net.isHost){ hostApplyDiscard(seat,[...sel]); } cb([...sel]); }; btns.appendChild(go); modal.appendChild(btns);
  }
  draw(); overlay.classList.add('show');
}

// ---------- Mode selection ----------
const modeOverlay = document.getElementById('modeOverlay');
function showModeSelect(){
  netDisconnect();
  document.getElementById('onlineOverlay').classList.remove('show');
  document.getElementById('lobbyOverlay').classList.remove('show');
  document.getElementById('aiSetupOverlay').classList.remove('show');
  modeOverlay.classList.add('show');
}
function startMode(m, seats){
  mode = m;
  seatLabels = [];
  numSeats = seats || 2;
  modeOverlay.classList.remove('show');
  document.getElementById('aiSetupOverlay').classList.remove('show');
  newGame();
}

// ---------- Wire up buttons ----------
// "New Game" returns to the mode picker so you can switch AI / 2-player.
document.getElementById('newGameBtn').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); showModeSelect(); });
function localTurnControllable(){
  if(!G) return false;
  if(mode==='online') return G.turn===mySeatOnline && !G.over;
  return isHumanSeat(G.turn) && !G.over;
}
document.getElementById('playBtn').addEventListener('click', ()=>{ if(!G||G.busy) return; youPlayCard(); });
document.getElementById('bankBtn').addEventListener('click', ()=>{ if(!G||G.busy) return; youBankCard(); });
document.getElementById('endBtn').addEventListener('click', ()=>{ if(!G||G.busy||!localTurnControllable()) return; endTurn(); });
document.getElementById('logToggle').addEventListener('click', (e)=>{
  const el=document.getElementById('log'); el.classList.toggle('show');
  e.target.textContent = el.classList.contains('show')?'hide log':'show log';
});
document.getElementById('modeAi').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); showAiSetup(); });
document.getElementById('modeTwo').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); startMode('2p', 2); });
document.getElementById('modeOnline').addEventListener('click', ()=>{ if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); showOnlineConnect(); });

// vs-Computer opponent count picker.
function showAiSetup(){
  modeOverlay.classList.remove('show');
  document.getElementById('aiSetupOverlay').classList.add('show');
}
document.querySelectorAll('#aiCountOpts button').forEach(b=>{
  b.addEventListener('click', ()=>{ const n=parseInt(b.getAttribute('data-n'),10)||1; startMode('ai', n+1); });
});

// ---- Online connect overlay (create / join) ----
const onlineOverlay = document.getElementById('onlineOverlay');
const onlineModal = document.getElementById('onlineModal');
const NET_ADJ=['Swift','Brave','Clever','Lucky','Mighty','Sly','Witty','Bold','Cosmic','Turbo','Sneaky','Jolly','Nimble','Fuzzy','Zippy','Rad'];
const NET_ANI=['Otter','Fox','Panda','Falcon','Tiger','Koala','Wolf','Lynx','Raven','Gecko','Moose','Heron','Badger','Orca','Yak','Wombat'];
function suggestNick(){ function pk(a){ const b=new Uint8Array(1); crypto.getRandomValues(b); return a[b[0]%a.length]; } const n=new Uint8Array(1); crypto.getRandomValues(n); return pk(NET_ADJ)+' '+pk(NET_ANI)+' '+(10+(n[0]%90)); }
function randCode(){ const s='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let o=''; const a=new Uint8Array(7); crypto.getRandomValues(a); for(let i=0;i<7;i++) o+=s[a[i]%s.length]; return o; }

function showOnlineConnect(joinRoom){
  modeOverlay.classList.remove('show');
  onlineOverlay.classList.add('show');
  const nick = suggestNick();
  let html='<h2>'+(joinRoom?'Join online game':'Play online')+'</h2>';
  html+='<p>2–5 players. Share a link to invite friends.</p>';
  html+='<div style="margin-bottom:10px"><label style="font-size:12px;color:#94a3c4">Your nickname</label>'+
    '<input id="onName" maxlength="40" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2c3a5c;background:#0b1220;color:#e8edf7;margin-top:4px"></div>';
  html+='<div style="margin-bottom:10px"><label style="font-size:12px;color:#94a3c4">Room password (optional)</label>'+
    '<input id="onPass" type="password" placeholder="optional" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2c3a5c;background:#0b1220;color:#e8edf7;margin-top:4px"></div>';
  html+='<div id="onErr" style="font-size:13px;color:#ff5d6c;min-height:16px;margin-bottom:6px"></div>';
  onlineModal.innerHTML=html;
  document.getElementById('onName').value=nick;
  const btns=document.createElement('div'); btns.className='mbtns';
  if(joinRoom){
    const go=document.createElement('button'); go.className='go'; go.textContent='Join';
    go.onclick=()=>{ const name=document.getElementById('onName').value||nick; const pass=document.getElementById('onPass').value; document.getElementById('onErr').textContent='Connecting…'; netConnect(joinRoom, pass, name, false, (e)=>{ document.getElementById('onErr').textContent=e; }); };
    btns.appendChild(go);
  } else {
    const go=document.createElement('button'); go.className='go'; go.textContent='Create room';
    go.onclick=()=>{ const name=document.getElementById('onName').value||nick; const pass=document.getElementById('onPass').value; const code=randCode(); document.getElementById('onErr').textContent='Creating…'; netConnect(code, pass, name, true, (e)=>{ document.getElementById('onErr').textContent=e; }); };
    btns.appendChild(go);
  }
  const cancel=document.createElement('button'); cancel.className='cancel'; cancel.textContent='Back';
  cancel.onclick=()=>{ netDisconnect(); onlineOverlay.classList.remove('show'); modeOverlay.classList.add('show'); };
  btns.appendChild(cancel);
  onlineModal.appendChild(btns);
}

// prevent double-tap zoom on buttons
document.addEventListener('dblclick', e=>e.preventDefault(), {passive:false});

const urlRoom = new URLSearchParams(location.search).get('room');
newGame();
if(urlRoom){ showOnlineConnect(urlRoom); }
else showModeSelect();

})();
