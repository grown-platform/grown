<!DOCTYPE html>
<html lang="en">
<head>

<title>Stacker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0e1a;
    color: #e8ecf5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    touch-action: none;
    padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
  }
  header {
    width: 100%;
    max-width: 480px;
    text-align: center;
    padding: 10px 6px 6px;
    flex: 0 0 auto;
  }
  h1 {
    font-size: clamp(22px, 7vw, 34px);
    letter-spacing: 4px;
    font-weight: 800;
    background: linear-gradient(180deg, #7fd0ff, #2f7fff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 18px rgba(60,140,255,0.25);
  }
  #stats {
    display: flex;
    justify-content: space-around;
    gap: 6px;
    margin-top: 8px;
    font-size: clamp(11px, 3.2vw, 14px);
  }
  .stat { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 5px 10px; min-width: 64px; }
  .stat b { display: block; font-size: clamp(15px, 4.5vw, 19px); color: #fff; margin-top: 2px; }
  #stage {
    flex: 1 1 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    position: relative;
  }
  canvas {
    display: block;
    background: #0c1222;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.06);
    touch-action: none;
  }
  footer {
    flex: 0 0 auto;
    width: 100%;
    max-width: 480px;
    padding: 8px 6px 4px;
    text-align: center;
  }
  #msg {
    font-size: clamp(13px, 3.8vw, 16px);
    min-height: 22px;
    font-weight: 600;
    color: #9fb3d0;
  }
  #msg.win { color: #5cff9d; text-shadow: 0 0 12px rgba(92,255,157,0.4); }
  #msg.lose { color: #ff6b6b; text-shadow: 0 0 12px rgba(255,107,107,0.4); }
  #restart {
    margin-top: 8px;
    background: linear-gradient(180deg, #2f7fff, #1b5fd6);
    color: #fff;
    border: none;
    padding: 12px 26px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(47,127,255,0.4);
    touch-action: manipulation;
  }
  #restart:active { transform: translateY(1px); }
  .hint { font-size: 11px; color: #5a6a85; margin-top: 6px; }
</style>

    <script>
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/games/games-sw.js').catch(function(){})})}
    // Back-to-all-games pill (top-left) + one-tap install button (bottom-right).

    window.addEventListener('DOMContentLoaded',function(){var a=document.createElement('a');a.href='/games';a.textContent='‹ Games';a.setAttribute('style','position:fixed;left:calc(env(safe-area-inset-left,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;padding:6px 12px;border-radius:20px;background:rgba(15,23,42,.6);color:#fff;font:600 13px system-ui,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);touch-action:manipulation');document.body.appendChild(a);});
    (function(){var dp=null,btn=null;function mk(){btn=document.createElement('button');btn.textContent='⬇ Install';btn.setAttribute('style','position:fixed;right:calc(env(safe-area-inset-right,0px) + 12px);bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:2147483647;padding:10px 16px;border:none;border-radius:24px;background:#F59E0B;color:#fff;font:600 14px system-ui,sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation');btn.onclick=function(){if(!dp)return;dp.prompt();dp.userChoice.finally(function(){dp=null;btn.remove();btn=null;});};document.body.appendChild(btn);}window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;if(!btn)mk();});window.addEventListener('appinstalled',function(){if(btn){btn.remove();btn=null;}});})();

</head>
<body>
<div id="app">
  <header>
    <h1>STACKER</h1>
    <div id="stats">
      <div class="stat">ROW<b id="rowNum">1</b></div>
      <div class="stat">HEIGHT<b id="height">0</b></div>
      <div class="stat">BEST<b id="best">0</b></div>
    </div>
  </header>
  <div id="stage">
    <canvas id="c"></canvas>
  </div>
  <footer>
    <div id="msg">Tap to lock the blocks</div>
    <button id="restart">RESTART</button>
    <div class="hint">Tap anywhere / Click / Space</div>
  </footer>
</div>
<script>
(function () {
  "use strict";

  // ---- Config ----
  var COLS = 7;
  var ROWS = 15;
  var START_WIDTH = 3;
  var MINOR_ROW = 8;   // 1-indexed row that awards minor prize (when this row is cleared)
  var MAJOR_ROW = ROWS; // top row = major prize

  // ---- Canvas ----
  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
  var cell = 0;       // pixel size of a cell (CSS px)
  var boardW = 0, boardH = 0;
  var pad = 0;        // inner padding (CSS px)

  // ---- Game state ----
  var board;          // array[ROWS] of {start, width} for locked rows; null if not yet placed (current+above)
  var currentRow;     // 0-indexed row currently being played
  var blockWidth;     // width of moving block group on current row
  var blockPos;       // left index of moving block group
  var dir;            // +1 / -1
  var moveAccum;      // accumulator for movement timing
  var lastTime;
  var running;        // animating
  var gameState;      // 'play' | 'win' | 'lose'
  var best = 0;
  try { best = parseInt(localStorage.getItem("stacker_best") || "0", 10) || 0; } catch (e) {}

  var els = {
    rowNum: document.getElementById("rowNum"),
    height: document.getElementById("height"),
    best: document.getElementById("best"),
    msg: document.getElementById("msg")
  };

  // ---- Audio ----
  var actx = null;
  function ac() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
    }
    if (actx && actx.state === "suspended") { actx.resume(); }
    return actx;
  }
  function beep(freq, dur, type, vol) {
    var a = ac();
    if (!a) return;
    var o = a.createOscillator();
    var g = a.createGain();
    o.type = type || "square";
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(a.destination);
    var t = a.currentTime;
    g.gain.linearRampToValueAtTime(vol || 0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t);
    o.stop(t + dur + 0.02);
  }
  function sLock() { beep(660, 0.08, "square", 0.16); }
  function sTrim() { beep(300, 0.12, "sawtooth", 0.14); }
  function sLose() { beep(140, 0.4, "sawtooth", 0.2); setTimeout(function () { beep(90, 0.5, "sawtooth", 0.2); }, 120); }
  function sWin() {
    var seq = [523, 659, 784, 1047];
    seq.forEach(function (f, i) { setTimeout(function () { beep(f, 0.16, "triangle", 0.2); }, i * 110); });
  }
  function sMinor() { beep(880, 0.12, "triangle", 0.2); setTimeout(function () { beep(1175, 0.14, "triangle", 0.2); }, 90); }

  // ---- Layout ----
  function resize() {
    var stage = document.getElementById("stage");
    var availW = stage.clientWidth;
    var availH = stage.clientHeight;
    if (availW <= 0 || availH <= 0) return;

    // Reserve a little padding around the grid.
    var marginPx = 6;
    var usableW = availW - marginPx * 2;
    var usableH = availH - marginPx * 2;

    // cell size limited by both dimensions; aspect = COLS/ROWS
    var cw = usableW / COLS;
    var ch = usableH / ROWS;
    cell = Math.floor(Math.max(8, Math.min(cw, ch)));

    pad = Math.max(4, Math.round(cell * 0.18));
    boardW = cell * COLS + pad * 2;
    boardH = cell * ROWS + pad * 2;

    canvas.style.width = boardW + "px";
    canvas.style.height = boardH + "px";
    canvas.width = Math.round(boardW * dpr);
    canvas.height = Math.round(boardH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  // ---- Speed / width per row ----
  // Lower rows: slower & wider. Upper "prize" rows: faster & narrower.
  function moveIntervalForRow(r) {
    // ms per one-cell step. Starts ~210ms, ramps down.
    var base = 230 - r * 11;
    if (r >= MINOR_ROW) base -= 35; // tougher in prize zone
    return Math.max(55, base);
  }
  function widthCapForRow(r, carriedWidth) {
    // In upper prize rows, force the block to narrow to make it hard.
    var cap = carriedWidth;
    if (r === MAJOR_ROW - 1) cap = Math.min(cap, 1);      // top push: single block
    else if (r >= MINOR_ROW) cap = Math.min(cap, 2);      // prize zone: max 2 wide
    return Math.max(1, cap);
  }

  // ---- Game flow ----
  function reset() {
    board = new Array(ROWS);
    for (var i = 0; i < ROWS; i++) board[i] = null;
    currentRow = 0;
    gameState = "play";
    startRow(START_WIDTH);
    setMsg("Tap to lock the blocks", "");
    updateStats();
    running = true;
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function startRow(carriedWidth) {
    blockWidth = widthCapForRow(currentRow, carriedWidth);
    blockPos = 0;
    dir = 1;
    moveAccum = 0;
  }

  function updateStats() {
    els.rowNum.textContent = Math.min(currentRow + 1, ROWS);
    els.height.textContent = lockedHeight();
    els.best.textContent = best;
  }
  function lockedHeight() {
    var h = 0;
    for (var i = 0; i < ROWS; i++) if (board[i]) h++;
    return h;
  }

  function setMsg(t, cls) {
    els.msg.textContent = t;
    els.msg.className = cls || "";
  }

  // The core action: lock the moving block on the current row.
  function lock() {
    if (gameState !== "play") return;
    var cur = { start: blockPos, width: blockWidth };

    if (currentRow > 0) {
      var below = board[currentRow - 1];
      // overlap interval [oStart, oEnd)
      var oStart = Math.max(cur.start, below.start);
      var oEnd = Math.min(cur.start + cur.width, below.start + below.width);
      var overlap = oEnd - oStart;
      if (overlap <= 0) {
        // Nothing landed on support -> game over
        board[currentRow] = { start: cur.start, width: cur.width }; // show where it landed
        gameOver();
        return;
      }
      if (overlap < cur.width) sTrim(); else sLock();
      cur = { start: oStart, width: overlap };
    } else {
      sLock();
    }

    board[currentRow] = cur;
    var clearedRow = currentRow + 1; // 1-indexed

    // Win checks
    if (clearedRow >= MAJOR_ROW) {
      updateStats();
      win(true);
      return;
    }

    // advance
    currentRow++;
    if (clearedRow === MINOR_ROW) {
      sMinor();
      setMsg("MINOR PRIZE! Keep going…", "win");
    }
    startRow(cur.width);
    updateStats();
  }

  function gameOver() {
    gameState = "lose";
    running = false;
    sLose();
    var h = lockedHeight();
    if (h > best) { best = h; saveBest(); }
    updateStats();
    setMsg("GAME OVER — Height " + h + ". Tap RESTART", "lose");
    draw();
  }

  function win(major) {
    gameState = "win";
    running = false;
    var h = lockedHeight();
    if (h > best) { best = h; saveBest(); }
    updateStats();
    if (major) { sWin(); setMsg("MAJOR PRIZE!! You win! 🏆", "win"); }
    draw();
  }

  function saveBest() {
    try { localStorage.setItem("stacker_best", String(best)); } catch (e) {}
  }

  // ---- Animation ----
  function loop(ts) {
    if (!running) return;
    if (!lastTime) lastTime = ts;
    var dt = ts - lastTime;
    lastTime = ts;
    if (dt > 100) dt = 100; // clamp big gaps

    if (gameState === "play") {
      moveAccum += dt;
      var step = moveIntervalForRow(currentRow);
      while (moveAccum >= step) {
        moveAccum -= step;
        blockPos += dir;
        var maxPos = COLS - blockWidth;
        if (blockPos >= maxPos) { blockPos = maxPos; dir = -1; }
        else if (blockPos <= 0) { blockPos = 0; dir = 1; }
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  // ---- Drawing ----
  function cellX(col) { return pad + col * cell; }
  function cellY(row) { return pad + (ROWS - 1 - row) * cell; } // row 0 at bottom

  function draw() {
    if (!boardW) return;
    ctx.clearRect(0, 0, boardW, boardH);

    // grid background cells
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var x = cellX(c), y = cellY(r);
        ctx.fillStyle = "rgba(255,255,255,0.025)";
        roundRect(x + 1, y + 1, cell - 2, cell - 2, Math.max(2, cell * 0.12));
        ctx.fill();
      }
    }

    // prize lines
    drawPrizeLine(MINOR_ROW - 1, "#ffd34d", "MINOR");
    drawPrizeLine(MAJOR_ROW - 1, "#ff5cf0", "MAJOR");

    // locked rows
    for (var rr = 0; rr < ROWS; rr++) {
      var b = board[rr];
      if (!b || rr === currentRow && gameState === "play") {
        // (current row drawn separately while playing)
      }
      if (b && !(rr === currentRow && gameState === "play")) {
        drawBlocks(b.start, b.width, rr, blockColor(rr), false);
      }
    }

    // moving / current block
    if (gameState === "play") {
      drawBlocks(blockPos, blockWidth, currentRow, "#3aa0ff", true);
    }
  }

  function blockColor(row) {
    if (row >= MAJOR_ROW - 1) return "#ff5cf0";
    if (row >= MINOR_ROW - 1) return "#ffd34d";
    // gradient from teal to blue as you climb
    var t = row / (ROWS - 1);
    var rC = Math.round(40 + t * 90);
    var gC = Math.round(200 - t * 60);
    var bC = Math.round(255 - t * 20);
    return "rgb(" + rC + "," + gC + "," + bC + ")";
  }

  function drawBlocks(start, width, row, color, glow) {
    var y = cellY(row);
    for (var i = 0; i < width; i++) {
      var c = start + i;
      if (c < 0 || c >= COLS) continue;
      var x = cellX(c);
      if (glow) {
        ctx.shadowColor = color;
        ctx.shadowBlur = cell * 0.5;
      }
      ctx.fillStyle = color;
      roundRect(x + 1.5, y + 1.5, cell - 3, cell - 3, Math.max(2, cell * 0.14));
      ctx.fill();
      ctx.shadowBlur = 0;
      // inner highlight
      ctx.fillStyle = "rgba(255,255,255,0.22)";
      roundRect(x + 3, y + 3, cell - 6, (cell - 6) * 0.4, Math.max(1, cell * 0.1));
      ctx.fill();
    }
  }

  function drawPrizeLine(row, color, label) {
    var y = cellY(row);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.65;
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(pad, y + cell + 0.5);
    ctx.lineTo(boardW - pad, y + cell + 0.5);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = color;
    ctx.font = "bold " + Math.max(8, Math.round(cell * 0.30)) + "px -apple-system, sans-serif";
    ctx.textBaseline = "bottom";
    ctx.fillText(label, pad + 3, y + cell - 2);
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    if (w < 0) w = 0; if (h < 0) h = 0;
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- Input ----
  function onTap(e) {
    if (e) { e.preventDefault(); }
    ac(); // unlock audio on first gesture
    if (gameState === "play") {
      lock();
    }
  }

  // Tap anywhere in the app area (but let the restart button do its own thing)
  var app = document.getElementById("app");
  app.addEventListener("touchstart", function (e) {
    if (e.target && e.target.id === "restart") return;
    onTap(e);
  }, { passive: false });
  app.addEventListener("mousedown", function (e) {
    if (e.target && e.target.id === "restart") return;
    onTap(e);
  });
  // prevent context menu / scroll glitches
  app.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });

  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " ") {
      e.preventDefault();
      onTap(null);
    } else if (e.key === "r" || e.key === "R") {
      reset();
    }
  });

  document.getElementById("restart").addEventListener("click", function (e) {
    e.preventDefault();
    ac();
    reset();
  });

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 200); });

  // ---- Boot ----
  resize();
  reset();
  // resize once more after layout settles
  setTimeout(resize, 60);
})();
</script>
</body>
</html>
