<title>Boggle</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --cell: #334155;
    --cell-active: #f59e0b;
    --cell-path: #fbbf24;
    --text: #f1f5f9;
    --accent: #38bdf8;
    --good: #4ade80;
    --bad: #f87171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 8px;
  }
  .wrap {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .stats {
    display: flex;
    gap: 12px;
    font-size: 0.95rem;
  }
  .stat {
    background: var(--panel);
    padding: 6px 10px;
    border-radius: 8px;
    text-align: center;
    min-width: 64px;
  }
  .stat .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }
  .stat .value {
    font-size: 1.15rem;
    font-weight: 700;
  }
  #timer.low .value { color: var(--bad); }

  .board {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--panel);
    border-radius: 14px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    touch-action: none;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell {
    background: var(--cell);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell.path {
    background: var(--cell-path);
    color: #1e293b;
  }
  .cell.active {
    background: var(--cell-active);
    color: #1e293b;
    transform: scale(1.05);
  }

  .current {
    min-height: 38px;
    background: var(--panel);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .current.good { color: var(--good); }
  .current.bad { color: var(--bad); }

  .controls {
    display: flex;
    gap: 8px;
  }
  button {
    flex: 1;
    padding: 12px;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #0f172a;
    cursor: pointer;
    touch-action: manipulation;
  }
  button.secondary {
    background: var(--cell);
    color: var(--text);
  }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.4; cursor: default; }

  .msg {
    min-height: 18px;
    text-align: center;
    font-size: 0.85rem;
    height: 18px;
  }
  .msg.good { color: var(--good); }
  .msg.bad { color: var(--bad); }

  .found {
    background: var(--panel);
    border-radius: 10px;
    padding: 8px 10px;
    min-height: 60px;
  }
  .found .head {
    font-size: 0.7rem;
    text-transform: uppercase;
    opacity: 0.7;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .found .words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .found .words span {
    background: var(--cell);
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.85rem;
  }
  .found .words span b {
    color: var(--accent);
    margin-left: 4px;
    font-size: 0.7rem;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
    padding: 20px;
    text-align: center;
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 2rem; color: var(--accent); }
  .overlay .big { font-size: 3rem; font-weight: 800; }
  .overlay button { max-width: 240px; }
</style>

    "EIOSST", "ELRTTY", "HIMNUQ", "HLNNRZ"
  ];

  // ---- State ----
  var ROUND_SECONDS = 180;
  var board = [];          // array of 16 letters (uppercase, may be "QU")
  var found = {};          // word -> points
  var foundOrder = [];
  var score = 0;
  var timeLeft = ROUND_SECONDS;
  var timerId = null;
  var path = [];           // array of cell indices in current selection
  var dragging = false;
  var gameOver = false;

  var boardEl = document.getElementById("board");
  var currentEl = document.getElementById("current");
  var msgEl = document.getElementById("msg");
  var scoreEl = document.getElementById("score");
  var timeEl = document.getElementById("time");
  var timerWrap = document.getElementById("timer");
  var wordsEl = document.getElementById("words");
  var countEl = document.getElementById("count");
  var overlay = document.getElementById("overlay");
  var finalScoreEl = document.getElementById("finalScore");
  var finalWordsEl = document.getElementById("finalWords");

  var cellEls = [];

  // ---- Audio ----
  var audioCtx = null;
  function beep(freq, dur, type, vol) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.type = type || "sine";
      o.frequency.value = freq;
      g.gain.value = vol == null ? 0.08 : vol;
      o.connect(g);
      g.connect(audioCtx.destination);
      var now = audioCtx.currentTime;
      g.gain.setValueAtTime(g.gain.value, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      o.start(now);
      o.stop(now + dur);
    } catch (e) {}
  }
  function soundTap() { beep(440, 0.06, "square", 0.04); }
  function soundGood() { beep(660, 0.08, "sine", 0.08); setTimeout(function () { beep(990, 0.12, "sine", 0.08); }, 70); }
  function soundBad() { beep(160, 0.18, "sawtooth", 0.06); }
  function soundEnd() { beep(523, 0.15, "sine", 0.1); setTimeout(function(){beep(392,0.15,"sine",0.1);},150); setTimeout(function(){beep(330,0.3,"sine",0.1);},300); }

  // ---- Scoring ----
  function scoreForLength(n) {
    if (n <= 4) return 1;
    if (n === 5) return 2;
    if (n === 6) return 3;
    if (n === 7) return 5;
    return 11; // 8+
  }

  // ---- Adjacency: cells in 4x4 grid (incl. diagonals) ----
  function areAdjacent(a, b) {
    if (a === b) return false;
    var ra = Math.floor(a / 4), ca = a % 4;
    var rb = Math.floor(b / 4), cb = b % 4;
    return Math.abs(ra - rb) <= 1 && Math.abs(ca - cb) <= 1;
  }

  // ---- Board generation ----
  function rollBoard() {
    // copy dice, shuffle order, pick a random face for each
    var dice = DICE.slice();
    // Fisher-Yates shuffle dice positions
    for (var i = dice.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = dice[i]; dice[i] = dice[j]; dice[j] = t;
    }
    board = [];
    for (var k = 0; k < 16; k++) {
      var faces = dice[k];
      var f = faces.charAt(Math.floor(Math.random() * faces.length));
      // Q is displayed as QU in Boggle
      if (f === "Q") board.push("QU");
      else board.push(f);
    }
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    cellEls = [];
    for (var i = 0; i < 16; i++) {
      var c = document.createElement("div");
      c.className = "cell";
      c.textContent = board[i];
      c.setAttribute("data-idx", String(i));
      boardEl.appendChild(c);
      cellEls.push(c);
    }
  }

  // ---- Path / selection helpers ----
  function pathWord() {
    var w = "";
    for (var i = 0; i < path.length; i++) w += board[path[i]];
    return w;
  }

  function updatePathVisuals() {
    for (var i = 0; i < cellEls.length; i++) {
      cellEls[i].classList.remove("path", "active");
    }
    for (var j = 0; j < path.length; j++) {
      var el = cellEls[path[j]];
      if (j === path.length - 1) el.classList.add("active");
      else el.classList.add("path");
    }
    currentEl.classList.remove("good", "bad");
    var w = pathWord();
    currentEl.textContent = w.length ? w : " ";
  }

  function tryAddCell(idx) {
    if (idx < 0 || idx > 15) return;
    if (path.length === 0) {
      path.push(idx);
      soundTap();
      updatePathVisuals();
      return;
    }
    var last = path[path.length - 1];
    if (idx === last) return;
    // allow backtrack: if idx is the second-to-last, pop
    if (path.length >= 2 && idx === path[path.length - 2]) {
      path.pop();
      soundTap();
      updatePathVisuals();
      return;
    }
    // must be adjacent and not already used
    if (path.indexOf(idx) !== -1) return;
    if (!areAdjacent(last, idx)) return;
    path.push(idx);
    soundTap();
    updatePathVisuals();
  }

  function clearSelection() {
    path = [];
    updatePathVisuals();
  }

  // ---- Submit ----
  function flashCurrent(cls, text) {
    currentEl.classList.remove("good", "bad");
    if (cls) currentEl.classList.add(cls);
    if (text != null) currentEl.textContent = text;
  }

  function showMsg(text, cls) {
    msgEl.textContent = text;
    msgEl.className = "msg" + (cls ? " " + cls : "");
  }

  function submitWord() {
    if (gameOver) return;
    var w = pathWord();
    var lower = w.toLowerCase();
    if (w.length < 3) {
      showMsg("Too short (min 3 letters)", "bad");
      soundBad();
      clearSelection();
      return;
    }
    if (found[lower]) {
      showMsg('"' + w + '" already found', "bad");
      soundBad();
      clearSelection();
      return;
    }
    if (!DICT[lower]) {
      showMsg('"' + w + '" not in dictionary', "bad");
      soundBad();
      clearSelection();
      return;
    }
    // Path adjacency is guaranteed by construction, but double-check.
    if (!validPath(path)) {
      showMsg("Invalid path", "bad");
      soundBad();
      clearSelection();
      return;
    }
    var pts = scoreForLength(w.length);
    found[lower] = pts;
    foundOrder.unshift({ word: w, pts: pts });
    score += pts;
    scoreEl.textContent = String(score);
    showMsg("+" + pts + "  —  " + w, "good");
    soundGood();
    renderFound();
    clearSelection();
  }

  function validPath(p) {
    if (p.length < 1) return false;
    var seen = {};
    for (var i = 0; i < p.length; i++) {
      if (seen[p[i]]) return false;
      seen[p[i]] = true;
      if (i > 0 && !areAdjacent(p[i - 1], p[i])) return false;
    }
    return true;
  }

  function renderFound() {
    wordsEl.innerHTML = "";
    for (var i = 0; i < foundOrder.length; i++) {
      var f = foundOrder[i];
      var s = document.createElement("span");
      s.textContent = f.word;
      var b = document.createElement("b");
      b.textContent = "+" + f.pts;
      s.appendChild(b);
      wordsEl.appendChild(s);
    }
    countEl.textContent = String(foundOrder.length);
  }

  // ---- Timer ----
  function fmtTime(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function tick() {
    timeLeft--;
    if (timeLeft <= 0) {
      timeLeft = 0;
      timeEl.textContent = fmtTime(0);
      endGame();
      return;
    }
    timeEl.textContent = fmtTime(timeLeft);
    if (timeLeft <= 30) timerWrap.classList.add("low");
    else timerWrap.classList.remove("low");
  }

  function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(tick, 1000);
  }

  function endGame() {
    gameOver = true;
    if (timerId) { clearInterval(timerId); timerId = null; }
    clearSelection();
    finalScoreEl.textContent = String(score);
    finalWordsEl.textContent = foundOrder.length + (foundOrder.length === 1 ? " word found" : " words found");
    overlay.classList.add("show");
    soundEnd();
  }

  // ---- New game ----
  function newGame() {
    found = {};
    foundOrder = [];
    score = 0;
    timeLeft = ROUND_SECONDS;
    path = [];
    gameOver = false;
    overlay.classList.remove("show");
    timerWrap.classList.remove("low");
    scoreEl.textContent = "0";
    timeEl.textContent = fmtTime(ROUND_SECONDS);
    showMsg(" ");
    rollBoard();
    renderBoard();
    renderFound();
    updatePathVisuals();
    startTimer();
  }

  // ---- Input: pointer + touch ----
  function cellIndexFromPoint(x, y) {
    var el = document.elementFromPoint(x, y);
    if (!el) return -1;
    if (!el.classList || !el.classList.contains("cell")) return -1;
    var idx = el.getAttribute("data-idx");
    if (idx == null) return -1;
    return parseInt(idx, 10);
  }

  // Press a cell: extend the path when it's a legal continuation (adjacent /
  // first cell / backtrack); otherwise begin a brand-new selection here. This
  // makes tap-to-build and drag-to-build share the same logic.
  function pressCell(idx) {
    if (idx < 0 || idx > 15) return;
    if (path.length === 0) { tryAddCell(idx); return; }
    var last = path[path.length - 1];
    var isBacktrack = path.length >= 2 && idx === path[path.length - 2];
    var canExtend = idx !== last &&
      (isBacktrack || (path.indexOf(idx) === -1 && areAdjacent(last, idx)));
    if (canExtend) tryAddCell(idx);
    else if (idx !== last) {
      // Not a legal continuation: start a fresh word from this cell.
      path = [];
      tryAddCell(idx);
    }
  }

  // Track whether the current gesture actually dragged across cells, so a plain
  // tap leaves the selection up for further taps instead of auto-submitting.
  var gestureMoved = false;
  var gestureStartLen = 0;

  // Touch events (mobile)
  boardEl.addEventListener("touchstart", function (e) {
    if (gameOver) return;
    e.preventDefault();
    dragging = true;
    gestureMoved = false;
    var t = e.touches[0];
    var idx = cellIndexFromPoint(t.clientX, t.clientY);
    gestureStartLen = path.length;
    if (idx >= 0) pressCell(idx);
  }, { passive: false });

  boardEl.addEventListener("touchmove", function (e) {
    if (gameOver || !dragging) return;
    e.preventDefault();
    var t = e.touches[0];
    var idx = cellIndexFromPoint(t.clientX, t.clientY);
    if (idx >= 0) {
      var before = path.length;
      pressCell(idx);
      if (path.length !== before) gestureMoved = true;
    }
  }, { passive: false });

  boardEl.addEventListener("touchend", function (e) {
    if (gameOver) return;
    e.preventDefault();
    dragging = false;
    // Auto-submit only when the finger was dragged across cells. A single tap
    // keeps building so the player can tap a sequence and press Submit.
    if (gestureMoved && path.length >= 3) submitWord();
  }, { passive: false });

  // Mouse events (desktop) — click to build, or click-drag across cells
  var mouseDown = false;
  boardEl.addEventListener("mousedown", function (e) {
    if (gameOver) return;
    e.preventDefault();
    mouseDown = true;
    gestureMoved = false;
    var idx = cellIndexFromPoint(e.clientX, e.clientY);
    if (idx >= 0) pressCell(idx);
  });

  boardEl.addEventListener("mousemove", function (e) {
    if (gameOver || !mouseDown) return;
    var idx = cellIndexFromPoint(e.clientX, e.clientY);
    if (idx >= 0) {
      var before = path.length;
      pressCell(idx);
      if (path.length !== before) gestureMoved = true;
    }
  });

  document.addEventListener("mouseup", function () {
    if (gameOver) { mouseDown = false; return; }
    if (mouseDown && gestureMoved && path.length >= 3) submitWord();
    mouseDown = false;
  });

  // Prevent context menu / long-press selection on board
  boardEl.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  // ---- Buttons ----
  document.getElementById("submitBtn").addEventListener("click", function () {
    submitWord();
  });
  document.getElementById("clearBtn").addEventListener("click", function () {
    clearSelection();
    showMsg(" ");
  });
  document.getElementById("newBtn").addEventListener("click", function () {
    newGame();
  });
  document.getElementById("playAgain").addEventListener("click", function () {
    newGame();
  });

  // Prevent page scroll/zoom gestures globally on the board area
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });

  // ---- Boot ----
  newGame();
})();
</script>
</body>
</html>
