<title>Reaction Time</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  body { display: flex; flex-direction: column; background: #111; }

  header {
    flex: 0 0 auto;
    padding: 10px 12px calc(10px + env(safe-area-inset-top, 0px));
    text-align: center;
    color: #fff;
    background: #1a1a1a;
  }
  header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
  header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

  #stage {
    flex: 1 1 auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: background-color 0.06s linear;
    overflow: hidden;
  }
  #stage .big {
    font-size: clamp(28px, 9vw, 64px);
    font-weight: 800;
    color: #fff;
    line-height: 1.15;
    padding: 12px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #stage .sub {
    font-size: clamp(14px, 4.5vw, 22px);
    font-weight: 600;
    color: rgba(255,255,255,0.92);
    margin-top: 10px;
  }

  /* states */
  .state-idle  #stage { background: #2b3a67; }
  .state-wait  #stage { background: #c0392b; }
  .state-ready #stage { background: #27ae60; }
  .state-result #stage { background: #2b3a67; }
  .state-tooSoon #stage { background: #8e44ad; }

  footer {
    flex: 0 0 auto;
    background: #1a1a1a;
    color: #fff;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0px));
  }
  .stats {
    display: flex;
    justify-content: space-around;
    text-align: center;
    margin-bottom: 8px;
  }
  .stat { flex: 1; }
  .stat .label { font-size: 11px; text-transform: uppercase; opacity: 0.6; letter-spacing: 0.5px; }
  .stat .val { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .stat .val small { font-size: 12px; opacity: 0.7; font-weight: 600; }

  .attempts {
    text-align: center;
    font-size: 12px;
    opacity: 0.75;
    min-height: 16px;
    margin-bottom: 8px;
  }

  button#restart {
    display: block;
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    background: #3d6cff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    touch-action: manipulation;
  }
  button#restart:active { background: #2f55cc; }
</style>

</head>
<body class="state-idle">
  <header>
    <h1>Reaction Time</h1>
    <p>Tap when the screen turns <strong>green</strong>. Don't tap too soon!</p>
  </header>

  <div id="stage">
    <div>
      <div class="big" id="bigText">Tap to start</div>
      <div class="sub" id="subText">Round of 5 tries</div>
    </div>
  </div>

  <footer>
    <div class="stats">
      <div class="stat"><div class="label">Last</div><div class="val" id="lastVal">—</div></div>
      <div class="stat"><div class="label">Average</div><div class="val" id="avgVal">—</div></div>
      <div class="stat"><div class="label">Best</div><div class="val" id="bestVal">—</div></div>
    </div>
    <div class="attempts" id="attempts">&nbsp;</div>
    <button id="restart">Restart Round</button>
  </footer>

<script>
(function () {
  "use strict";

  var ROUND_SIZE = 5;
  var MIN_DELAY = 1000;   // ms
  var MAX_DELAY = 4000;   // ms

  var body = document.body;
  var stage = document.getElementById("stage");
  var bigText = document.getElementById("bigText");
  var subText = document.getElementById("subText");
  var lastVal = document.getElementById("lastVal");
  var avgVal = document.getElementById("avgVal");
  var bestVal = document.getElementById("bestVal");
  var attemptsEl = document.getElementById("attempts");
  var restartBtn = document.getElementById("restart");

  // state machine: idle -> wait -> ready -> result ; or wait -> tooSoon
  var state = "idle";
  var greenAt = 0;        // performance.now() when it went green
  var waitTimer = null;
  var attempts = [];      // ms times for this round
  var best = null;        // best across all rounds (this session)

  // ---- WebAudio (optional, created lazily) ----
  var audioCtx = null;
  function ensureAudio() {
    if (audioCtx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    } catch (e) { audioCtx = null; }
  }
  function beep(freq, durMs, type) {
    if (!audioCtx) return;
    try {
      if (audioCtx.state === "suspended") audioCtx.resume();
      var now = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = type || "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + durMs / 1000);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + durMs / 1000 + 0.02);
    } catch (e) { /* ignore */ }
  }

  function setState(s) {
    state = s;
    body.className = "state-" + s;
  }

  function fmt(ms) {
    return Math.round(ms) + " ms";
  }

  function clearWaitTimer() {
    if (waitTimer !== null) {
      clearTimeout(waitTimer);
      waitTimer = null;
    }
  }

  function updateStats() {
    lastVal.textContent = attempts.length ? fmt(attempts[attempts.length - 1]) : "—";
    if (attempts.length) {
      var sum = 0;
      for (var i = 0; i < attempts.length; i++) sum += attempts[i];
      avgVal.textContent = fmt(sum / attempts.length);
    } else {
      avgVal.textContent = "—";
    }
    bestVal.textContent = (best !== null) ? fmt(best) : "—";

    if (attempts.length) {
      var parts = [];
      for (var j = 0; j < attempts.length; j++) parts.push(Math.round(attempts[j]));
      attemptsEl.textContent = "Tries: " + parts.join(" · ") + " ms";
    } else {
      attemptsEl.innerHTML = "&nbsp;";
    }
  }

  // Begin one attempt: show red "wait", schedule green.
  function startAttempt() {
    clearWaitTimer();
    setState("wait");
    bigText.textContent = "Wait for green…";
    subText.textContent = "Attempt " + (attempts.length + 1) + " of " + ROUND_SIZE;

    var delay = MIN_DELAY + Math.random() * (MAX_DELAY - MIN_DELAY);
    waitTimer = setTimeout(function () {
      waitTimer = null;
      if (state !== "wait") return; // safety
      setState("ready");
      greenAt = (window.performance && performance.now) ? performance.now() : Date.now();
      bigText.textContent = "TAP!";
      subText.textContent = "";
      beep(880, 120, "square");
    }, delay);
  }

  function recordReaction() {
    var now = (window.performance && performance.now) ? performance.now() : Date.now();
    var rt = now - greenAt;
    attempts.push(rt);
    if (best === null || rt < best) best = rt;

    setState("result");
    bigText.textContent = fmt(rt);
    if (attempts.length >= ROUND_SIZE) {
      subText.textContent = "Round done! Tap to play again.";
    } else {
      subText.textContent = "Tap to continue (" + attempts.length + "/" + ROUND_SIZE + ")";
    }
    updateStats();
    beep(rt < 250 ? 1200 : 660, 140, "sine");
  }

  function tooSoon() {
    clearWaitTimer();
    setState("tooSoon");
    bigText.textContent = "Too soon!";
    subText.textContent = "Tap to try this attempt again.";
    beep(160, 220, "sawtooth");
  }

  // Main interaction handler.
  function handlePress() {
    ensureAudio();
    switch (state) {
      case "idle":
        startAttempt();
        break;
      case "wait":
        tooSoon();
        break;
      case "ready":
        recordReaction();
        break;
      case "tooSoon":
        // retry the same attempt
        startAttempt();
        break;
      case "result":
        if (attempts.length >= ROUND_SIZE) {
          // start a fresh round
          attempts = [];
          updateStats();
          startAttempt();
        } else {
          startAttempt();
        }
        break;
    }
  }

  function fullRestart() {
    clearWaitTimer();
    attempts = [];
    updateStats();
    setState("idle");
    bigText.textContent = "Tap to start";
    subText.textContent = "Round of " + ROUND_SIZE + " tries";
  }

  // ---- Events ----
  // Use pointer/touch for the stage; guard against double-fire.
  function onStagePress(e) {
    // Ignore presses that originate on the restart button (footer is separate, so safe)
    e.preventDefault();
    handlePress();
  }

  if (window.PointerEvent) {
    stage.addEventListener("pointerdown", onStagePress, { passive: false });
  } else {
    stage.addEventListener("touchstart", onStagePress, { passive: false });
    stage.addEventListener("mousedown", onStagePress, { passive: false });
  }

  restartBtn.addEventListener("click", function (e) {
    e.preventDefault();
    ensureAudio();
    fullRestart();
  });

  // Desktop: Space or Enter triggers the stage.
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " " || e.code === "Enter" || e.key === "Enter") {
      // don't double-trigger when focus is on the restart button + Enter
      if (document.activeElement === restartBtn) return;
      e.preventDefault();
      ensureAudio();
      handlePress();
    }
  });

  // Prevent context menu long-press popup on mobile.
  stage.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  updateStats();
})();
</script>
</body>
</html>
