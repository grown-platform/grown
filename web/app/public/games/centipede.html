    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;

    background: #06060f;

  }

    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    background: rgba(6,6,15,0.82);

    border: 1px solid #7cff7c;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  button:active { background: #2a8a2a; }
  #controls {
    width: 100%;
    padding: 8px 10px 12px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  #fireBtn {
    background: #6b1b3b;
    border-color: #ff7c9c;
    color: #ffeaf0;
    flex: 1;
    max-width: 200px;
  }
  #restartBtn {
    background: #2a2a44;
    border-color: #7cc8ff;
    color: #eaf4ff;
    font-size: 14px;
    padding: 12px 18px;
  }
  .hint { font-size: 11px; color: #6a6a88; margin-top: 2px; }

<body>
<div id="wrap">
  <header>
    <h1>CENTIPEDE</h1>
    <div id="hud">
      <div class="item" id="score">SCORE 0</div>
      <div class="item" id="wave">WAVE 1</div>
      <div class="item" id="lives">&#9650;&#9650;&#9650;</div>
    </div>
  </header>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">CENTIPEDE</h2>
      <p id="ovText">Drag your finger near the bottom to move. It auto-fires.<br>Desktop: Arrow keys / WASD to move, Space to fire.<br>Shoot every segment to clear the wave!</p>
      <button id="startBtn">START</button>
    </div>
  </div>
  <div id="controls">
    <button id="fireBtn">FIRE</button>
    <button id="restartBtn">RESTART</button>
  </div>
</div>
<script>
(function(){
"use strict";

// ---------- Grid / layout ----------
var COLS = 15;          // logical columns
var ROWS = 20;          // logical rows
var cell = 24;          // pixel size of a cell (recomputed on resize)
var W = COLS * cell;
var H = ROWS * cell;
var PLAYER_ROWS = 4;    // bottom rows the shooter may roam in

var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');

// ---------- DOM ----------
var scoreEl = document.getElementById('score');
var waveEl  = document.getElementById('wave');
var livesEl = document.getElementById('lives');
var overlay = document.getElementById('overlay');
var ovTitle = document.getElementById('ovTitle');
var ovText  = document.getElementById('ovText');
var startBtn = document.getElementById('startBtn');
var fireBtn  = document.getElementById('fireBtn');
var restartBtn = document.getElementById('restartBtn');

// ---------- Game state ----------
var STATE_MENU = 0, STATE_PLAY = 1, STATE_WAVECLEAR = 2, STATE_DEAD = 3, STATE_OVER = 4;
var state = STATE_MENU;

var score = 0;
var lives = 3;
var wave = 1;

var mushrooms;   // 2D array [ROWS][COLS] -> health 0..4 (0 = none)
var segments;    // array of centipede segments
var bullets;     // array of bullets
var player;      // shooter
var powerups;    // falling power-up pickups dropped by destroyed mushrooms
var crossers;    // things that skitter across the bottom: spiders (hurt) + powerups (help)
var crosserTimer = 0;
var waveTimer = 0;
var deadTimer = 0;
var floatTexts = [];
var flash = 0;   // white screen flash timer (bomb pickup)

// Bottom-crossers: every spawn sends one spider (hazard) and one power-up
// (reward) across the player's zone from opposite sides — equal amounts of each.
var CROSSER_BASE_INTERVAL = 8;   // seconds between spawns (eases down with wave)
var CROSSER_MIN_INTERVAL = 4;
var SPIDER_SCORE = 150;
var CROSSER_START_WAVE = 5;      // bottom-crossers begin at "medium" difficulty

// ---------- Power-ups ----------
// Destroyed mushrooms have a chance to drop one of these. It falls; the player
// catches it by moving onto it. Timed effects live on the player object.
// weight = relative drop frequency (higher = more common).
var POWERUPS = {
  shield: { label: 'S', name: 'SHIELD',      color: '#5fb8ff', weight: 30, dur: 8 },
  rapid:  { label: 'R', name: 'RAPID FIRE',  color: '#ffd24a', weight: 28, dur: 8 },
  triple: { label: '3', name: 'TRIPLE SHOT', color: '#b46cff', weight: 22, dur: 10 },
  life:   { label: '+', name: 'EXTRA LIFE',  color: '#ff6c9c', weight: 7,  dur: 0 },
  bomb:   { label: '*', name: 'BOMB',        color: '#ff8a3c', weight: 13, dur: 0 }
};
var POWERUP_KEYS = ['shield','rapid','triple','life','bomb'];
var DROP_CHANCE = 0.14;   // chance a fully-destroyed mushroom drops a power-up
var MAX_LIVES = 6;        // cap so the lives HUD stays readable

// ---------- Sizing ----------
function resize(){
  var stage = document.getElementById('stage');
  var availW = stage.clientWidth;
  var availH = stage.clientHeight;
  // pick cell so the COLSxROWS grid fits both dimensions
  var cw = Math.floor(availW / COLS);
  var ch = Math.floor(availH / ROWS);
  cell = Math.max(8, Math.min(cw, ch));
  W = COLS * cell;
  H = ROWS * cell;
  // device pixel ratio for crispness
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (player) {
    // keep player within new bounds
    player.x = clamp(player.x, cell*0.5, W - cell*0.5);
    player.y = clamp(player.y, H - PLAYER_ROWS*cell + cell*0.5, H - cell*0.5);
  }
}
window.addEventListener('resize', resize);

function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }

// ---------- Audio ----------
var actx = null;
function audio(){
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ actx = null; }
  }
  return actx;
}
function beep(freq, dur, type, vol){
  var a = audio();
  if (!a) return;
  if (a.state === 'suspended') { try { a.resume(); } catch(e){} }
  var o = a.createOscillator();
  var g = a.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.value = 0.0001;
  o.connect(g); g.connect(a.destination);
  var t = a.currentTime;
  var v = vol == null ? 0.08 : vol;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(v, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t);
  o.stop(t + dur + 0.02);
}
function sFire(){ beep(880, 0.06, 'square', 0.05); }
function sHitMush(){ beep(180, 0.05, 'square', 0.04); }
function sKillSeg(){ beep(330, 0.08, 'square', 0.07); beep(440,0.08,'square',0.05); }
function sDie(){ beep(120, 0.5, 'sawtooth', 0.1); beep(80,0.5,'sawtooth',0.08); }
function sWave(){ beep(523,0.1,'triangle',0.08); beep(659,0.12,'triangle',0.08); beep(784,0.16,'triangle',0.08); }
function sPower(){ beep(784,0.08,'square',0.07); setTimeout(function(){ beep(1047,0.12,'square',0.07); }, 70); }
function sBomb(){ beep(140,0.35,'sawtooth',0.12); beep(90,0.4,'sawtooth',0.1); }

// ---------- Mushroom helpers ----------
function newMushrooms(){
  var m = [];
  for (var r = 0; r < ROWS; r++){
    m[r] = [];
    for (var c = 0; c < COLS; c++) m[r][c] = 0;
  }
  // random field, but not in top 2 rows (spawn) nor bottom player zone
  var count = 18 + wave * 2;
  var tries = 0;
  var placed = 0;
  while (placed < count && tries < 400){
    tries++;
    var rr = 2 + Math.floor(Math.random() * (ROWS - 2 - PLAYER_ROWS));
    var cc = Math.floor(Math.random() * COLS);
    if (m[rr][cc] === 0){ m[rr][cc] = 4; placed++; }
  }
  return m;
}
function mushAt(r, c){
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 0;
  return mushrooms[r][c];
}

// ---------- Centipede ----------
// Model: discrete grid steps on a timer. Each segment occupies an integer
// (col,row). The chain is an ordered list head-first. On each step we compute
// the head's next cell (turn + drop on wall/mushroom), then every body segment
// moves into the cell its predecessor occupied BEFORE the step (true follow).
// rowF is a render-only smoothed position for vertical drops; movement logic is
// purely grid-based so following/splitting/collisions stay exact.

var stepInterval = 0.18;   // seconds per grid step (set by wave)
var stepAccum = 0;
var enteringTimer = 0;     // staggered entry from the top edge

function spawnCentipede(){
  segments = [];
  var len = 9 + Math.min(wave, 6);                 // grows a little with waves
  stepInterval = Math.max(0.08, 0.18 - (wave - 1) * 0.01); // gently faster each wave, capped
  stepAccum = 0;
  enteringTimer = 0;
  // Build chain head-first. Head starts just off the left edge on row 0, moving
  // right; the body trails off-screen to the left so they march in one by one.
  for (var i = 0; i < len; i++){
    segments.push({
      col: -1 - i,        // off-screen to the left initially
      row: 0,
      dir: 1,             // 1 = right, -1 = left
      isHead: (i === 0),
      alive: true,
      rowF: 0,            // render-smoothed row
      colF: -1 - i,       // render-smoothed col
      enteredYet: false
    });
  }
}

// Determine whether grid cell (r,c) blocks the centipede (wall or mushroom).
function cellBlocked(r, c){
  if (c < 0 || c >= COLS) return true;     // wall
  if (r >= ROWS) return true;              // floor (shouldn't reach here)
  if (mushAt(r, c) > 0) return true;       // mushroom
  return false;
}

// Advance the centipede by exactly one grid step.
function gridStep(){
  // Compact to the live chain, preserving head-first order.
  var chain = segments;   // head-first ordered chain (killed segments are spliced out)
  if (chain.length === 0) return;

  // Remember each segment's pre-step cell for following.
  var prev = [];
  for (var p = 0; p < chain.length; p++){ prev.push({ col: chain[p].col, row: chain[p].row, dir: chain[p].dir }); }

  // ----- Move heads -----
  // Any segment flagged isHead leads its own sub-chain. We move each head by its
  // own rule, then trail its followers into predecessor cells. Because a split
  // creates a second head mid-list, we walk the chain and treat each isHead as a
  // new leader for the following run until the next isHead.
  var leaderIndices = [];
  for (var li = 0; li < chain.length; li++){ if (chain[li].isHead) leaderIndices.push(li); }
  if (leaderIndices.length === 0){ chain[0].isHead = true; leaderIndices = [0]; }

  for (var g = 0; g < leaderIndices.length; g++){
    var start = leaderIndices[g];
    var end = (g + 1 < leaderIndices.length) ? leaderIndices[g + 1] : chain.length; // exclusive
    var head = chain[start];

    // --- compute head's next cell ---
    var nc = head.col + head.dir;
    var nr = head.row;
    // While still entering from off the left edge, march freely until on-grid.
    var entering = (head.col < 0 && head.dir > 0 && nc <= 0);
    var ahead = entering ? false : cellBlocked(head.row, nc);
    if (ahead){
      // reverse horizontally and drop one row
      head.dir = -head.dir;
      nc = head.col + head.dir;
      nr = head.row + 1;
      // if the cell we'd drop into is blocked by a mushroom, eat through by
      // dropping straight down anyway (classic behavior: drop has priority).
      if (nr >= ROWS){
        // reached the bottom row -> costs a life (unless shielded: it just
        // crawls along the bottom and you live).
        nr = ROWS - 1;
        head.row = nr;
        if (state === STATE_PLAY && !shielded()){ loseLife(); return; }
      }
      // if reversed-into cell is also a wall (corner), just drop straight down
      if (nc < 0 || nc >= COLS) nc = head.col;
    } else {
      // also: if at bottom and somehow moving down — handled above
    }
    head.col = nc;
    head.row = nr;

    // --- trail followers of THIS sub-chain into predecessor cells ---
    for (var f = start + 1; f < end; f++){
      chain[f].col = prev[f - 1].col;
      chain[f].row = prev[f - 1].row;
      chain[f].dir = prev[f - 1].dir;
    }
  }

  // Player / bottom collision check after the step. A live shield makes the
  // player invulnerable — the centipede passes right through.
  if (state === STATE_PLAY && !shielded()){
    var prow = Math.floor(player.y / cell);
    var pcol = Math.floor(player.x / cell);
    for (var k = 0; k < chain.length; k++){
      var s = chain[k];
      if (s.row >= ROWS - 1){ loseLife(); return; }
      if (s.row === prow && s.col === pcol){ loseLife(); return; }
    }
  }
}

function stepCentipede(dt){
  if (segments.length === 0) return;
  stepAccum += dt;
  while (stepAccum >= stepInterval){
    stepAccum -= stepInterval;
    gridStep();
    if (state !== STATE_PLAY) { stepAccum = 0; break; }
  }
  // smooth render positions toward grid cells
  var lerp = Math.min(1, dt / stepInterval);
  for (var i = 0; i < segments.length; i++){
    var s = segments[i];
    // Snap (don't lerp) across a horizontal wrap so a split head doesn't streak.
    if (Math.abs(s.col - s.colF) > 1.5) s.colF = s.col;
    if (Math.abs(s.row - s.rowF) > 1.5) s.rowF = s.row;
    s.colF += (s.col - s.colF) * lerp;
    s.rowF += (s.row - s.rowF) * lerp;
  }
}

// ---------- Player ----------
function newPlayer(){
  return {
    x: W * 0.5,
    y: H - cell * 1.2,
    w: cell * 0.8,
    speed: 6 * cell,   // px per second (desktop keys)
    cooldown: 0,
    shieldT: 0,        // seconds of shield bubble remaining
    rapidT: 0,         // seconds of rapid fire remaining
    tripleT: 0         // seconds of triple shot remaining
  };
}
function shielded(){ return player && player.shieldT > 0; }

// ---------- Bullets ----------
function fire(){
  if (state !== STATE_PLAY) return;
  if (player.cooldown > 0) return;
  var rapid = player.rapidT > 0;
  var speed = (rapid ? 20 : 14) * cell;
  var by = player.y - cell*0.5;
  if (player.tripleT > 0){
    // center + two angled side bullets
    bullets.push({ x: player.x, y: by, speed: speed, vx: 0 });
    bullets.push({ x: player.x, y: by, speed: speed, vx: -4.5 * cell });
    bullets.push({ x: player.x, y: by, speed: speed, vx:  4.5 * cell });
  } else {
    bullets.push({ x: player.x, y: by, speed: speed, vx: 0 });
  }
  player.cooldown = rapid ? 0.07 : 0.16;
  sFire();
}

function stepBullets(dt){
  for (var i = bullets.length - 1; i >= 0; i--){
    var b = bullets[i];
    b.y -= b.speed * dt;
    if (b.vx) b.x += b.vx * dt;
    if (b.y < -cell || b.x < -cell || b.x > W + cell){ bullets.splice(i,1); continue; }
    var c = Math.floor(b.x / cell);
    var r = Math.floor(b.y / cell);
    // hit mushroom?
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS && mushrooms[r][c] > 0){
      mushrooms[r][c]--;
      if (mushrooms[r][c] === 0){ addScore(1); maybeDropPowerup(r, c); }
      sHitMush();
      bullets.splice(i,1);
      continue;
    }
    // hit a bottom-crosser spider?
    var sp = -1;
    for (var ci = 0; ci < crossers.length; ci++){
      var cr = crossers[ci];
      if (cr.kind !== 'spider') continue;
      if (Math.abs(b.x - cr.x) < cell*0.55 && Math.abs(b.y - cr.y) < cell*0.55){ sp = ci; break; }
    }
    if (sp >= 0){
      killSpider(crossers[sp]);
      crossers.splice(sp, 1);
      bullets.splice(i, 1);
      continue;
    }
    // hit segment? (use smoothed render position so it matches the visuals)
    var hit = -1;
    for (var j = 0; j < segments.length; j++){
      var s = segments[j];
      var sx = (s.colF + 0.5) * cell;
      var sy = (s.rowF + 0.5) * cell;
      if (Math.abs(b.x - sx) < cell*0.5 && Math.abs(b.y - sy) < cell*0.5){
        hit = j; break;
      }
    }
    if (hit >= 0){
      killSegment(hit);
      bullets.splice(i,1);
    }
  }
}

// Shooting a segment: it turns into a mushroom and the chain splits there.
// segments[] is head-first order; killing one and removing it from the array
// means the segment that followed it (now first of the trailing run) becomes a
// new head.
function killSegment(idx){
  var s = segments[idx];
  var wasHead = s.isHead;
  // turn into a mushroom at its grid cell
  var gr = clamp(s.row, 0, ROWS-1);
  var gc = clamp(s.col, 0, COLS-1);
  if (mushrooms[gr][gc] === 0) mushrooms[gr][gc] = 4;
  addScore(wasHead ? 100 : 10);
  floatTexts.push({ x:(gc+0.5)*cell, y:(gr+0.5)*cell, t:0.7, v: wasHead?100:10 });
  sKillSeg();

  // Remove it from the ordered chain. The follower (if any) becomes a head.
  segments.splice(idx, 1);
  if (idx < segments.length){
    segments[idx].isHead = true;       // new head of the trailing piece
    // it should turn down/around like a fresh head; keep its current dir but it
    // will resolve naturally on the next grid step against walls/mushrooms.
  }
  if (segments.length > 0) segments[0].isHead = true;

  if (segments.length === 0){ winWave(); }
}

// ---------- Power-ups ----------
function maybeDropPowerup(r, c){
  if (Math.random() > DROP_CHANCE) return;
  powerups.push({
    type: weightedPowerupType(),
    x: (c + 0.5) * cell,
    y: (r + 0.5) * cell,
    vy: 3.2 * cell,   // fall speed (px/s) — slow enough to chase down
    t: 0              // animation clock
  });
}
function weightedPowerupType(){
  var total = 0, k;
  for (var i = 0; i < POWERUP_KEYS.length; i++){ total += POWERUPS[POWERUP_KEYS[i]].weight; }
  var roll = Math.random() * total;
  for (var j = 0; j < POWERUP_KEYS.length; j++){
    k = POWERUP_KEYS[j];
    roll -= POWERUPS[k].weight;
    if (roll <= 0) return k;
  }
  return 'shield';
}
function stepPowerups(dt){
  var pr = cell * 0.42;                 // pickup radius of the player
  for (var i = powerups.length - 1; i >= 0; i--){
    var p = powerups[i];
    p.t += dt;
    p.y += p.vy * dt;
    if (p.y > H + cell){ powerups.splice(i,1); continue; }   // missed, off the bottom
    // caught? (player center within reach)
    if (Math.abs(p.x - player.x) < pr + cell*0.45 && Math.abs(p.y - player.y) < pr + cell*0.45){
      applyPowerup(p.type);
      powerups.splice(i,1);
    }
  }
}
function applyPowerup(type){
  var def = POWERUPS[type];
  floatTexts.push({ x: player.x, y: player.y - cell*0.8, t: 1.0, v: def.name, color: def.color });
  if (type === 'shield')      player.shieldT = def.dur;
  else if (type === 'rapid')  player.rapidT  = def.dur;
  else if (type === 'triple') player.tripleT = def.dur;
  else if (type === 'life'){ if (lives < MAX_LIVES){ lives++; setLivesHud(); } }
  else if (type === 'bomb')   doBomb();
  if (type === 'bomb') sBomb(); else sPower();
}
// Bomb: detonate every mushroom on the field (scoring each), and clear the
// falling powerup's own cell already handled. A bright flash sells the blast.
function doBomb(){
  var cleared = 0;
  for (var r = 0; r < ROWS; r++){
    for (var c = 0; c < COLS; c++){
      if (mushrooms[r][c] > 0){ mushrooms[r][c] = 0; cleared++; }
    }
  }
  if (cleared > 0){ addScore(cleared); }
  flash = 0.25;
}

// ---------- Bottom crossers (spider hazard + power-up runner) ----------
function bottomBand(){
  return { top: H - PLAYER_ROWS * cell + cell*0.6, bot: H - cell*0.6 };
}
function spawnCrossers(){
  var z = bottomBand();
  var fromLeft = Math.random() < 0.5;
  var spd = (3.2 + Math.min(wave, 8) * 0.12) * cell;
  // Spider enters from one side; the power-up enters from the other — same count.
  crossers.push({
    kind: 'spider',
    x: fromLeft ? -cell : W + cell,
    baseY: z.top + Math.random() * (z.bot - z.top),
    y: 0, vx: fromLeft ? spd : -spd,
    phase: Math.random() * 6.28, t: 0
  });
  crossers.push({
    kind: 'power', type: weightedPowerupType(),
    x: fromLeft ? W + cell : -cell,
    baseY: z.top + Math.random() * (z.bot - z.top),
    y: 0, vx: fromLeft ? -spd : spd,
    phase: Math.random() * 6.28, t: 0
  });
}
function stepCrossers(dt){
  var amp = cell * 0.5;
  var hitR = cell * 0.6;
  for (var i = crossers.length - 1; i >= 0; i--){
    var cr = crossers[i];
    cr.t += dt;
    cr.x += cr.vx * dt;
    cr.y = cr.baseY + Math.sin(cr.t * 4 + cr.phase) * amp;
    if (cr.x < -cell*1.5 || cr.x > W + cell*1.5){ crossers.splice(i,1); continue; }
    var dx = cr.x - player.x, dy = cr.y - player.y;
    if (dx*dx + dy*dy < hitR*hitR){
      if (cr.kind === 'spider'){
        if (!shielded()){ crossers.splice(i,1); loseLife(); return; }
        // shielded: spider harmlessly passes
      } else {
        applyPowerup(cr.type);
        crossers.splice(i,1);
      }
    }
  }
}
function killSpider(cr){
  addScore(SPIDER_SCORE);
  floatTexts.push({ x: cr.x, y: cr.y, t: 0.7, v: SPIDER_SCORE });
  sKillSeg();
}

// ---------- Scoring / lives ----------
function addScore(n){ score += n; scoreEl.textContent = 'SCORE ' + score; if (window.GrownGame) window.GrownGame.setHighScore(score); }
function setLivesHud(){
  var s = '';
  for (var i = 0; i < lives; i++) s += '▲';
  livesEl.textContent = s;
}

function loseLife(){
  lives--;
  setLivesHud();
  sDie();
  bullets = [];
  crossers = [];          // clear the bottom so you don't respawn onto a spider
  crosserTimer = Math.max(CROSSER_MIN_INTERVAL, 3);
  if (lives <= 0){
    state = STATE_OVER;
    if (window.GrownGame) window.GrownGame.setHighScore(score);
    showOverlay('GAME OVER', 'Final score: ' + score + '<br>Tap RESTART to play again.', 'PLAY AGAIN');
  } else {
    state = STATE_DEAD;
    deadTimer = 1.0;
  }
}

function reviveAfterDeath(){
  // Reset centipede & player for the current wave (mushrooms persist).
  spawnCentipede();
  player = newPlayer();
  state = STATE_PLAY;
}

function winWave(){
  state = STATE_WAVECLEAR;
  waveTimer = 1.4;
  sWave();
  addScore(50);
}

function nextWave(){
  wave++;
  waveEl.textContent = 'WAVE ' + wave;
  // add a few mushrooms, keep existing
  var add = 6;
  var tries = 0;
  while (add > 0 && tries < 200){
    tries++;
    var rr = 2 + Math.floor(Math.random() * (ROWS - 2 - PLAYER_ROWS));
    var cc = Math.floor(Math.random() * COLS);
    if (mushrooms[rr][cc] === 0){ mushrooms[rr][cc] = 4; add--; }
  }
  spawnCentipede();
  player = newPlayer();
  bullets = [];
  powerups = [];
  crossers = [];
  crosserTimer = 4;
  state = STATE_PLAY;
}

// ---------- Game flow ----------
function startGame(){
  resize();
  score = 0; lives = 3; wave = 1;
  scoreEl.textContent = 'SCORE 0';
  waveEl.textContent = 'WAVE 1';
  setLivesHud();
  mushrooms = newMushrooms();
  bullets = [];
  powerups = [];
  crossers = [];
  crosserTimer = 4;          // first spider/power-up runner a few seconds in
  flash = 0;
  floatTexts = [];
  spawnCentipede();
  player = newPlayer();
  state = STATE_PLAY;
  hideOverlay();
  beep(660,0.08,'triangle',0.06);
}

function showOverlay(title, text, btn){
  ovTitle.textContent = title;
  ovText.innerHTML = text;
  startBtn.textContent = btn || 'START';
  overlay.classList.remove('hidden');
}
function hideOverlay(){ overlay.classList.add('hidden'); }

// ---------- Input ----------
var keys = {};
window.addEventListener('keydown', function(e){
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Spacebar'].indexOf(e.key) >= 0) e.preventDefault();
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Spacebar') fire();
  if ((e.key === 'Enter') && (state === STATE_MENU || state === STATE_OVER)) startGame();
});
window.addEventListener('keyup', function(e){ keys[e.key] = false; });

// Touch / pointer drag to move the shooter
var dragging = false;
function pointerMove(clientX, clientY){
  if (state !== STATE_PLAY) return;
  var rect = canvas.getBoundingClientRect();
  var x = (clientX - rect.left);
  var y = (clientY - rect.top);
  player.x = clamp(x, cell*0.5, W - cell*0.5);
  // allow vertical movement only within the bottom player zone
  var minY = H - PLAYER_ROWS * cell + cell*0.5;
  var maxY = H - cell*0.5;
  player.y = clamp(y, minY, maxY);
}

canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  dragging = true;
  audio();
  if (e.touches.length){ pointerMove(e.touches[0].clientX, e.touches[0].clientY); }
}, { passive:false });
canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  if (e.touches.length){ pointerMove(e.touches[0].clientX, e.touches[0].clientY); }
}, { passive:false });
canvas.addEventListener('touchend', function(e){ e.preventDefault(); dragging = false; }, { passive:false });
canvas.addEventListener('touchcancel', function(e){ e.preventDefault(); dragging = false; }, { passive:false });

// Mouse drag (desktop optional)
canvas.addEventListener('mousedown', function(e){ dragging = true; audio(); pointerMove(e.clientX, e.clientY); });
window.addEventListener('mousemove', function(e){ if (dragging) pointerMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', function(){ dragging = false; });

// Buttons
startBtn.addEventListener('click', function(){ audio(); startGame(); });
restartBtn.addEventListener('click', function(){ audio(); startGame(); });
fireBtn.addEventListener('click', function(){ audio(); fire(); });
// hold-to-fire on fire button (touch)
var fireHeld = false;
fireBtn.addEventListener('touchstart', function(e){ e.preventDefault(); fireHeld = true; audio(); fire(); }, { passive:false });
fireBtn.addEventListener('touchend', function(e){ e.preventDefault(); fireHeld = false; }, { passive:false });

// ---------- Loop ----------
var last = 0;
var paused = false, rafId = 0;
function loop(ts){
  if (paused) return;
  if (!last) last = ts;
  var dt = (ts - last) / 1000;
  if (dt > 0.05) dt = 0.05; // clamp big frames
  last = ts;

  update(dt);
  render();
  rafId = requestAnimationFrame(loop);
}
window.addEventListener('grown:pause', function(){
  paused = true;
  if (rafId) cancelAnimationFrame(rafId);
});
window.addEventListener('grown:resume', function(){
  if (paused){
    paused = false;
    last = 0; // reset delta so no time jump
    rafId = requestAnimationFrame(loop);
  }
});

function update(dt){
  if (state === STATE_PLAY){
    // desktop keyboard movement
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed * dt;
    if (keys['ArrowRight']|| keys['d'] || keys['D']) player.x += player.speed * dt;
    if (keys['ArrowUp']   || keys['w'] || keys['W']) player.y -= player.speed * dt;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed * dt;
    player.x = clamp(player.x, cell*0.5, W - cell*0.5);
    player.y = clamp(player.y, H - PLAYER_ROWS*cell + cell*0.5, H - cell*0.5);

    if (player.cooldown > 0) player.cooldown -= dt;
    // tick down timed power-up effects
    if (player.shieldT > 0) player.shieldT = Math.max(0, player.shieldT - dt);
    if (player.rapidT  > 0) player.rapidT  = Math.max(0, player.rapidT  - dt);
    if (player.tripleT > 0) player.tripleT = Math.max(0, player.tripleT - dt);

    // Auto-fire continuously during play (fire() self-throttles via cooldown).
    // dragging / fireHeld are still honored but auto-fire keeps it always firing.
    fire();

    // bottom-crosser spawns (spider hazard + power-up runner) — these only kick
    // in at "medium" difficulty (wave CROSSER_START_WAVE+) as an added challenge.
    if (wave >= CROSSER_START_WAVE){
      crosserTimer -= dt;
      if (crosserTimer <= 0){
        spawnCrossers();
        crosserTimer = Math.max(CROSSER_MIN_INTERVAL, CROSSER_BASE_INTERVAL - wave * 0.3);
      }
    }

    stepBullets(dt);
    stepPowerups(dt);
    stepCentipede(dt);
    stepCrossers(dt);
  } else if (state === STATE_DEAD){
    deadTimer -= dt;
    if (deadTimer <= 0) reviveAfterDeath();
  } else if (state === STATE_WAVECLEAR){
    waveTimer -= dt;
    if (waveTimer <= 0) nextWave();
  }

  // float texts
  for (var i = floatTexts.length - 1; i >= 0; i--){
    floatTexts[i].t -= dt;
    floatTexts[i].y -= 20 * dt;
    if (floatTexts[i].t <= 0) floatTexts.splice(i,1);
  }
  if (flash > 0) flash = Math.max(0, flash - dt);
}

// ---------- Render ----------
function render(){
  ctx.clearRect(0,0,W,H);
  // subtle field background grid
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0,0,W,H);

  // player-zone tint
  ctx.fillStyle = 'rgba(40,40,80,0.18)';
  ctx.fillRect(0, H - PLAYER_ROWS*cell, W, PLAYER_ROWS*cell);

  drawMushrooms();
  drawPowerups();
  drawSegments();
  drawBullets();
  if (state === STATE_PLAY || state === STATE_DEAD || state === STATE_WAVECLEAR) drawPlayer();
  drawCrossers();
  drawFloatTexts();
  drawEffectHud();

  // bomb flash
  if (flash > 0){
    ctx.fillStyle = 'rgba(255,255,255,' + (0.6 * (flash / 0.25)).toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  if (state === STATE_WAVECLEAR){
    bannerText('WAVE ' + wave + ' CLEARED!', '#7cff7c');
  } else if (state === STATE_DEAD){
    bannerText('LIFE LOST', '#ff7c9c');
  }
}

function drawPowerCapsule(x, y, type, t){
  var def = POWERUPS[type];
  var rad = cell * 0.34;
  // glow halo
  ctx.globalAlpha = 0.30 + 0.15 * Math.sin(t * 6);
  ctx.fillStyle = def.color;
  ctx.beginPath(); ctx.arc(x, y, rad * 1.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // capsule body
  ctx.fillStyle = def.color;
  ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2); ctx.fill();
  ctx.lineWidth = Math.max(1, cell*0.05);
  ctx.strokeStyle = '#0b0b18';
  ctx.stroke();
  // label
  ctx.fillStyle = '#0b0b18';
  ctx.font = 'bold ' + Math.round(cell*0.42) + 'px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(def.label, x, y + cell*0.02);
  ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'start';
}
function drawPowerups(){
  if (!powerups) return;
  for (var i = 0; i < powerups.length; i++){
    var p = powerups[i];
    var bob = Math.sin(p.t * 6) * cell * 0.04;
    drawPowerCapsule(p.x, p.y + bob, p.type, p.t);
  }
}
function drawCrossers(){
  if (!crossers) return;
  for (var i = 0; i < crossers.length; i++){
    var cr = crossers[i];
    if (cr.kind === 'spider') drawSpider(cr);
    else drawPowerCapsule(cr.x, cr.y, cr.type, cr.t);
  }
}
function drawSpider(cr){
  var x = cr.x, y = cr.y, rad = cell * 0.30;
  // legs
  ctx.strokeStyle = '#ff5c5c';
  ctx.lineWidth = Math.max(1, cell*0.05);
  for (var k = -1; k <= 1; k++){
    ctx.beginPath();
    ctx.moveTo(x - rad*0.5, y); ctx.lineTo(x - rad*1.4, y + k*rad*0.7);
    ctx.moveTo(x + rad*0.5, y); ctx.lineTo(x + rad*1.4, y + k*rad*0.7);
    ctx.stroke();
  }
  // body
  ctx.fillStyle = '#ff5c5c';
  ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#7a1010';
  ctx.beginPath(); ctx.arc(x, y, rad*0.55, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - rad*0.32, y - rad*0.18, rad*0.16, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + rad*0.32, y - rad*0.18, rad*0.16, 0, Math.PI*2); ctx.fill();
}

// Small badges (bottom-left) showing active timed effects + remaining time bar.
function drawEffectHud(){
  if (state !== STATE_PLAY && state !== STATE_DEAD) return;
  var actives = [];
  if (player.shieldT > 0) actives.push({ d: POWERUPS.shield, t: player.shieldT });
  if (player.rapidT  > 0) actives.push({ d: POWERUPS.rapid,  t: player.rapidT });
  if (player.tripleT > 0) actives.push({ d: POWERUPS.triple, t: player.tripleT });
  var bw = cell * 1.9, bh = cell * 0.5, gap = cell * 0.16;
  var x0 = cell * 0.25, y0 = H - cell * 0.25 - bh;
  for (var i = 0; i < actives.length; i++){
    var a = actives[i];
    var y = y0 - i * (bh + gap);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x0, y, bw, bh);
    // time bar
    ctx.fillStyle = a.d.color;
    ctx.globalAlpha = 0.35;
    ctx.fillRect(x0, y, bw * Math.min(1, a.t / a.d.dur), bh);
    ctx.globalAlpha = 1;
    ctx.fillStyle = a.d.color;
    ctx.font = 'bold ' + Math.round(cell*0.34) + 'px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(a.d.label + ' ' + a.d.name + ' ' + Math.ceil(a.t), x0 + cell*0.18, y + bh*0.5);
    ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'start';
  }
}

function drawMushrooms(){
  for (var r = 0; r < ROWS; r++){
    for (var c = 0; c < COLS; c++){
      var hp = mushrooms[r][c];
      if (hp <= 0) continue;
      var x = c * cell, y = r * cell;
      var dmg = (4 - hp) / 4; // 0 = full
      // cap
      var cx = x + cell*0.5;
      ctx.fillStyle = mushCapColor(hp);
      ctx.beginPath();
      ctx.arc(cx, y + cell*0.42, cell*0.34, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      // stem
      ctx.fillStyle = mushStemColor(hp);
      ctx.fillRect(cx - cell*0.10, y + cell*0.42, cell*0.20, cell*0.34);
      // damage spots
      if (dmg > 0){
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(x + cell*0.2, y + cell*0.25, cell*0.6*dmg, cell*0.1);
      }
    }
  }
}
function shadeGreen(hp){
  switch(hp){
    case 4: return '#7cff7c';
    case 3: return '#5fd65f';
    case 2: return '#46a846';
    default: return '#2e7a2e';
  }
}
// Mushroom palette. Stays green through wave 9; from wave 10 on the hue cycles
// each level (Apeiron-style garden recolor). Damage still darkens the cap.
function mushHue(){ return ((wave - 10) * 40) % 360; }
function mushCapColor(hp){
  if (wave < 10) return shadeGreen(hp);
  var light = hp >= 4 ? 66 : (hp === 3 ? 55 : (hp === 2 ? 45 : 34));
  return 'hsl(' + mushHue() + ',62%,' + light + '%)';
}
function mushStemColor(hp){
  if (wave < 10) return hp >= 3 ? '#caa15a' : '#8a6e3a';
  var light = hp >= 3 ? 50 : 38;
  return 'hsl(' + mushHue() + ',34%,' + light + '%)';
}

function drawSegments(){
  for (var i = 0; i < segments.length; i++){
    var s = segments[i];
    var x = (s.colF + 0.5) * cell;
    var y = (s.rowF + 0.5) * cell;
    var rad = cell * 0.42;
    // body
    ctx.fillStyle = s.isHead ? '#ff5c5c' : '#ffd24a';
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI*2);
    ctx.fill();
    // outline
    ctx.lineWidth = Math.max(1, cell*0.06);
    ctx.strokeStyle = s.isHead ? '#7a1010' : '#a07000';
    ctx.stroke();
    if (s.isHead){
      // eyes
      ctx.fillStyle = '#fff';
      var ex = s.dir >= 0 ? rad*0.35 : -rad*0.35;
      ctx.beginPath(); ctx.arc(x+ex, y-rad*0.2, rad*0.18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+ex, y+rad*0.2, rad*0.18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(x+ex+(s.dir>=0?1:-1), y-rad*0.2, rad*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+ex+(s.dir>=0?1:-1), y+rad*0.2, rad*0.08, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawBullets(){
  ctx.fillStyle = '#fff8c0';
  for (var i = 0; i < bullets.length; i++){
    var b = bullets[i];
    ctx.fillRect(b.x - cell*0.06, b.y - cell*0.4, cell*0.12, cell*0.5);
  }
}

function drawPlayer(){
  var x = player.x, y = player.y;
  var s = cell * 0.4;
  ctx.fillStyle = state === STATE_DEAD ? '#888' : '#7cc8ff';
  // little ship/shooter triangle
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x + s, y + s);
  ctx.lineTo(x, y + s*0.4);
  ctx.lineTo(x - s, y + s);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#cdebff';
  ctx.lineWidth = Math.max(1, cell*0.05);
  ctx.stroke();

  // Shield bubble — pulses, and blinks during its final 2 seconds.
  if (player.shieldT > 0){
    var t = player.shieldT;
    var blink = t > 2 ? 1 : (Math.sin(t * 18) > -0.2 ? 1 : 0.25);
    var pulse = 0.5 + 0.25 * Math.sin(t * 6);
    ctx.save();
    ctx.globalAlpha = blink * pulse;
    ctx.strokeStyle = POWERUPS.shield.color;
    ctx.lineWidth = Math.max(1.5, cell * 0.10);
    ctx.beginPath();
    ctx.arc(x, y, cell * 0.78, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = blink * 0.12;
    ctx.fillStyle = POWERUPS.shield.color;
    ctx.beginPath();
    ctx.arc(x, y, cell * 0.78, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawFloatTexts(){
  ctx.textAlign = 'center';
  for (var i = 0; i < floatTexts.length; i++){
    var f = floatTexts[i];
    var isNum = (typeof f.v === 'number');
    ctx.globalAlpha = Math.max(0, f.t / (isNum ? 0.7 : 1.0));
    ctx.font = (isNum ? '' : 'bold ') + Math.round(cell*(isNum ? 0.5 : 0.42)) + 'px monospace';
    ctx.fillStyle = f.color || '#ffe07c';
    ctx.fillText(isNum ? ('+' + f.v) : f.v, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'start';
}

function bannerText(txt, color){
  ctx.save();
  ctx.font = 'bold ' + Math.round(cell*0.9) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, H*0.4, W, cell*1.6);
  ctx.fillStyle = color;
  ctx.fillText(txt, W*0.5, H*0.5 + cell*0.3);
  ctx.restore();
}

// ---------- Boot ----------
function boot(){
  resize();
  // dummy state for first render
  mushrooms = newMushrooms();
  segments = [];
  bullets = [];
  powerups = [];
  crossers = [];
  player = newPlayer();
  state = STATE_MENU;
  showOverlay('CENTIPEDE',
    'Drag your finger near the bottom to move &mdash; it auto-fires.<br>Desktop: Arrow keys / WASD + Space.<br>Shoot segments to clear the wave. Blasted mushrooms sometimes drop <b>power-ups</b> &mdash; move under them to grab a <b style="color:#5fb8ff">shield</b>, <b style="color:#ffd24a">rapid fire</b>, <b style="color:#b46cff">triple shot</b>, a life, or a bomb!',
    'START');
  rafId = requestAnimationFrame(loop);
}
boot();

})();
</script>
