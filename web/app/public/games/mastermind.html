<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mastermind Pro</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --peg-empty: #e0e0e0;
            /* Game Colors */
            --c1: #ff5252; --c2: #448aff; --c3: #69f0ae;
            --c4: #ffd740; --c5: #ffab40; --c6: #e040fb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin-top: 0; font-weight: 700; color: #2c3e50; }

        #board {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .row.active {
            background: #eef6ff;
            outline: 2px solid var(--primary-color);
        }

        .pegs-container {
            display: flex;
            gap: 10px;
        }

        .peg {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--peg-empty);
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .peg:active { transform: scale(0.9); }

        .feedback-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            width: 36px;
        }

        .f-peg {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ddd;
        }

        .f-black { background-color: #333; }
        .f-white { background-color: #fff; border: 1px solid #ccc; }

        #palette {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .color-opt {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }

        .color-opt:hover { transform: translateY(-3px); }
        .color-opt:active { transform: scale(0.9); }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #submit-btn { background-color: var(--primary-color); color: white; flex: 2; }
        #new-game-btn { background-color: #95a5a6; color: white; flex: 1; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #message {
            margin-top: 1.5rem;
            font-weight: 700;
            min-height: 1.5em;
        }

        .win { color: var(--success-color); }
        .loss { color: var(--danger-color); }

        /* Color Classes */
        .c1 { background-color: var(--c1); }
        .c2 { background-color: var(--c2); }
        .c3 { background-color: var(--c3); }
        .c4 { background-color: var(--c4); }
        .c5 { background-color: var(--c5); }
        .c6 { background-color: var(--c6); }
    </style>
    <!-- pwa:start -->
    <link rel="icon" type="image/svg+xml" href="/games/icons/mastermind.svg">
    <link rel="manifest" href="/games/mastermind.webmanifest">
    <meta name="theme-color" content="#7C4DFF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mastermind">
    <link rel="apple-touch-icon" href="/games/icons/mastermind.svg">
    <style>/* keep content clear of the iPhone notch / camera island (safe-area insets) */
    body{padding-top:env(safe-area-inset-top,0px);padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);}
    </style>
    <script>
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/games/games-sw.js').catch(function(){})})}
    // Back-to-all-games pill (top-left). Positioned with env(safe-area-inset-*)
    // so it clears the notch / Dynamic Island.
    window.addEventListener('DOMContentLoaded',function(){var a=document.createElement('a');a.href='/games';a.textContent='‹ Games';a.setAttribute('style','position:fixed;left:calc(env(safe-area-inset-left,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;padding:6px 12px;border-radius:20px;background:rgba(15,23,42,.6);color:#fff;font:600 13px system-ui,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);touch-action:manipulation');document.body.appendChild(a);});
    // Top-right pause/menu button (placed far from gameplay). Opens a top sheet
    // with high score, Install, Back to games, and Report an issue. Opening the
    // menu fires a 'grown:pause' event + dims/blocks the screen (soft pause);
    // closing fires 'grown:resume'. Games can opt in to true pause + scoring via
    // the window.GrownGame hook (highScore()/setHighScore()).
    (function(){
      var ID="mastermind",NAME="Mastermind",COLOR="#7C4DFF",HK='grown-hi-'+ID;
      window.GrownGame={
        highScore:function(){return parseInt(localStorage.getItem(HK)||'0',10)||0;},
        setHighScore:function(n){n=Math.floor(+n||0);try{if(n>this.highScore())localStorage.setItem(HK,String(n));}catch(e){}return this.highScore();}
      };
      var dp=null,scrim,sheet,hiEl,installItem,isOpen=false;
      function css(el,s){el.setAttribute('style',s);}
      function emit(n){try{window.dispatchEvent(new Event(n));}catch(e){}}
      window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;if(installItem)installItem.style.display='';});
      window.addEventListener('appinstalled',function(){dp=null;if(installItem)installItem.style.display='none';});
      function item(label,fn){var b=document.createElement('button');b.textContent=label;css(b,'display:block;width:100%;text-align:left;margin:6px 0;padding:12px 14px;border:1px solid #243049;border-radius:10px;background:#16203a;color:#e8eefc;font:600 15px system-ui,sans-serif;cursor:pointer;touch-action:manipulation');b.onclick=fn;return b;}
      function openMenu(){if(isOpen)return;isOpen=true;hiEl.textContent='High score: '+(window.GrownGame.highScore()||'—');scrim.style.pointerEvents='auto';scrim.style.opacity='1';sheet.style.transform='translateY(0)';emit('grown:pause');}
      function closeMenu(){if(!isOpen)return;isOpen=false;scrim.style.opacity='0';scrim.style.pointerEvents='none';sheet.style.transform='translateY(-110%)';emit('grown:resume');}
      function doInstall(){if(!dp)return;var d=dp;dp=null;installItem.style.display='none';d.prompt();d.userChoice.finally(function(){});closeMenu();}
      function report(){var body='\n\n----\nGame: '+NAME+'\nURL: '+location.href+'\nDevice: '+navigator.userAgent;location.href='mailto:games@pick.haus?subject='+encodeURIComponent('Issue: '+NAME)+'&body='+encodeURIComponent(body);}
      function build(){
        var btn=document.createElement('button');btn.setAttribute('aria-label','Menu');btn.textContent='\u23F8';
        css(btn,'position:fixed;right:calc(env(safe-area-inset-right,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;width:40px;height:40px;padding:0;border:none;border-radius:50%;background:rgba(15,23,42,.6);color:#fff;font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation');
        btn.onclick=openMenu;document.body.appendChild(btn);
        scrim=document.createElement('div');css(scrim,'position:fixed;inset:0;z-index:2147483646;background:rgba(0,0,0,.55);opacity:0;transition:opacity .18s;pointer-events:none');scrim.onclick=closeMenu;document.body.appendChild(scrim);
        sheet=document.createElement('div');css(sheet,'position:fixed;left:0;right:0;top:0;z-index:2147483647;transform:translateY(-110%);transition:transform .22s;background:#0f172a;color:#e8eefc;border-bottom-left-radius:16px;border-bottom-right-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 16px;max-width:480px;margin:0 auto');document.body.appendChild(sheet);
        var h=document.createElement('div');css(h,'font-weight:700;font-size:17px;color:'+COLOR);h.textContent=NAME;sheet.appendChild(h);
        hiEl=document.createElement('div');css(hiEl,'font-size:13px;color:#9fb3d9;margin:2px 0 12px');sheet.appendChild(hiEl);
        sheet.appendChild(item('\u25B6 Resume',closeMenu));
        installItem=item('\u2B07 Install app',doInstall);installItem.style.display=dp?'':'none';sheet.appendChild(installItem);
        sheet.appendChild(item('\u2039 All games',function(){location.href='/games';}));
        sheet.appendChild(item('\u2691 Report an issue',report));
      }
      if(document.body)build();else window.addEventListener('DOMContentLoaded',build);
    })();
    </script>
    <!-- pwa:end -->
</head>
<body>

<div id="game-container">
    <h1>Mastermind</h1>
    
    <div id="board">
        <!-- Rows generated by JS -->
    </div>

    <div id="palette">
        <div class="color-opt c1" data-color="1"></div>
        <div class="color-opt c2" data-color="2"></div>
        <div class="color-opt c3" data-color="3"></div>
        <div class="color-opt c4" data-color="4"></div>
        <div class="color-opt c5" data-color="5"></div>
        <div class="color-opt c6" data-color="6"></div>
    </div>

    <div class="controls">
        <button id="submit-btn">Submit Guess</button>
        <button id="new-game-btn">New Game</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const MAX_ATTEMPTS = 10;
    const CODE_LENGTH = 4;
    const COLORS_COUNT = 6;

    let secretCode = [];
    let currentGuess = [];
    let attempts = [];
    let gameOver = false;

    const boardEl = document.getElementById('board');
    const submitBtn = document.getElementById('submit-btn');
    const newGameBtn = document.getElementById('new-game-btn');
    const messageEl = document.getElementById('message');
    const palette = document.getElementById('palette');

    function initGame() {
        secretCode = Array.from({ length: CODE_LENGTH }, () => Math.floor(Math.random() * COLORS_COUNT) + 1);
        currentGuess = [];
        attempts = [];
        gameOver = false;
        messageEl.textContent = '';
        messageEl.className = '';
        submitBtn.disabled = false;
        renderBoard();
        console.log("Cheat:", secretCode); // For testing
    }

    function renderBoard() {
        boardEl.innerHTML = '';
        
        // Render previous attempts
        attempts.forEach((attempt, idx) => {
            boardEl.appendChild(createRow(attempt.guess, attempt.feedback, false));
        });

        // Render current active row
        if (!gameOver) {
            const activeRow = createRow(currentGuess, null, true);
            boardEl.appendChild(activeRow);
        } else {
            // If game over, show the last row as the final attempt
            const lastAttempt = attempts[attempts.length - 1];
            if (lastAttempt) {
                boardEl.appendChild(createRow(lastAttempt.guess, lastAttempt.feedback, false));
            }
        }
    }

    function createRow(guess, feedback, isActive) {
        const row = document.createElement('div');
        row.className = `row ${isActive ? 'active' : ''}`;

        const pegsContainer = document.createElement('div');
        pegsContainer.className = 'pegs-container';

        for (let i = 0; i < CODE_LENGTH; i++) {
            const peg = document.createElement('div');
            peg.className = 'peg';
            if (guess[i]) {
                peg.classList.add(`c${guess[i]}`);
            }
            if (isActive) {
                peg.onclick = () => removeColor(i);
            }
            pegsContainer.appendChild(peg);
        }

        row.appendChild(pegsContainer);

        const feedbackContainer = document.createElement('div');
        feedbackContainer.className = 'feedback-container';
        
        if (feedback) {
            for (let i = 0; i < feedback.black; i++) {
                const f = document.createElement('div');
                f.className = 'f-peg f-black';
                feedbackContainer.appendChild(f);
            }
            for (let i = 0; i < feedback.white; i++) {
                const f = document.createElement('div');
                f.className = 'f-peg f-white';
                feedbackContainer.appendChild(f);
            }
            // Fill remaining empty feedback slots
            for (let i = 0; i < (4 - (feedback.black + feedback.white)); i++) {
                const f = document.createElement('div');
                f.className = 'f-peg';
                feedbackContainer.appendChild(f);
            }
        } else {
            for (let i = 0; i < 4; i++) {
                const f = document.createElement('div');
                f.className = 'f-peg';
                feedbackContainer.appendChild(f);
            }
        }

        row.appendChild(feedbackContainer);
        return row;
    }

    function removeColor(index) {
        currentGuess[index] = null;
        // Filter out nulls to keep logic simple or keep indices? 
        // Let's keep indices so user can target specific pegs.
        currentGuess = currentGuess.map((val, i) => i === index ? null : val);
        // Clean up the array to handle "next available" logic
        renderBoard();
    }

    function handleColorSelect(colorId) {
        if (gameOver) return;
        
        // Find first null slot
        const emptyIndex = currentGuess.findIndex(c => c === null || c === undefined);
        if (emptyIndex !== -1) {
            currentGuess[emptyIndex] = parseInt(colorId);
            // Ensure array is always length 4
            while(currentGuess.length < CODE_LENGTH) currentGuess.push(null);
            renderBoard();
        }
    }

    function calculateFeedback(guess, secret) {
        let black = 0;
        let white = 0;
        let sCopy = [...secret];
        let gCopy = [...guess];

        // First pass: Black pegs
        for (let i = 0; i < CODE_LENGTH; i++) {
            if (gCopy[i] === sCopy[i]) {
                black++;
                sCopy[i] = null;
                gCopy[i] = null;
            }
        }

        // Second pass: White pegs
        for (let i = 0; i < CODE_LENGTH; i++) {
            if (gCopy[i] !== null) {
                const foundIdx = sCopy.indexOf(gCopy[i]);
                if (foundIdx !== -1) {
                    white++;
                    sCopy[foundIdx] = null;
                }
            }
        }

        return { black, white };
    }

    function submitGuess() {
        if (gameOver) return;
        
        // Validate
        const filledGuess = currentGuess.filter(c => c !== null && c !== undefined);
        if (filledGuess.length < CODE_LENGTH) {
            messageEl.textContent = "Fill all 4 pegs!";
            messageEl.className = 'loss';
            return;
        }

        const feedback = calculateFeedback(currentGuess, secretCode);
        attempts.push({ guess: [...currentGuess], feedback });
        
        if (feedback.black === CODE_LENGTH) {
            endGame(true);
        } else if (attempts.length >= MAX_ATTEMPTS) {
            endGame(false);
        } else {
            currentGuess = [null, null, null, null];
            messageEl.textContent = '';
            renderBoard();
        }
    }

    function endGame(win) {
        gameOver = true;
        submitBtn.disabled = true;
        renderBoard();

        if (win) {
            messageEl.textContent = "YOU WIN! 🎉";
            messageEl.className = "win";
        } else {
            messageEl.textContent = `GAME OVER! Code was: `;
            messageEl.className = "loss";
            // Add color indicators to message
            const codeSpan = document.createElement('span');
            codeSpan.style.display = 'block';
            codeSpan.style.marginTop = '5px';
            
            secretCode.forEach(c => {
                const dot = document.createElement('span');
                dot.className = `peg c${c}`;
                dot.style.display = 'inline-block';
                dot.style.margin = '0 4px';
                dot.style.verticalAlign = 'middle';
                codeSpan.appendChild(dot);
            });
            messageEl.appendChild(codeSpan);
        }
    }

    // Event Listeners
    palette.addEventListener('click', (e) => {
        if (e.target.classList.contains('color-opt')) {
            handleColorSelect(e.target.dataset.color);
        }
    });

    submitBtn.addEventListener('click', submitGuess);
    newGameBtn.addEventListener('click', initGame);

    // Start
    initGame();
</script>

</body>
</html>
