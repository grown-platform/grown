<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Multiplayer Tic-Tac-Toe</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --x:#38bdf8; --o:#fb7185; --txt:#e2e8f0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:480px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px;min-height:100%}
  h1{font-size:22px;margin:0;text-align:center}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  label{display:block;font-size:13px;opacity:.75;margin-bottom:4px}
  input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);
    background:#0b1220;color:var(--txt);font:inherit;margin-bottom:10px}
  button{width:100%;padding:11px 14px;border:0;border-radius:10px;background:#2563eb;color:#fff;
    font:600 15px system-ui;cursor:pointer}
  button.alt{background:transparent;border:1px solid var(--line);color:var(--txt)}
  button:disabled{opacity:.5;cursor:default}
  .row{display:flex;gap:8px}
  .status{text-align:center;font-weight:600;min-height:24px}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;aspect-ratio:1;max-width:360px;margin:0 auto;width:100%}
  .cell{background:#0b1220;border:1px solid var(--line);border-radius:12px;display:flex;
    align-items:center;justify-content:center;font-size:14vw;max-font-size:64px;font-weight:800;cursor:pointer;user-select:none}
  @media(min-width:480px){.cell{font-size:64px}}
  .cell.x{color:var(--x)} .cell.o{color:var(--o)}
  .share{font-family:ui-monospace,monospace;font-size:13px;word-break:break-all;background:#0b1220;
    border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px}
  .hide{display:none}
  .small{font-size:13px;opacity:.7;text-align:center}
  a{color:var(--x)}
</style>
</head>
<body>
<div class="wrap">
  <h1>⭕ Multiplayer Tic-Tac-Toe ❌</h1>

  <!-- Lobby (create or join) -->
  <div id="lobby" class="card">
    <label>Your name</label>
    <input id="name" placeholder="Player" maxlength="40" />
    <div id="join-extra" class="hide">
      <label>Room password (if set)</label>
      <input id="join-pass" type="password" placeholder="leave blank if none" />
      <button id="join-btn">Join game</button>
    </div>
    <div id="create-extra">
      <label>Room password (optional)</label>
      <input id="create-pass" type="password" placeholder="optional — protect your room" />
      <button id="create-btn">Create game &amp; get link</button>
    </div>
  </div>

  <!-- Share -->
  <div id="share-card" class="card hide">
    <label>Share this link — whoever opens it joins your game:</label>
    <div id="share-link" class="share"></div>
    <button id="copy-btn" class="alt">Copy link</button>
  </div>

  <!-- Game -->
  <div id="game" class="hide">
    <div id="status" class="status">Waiting for opponent…</div>
    <div id="board" class="board"></div>
    <div class="small" id="who"></div>
    <button id="rematch" class="alt hide" style="margin-top:12px">Rematch</button>
  </div>
</div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var params = new URLSearchParams(location.search);
  var roomCode = params.get("room") || "";
  var isJoining = !!roomCode;

  // UI: joining vs creating
  if (isJoining) { $("create-extra").classList.add("hide"); $("join-extra").classList.remove("hide"); }

  var ws = null, myMark = null, myId = null, turn = "X", board = Array(9).fill(""), over = false, names = {};

  function randCode(){
    var s = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789", out = "";
    var a = new Uint8Array(7); crypto.getRandomValues(a);
    for (var i=0;i<7;i++) out += s[a[i] % s.length];
    return out;
  }

  function connect(code, pass, name){
    var proto = location.protocol === "https:" ? "wss://" : "ws://";
    var url = proto + location.host + "/api/v1/gamerooms/ws?room=" + encodeURIComponent(code) +
      "&password=" + encodeURIComponent(pass) + "&name=" + encodeURIComponent(name);
    ws = new WebSocket(url);
    ws.onmessage = onMessage;
    ws.onclose = function(){ if(!over) setStatus("Disconnected. Reload to rejoin."); };
    ws.onerror = function(){ setStatus("Connection error. Check the password and try again."); };
  }

  function send(obj){ if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

  function startGame(){
    $("lobby").classList.add("hide");
    $("game").classList.remove("hide");
    renderBoard();
  }

  function onMessage(ev){
    var m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if (m.type === "roster") {
      myId = m.you;
      // First peer in the room is X, the second is O.
      myMark = (m.peers && m.peers.length <= 1) ? "X" : "O";
      (m.peers||[]).forEach(function(p){ names[p.id] = p.name; });
      $("who").textContent = "You are " + myMark + (myMark === "X" ? " (you move first)" : "");
      startGame();
      updateStatus();
    } else if (m.type === "join") {
      names[m.from] = m.name;
      if (myMark === "X") { setStatus(m.name + " joined — your move (X)"); }
    } else if (m.type === "leave") {
      if (!over) setStatus((names[m.from]||"Opponent") + " left the game.");
    } else if (m.type === "move") {
      applyMove(m.cell, m.mark, false);
    } else if (m.type === "rematch") {
      resetBoard();
    }
  }

  function setStatus(t){ $("status").textContent = t; }
  function updateStatus(){
    if (over) return;
    if (myMark === "X" && Object.keys(names).length <= 1) { setStatus("Waiting for opponent…"); return; }
    setStatus(turn === myMark ? "Your move (" + myMark + ")" : "Opponent's move (" + turn + ")");
  }

  function renderBoard(){
    var b = $("board"); b.innerHTML = "";
    for (var i=0;i<9;i++){
      (function(i){
        var c = document.createElement("div");
        c.className = "cell" + (board[i] ? " " + board[i].toLowerCase() : "");
        c.textContent = board[i];
        c.onclick = function(){ tryMove(i); };
        b.appendChild(c);
      })(i);
    }
  }

  function tryMove(i){
    if (over || board[i] || turn !== myMark) return;
    applyMove(i, myMark, true);
    send({ type:"move", cell:i, mark:myMark });
  }

  function applyMove(i, mark, local){
    if (over || board[i]) return;
    board[i] = mark;
    turn = mark === "X" ? "O" : "X";
    renderBoard();
    var win = winner();
    if (win) { endGame(win === "draw" ? "It's a draw!" : (win + " wins!")); }
    else { updateStatus(); }
  }

  function winner(){
    var L = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (var i=0;i<L.length;i++){
      var a=L[i][0],b=L[i][1],c=L[i][2];
      if (board[a] && board[a]===board[b] && board[a]===board[c]) return board[a];
    }
    return board.every(function(x){return x;}) ? "draw" : null;
  }

  function endGame(msg){ over = true; setStatus(msg); $("rematch").classList.remove("hide"); }
  function resetBoard(){ board = Array(9).fill(""); turn = "X"; over = false; $("rematch").classList.add("hide"); renderBoard(); updateStatus(); }

  $("rematch").onclick = function(){ resetBoard(); send({ type:"rematch" }); };

  // Create flow
  $("create-btn") && ($("create-btn").onclick = function(){
    var name = ($("name").value || "Player").trim();
    var pass = $("create-pass").value || "";
    var code = randCode();
    var link = location.origin + location.pathname + "?room=" + code;
    $("share-link").textContent = link + (pass ? "  (password protected)" : "");
    $("share-card").classList.remove("hide");
    $("create-extra").classList.add("hide");
    $("copy-btn").onclick = function(){
      navigator.clipboard && navigator.clipboard.writeText(link);
      $("copy-btn").textContent = "Copied!";
    };
    connect(code, pass, name);
  });

  // Join flow
  $("join-btn") && ($("join-btn").onclick = function(){
    var name = ($("name").value || "Player").trim();
    var pass = $("join-pass").value || "";
    connect(roomCode, pass, name);
  });
})();
</script>
</body>
</html>
