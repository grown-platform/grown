<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Snake</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #22c55e;
            --food-color: #ef4444;
            --snake-head: #4ade80;
            --snake-body: #166534;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        #score-val, #high-score-val {
            color: var(--accent-color);
        }

        canvas {
            display: block;
            background-color: #000;
            border-radius: 8px;
            border: 2px solid #334155;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            background-color: var(--accent-color);
            color: #052e16;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: #4ade80;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            z-index: 10;
        }

        #game-over-overlay h2 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--food-color);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats-container">
            <div>Score: <span id="score-val">0</span></div>
            <div>High: <span id="high-score-val">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="game-over-overlay">
            <h2>GAME OVER</h2>
            <p id="final-score">Score: 0</p>
            <button onclick="resetGame()">Try Again</button>
        </div>

        <div class="controls">
            <button onclick="resetGame()">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const highScoreEl = document.getElementById('high-score-val');
        const finalScoreEl = document.getElementById('final-score');
        const overlay = document.getElementById('game-over-overlay');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        let snake, food, direction, nextDirection, score, highScore, gameLoopTimeout, isGameOver;

        function init() {
            highScore = localStorage.getItem('snakeHighScore') || 0;
            highScoreEl.textContent = highScore;
            resetGame();
        }

        function resetGame() {
            snake = [
                {x: 10, y: 10},
                {x: 10, y: 11},
                {x: 10, y: 12}
            ];
            direction = {x: 0, y: -1};
            nextDirection = {x: 0, y: -1};
            score = 0;
            isGameOver = false;
            scoreEl.textContent = score;
            overlay.style.display = 'none';
            
            spawnFood();
            clearTimeout(gameLoopTimeout);
            gameLoop();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
            // Don't spawn food on snake body
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    return;
                }
            }
        }

        function handleInput(e) {
            const key = e.key;
            // Arrow keys or WASD
            if ((key === 'ArrowUp' || key === 'w' || key === 'W') && direction.y === 0) {
                nextDirection = {x: 0, y: -1};
            } else if ((key === 'ArrowDown' || key === 's' || key === 'S') && direction.y === 0) {
                nextDirection = {x: 0, y: 1};
            } else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && direction.x === 0) {
                nextDirection = {x: -1, y: 0};
            } else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && direction.x === 0) {
                nextDirection = {x: 1, y: 0};
            }
        }

        function update() {
            direction = nextDirection;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                return gameOver();
            }

            // Self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2, 
                food.y * CELL_SIZE + CELL_SIZE / 2, 
                CELL_SIZE / 2.5, 
                0, Math.PI * 2
            );
            ctx.fill();

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4ade80' : '#166534';
                // Rounded rectangle effect
                const padding = 1;
                ctx.fillRect(
                    segment.x * CELL_SIZE + padding, 
                    segment.y * CELL_SIZE + padding, 
                    CELL_SIZE - padding * 2, 
                    CELL_SIZE - padding * 2
                );
            });
        }

        function gameOver() {
            isGameOver = true;
            finalScoreEl.textContent = `Score: ${score}`;
            overlay.style.display = 'flex';
        }

        function gameLoop() {
            if (isGameOver) return;

            update();
            draw();

            // Speed increases as score goes up (minimum 60ms)
            const speed = Math.max(60, 150 - Math.floor(score / 10) * 5);
            gameLoopTimeout = setTimeout(gameLoop, speed);
        }

        window.addEventListener('keydown', handleInput);
        init();
    </script>
</body>
</html>
