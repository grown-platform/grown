<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #05060d;
    color: #cfe8ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;

    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 560px;
    margin: 0 auto;
    padding: 8px;
    gap: 8px;
  }
  header {
    text-align: center;
    flex: 0 0 auto;
  }
  h1 {
    font-size: 18px;
    letter-spacing: 2px;

  }
  #scorebar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
    font-size: 14px;
  }
  .you { color: #2af0ff; }
  .cpu { color: #ff7a2a; }
  #scorebar .lbl { opacity: .7; font-size: 11px; }
  #scorebar .num { font-size: 20px; font-weight: 700; }
  #round { opacity: .8; font-size: 12px; }
  #stage {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  canvas {
    background: #080a16;
    border: 1px solid #173a55;
    box-shadow: 0 0 24px rgba(20,80,140,.35) inset, 0 0 12px rgba(20,120,180,.25);
    border-radius: 4px;
    display: block;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(5,6,13,.78);
    backdrop-filter: blur(2px);
    text-align: center;
    padding: 16px;
  }
  #overlay.show { display: flex; }
  #overlay .big {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 0 12px currentColor;
  }
  #overlay .sub { font-size: 14px; opacity: .85; }
  button {
    font: inherit;
    color: #05060d;
    background: #2af0ff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(42,240,255,.5);
    touch-action: manipulation;
  }
  button:active { transform: scale(.96); }
  #controls {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding-bottom: 6px;
  }
  .turnbtn {
    width: 88px;
    height: 64px;
    background: #0e1f33;
    color: #2af0ff;
    border: 1px solid #2af0ff;
    border-radius: 12px;
    box-shadow: 0 0 8px rgba(42,240,255,.25);
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .turnbtn:active { background: #18324f; }
  #hint { text-align: center; font-size: 11px; opacity: .55; flex: 0 0 auto; }

<body>
<div id="wrap">
  <header>
    <h1>Tron &middot; Light Cycles</h1>
    <div id="scorebar">
      <span class="you"><span class="lbl">YOU</span> <span class="num" id="youScore">0</span></span>
      <span id="round">Round 1</span>
      <span class="cpu"><span class="num" id="cpuScore">0</span> <span class="lbl">CPU</span></span>
    </div>
  </header>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <div class="big" id="ovTitle"></div>
      <div class="sub" id="ovSub"></div>
      <button id="ovBtn">Restart</button>
    </div>
  </div>
  <div id="controls">
    <button class="turnbtn" id="leftBtn" aria-label="Turn left">&#8634;</button>
    <button class="turnbtn" id="rightBtn" aria-label="Turn right">&#8635;</button>
  </div>
  <div id="hint">Swipe or arrow keys to steer &middot; First to 5 wins</div>
</div>

<script>
(function () {
  "use strict";

  // ---- Config ----
  var COLS = 40, ROWS = 40;     // grid cells
  var WIN_TARGET = 5;           // first to N
  var STEP_MS = 70;             // ms per grid step (movement speed)

  // ---- Canvas ----
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var cell = 8;                 // pixel size per cell, recomputed on resize
  var pad = 1;

  // ---- Elements ----
  var youScoreEl = document.getElementById("youScore");
  var cpuScoreEl = document.getElementById("cpuScore");
  var roundEl = document.getElementById("round");
  var overlay = document.getElementById("overlay");
  var ovTitle = document.getElementById("ovTitle");
  var ovSub = document.getElementById("ovSub");
  var ovBtn = document.getElementById("ovBtn");

  // ---- Directions ----
  var DIRS = {
    up:    { x: 0, y: -1 },
    down:  { x: 0, y: 1 },
    left:  { x: -1, y: 0 },
    right: { x: 1, y: 0 }
  };
  var OPP = { up: "down", down: "up", left: "right", right: "left" };

  // grid: 0 empty, 1 player trail, 2 cpu trail
  var grid;
  var player, cpu;
  var youScore = 0, cpuScore = 0, round = 1;
  var running = false, lastStep = 0, matchOver = false;

  function newGrid() {
    grid = new Array(COLS * ROWS);
    for (var i = 0; i < grid.length; i++) grid[i] = 0;
  }
  function gAt(x, y) { return grid[y * COLS + x]; }
  function gSet(x, y, v) { grid[y * COLS + x] = v; }
  function inBounds(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }

  // ---- Audio ----
  var actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    return actx;
  }
  function beep(freq, dur, type, vol) {
    var a = audio();
    if (!a) return;
    try {
      var o = a.createOscillator();
      var g = a.createGain();
      o.type = type || "square";
      o.frequency.value = freq;
      g.gain.value = vol == null ? 0.05 : vol;
      o.connect(g); g.connect(a.destination);
      var t = a.currentTime;
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur);
    } catch (e) {}
  }
  function sndTurn() { beep(440, 0.05, "square", 0.03); }
  function sndCrash() { beep(110, 0.35, "sawtooth", 0.08); }
  function sndWin() { beep(660, 0.12, "triangle", 0.06); setTimeout(function(){ beep(880, 0.18, "triangle", 0.06); }, 110); }

  // ---- Round setup ----
  function startRound() {
    newGrid();
    var midY = Math.floor(ROWS / 2);
    player = {
      x: Math.floor(COLS * 0.25), y: midY,
      dir: "right", next: "right",
      alive: true, who: 1
    };
    cpu = {
      x: Math.floor(COLS * 0.75), y: midY,
      dir: "left", next: "left",
      alive: true, who: 2
    };
    gSet(player.x, player.y, 1);
    gSet(cpu.x, cpu.y, 2);
    running = true;
    matchOver = false;
    lastStep = performance.now();
    overlay.classList.remove("show");
    roundEl.textContent = "Round " + round;
    draw();
  }

  // ---- Player steering ----
  function setNextDir(bike, d) {
    if (!bike.alive || !running) return;
    // can't reverse directly
    if (OPP[bike.dir] === d) return;
    if (bike.next !== d) sndTurn();
    bike.next = d;
  }
  // relative turn for swipe-relative & buttons
  function turn(bike, dirSign) {
    // dirSign: -1 left, +1 right (clockwise)
    var order = ["up", "right", "down", "left"];
    var idx = order.indexOf(bike.dir);
    var ni = (idx + dirSign + 4) % 4;
    setNextDir(bike, order[ni]);
  }

  // ---- CPU AI ----
  // Returns true if moving from (x,y) in dir d would be safe (no immediate crash).
  function safeMove(x, y, d) {
    var nx = x + DIRS[d].x;
    var ny = y + DIRS[d].y;
    if (!inBounds(nx, ny)) return false;
    if (gAt(nx, ny) !== 0) return false;
    return true;
  }
  // Flood-fill open space reachable from (x,y) — used to avoid trapping self.
  function openSpace(x, y, limit) {
    if (!inBounds(x, y) || gAt(x, y) !== 0) return 0;
    var seen = {};
    var stack = [[x, y]];
    var count = 0;
    while (stack.length && count < limit) {
      var c = stack.pop();
      var cx = c[0], cy = c[1];
      var key = cy * COLS + cx;
      if (seen[key]) continue;
      if (!inBounds(cx, cy) || gAt(cx, cy) !== 0) continue;
      seen[key] = 1;
      count++;
      stack.push([cx + 1, cy]);
      stack.push([cx - 1, cy]);
      stack.push([cx, cy + 1]);
      stack.push([cx, cy - 1]);
    }
    return count;
  }

  function cpuThink() {
    if (!cpu.alive) return;
    var order = ["up", "right", "down", "left"];
    var options = [];
    for (var i = 0; i < order.length; i++) {
      var d = order[i];
      if (OPP[cpu.dir] === d) continue;        // can't reverse
      if (!safeMove(cpu.x, cpu.y, d)) continue; // immediate crash
      var nx = cpu.x + DIRS[d].x;
      var ny = cpu.y + DIRS[d].y;
      // space available after this move (avoid self-trapping)
      var space = openSpace(nx, ny, 220);
      // distance toward cutting off the player
      var pdx = player.x - nx, pdy = player.y - ny;
      var pdist = Math.abs(pdx) + Math.abs(pdy);
      // bias: chase / cut off the player when there is plenty of space
      var aggression = space > 60 ? 1 : 0;
      // wall hugging penalty: prefer center a bit when boxed
      var edge = Math.min(nx, COLS - 1 - nx, ny, ROWS - 1 - ny);
      var score = space * 4
                - aggression * pdist * 1.5
                + edge * 0.5;
      // small preference to keep going straight (smoother lines)
      if (d === cpu.dir) score += 6;
      options.push({ d: d, score: score, space: space });
    }
    if (!options.length) return; // no safe move; will crash
    options.sort(function (a, b) { return b.score - a.score; });

    // Predict player's likely cell and try to block it if very close.
    var pn = predictPlayer();
    for (var j = 0; j < options.length; j++) {
      var o = options[j];
      var ox = cpu.x + DIRS[o.d].x;
      var oy = cpu.y + DIRS[o.d].y;
      if (o.space > 40 && ox === pn.x && oy === pn.y) {
        cpu.next = o.d; // intercept
        return;
      }
    }
    cpu.next = options[0].d;
  }
  function predictPlayer() {
    var nx = player.x + DIRS[player.next].x;
    var ny = player.y + DIRS[player.next].y;
    return { x: nx, y: ny };
  }

  // ---- Step / collision ----
  function step() {
    cpuThink();
    player.dir = player.next;
    cpu.dir = cpu.next;

    var pnx = player.x + DIRS[player.dir].x;
    var pny = player.y + DIRS[player.dir].y;
    var cnx = cpu.x + DIRS[cpu.dir].x;
    var cny = cpu.y + DIRS[cpu.dir].y;

    var pCrash = !inBounds(pnx, pny) || gAt(pnx, pny) !== 0;
    var cCrash = !inBounds(cnx, cny) || gAt(cnx, cny) !== 0;
    // head-on into same cell
    if (pnx === cnx && pny === cny) { pCrash = true; cCrash = true; }

    if (pCrash) player.alive = false;
    if (cCrash) cpu.alive = false;

    if (!pCrash) { player.x = pnx; player.y = pny; gSet(pnx, pny, 1); }
    if (!cCrash) { cpu.x = cnx; cpu.y = cny; gSet(cnx, cny, 2); }

    if (pCrash || cCrash) {
      endRound(pCrash, cCrash);
    }
  }

  function endRound(pCrash, cCrash) {
    running = false;
    sndCrash();
    var youWon = false, cpuWon = false, draw_ = false;
    if (pCrash && cCrash) { draw_ = true; }
    else if (pCrash) { cpuWon = true; }
    else { youWon = true; }

    if (youWon) youScore++;
    if (cpuWon) cpuScore++;
    youScoreEl.textContent = youScore;
    cpuScoreEl.textContent = cpuScore;
    draw();

    var done = youScore >= WIN_TARGET || cpuScore >= WIN_TARGET;
    if (done) {
      matchOver = true;
      var win = youScore > cpuScore;
      ovTitle.style.color = win ? "#2af0ff" : "#ff7a2a";
      ovTitle.textContent = win ? "YOU WIN THE MATCH!" : "CPU WINS THE MATCH";
      ovSub.textContent = "Final " + youScore + " – " + cpuScore;
      ovBtn.textContent = "Play Again";
      sndWin();
      overlay.classList.add("show");
    } else {
      round++;
      var msg = draw_ ? "Draw!" : (youWon ? "You win the round" : "CPU wins the round");
      ovTitle.style.color = draw_ ? "#cfe8ff" : (youWon ? "#2af0ff" : "#ff7a2a");
      ovTitle.textContent = msg;
      ovSub.textContent = "Score  " + youScore + " – " + cpuScore + "  ·  Next: Round " + round;
      ovBtn.textContent = "Next Round";
      overlay.classList.add("show");
    }
  }

  // ---- Rendering ----
  function resize() {
    var stage = document.getElementById("stage");
    var w = stage.clientWidth;
    var h = stage.clientHeight;
    if (w <= 0 || h <= 0) return;
    // square board fitting the stage
    var size = Math.min(w, h);
    cell = Math.max(4, Math.floor(size / COLS));
    var px = cell * COLS;
    var dpr = window.devicePixelRatio || 1;
    canvas.style.width = px + "px";
    canvas.style.height = px + "px";
    canvas.width = Math.floor(px * dpr);
    canvas.height = Math.floor(px * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  function draw() {
    if (!grid) return;
    var px = cell * COLS;
    ctx.fillStyle = "#080a16";
    ctx.fillRect(0, 0, px, px);

    // faint grid
    ctx.strokeStyle = "rgba(30,60,90,.18)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var gx = 0; gx <= COLS; gx += 4) {
      ctx.moveTo(gx * cell + 0.5, 0);
      ctx.lineTo(gx * cell + 0.5, px);
    }
    for (var gy = 0; gy <= ROWS; gy += 4) {
      ctx.moveTo(0, gy * cell + 0.5);
      ctx.lineTo(px, gy * cell + 0.5);
    }
    ctx.stroke();

    // trails
    for (var y = 0; y < ROWS; y++) {
      for (var x = 0; x < COLS; x++) {
        var v = gAt(x, y);
        if (v === 0) continue;
        ctx.fillStyle = v === 1 ? "#1391c4" : "#c2531a";
        ctx.fillRect(x * cell + pad, y * cell + pad, cell - pad * 2, cell - pad * 2);
      }
    }

    // heads (brighter, glowing)
    drawHead(player.x, player.y, "#2af0ff");
    drawHead(cpu.x, cpu.y, "#ff8a3a");
  }
  function drawHead(x, y, color) {
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = color;
    ctx.fillRect(x * cell, y * cell, cell, cell);
    ctx.restore();
  }

  // ---- Loop ----
  function loop(now) {
    if (running) {
      if (now - lastStep >= STEP_MS) {
        lastStep = now;
        step();
        if (running) draw();
      }
    }
    requestAnimationFrame(loop);
  }

  // ---- Input: keyboard ----
  window.addEventListener("keydown", function (e) {
    var k = e.key;
    var handled = true;
    if (k === "ArrowUp" || k === "w" || k === "W") setNextDir(player, "up");
    else if (k === "ArrowDown" || k === "s" || k === "S") setNextDir(player, "down");
    else if (k === "ArrowLeft" || k === "a" || k === "A") setNextDir(player, "left");
    else if (k === "ArrowRight" || k === "d" || k === "D") setNextDir(player, "right");
    else if (k === " " || k === "Enter") { if (!running) ovBtn.click(); }
    else handled = false;
    if (handled) e.preventDefault();
  }, { passive: false });

  // ---- Input: swipe (absolute direction + relative fallback) ----
  var touchStart = null;
  var SWIPE_MIN = 22; // px

  canvas.addEventListener("touchstart", function (e) {
    if (e.touches.length) {
      var t = e.touches[0];
      touchStart = { x: t.clientX, y: t.clientY };
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchmove", function (e) {
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchend", function (e) {
    if (!touchStart) return;
    var t = (e.changedTouches && e.changedTouches[0]);
    if (!t) { touchStart = null; return; }
    var dx = t.clientX - touchStart.x;
    var dy = t.clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return;
    // absolute direction steering
    if (Math.abs(dx) > Math.abs(dy)) {
      setNextDir(player, dx > 0 ? "right" : "left");
    } else {
      setNextDir(player, dy > 0 ? "down" : "up");
    }
    e.preventDefault();
  }, { passive: false });

  // ---- On-screen turn buttons (relative) ----
  function bindTap(el, fn) {
    el.addEventListener("touchstart", function (e) {
      e.preventDefault();
      audio();
      fn();
    }, { passive: false });
    el.addEventListener("click", function (e) {
      e.preventDefault();
      audio();
      fn();
    });
  }
  bindTap(document.getElementById("leftBtn"), function () { turn(player, -1); });
  bindTap(document.getElementById("rightBtn"), function () { turn(player, 1); });

  // ---- Overlay / restart ----
  ovBtn.addEventListener("click", function () {
    audio();
    if (matchOver) {
      youScore = 0; cpuScore = 0; round = 1;
      youScoreEl.textContent = "0";
      cpuScoreEl.textContent = "0";
    }
    startRound();
  });

  // prevent gesture zoom on iOS
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });
  document.addEventListener("touchmove", function (e) {
    if (e.target === canvas) e.preventDefault();
  }, { passive: false });

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 120); });

  // ---- Boot ----
  resize();
  startRound();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
