<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>2048 Game</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --empty-tile: rgba(238, 228, 218, 0.35);
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: var(--bg-color);
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }

        :root {
            --board-size: min(400px, 92vw);
        }

        .header {
            width: var(--board-size);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 60px;
            margin: 0;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #bbada0;
            padding: 5px 20px;
            border-radius: 3px;
            color: white;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
        }

        .score-box span {
            display: block;
            font-size: 20px;
        }

        #grid-container {
            width: var(--board-size);
            height: var(--board-size);
            background-color: var(--grid-bg);
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 3%;
            padding: 3%;
            position: relative;
            box-sizing: border-box;
            touch-action: none;
        }

        .tile {
            width: 100%;
            height: 100%;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: min(35px, 8.75vw);
            background-color: var(--empty-tile);
        }

        /* Tile Colors */
        .tile-2 { background: #eee4da; color: var(--text-dark); }
        .tile-4 { background: #ede0c8; color: var(--text-dark); }
        .tile-8 { background: #f2b179; color: var(--text-light); }
        .tile-16 { background: #f59563; color: var(--text-light); }
        .tile-32 { background: #f67c5f; color: var(--text-light); }
        .tile-64 { background: #f65e3b; color: var(--text-light); }
        .tile-128 { background: #edcf72; color: var(--text-light); font-size: min(30px, 7.5vw); }
        .tile-256 { background: #edcc61; color: var(--text-light); font-size: min(30px, 7.5vw); }
        .tile-512 { background: #edc850; color: var(--text-light); font-size: min(30px, 7.5vw); }
        .tile-1024 { background: #edc53f; color: var(--text-light); font-size: min(25px, 6.25vw); }
        .tile-2048 { background: #edc22e; color: var(--text-light); font-size: min(25px, 6.25vw); }

        .controls {
            margin-top: 20px;
            width: var(--board-size);
            display: flex;
            justify-content: flex-end;
        }

        button {
            background-color: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #7f6a56;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.73);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            z-index: 10;
        }

        #overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
    <!-- pwa:start -->
    <link rel="icon" type="image/svg+xml" href="/games/icons/2048.svg">

    <meta name="theme-color" content="#EDC22E">
    <meta name="mobile-web-app-capable" content="yes">

    <style>/* keep content clear of the iPhone notch / camera island (safe-area insets) */

    <script>
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/games/games-sw.js').catch(function(){})})}
    // Back-to-all-games pill (top-left). Positioned with env(safe-area-inset-*)
    // so it clears the notch / Dynamic Island.
    window.addEventListener('DOMContentLoaded',function(){var a=document.createElement('a');a.href='/games';a.textContent='‹ Games';a.setAttribute('style','position:fixed;left:calc(env(safe-area-inset-left,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;padding:6px 12px;border-radius:20px;background:rgba(15,23,42,.6);color:#fff;font:600 13px system-ui,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);touch-action:manipulation');document.body.appendChild(a);});
    // Top-right pause/menu button (placed far from gameplay). Opens a top sheet
    // with high score, Install, Back to games, and Report an issue. Opening the
    // menu fires a 'grown:pause' event + dims/blocks the screen (soft pause);
    // closing fires 'grown:resume'. Games can opt in to true pause + scoring via
    // the window.GrownGame hook (highScore()/setHighScore()).
    (function(){
      var ID="2048",NAME="2048",COLOR="#EDC22E",HK='grown-hi-'+ID;
      window.GrownGame={
        highScore:function(){return parseInt(localStorage.getItem(HK)||'0',10)||0;},
        setHighScore:function(n){n=Math.floor(+n||0);try{if(n>this.highScore())localStorage.setItem(HK,String(n));}catch(e){}return this.highScore();}
      };
      var dp=null,scrim,sheet,hiEl,installItem,isOpen=false;
      function css(el,s){el.setAttribute('style',s);}
      function emit(n){try{window.dispatchEvent(new Event(n));}catch(e){}}
      window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;if(installItem)installItem.style.display='';});
      window.addEventListener('appinstalled',function(){dp=null;if(installItem)installItem.style.display='none';});
      function item(label,fn){var b=document.createElement('button');b.textContent=label;css(b,'display:block;width:100%;text-align:left;margin:6px 0;padding:12px 14px;border:1px solid #243049;border-radius:10px;background:#16203a;color:#e8eefc;font:600 15px system-ui,sans-serif;cursor:pointer;touch-action:manipulation');b.onclick=fn;return b;}
      function openMenu(){if(isOpen)return;isOpen=true;hiEl.textContent='High score: '+(window.GrownGame.highScore()||'—');scrim.style.pointerEvents='auto';scrim.style.opacity='1';sheet.style.transform='translateY(0)';emit('grown:pause');}
      function closeMenu(){if(!isOpen)return;isOpen=false;scrim.style.opacity='0';scrim.style.pointerEvents='none';sheet.style.transform='translateY(-110%)';emit('grown:resume');}
      function doInstall(){if(!dp)return;var d=dp;dp=null;installItem.style.display='none';d.prompt();d.userChoice.finally(function(){});closeMenu();}
      function report(){var body='\n\n----\nGame: '+NAME+'\nURL: '+location.href+'\nDevice: '+navigator.userAgent;location.href='mailto:games@pick.haus?subject='+encodeURIComponent('Issue: '+NAME)+'&body='+encodeURIComponent(body);}
      function build(){
        var btn=document.createElement('button');btn.setAttribute('aria-label','Menu');btn.textContent='\u23F8';
        css(btn,'position:fixed;right:calc(env(safe-area-inset-right,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;width:40px;height:40px;padding:0;border:none;border-radius:50%;background:rgba(15,23,42,.6);color:#fff;font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation');
        btn.onclick=openMenu;document.body.appendChild(btn);
        scrim=document.createElement('div');css(scrim,'position:fixed;inset:0;z-index:2147483646;background:rgba(0,0,0,.55);opacity:0;transition:opacity .18s;pointer-events:none');scrim.onclick=closeMenu;document.body.appendChild(scrim);
        sheet=document.createElement('div');css(sheet,'position:fixed;left:0;right:0;top:0;z-index:2147483647;transform:translateY(-110%);transition:transform .22s;background:#0f172a;color:#e8eefc;border-bottom-left-radius:16px;border-bottom-right-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 16px;max-width:480px;margin:0 auto');document.body.appendChild(sheet);
        var h=document.createElement('div');css(h,'font-weight:700;font-size:17px;color:'+COLOR);h.textContent=NAME;sheet.appendChild(h);
        hiEl=document.createElement('div');css(hiEl,'font-size:13px;color:#9fb3d9;margin:2px 0 12px');sheet.appendChild(hiEl);
        sheet.appendChild(item('\u25B6 Resume',closeMenu));
        installItem=item('\u2B07 Install app',doInstall);installItem.style.display=dp?'':'none';sheet.appendChild(installItem);
        sheet.appendChild(item('\u2039 All games',function(){location.href='/games';}));
        sheet.appendChild(item('\u2691 Report an issue',report));
      }
      if(document.body)build();else window.addEventListener('DOMContentLoaded',build);
    })();
    </script>

<body>

    <div class="header">
        <h1>2048</h1>
        <div class="scores-container">
            <div class="score-box">SCORE<span id="score">0</span></div>
            <div class="score-box">BEST<span id="best">0</span></div>
        </div>
    </div>

    <div id="grid-container">
        <div id="overlay"></div>
    </div>

    <div class="controls">
        <button onclick="init()">New Game</button>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;

        const gridContainer = document.getElementById('grid-container');
        const scoreElement = document.getElementById('score');
        const bestElement = document.getElementById('best');
        const overlay = document.getElementById('overlay');

        function init() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            overlay.style.display = 'none';
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            let empties = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empties.push({r, c});
                }
            }
            if (empties.length > 0) {
                let {r, c} = empties[Math.floor(Math.random() * empties.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function slide(row) {
            let nonZeros = row.filter(v => v !== 0);
            let newRow = [];
            for (let i = 0; i < nonZeros.length; i++) {
                if (i < nonZeros.length - 1 && nonZeros[i] === nonZeros[i + 1]) {
                    let val = nonZeros[i] * 2;
                    newRow.push(val);
                    score += val;
                    i++;
                } else {
                    newRow.push(nonZeros[i]);
                }
            }
            while (newRow.length < 4) newRow.push(0);
            return newRow;
        }

        function transpose(matrix) {
            return matrix[0].map((_, colIndex) => matrix.map(row => row[colIndex]));
        }

        function move(code) {
            const oldGridStr = JSON.stringify(grid);
            const oldScore = score;

            if (code === 'ArrowLeft' || code === 'KeyA') {
                for (let i = 0; i < 4; i++) grid[i] = slide(grid[i]);
            } else if (code === 'ArrowRight' || code === 'KeyD') {
                for (let i = 0; i < 4; i++) grid[i] = slide([...grid[i]].reverse()).reverse();
            } else if (code === 'ArrowUp' || code === 'KeyW') {
                grid = transpose(grid);
                for (let i = 0; i < 4; i++) grid[i] = slide(grid[i]);
                grid = transpose(grid);
            } else if (code === 'ArrowDown' || code === 'KeyS') {
                grid = transpose(grid);
                for (let i = 0; i < 4; i++) grid[i] = slide([...grid[i]].reverse()).reverse();
                grid = transpose(grid);
            }

            if (JSON.stringify(grid) !== oldGridStr) {
                addRandomTile();
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('bestScore', bestScore);
                }
                render();
                if (checkWin()) {
                    showOverlay("You Win!");
                } else if (checkGameOver()) {
                    showOverlay("Game Over!");
                }
            }
        }

        function checkWin() {
            return grid.some(row => row.includes(2048));
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }

        function showOverlay(text) {
            overlay.innerHTML = `<h2>${text}</h2><button onclick="init()">Try Again</button>`;
            overlay.style.display = 'flex';
        }

        function render() {
            // Clear existing tiles but keep overlay
            const tiles = gridContainer.querySelectorAll('.tile');
            tiles.forEach(t => t.remove());

            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const val = grid[r][c];
                    const tile = document.createElement('div');
                    tile.className = 'tile' + (val ? ` tile-${val}` : '');
                    tile.textContent = val || '';
                    gridContainer.appendChild(tile);
                }
            }
            scoreElement.textContent = score;
            bestElement.textContent = bestScore;
        }

        window.addEventListener('keydown', (e) => {
            const validKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD'];
            if (validKeys.includes(e.code)) {
                e.preventDefault();
                move(e.code);
            }
        });

        // Touch swipe support (mobile) — reuses the same move() logic as the keyboard.
        let touchStartX = 0, touchStartY = 0;
        const SWIPE_MIN = 20; // minimum swipe distance in px

        gridContainer.addEventListener('touchstart', (e) => {
            const t = e.changedTouches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            e.preventDefault();
        }, { passive: false });

        gridContainer.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        gridContainer.addEventListener('touchend', (e) => {
            e.preventDefault();
            const t = e.changedTouches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            if (Math.abs(dx) < SWIPE_MIN && Math.abs(dy) < SWIPE_MIN) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
            } else {
                move(dy > 0 ? 'ArrowDown' : 'ArrowUp');
            }
        }, { passive: false });

        init();
    </script>
</body>
</html>
