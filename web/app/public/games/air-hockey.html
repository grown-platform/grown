    position: relative;

  }

<body>
<div id="wrap">
  <div id="hud">
    <div id="title">AIR HOCKEY</div>
    <div id="score"><span class="cpu" id="cpuScore">0</span><span class="sep">:</span><span class="you" id="youScore">0</span></div>
    <button id="restart">Restart</button>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
  </div>
</div>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("cv");
  var ctx = canvas.getContext("2d");
  var stage = document.getElementById("stage");
  var cpuScoreEl = document.getElementById("cpuScore");
  var youScoreEl = document.getElementById("youScore");
  var restartBtn = document.getElementById("restart");

  // ---- Logical playfield dimensions (table aspect ~ tall/portrait) ----
  // We use a fixed logical coordinate space and scale to fit.
  var W = 360;       // logical width
  var H = 600;       // logical height
  var scale = 1;     // CSS px per logical unit
  var dpr = 1;

  var WIN_SCORE = 7;
  var GOAL_W = 150;          // goal mouth width
  var PUCK_R = 13;
  var MALLET_R = 26;
  var WALL = 8;              // wall thickness inset

  // ---- State ----
  var puck = { x: W / 2, y: H / 2, vx: 0, vy: 0 };
  var you = { x: W / 2, y: H * 0.78, px: W / 2, py: H * 0.78 };   // bottom mallet (player)
  var cpu = { x: W / 2, y: H * 0.22, vx: 0, vy: 0 };             // top mallet
  var scoreYou = 0, scoreCpu = 0;
  var gameOver = false;
  var winner = null;
  var serveTimer = 0;        // frames to wait before puck active after goal
  var flash = 0;             // goal flash effect

  // ---- Audio ----
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      } catch (e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function beep(freq, dur, type, vol) {
    if (!audioCtx) return;
    try {
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.type = type || "sine";
      o.frequency.value = freq;
      var now = audioCtx.currentTime;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(vol || 0.18, now + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now); o.stop(now + dur + 0.02);
    } catch (e) {}
  }
  function sndWall() { beep(220 + Math.random() * 40, 0.05, "square", 0.08); }
  function sndHit() { beep(420, 0.06, "triangle", 0.16); }
  function sndGoalYou() { beep(660, 0.12, "sawtooth", 0.18); setTimeout(function(){ beep(880, 0.14, "sawtooth", 0.16); }, 90); }
  function sndGoalCpu() { beep(180, 0.2, "sawtooth", 0.18); }
  function sndWin() {
    beep(523, 0.12, "square", 0.18);
    setTimeout(function(){ beep(659, 0.12, "square", 0.18); }, 120);
    setTimeout(function(){ beep(784, 0.2, "square", 0.18); }, 240);
  }

  // ---- Resize / fit canvas to viewport keeping aspect ratio ----
  function resize() {
    var availW = stage.clientWidth;
    var availH = stage.clientHeight;
    if (availW <= 0 || availH <= 0) return;
    var pad = 6;
    availW -= pad * 2;
    availH -= pad * 2;
    var aspect = W / H;
    var cssW, cssH;
    if (availW / availH > aspect) {
      cssH = availH;
      cssW = cssH * aspect;
    } else {
      cssW = availW;
      cssH = cssW / aspect;
    }
    scale = cssW / W;
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 100); });

  // ---- Convert pointer (client coords) to logical playfield coords ----
  function toLogical(clientX, clientY) {
    var r = canvas.getBoundingClientRect();
    var lx = (clientX - r.left) / r.width * W;
    var ly = (clientY - r.top) / r.height * H;
    return { x: lx, y: ly };
  }

  // ---- Player input: drag mallet on the bottom half ----
  var dragging = false;
  var targetX = you.x, targetY = you.y;

  function setTarget(clientX, clientY) {
    var p = toLogical(clientX, clientY);
    targetX = p.x;
    targetY = p.y;
  }

  function onPointerDown(e) {
    ensureAudio();
    if (gameOver) { restart(); return; }
    dragging = true;
    setTarget(e.clientX, e.clientY);
    e.preventDefault();
  }
  function onPointerMove(e) {
    if (!dragging) return;
    setTarget(e.clientX, e.clientY);
    e.preventDefault();
  }
  function onPointerUp(e) {
    dragging = false;
    if (e && e.preventDefault) e.preventDefault();
  }

  // Use Pointer Events when available (covers mouse + touch), else fall back.
  if (window.PointerEvent) {
    canvas.addEventListener("pointerdown", onPointerDown, { passive: false });
    window.addEventListener("pointermove", onPointerMove, { passive: false });
    window.addEventListener("pointerup", onPointerUp, { passive: false });
    window.addEventListener("pointercancel", onPointerUp, { passive: false });
  } else {
    canvas.addEventListener("touchstart", function (e) {
      var t = e.changedTouches[0]; onPointerDown({ clientX: t.clientX, clientY: t.clientY, preventDefault: function(){ e.preventDefault(); } });
    }, { passive: false });
    window.addEventListener("touchmove", function (e) {
      var t = e.changedTouches[0]; onPointerMove({ clientX: t.clientX, clientY: t.clientY, preventDefault: function(){ e.preventDefault(); } });
    }, { passive: false });
    window.addEventListener("touchend", function (e) { onPointerUp({ preventDefault: function(){ e.preventDefault(); } }); }, { passive: false });
    canvas.addEventListener("mousedown", function (e) { onPointerDown(e); });
    window.addEventListener("mousemove", function (e) { onPointerMove(e); });
    window.addEventListener("mouseup", function (e) { onPointerUp(e); });
  }

  // Prevent scrolling/zoom gestures on the whole document.
  document.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); }, { passive: false });

  restartBtn.addEventListener("click", function () { ensureAudio(); restart(); });

  // ---- Geometry helpers ----
  var goalLeft = (W - GOAL_W) / 2;
  var goalRight = (W + GOAL_W) / 2;

  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

  // ---- Reset puck to center, served toward whoever conceded ----
  function resetPuck(towardBottom) {
    puck.x = W / 2;
    puck.y = H / 2;
    puck.vx = 0;
    puck.vy = 0;
    serveTimer = 45; // ~0.75s pause
    puck._serveDir = towardBottom ? 1 : -1;
  }

  function restart() {
    scoreYou = 0; scoreCpu = 0;
    gameOver = false; winner = null;
    updateScore();
    you.x = W / 2; you.y = H * 0.78; you.px = you.x; you.py = you.y;
    cpu.x = W / 2; cpu.y = H * 0.22; cpu.vx = 0; cpu.vy = 0;
    targetX = you.x; targetY = you.y;
    resetPuck(Math.random() < 0.5);
  }

  function updateScore() {
    youScoreEl.textContent = scoreYou;
    cpuScoreEl.textContent = scoreCpu;
  }

  // ---- Mallet vs puck collision (elastic-ish + impart mallet velocity) ----
  function malletCollide(mx, my, mvx, mvy) {
    var dx = puck.x - mx;
    var dy = puck.y - my;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var minDist = PUCK_R + MALLET_R;
    if (dist < minDist && dist > 0) {
      var nx = dx / dist;
      var ny = dy / dist;
      // Push puck out of overlap
      var overlap = minDist - dist;
      puck.x += nx * overlap;
      puck.y += ny * overlap;
      // Reflect puck velocity about the normal
      var vDotN = puck.vx * nx + puck.vy * ny;
      if (vDotN < 0) {
        puck.vx -= 2 * vDotN * nx;
        puck.vy -= 2 * vDotN * ny;
      }
      // Impart mallet momentum along the normal
      var mDotN = mvx * nx + mvy * ny;
      if (mDotN > 0) {
        puck.vx += nx * mDotN * 1.1;
        puck.vy += ny * mDotN * 1.1;
      }
      // Always give a minimum kick away from the mallet so it never sticks
      var speed = Math.sqrt(puck.vx * puck.vx + puck.vy * puck.vy);
      var minSpeed = 3.2;
      if (speed < minSpeed) {
        puck.vx += nx * (minSpeed - speed);
        puck.vy += ny * (minSpeed - speed);
      }
      sndHit();
      return true;
    }
    return false;
  }

  // ---- Physics step ----
  var MAX_PUCK_SPEED = 16;
  var FRICTION = 0.995;

  function step() {
    // --- Player mallet: move toward finger target, clamped to bottom half ---
    you.px = you.x; you.py = you.y;
    var halfTop = H / 2 + MALLET_R * 0.5; // keep mallet slightly past center allowed? keep on own half
    var tx = clamp(targetX, WALL + MALLET_R, W - WALL - MALLET_R);
    var ty = clamp(targetY, H / 2 + MALLET_R, H - WALL - MALLET_R);
    // Smooth follow for responsiveness without jitter
    you.x += (tx - you.x) * 0.45;
    you.y += (ty - you.y) * 0.45;
    var youVx = you.x - you.px;
    var youVy = you.y - you.py;

    // --- CPU AI ---
    cpuAI();

    // --- Puck integration ---
    if (serveTimer > 0) {
      serveTimer--;
      if (serveTimer === 0) {
        // launch the puck on serve
        var ang = (Math.random() - 0.5) * 0.8;
        var spd = 5.5;
        puck.vx = Math.sin(ang) * spd;
        puck.vy = (puck._serveDir || 1) * Math.cos(ang) * spd;
      }
    } else {
      puck.x += puck.vx;
      puck.y += puck.vy;
      puck.vx *= FRICTION;
      puck.vy *= FRICTION;
    }

    // Clamp puck speed
    var ps = Math.sqrt(puck.vx * puck.vx + puck.vy * puck.vy);
    if (ps > MAX_PUCK_SPEED) {
      puck.vx = puck.vx / ps * MAX_PUCK_SPEED;
      puck.vy = puck.vy / ps * MAX_PUCK_SPEED;
    }

    // --- Wall collisions (left/right always; top/bottom except goal mouth) ---
    // Left
    if (puck.x - PUCK_R < WALL) {
      puck.x = WALL + PUCK_R;
      puck.vx = Math.abs(puck.vx) * 0.92;
      sndWall();
    }
    // Right
    if (puck.x + PUCK_R > W - WALL) {
      puck.x = W - WALL - PUCK_R;
      puck.vx = -Math.abs(puck.vx) * 0.92;
      sndWall();
    }
    // Top wall (CPU side) — unless within goal mouth
    if (puck.y - PUCK_R < WALL) {
      if (puck.x > goalLeft && puck.x < goalRight) {
        // possible goal (top goal = player scores) handled below once fully in
      } else {
        puck.y = WALL + PUCK_R;
        puck.vy = Math.abs(puck.vy) * 0.92;
        sndWall();
      }
    }
    // Bottom wall (player side) — unless within goal mouth
    if (puck.y + PUCK_R > H - WALL) {
      if (puck.x > goalLeft && puck.x < goalRight) {
        // possible goal (bottom goal = CPU scores)
      } else {
        puck.y = H - WALL - PUCK_R;
        puck.vy = -Math.abs(puck.vy) * 0.92;
        sndWall();
      }
    }

    // --- Goal detection (puck center fully past the line within mouth) ---
    if (!gameOver && serveTimer === 0) {
      if (puck.y + PUCK_R < 0 + 2 && puck.x > goalLeft && puck.x < goalRight) {
        // entered top goal -> player scores
        scoreYou++;
        updateScore();
        flash = 18;
        if (scoreYou >= WIN_SCORE) { endGame("you"); }
        else { sndGoalYou(); resetPuck(false); }
      } else if (puck.y - PUCK_R > H - 2 && puck.x > goalLeft && puck.x < goalRight) {
        // entered bottom goal -> CPU scores
        scoreCpu++;
        updateScore();
        flash = 18;
        if (scoreCpu >= WIN_SCORE) { endGame("cpu"); }
        else { sndGoalCpu(); resetPuck(true); }
      }
    }

    // --- Mallet collisions ---
    malletCollide(you.x, you.y, youVx, youVy);
    malletCollide(cpu.x, cpu.y, cpu.vx, cpu.vy);

    // Anti-stuck: if puck is barely moving and not on serve, nudge it
    if (serveTimer === 0 && !gameOver) {
      var sp = Math.sqrt(puck.vx * puck.vx + puck.vy * puck.vy);
      if (sp < 0.25) {
        puck._stuck = (puck._stuck || 0) + 1;
        if (puck._stuck > 60) {
          var a = Math.random() * Math.PI * 2;
          puck.vx = Math.cos(a) * 2.5;
          puck.vy = Math.sin(a) * 2.5;
          puck._stuck = 0;
        }
      } else {
        puck._stuck = 0;
      }
    }

    if (flash > 0) flash--;
  }

  // ---- CPU AI: defend goal, attack when puck on its half ----
  function cpuAI() {
    var px = cpu.x, py = cpu.y;
    var desiredX, desiredY;
    var homeY = H * 0.18;

    if (puck.y < H * 0.55) {
      // Puck on CPU's half (or near) — go attack / intercept
      // Aim to hit puck toward player's goal: position slightly behind puck (higher up than puck if puck below it)
      desiredX = puck.x;
      // If CPU is above the puck, dive to strike it downward
      if (cpu.y < puck.y - PUCK_R) {
        desiredY = puck.y - PUCK_R - MALLET_R * 0.3; // approach from above to push down
        // but to actually push the puck DOWN toward player goal, get above & ram down
        desiredY = puck.y - (MALLET_R + PUCK_R) * 0.5;
      } else {
        desiredY = puck.y - (MALLET_R + PUCK_R) * 0.6;
      }
      desiredY = clamp(desiredY, WALL + MALLET_R, H * 0.48);
    } else {
      // Puck on player's half — return to defensive position, track puck x a bit
      desiredX = W / 2 + (puck.x - W / 2) * 0.5;
      desiredY = homeY;
    }

    // Keep CPU in front of its goal when puck is dangerous (heading toward top)
    if (puck.vy < 0 && puck.y < H * 0.5) {
      // predict puck x at goal line
      var t = (homeY - puck.y) / (puck.vy || -0.0001);
      if (t > 0 && t < 90) {
        var predX = puck.x + puck.vx * t;
        predX = clamp(predX, goalLeft + 10, goalRight - 10);
        desiredX = predX;
      }
    }

    desiredX = clamp(desiredX, WALL + MALLET_R, W - WALL - MALLET_R);
    desiredY = clamp(desiredY, WALL + MALLET_R, H / 2 - MALLET_R);

    // Difficulty: move speed cap
    var maxSpd = 5.2;
    var dx = desiredX - px;
    var dy = desiredY - py;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d > maxSpd) {
      dx = dx / d * maxSpd;
      dy = dy / d * maxSpd;
    }
    var nx = px + dx;
    var ny = py + dy;
    cpu.vx = nx - cpu.x;
    cpu.vy = ny - cpu.y;
    cpu.x = nx;
    cpu.y = ny;
  }

  function endGame(who) {
    gameOver = true;
    winner = who;
    if (who === "you") sndWin();
    else sndGoalCpu();
  }

  // ---- Rendering ----
  function draw() {
    ctx.save();
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Table surface
    ctx.fillStyle = "#0e1530";
    roundRect(0, 0, W, H, 14); ctx.fill();

    // Goal flash background
    if (flash > 0) {
      ctx.fillStyle = "rgba(127,208,255," + (flash / 18 * 0.18) + ")";
      ctx.fillRect(0, 0, W, H);
    }

    // Center line + circle
    ctx.strokeStyle = "#27406e";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(WALL, H / 2);
    ctx.lineTo(W - WALL, H / 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 46, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#27406e";
    ctx.fill();

    // Border walls
    ctx.strokeStyle = "#3a558c";
    ctx.lineWidth = WALL;
    ctx.lineJoin = "round";
    ctx.strokeRect(WALL / 2, WALL / 2, W - WALL, H - WALL);

    // Goals (draw mouths in accent colors, cut out the wall there)
    // Top goal (player scores here) -> green-ish
    ctx.fillStyle = "#0e1530";
    ctx.fillRect(goalLeft, 0, GOAL_W, WALL + 1);
    ctx.fillRect(goalLeft, H - WALL - 1, GOAL_W, WALL + 1);
    // Goal markers
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#6fe3a0";
    ctx.beginPath(); ctx.moveTo(goalLeft, 3); ctx.lineTo(goalRight, 3); ctx.stroke();
    ctx.strokeStyle = "#ff7b8a";
    ctx.beginPath(); ctx.moveTo(goalLeft, H - 3); ctx.lineTo(goalRight, H - 3); ctx.stroke();
    // Goal posts
    ctx.fillStyle = "#6fe3a0";
    ctx.fillRect(goalLeft - 3, 2, 4, 14); ctx.fillRect(goalRight - 1, 2, 4, 14);
    ctx.fillStyle = "#ff7b8a";
    ctx.fillRect(goalLeft - 3, H - 16, 4, 14); ctx.fillRect(goalRight - 1, H - 16, 4, 14);

    // CPU mallet (top)
    drawMallet(cpu.x, cpu.y, "#ff7b8a", "#7a2230");
    // Player mallet (bottom)
    drawMallet(you.x, you.y, "#6fe3a0", "#1d5a3a");

    // Puck
    ctx.save();
    ctx.shadowColor = "rgba(127,208,255,0.6)";
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(puck.x, puck.y, PUCK_R, 0, Math.PI * 2);
    ctx.fillStyle = "#e8eefc";
    ctx.fill();
    ctx.restore();
    ctx.beginPath();
    ctx.arc(puck.x, puck.y, PUCK_R * 0.55, 0, Math.PI * 2);
    ctx.fillStyle = "#9fb8e8";
    ctx.fill();

    // Serve countdown hint
    if (serveTimer > 0 && !gameOver) {
      ctx.fillStyle = "rgba(232,238,252,0.5)";
      ctx.font = "bold 18px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Ready...", W / 2, H / 2 - 70);
    }

    // Game over overlay
    if (gameOver) {
      ctx.fillStyle = "rgba(6,10,24,0.78)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.fillStyle = winner === "you" ? "#6fe3a0" : "#ff7b8a";
      ctx.font = "bold 34px sans-serif";
      ctx.fillText(winner === "you" ? "YOU WIN!" : "CPU WINS", W / 2, H / 2 - 16);
      ctx.fillStyle = "#cfe0ff";
      ctx.font = "bold 18px sans-serif";
      ctx.fillText(scoreCpu + " : " + scoreYou, W / 2, H / 2 + 18);
      ctx.fillStyle = "#9fb8e8";
      ctx.font = "15px sans-serif";
      ctx.fillText("Tap or press Restart to play again", W / 2, H / 2 + 52);
    }

    ctx.restore();
  }

  function drawMallet(x, y, color, dark) {
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.4)";
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 3;
    ctx.beginPath();
    ctx.arc(x, y, MALLET_R, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
    // inner ring
    ctx.beginPath();
    ctx.arc(x, y, MALLET_R * 0.62, 0, Math.PI * 2);
    ctx.fillStyle = dark;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, MALLET_R * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- Main loop ----
  var lastT = 0;
  var acc = 0;
  var STEP = 1000 / 60;
  function loop(t) {
    if (!lastT) lastT = t;
    var dt = t - lastT;
    lastT = t;
    if (dt > 250) dt = 250; // avoid spiral after tab switch
    acc += dt;
    var iters = 0;
    while (acc >= STEP && iters < 5) {
      step();
      acc -= STEP;
      iters++;
    }
    draw();
    requestAnimationFrame(loop);
  }

  // ---- Init ----
  resize();
  restart();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
