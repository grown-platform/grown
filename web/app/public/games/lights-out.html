<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lights Out</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --cell-off: #333333;
            --cell-on: #00f2ff;
            --cell-shadow: rgba(0, 242, 255, 0.5);
            --accent: #7000ff;
            --accent-hover: #8a33ff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
            width: 100%;
            max-width: 340px;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background-color: var(--cell-off);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            outline: none;
        }

        .cell.on {
            background-color: var(--cell-on);
            box-shadow: 0 0 15px var(--cell-shadow);
        }

        .cell:active {
            transform: scale(0.9);
        }

        #win-message {
            height: 24px;
            margin-bottom: 1rem;
            color: #00ff88;
            font-weight: bold;
            visibility: hidden;
        }

        #win-message.visible {
            visibility: visible;
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
    <!-- pwa:start -->
    <link rel="icon" type="image/svg+xml" href="/games/icons/lights-out.svg">
    <link rel="manifest" href="/games/lights-out.webmanifest">
    <meta name="theme-color" content="#F4A261">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="/games/icons/lights-out.svg">
    <style>/* keep content clear of the iPhone notch / camera island (safe-area insets) */
    body{padding-top:env(safe-area-inset-top,0px);padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);}
    </style>
    <script>
    if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/games/games-sw.js').catch(function(){})})}
    // Back-to-all-games pill (top-left). Positioned with env(safe-area-inset-*)
    // so it clears the notch / Dynamic Island.
    window.addEventListener('DOMContentLoaded',function(){var a=document.createElement('a');a.href='/games';a.textContent='‹ Games';a.setAttribute('style','position:fixed;left:calc(env(safe-area-inset-left,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;padding:6px 12px;border-radius:20px;background:rgba(15,23,42,.6);color:#fff;font:600 13px system-ui,sans-serif;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.3);touch-action:manipulation');document.body.appendChild(a);});
    // Top-right pause/menu button (placed far from gameplay). Opens a top sheet
    // with high score, Install, Back to games, and Report an issue. Opening the
    // menu fires a 'grown:pause' event + dims/blocks the screen (soft pause);
    // closing fires 'grown:resume'. Games can opt in to true pause + scoring via
    // the window.GrownGame hook (highScore()/setHighScore()).
    (function(){
      var ID="lights-out",NAME="Lights Out",COLOR="#F4A261",HK='grown-hi-'+ID;
      window.GrownGame={
        highScore:function(){return parseInt(localStorage.getItem(HK)||'0',10)||0;},
        setHighScore:function(n){n=Math.floor(+n||0);try{if(n>this.highScore())localStorage.setItem(HK,String(n));}catch(e){}return this.highScore();}
      };
      var dp=null,scrim,sheet,hiEl,installItem,isOpen=false;
      function css(el,s){el.setAttribute('style',s);}
      function emit(n){try{window.dispatchEvent(new Event(n));}catch(e){}}
      window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;if(installItem)installItem.style.display='';});
      window.addEventListener('appinstalled',function(){dp=null;if(installItem)installItem.style.display='none';});
      function item(label,fn){var b=document.createElement('button');b.textContent=label;css(b,'display:block;width:100%;text-align:left;margin:6px 0;padding:12px 14px;border:1px solid #243049;border-radius:10px;background:#16203a;color:#e8eefc;font:600 15px system-ui,sans-serif;cursor:pointer;touch-action:manipulation');b.onclick=fn;return b;}
      function openMenu(){if(isOpen)return;isOpen=true;hiEl.textContent='High score: '+(window.GrownGame.highScore()||'—');scrim.style.pointerEvents='auto';scrim.style.opacity='1';sheet.style.transform='translateY(0)';emit('grown:pause');}
      function closeMenu(){if(!isOpen)return;isOpen=false;scrim.style.opacity='0';scrim.style.pointerEvents='none';sheet.style.transform='translateY(-110%)';emit('grown:resume');}
      function doInstall(){if(!dp)return;var d=dp;dp=null;installItem.style.display='none';d.prompt();d.userChoice.finally(function(){});closeMenu();}
      function report(){var body='\n\n----\nGame: '+NAME+'\nURL: '+location.href+'\nDevice: '+navigator.userAgent;location.href='mailto:games@pick.haus?subject='+encodeURIComponent('Issue: '+NAME)+'&body='+encodeURIComponent(body);}
      function build(){
        var btn=document.createElement('button');btn.setAttribute('aria-label','Menu');btn.textContent='\u23F8';
        css(btn,'position:fixed;right:calc(env(safe-area-inset-right,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;width:40px;height:40px;padding:0;border:none;border-radius:50%;background:rgba(15,23,42,.6);color:#fff;font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation');
        btn.onclick=openMenu;document.body.appendChild(btn);
        scrim=document.createElement('div');css(scrim,'position:fixed;inset:0;z-index:2147483646;background:rgba(0,0,0,.55);opacity:0;transition:opacity .18s;pointer-events:none');scrim.onclick=closeMenu;document.body.appendChild(scrim);
        sheet=document.createElement('div');css(sheet,'position:fixed;left:0;right:0;top:0;z-index:2147483647;transform:translateY(-110%);transition:transform .22s;background:#0f172a;color:#e8eefc;border-bottom-left-radius:16px;border-bottom-right-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 16px;max-width:480px;margin:0 auto');document.body.appendChild(sheet);
        var h=document.createElement('div');css(h,'font-weight:700;font-size:17px;color:'+COLOR);h.textContent=NAME;sheet.appendChild(h);
        hiEl=document.createElement('div');css(hiEl,'font-size:13px;color:#9fb3d9;margin:2px 0 12px');sheet.appendChild(hiEl);
        sheet.appendChild(item('\u25B6 Resume',closeMenu));
        installItem=item('\u2B07 Install app',doInstall);installItem.style.display=dp?'':'none';sheet.appendChild(installItem);
        sheet.appendChild(item('\u2039 All games',function(){location.href='/games';}));
        sheet.appendChild(item('\u2691 Report an issue',report));
      }
      if(document.body)build();else window.addEventListener('DOMContentLoaded',build);
    })();
    </script>

</head>
<body>

<div class="game-container">
    <h1>Lights Out</h1>
    <div class="stats">Moves: <span id="move-count">0</span></div>
    
    <div id="grid" class="grid"></div>
    
    <div id="win-message">You Won! 🎉</div>
    
    <button id="new-game-btn">New Game</button>
</div>

<script>
    const gridElement = document.getElementById('grid');
    const moveDisplay = document.getElementById('move-count');
    const winMessage = document.getElementById('win-message');
    const newGameBtn = document.getElementById('new-game-btn');

    const SIZE = 5;
    let state = Array(SIZE * SIZE).fill(false);
    let moves = 0;
    let gameOver = false;

    function initGrid() {
        gridElement.innerHTML = '';
        for (let i = 0; i < SIZE * SIZE; i++) {
            const cell = document.createElement('button');
            cell.classList.add('cell');
            cell.dataset.index = i;
            cell.addEventListener('click', () => handleCellClick(i));
            gridElement.appendChild(cell);
        }
    }

    function handleCellClick(index) {
        if (gameOver) return;

        moves++;
        moveDisplay.textContent = moves;
        
        const r = Math.floor(index / SIZE);
        const c = index % SIZE;
        
        toggleLights(r, c);
        updateUI();
        checkWin();
    }

    function toggleLights(r, c) {
        const directions = [
            [0, 0],   // center
            [0, 1],   // right
            [0, -1],  // left
            [1, 0],   // down
            [-1, 0]   // up
        ];

        directions.forEach(([dr, dc]) => {
            const nr = r + dr;
            const nc = c + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                const idx = nr * SIZE + nc;
                state[idx] = !state[idx];
            }
        });
    }

    function updateUI() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            if (state[i]) {
                cell.classList.add('on');
            } else {
                cell.classList.remove('on');
            }
        });
    }

    function checkWin() {
        if (state.every(light => !light)) {
            gameOver = true;
            winMessage.classList.add('visible');
        }
    }

    function startNewGame() {
        // Reset state
        state = Array(SIZE * SIZE).fill(false);
        moves = 0;
        gameOver = false;
        moveDisplay.textContent = moves;
        winMessage.classList.remove('visible');
        
        // Generate solvable state by simulating random clicks
        // This is the most reliable way to ensure solvability
        const shuffleMoves = 15 + Math.floor(Math.random() * 10);
        for (let i = 0; i < shuffleMoves; i++) {
            const randR = Math.floor(Math.random() * SIZE);
            const randC = Math.floor(Math.random() * SIZE);
            toggleLights(randR, randC);
        }

        // If by pure chance the shuffle results in all lights off, try again
        if (state.every(light => !light)) {
            startNewGame();
            return;
        }

        updateUI();
    }

    newGameBtn.addEventListener('click', startNewGame);

    // Initialize
    initGrid();
    startNewGame();
</script>

</body>
</html>
