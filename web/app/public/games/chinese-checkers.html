<script>
"use strict";
(function(){

/* ============================================================
   Chinese Checkers — 2 player (You vs CPU) on a 6-point star.
   Coordinate system: axial hex (q, r). We build the full Star
   of David: a central hexagon (radius 4) plus six triangular
   points. Only two opposite triangles are used (top & bottom)
   for a 2-player game, but all 121 holes exist for movement.
   ============================================================ */

  // ----- Build the star board in axial coords -----
  // We use cube coords x+y+z=0. The classic Chinese-checker star:
  // central hexagon = all cells with max(|x|,|y|,|z|) <= 4 forming
  // a hexagon of "radius" 4 (that's a hex with side 5 -> 61 cells).
  // The six triangular points extend beyond, side length 4 (10 cells each).
  //
  // Standard construction: a cell (x,y,z) is on the board if at most
  // one of the three "outer" conditions exceeds the hex. We use the
  // well-known definition based on the three pairs.
  //
  // Define limits: the board = cells where, in cube coords,
  //   -4 <= x,y,z <= 4  (central hexagon)  OR  a triangle point.
  // We'll instead enumerate directly with the canonical rule:
  // For each axis pair we allow the triangle to stick out by up to 4.

  // Canonical star-of-David hole set (121 holes):
  // A cube cell (x,y,z) with x+y+z=0 is valid iff it satisfies:
  //   at least 4 of the 6 half-plane constraints |coord|<=4 PLUS
  // ... simpler: generate central hex (r<=4) plus 6 triangles.

  function key(q,r){ return q+","+r; }

  // axial <-> cube: cube x=q, z=r, y=-x-z.
  const N = 4; // triangle side / hex radius

  // Star-of-David membership (the clean 121-hole definition): a cube cell
  // (x,y,z), x+y+z=0, is on the board iff at least two of the three coords
  // have |coord| <= N. The central hexagon satisfies all three; each of the
  // six triangular points is where exactly one axis coord exceeds N.
  function inStar(x,y,z){
    const ax=Math.abs(x), ay=Math.abs(y), az=Math.abs(z);
    return (ax<=N&&ay<=N) || (ay<=N&&az<=N) || (ax<=N&&az<=N);
  }

  const board = new Map();   // key -> {q,r,x,y,z}
  const R = 2*N;
  for(let x=-R;x<=R;x++){
    for(let y=-R;y<=R;y++){
      const z=-x-y;
      if(Math.abs(z)>R) continue;
      if(inStar(x,y,z)){
        board.set(key(x,z), {q:x, r:z, x, y, z});
      }
    }
  }

  // ---- Identify the six triangular points (tips) of the star ----
  // A tip along axis `ax` (sign +/-) is the set of board cells whose `ax`
  // coordinate exceeds N in that direction. We orient z as the vertical-ish
  // axis: +z tip = bottom, -z tip = top.
  function tipCells(ax, sign){
    const out=[];
    for(const c of board.values()){
      const v = c[ax];
      if(sign>0 ? v>N : v<-N) out.push(key(c.q,c.r));
    }
    return out;
  }

  // The six star tips, in CLOCKWISE screen order starting from the bottom.
  // Pixel layout is x=sqrt(3)*(q+r/2), y=1.5*r, so +z (r large) is the bottom
  // tip. Going clockwise from the bottom in screen space the tips alternate as
  // +z, -x, +y, -z, +x, -y. Each tip's opposite (the goal a player drives into)
  // is the diametrically-opposed tip three steps around the ring.
  //   TIPS[i] opposite = TIPS[(i+3)%6]
  // `tag` is a stable single-char side id used in occupancy ('a'..'f').
  const TIP_DEFS = [
    {ax:'z', sign: 1, tag:'a'},  // 0 bottom
    {ax:'x', sign:-1, tag:'b'},  // 1 bottom-left
    {ax:'y', sign: 1, tag:'c'},  // 2 top-left
    {ax:'z', sign:-1, tag:'d'},  // 3 top
    {ax:'x', sign: 1, tag:'e'},  // 4 top-right
    {ax:'y', sign:-1, tag:'f'},  // 5 bottom-right
  ];
  const TIPS = TIP_DEFS.map(function(t){ return tipCells(t.ax, t.sign); });
  // each tip has 10 cells (1+2+3+4)

  // Per-tip color (peg gradient inner/outer + home tint + status dot).
  const TIP_COLORS = [
    {in:'#aee2ff', out:'#2b8fe6', tint:'rgba(80,180,255,0.10)', home:'#243a52', dot:'#3aa0ff', name:'Blue'},   // a bottom
    {in:'#ffd9a8', out:'#e6862b', tint:'rgba(255,160,60,0.10)', home:'#523a24', dot:'#ff9a3a', name:'Orange'}, // b
    {in:'#c2ffce', out:'#34c24d', tint:'rgba(80,255,120,0.10)', home:'#24522e', dot:'#3ad06a', name:'Green'},  // c
    {in:'#ffc2d8', out:'#e64d86', tint:'rgba(255,110,160,0.10)', home:'#4a2438', dot:'#ff6fae', name:'Pink'},  // d top
    {in:'#e3c2ff', out:'#9b4de6', tint:'rgba(160,80,255,0.10)', home:'#3a2452', dot:'#b07aff', name:'Purple'}, // e
    {in:'#fff3a8', out:'#e6c52b', tint:'rgba(255,216,77,0.12)', home:'#52492a', dot:'#ffd84d', name:'Yellow'}, // f
  ];

  // Seat -> tip index assignments per player count (standard Chinese Checkers).
  // 2: opposite tips. 3: alternating (mutually non-adjacent). 4: two opposite
  // pairs. 6: all tips. The arrays index into TIPS; each player's GOAL is the
  // opposite tip (index+3)%6, guaranteeing a full opposing star point.
  const SEATING = {
    2: [0, 3],
    3: [0, 2, 4],
    4: [0, 3, 1, 4],
    5: [0, 3, 1, 4, 2],   // not a native count; nearest sensible spread
    6: [0, 3, 1, 4, 2, 5],
  };
  function seatingFor(n){
    return SEATING[n] || SEATING[Math.max(2, Math.min(6, n))] || SEATING[2];
  }

  // ---- Legacy 2-player aliases (local AI / pass-and-play) ----
  // Local play keeps its original two sides: 'H' (human, bottom) and 'C' (CPU,
  // top). These map onto tips a (bottom) and d (top).
  const HUMAN_HOME = TIPS[0];            // bottom tip
  const CPU_HOME   = TIPS[3];            // top tip
  const HUMAN_TARGET = TIPS[3].slice();  // human drives into the top tip
  const CPU_TARGET   = TIPS[0].slice();  // cpu drives into the bottom tip

  // ----- Hex neighbor directions (axial) -----
  const DIRS = [
    {dq:+1, dr:0}, {dq:+1, dr:-1}, {dq:0, dr:-1},
    {dq:-1, dr:0}, {dq:-1, dr:+1}, {dq:0, dr:+1},
  ];

  // ----- Game state -----
  // occupancy: key -> 'H' (human) | 'C' (cpu) | null
  let occ = new Map();
  let selected = null;     // key of selected peg
  let legalMoves = new Map(); // destKey -> {type:'step'|'hop', path:[keys]}
  let turn = 'H';          // current side to move (tag)
  let busy = false;        // animation / cpu thinking lock
  let gameOver = false;
  let mode = 'ai';         // 'ai' = vs computer, '2p' = pass-and-play, 'online'

  // ----- Side model (unifies local + online) -----
  // SIDES is the ordered list of active side tags this match. SIDE_INFO maps a
  // tag -> { home:[keys], target:[keys], color, name, seat }. Local play uses
  // tags 'H'/'C'; online uses 'a'..'f' (one per occupied star tip).
  let SIDES = ['H','C'];
  let SIDE_INFO = {};
  function setupSides(tags, defs){
    SIDES = tags.slice();
    SIDE_INFO = {};
    for(let i=0;i<tags.length;i++) SIDE_INFO[tags[i]] = defs[i];
  }
  function setupLocalSides(){
    // Bottom (Blue) vs Top (Pink) — the original 2-player layout.
    setupSides(['H','C'], [
      {home:HUMAN_HOME, target:HUMAN_TARGET, color:TIP_COLORS[0], name:'Blue',  seat:0},
      {home:CPU_HOME,   target:CPU_TARGET,   color:TIP_COLORS[3], name:'Pink',  seat:1},
    ]);
  }
  function nextSideTag(tag){
    const i = SIDES.indexOf(tag);
    return SIDES[(i+1) % SIDES.length];
  }

  // ----- Online state -----
  let online = false;      // true once an online match starts
  let mySide = null;       // our side tag in online play
  let finishedSides = {};  // tag -> true once that side fills its target
  let onlinePeerLeft = false;

  // In 2p / online-as-mover mode the side to move is always "human-controlled".
  // In ai mode only 'H' is human.
  function isHumanTurn(){
    if(mode === 'online') return turn === mySide && !gameOver;
    return mode === '2p' ? true : turn === 'H';
  }
  function sideName(side){
    if(mode === 'online'){
      const info = SIDE_INFO[side];
      const nm = info ? info.color.name : 'Player';
      return side === mySide ? 'You ('+nm+')' : nm;
    }
    if(mode === '2p') return side === 'H' ? 'Blue' : 'Pink';
    return side === 'H' ? 'You' : 'CPU';
  }

  function resetGame(){
    occ = new Map();
    for(const k of board.keys()) occ.set(k, null);
    if(mode === 'online'){
      for(const tag of SIDES){
        for(const k of SIDE_INFO[tag].home) occ.set(k, tag);
      }
    } else {
      setupLocalSides();
      for(const k of HUMAN_HOME) occ.set(k,'H');
      for(const k of CPU_HOME) occ.set(k,'C');
    }
    selected=null; legalMoves=new Map();
    turn = SIDES[0]; busy=false; gameOver=false;
    finishedSides = {};
    setStatus();
    overlay.classList.remove('show');
    layout();
  }

  // ----- Move generation -----
  function neighborKey(k, dir){
    const c=board.get(k);
    const nq=c.q+dir.dq, nr=c.r+dir.dr;
    const nk=key(nq,nr);
    return board.has(nk)? nk : null;
  }

  function computeMoves(fromKey){
    const moves = new Map();
    // single steps
    for(const dir of DIRS){
      const nk=neighborKey(fromKey,dir);
      if(nk && occ.get(nk)===null){
        moves.set(nk, {type:'step', path:[fromKey,nk]});
      }
    }
    // hop chains (BFS over jump graph)
    const visited = new Set([fromKey]);
    const queue = [{k:fromKey, path:[fromKey]}];
    while(queue.length){
      const cur=queue.shift();
      for(const dir of DIRS){
        const overK=neighborKey(cur.k,dir);
        if(!overK) continue;
        if(occ.get(overK)===null) continue; // must jump over a peg
        const landC=board.get(overK);
        const lq=landC.q+dir.dq, lr=landC.r+dir.dr;
        const landK=key(lq,lr);
        if(!board.has(landK)) continue;
        if(occ.get(landK)!==null) continue; // landing must be empty
        if(visited.has(landK)) continue;
        visited.add(landK);
        const np=cur.path.concat([landK]);
        const existing=moves.get(landK);
        // prefer hop over step? a hop reaching a step-dest: keep hop if not present
        if(!existing || existing.type==='step'){
          moves.set(landK, {type:'hop', path:np});
        }
        queue.push({k:landK, path:np});
      }
    }
    return moves;
  }

  // ----- Win check -----
  // A side wins when its opposite target tip is completely full and contains at
  // least one of its own pegs (so an opponent can't block by squatting it).
  function targetOf(p){
    if(SIDE_INFO[p]) return SIDE_INFO[p].target;
    return (p==='H') ? HUMAN_TARGET : CPU_TARGET;
  }
  function playerWon(p){
    const target = targetOf(p);
    let hasOwn=false;
    for(const k of target){
      const o=occ.get(k);
      if(o===null) return false;
      if(o===p) hasOwn=true;
    }
    return hasOwn;
  }

  // ----- Rendering (canvas) -----
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');
  let geom = null; // {cx,cy,scale, pts: Map key->{x,y}, holeR}

  function computeGeom(W,H){
    // axial -> pixel (pointy-top hex layout)
    // x = sqrt(3)*(q + r/2); y = 3/2 * r
    const raw = new Map();
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    for(const [k,c] of board){
      const px = Math.sqrt(3)*(c.q + c.r/2);
      const py = 1.5*c.r;
      raw.set(k,{px,py});
      if(px<minX)minX=px; if(px>maxX)maxX=px;
      if(py<minY)minY=py; if(py>maxY)maxY=py;
    }
    const spanX=maxX-minX, spanY=maxY-minY;
    const pad = 0.9; // hole radius units of margin
    const scaleX = W/(spanX+pad*2);
    const scaleY = H/(spanY+pad*2);
    const scale = Math.min(scaleX, scaleY);
    const offX = (W - spanX*scale)/2 - minX*scale;
    const offY = (H - spanY*scale)/2 - minY*scale;
    const pts = new Map();
    for(const [k,p] of raw){
      pts.set(k, {x: p.px*scale+offX, y: p.py*scale+offY});
    }
    const holeR = scale*0.46;
    return {scale, pts, holeR};
  }

  function layout(){
    const W = boardWrap.clientWidth;
    const H = boardWrap.clientHeight;
    const dpr = Math.min(window.devicePixelRatio||1, 2.5);
    const side = Math.min(W, H);
    canvas.style.width = side+'px';
    canvas.style.height = side+'px';
    canvas.width = Math.round(side*dpr);
    canvas.height = Math.round(side*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    geom = computeGeom(side, side);
    draw();
  }

  // Map each home-tip cell to the color of the side that lives there, so every
  // occupied star point is tinted in its owner's color (local: 2 sides; online:
  // up to 6). Rebuilt on each draw — cheap, and keeps it correct after reset.
  function homeFillMap(){
    const m = new Map();
    for(const tag of SIDES){
      const info = SIDE_INFO[tag];
      if(!info) continue;
      for(const k of info.home) m.set(k, info.color.home);
    }
    return m;
  }

  function draw(){
    if(!geom) return;
    const side = canvas.width / (Math.min(window.devicePixelRatio||1,2.5));
    ctx.clearRect(0,0,side,side);

    const homeFill = homeFillMap();

    // draw holes
    for(const [k,p] of geom.pts){
      // base hole
      ctx.beginPath();
      ctx.arc(p.x,p.y,geom.holeR,0,Math.PI*2);
      ctx.fillStyle = homeFill.get(k) || '#2c2140';
      ctx.fill();
      ctx.lineWidth=1;
      ctx.strokeStyle='rgba(0,0,0,0.35)';
      ctx.stroke();
    }

    // highlight legal destinations
    if(selected){
      for(const [dk,mv] of legalMoves){
        const p=geom.pts.get(dk);
        ctx.beginPath();
        ctx.arc(p.x,p.y,geom.holeR*0.9,0,Math.PI*2);
        ctx.fillStyle = mv.type==='hop'? 'rgba(255,216,77,0.40)':'rgba(120,255,160,0.35)';
        ctx.fill();
        ctx.lineWidth=2.5;
        ctx.strokeStyle = mv.type==='hop'? '#ffd84d':'#78ff9c';
        ctx.stroke();
      }
    }

    // draw pegs
    for(const [k,p] of geom.pts){
      const o = occ.get(k);
      if(o===null) continue;
      drawPeg(p.x,p.y,geom.holeR*0.92, o, k===selected);
    }
  }

  function pegColors(owner){
    if(SIDE_INFO[owner]) return SIDE_INFO[owner].color;
    return owner==='H' ? TIP_COLORS[0] : TIP_COLORS[3];
  }
  function drawPeg(x,y,r,owner,isSel){
    const grd=ctx.createRadialGradient(x-r*0.35,y-r*0.4,r*0.2, x,y,r);
    const c=pegColors(owner);
    grd.addColorStop(0, c.in); grd.addColorStop(1, c.out);
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=grd;
    ctx.fill();
    ctx.lineWidth = isSel? 3.5 : 1.2;
    ctx.strokeStyle = isSel? '#fff' : 'rgba(0,0,0,0.4)';
    ctx.stroke();
    if(isSel){
      ctx.beginPath();
      ctx.arc(x,y,r+3,0,Math.PI*2);
      ctx.lineWidth=2;
      ctx.strokeStyle='rgba(255,255,255,0.6)';
      ctx.stroke();
    }
  }

  // ----- Hit testing -----
  function hitTest(px,py){
    let best=null, bd=1e9;
    for(const [k,p] of geom.pts){
      const dx=px-p.x, dy=py-p.y;
      const d=dx*dx+dy*dy;
      if(d<bd){ bd=d; best=k; }
    }
    const rr=(geom.holeR*1.25);
    if(bd <= rr*rr) return best;
    return null;
  }

  // ----- Audio -----
  let actx=null;
  function beep(freq,dur,type,vol){
    try{
      if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended') actx.resume();
      const o=actx.createOscillator(), g=actx.createGain();
      o.type=type||'sine'; o.frequency.value=freq;
      g.gain.value=0; o.connect(g); g.connect(actx.destination);
      const t=actx.currentTime;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol||0.15,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
      o.start(t); o.stop(t+(dur||0.12)+0.02);
    }catch(e){}
  }
  function sndSelect(){ beep(540,0.08,'sine',0.12); }
  function sndStep(){ beep(420,0.10,'triangle',0.14); }
  function sndHop(){ beep(680,0.07,'square',0.10); }
  function sndWin(){ beep(523,0.15,'sine',0.18); setTimeout(()=>beep(659,0.15,'sine',0.18),140); setTimeout(()=>beep(784,0.25,'sine',0.2),300); }
  function sndLose(){ beep(300,0.2,'sawtooth',0.14); setTimeout(()=>beep(200,0.3,'sawtooth',0.14),160); }

  // ----- Animation of a move along path -----
  function animateMove(path, owner, cb){
    busy=true;
    const fromK=path[0], toK=path[path.length-1];
    occ.set(fromK, null); // peg lifted
    const segs = path.length-1;
    const segDur = path.length>2? 130 : 170; // per hop ms
    let seg=0, t0=null;
    const playSnd = path.length>2? sndHop : sndStep;
    playSnd();

    function frame(ts){
      if(t0===null) t0=ts;
      const elapsed=ts-t0;
      let s=Math.floor(elapsed/segDur);
      if(s>=segs){
        occ.set(toK, owner);
        draw();
        busy=false;
        cb&&cb();
        return;
      }
      if(s!==seg){ seg=s; if(path.length>2) sndHop(); }
      const localT=(elapsed - seg*segDur)/segDur;
      const a=geom.pts.get(path[seg]);
      const b=geom.pts.get(path[seg+1]);
      const ease = localT<0.5? 2*localT*localT : 1-Math.pow(-2*localT+2,2)/2;
      const x=a.x+(b.x-a.x)*ease;
      const y=a.y+(b.y-a.y)*ease;
      const arc = Math.sin(localT*Math.PI)* (path.length>2?10:6);
      draw();
      drawPeg(x, y-arc, geom.holeR*0.92, owner, false);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ----- Turn handling -----
  function setStatus(){
    const dot=document.getElementById('turnDot');
    const txt=document.getElementById('statusText');
    if(gameOver){ return; }
    if(mode==='online'){
      const info=SIDE_INFO[turn];
      dot.style.background = info ? info.color.dot : '#888';
      txt.textContent = (turn===mySide) ? 'Your turn ('+(info?info.color.name:'')+')'
                                        : sideName(turn)+'’s turn…';
      return;
    }
    if(mode==='2p'){
      if(turn==='H'){ dot.style.background='#3aa0ff'; txt.textContent=sideName('H')+'’s turn'; }
      else { dot.style.background='#ff6fae'; txt.textContent=sideName('C')+'’s turn'; }
    } else if(turn==='H'){ dot.style.background='#3aa0ff'; txt.textContent='Your turn (blue)'; }
    else { dot.style.background='#ff6fae'; txt.textContent='CPU thinking…'; }
  }

  function endMove(){
    if(mode==='online'){
      // First side to fill its opposite tip wins (mirrors the local rule).
      if(playerWon(turn)){ finish(turn); return; }
      // Advance to the next side that hasn't already finished.
      let t=turn;
      for(let i=0;i<SIDES.length;i++){
        t=nextSideTag(t);
        if(!finishedSides[t]) break;
      }
      turn=t;
      selected=null; legalMoves=new Map();
      setStatus();
      draw();
      return;
    }
    // check win
    if(playerWon('H')){ finish('H'); return; }
    if(playerWon('C')){ finish('C'); return; }
    turn = (turn==='H')? 'C':'H';
    selected=null; legalMoves=new Map();
    setStatus();
    draw();
    if(mode==='ai' && turn==='C'){
      setTimeout(cpuTurn, 350);
    }
  }

  function finish(winner){
    gameOver=true; busy=false;
    selected=null; legalMoves=new Map();
    draw();
    const ov=document.getElementById('overlay');
    if(mode==='online'){
      const iWon = winner===mySide;
      document.getElementById('ovTitle').textContent = iWon ? 'You win! 🎉' : sideName(winner)+' wins';
      document.getElementById('ovText').textContent = iWon
        ? 'All your pegs reached the far triangle.'
        : (SIDE_INFO[winner] ? SIDE_INFO[winner].color.name : 'A player') + ' filled the far triangle first.';
      document.getElementById('statusText').textContent = iWon ? 'You win!' : sideName(winner)+' wins!';
      const info=SIDE_INFO[winner];
      document.getElementById('turnDot').style.background = info ? info.color.dot : '#888';
      if(iWon) sndWin(); else sndLose();
      // Host-only rematch.
      const ob=document.getElementById('ovBtn');
      ob.textContent = onlinePeerLeft ? 'New game' : 'Rematch';
      ob.style.display = (mySide===SIDES[0] || onlinePeerLeft) ? '' : 'none';
      ov.classList.add('show');
      return;
    }
    if(mode==='2p'){
      document.getElementById('ovTitle').textContent = sideName(winner)+' wins! 🎉';
      document.getElementById('ovText').textContent = sideName(winner)+' filled the far triangle first.';
      document.getElementById('statusText').textContent = sideName(winner)+' wins!';
      sndWin();
    } else {
      document.getElementById('ovTitle').textContent = winner==='H'? 'You win! 🎉':'CPU wins';
      document.getElementById('ovText').textContent = winner==='H'
        ? 'All your pegs reached the far triangle.'
        : 'The CPU filled its target first. Try again!';
      document.getElementById('statusText').textContent = winner==='H'?'You win!':'CPU wins';
      if(winner==='H') sndWin(); else sndLose();
    }
    ov.classList.add('show');
    document.getElementById('turnDot').style.background = winner==='H'?'#3aa0ff':'#ff6fae';
  }

  // ----- Input -----
  function onTap(px,py){
    if(busy || gameOver || !isHumanTurn()) return;
    const k=hitTest(px,py);
    if(k===null){ // tap empty space deselects
      if(selected){ selected=null; legalMoves=new Map(); draw(); }
      return;
    }
    const o=occ.get(k);
    if(selected && legalMoves.has(k)){
      // make the move
      const mv=legalMoves.get(k);
      const path=mv.path;
      selected=null; legalMoves=new Map();
      draw();
      // Online: broadcast the full path so every client applies & animates the
      // identical move (single step OR multi-hop chain) before advancing.
      if(mode==='online'){
        GameMP.send({ action:'move', seat:GameMP.seat(), side:turn, path:path });
      }
      animateMove(path, turn, ()=>{ endMove(); });
      return;
    }
    if(o===turn){
      // select own peg
      selected=k;
      legalMoves=computeMoves(k);
      sndSelect();
      draw();
      return;
    }
    // tapped opponent peg or empty hole not legal: deselect
    selected=null; legalMoves=new Map();
    draw();
  }

  function canvasPos(ev){
    const rect=canvas.getBoundingClientRect();
    let cx,cy;
    if(ev.touches && ev.touches.length){ cx=ev.touches[0].clientX; cy=ev.touches[0].clientY; }
    else if(ev.changedTouches && ev.changedTouches.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
    else { cx=ev.clientX; cy=ev.clientY; }
    return { x: cx-rect.left, y: cy-rect.top };
  }

  let touchHandled=false;
  canvas.addEventListener('touchstart', function(e){
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', function(e){
    e.preventDefault();
    touchHandled=true;
    const p=canvasPos(e);
    onTap(p.x,p.y);
    setTimeout(()=>{touchHandled=false;}, 400);
  }, {passive:false});
  canvas.addEventListener('click', function(e){
    if(touchHandled) return;
    const p=canvasPos(e);
    onTap(p.x,p.y);
  });

  // ----- CPU AI -----
  // CPU pegs are 'C', their goal is to fill CPU_TARGET (the bottom +z tip).
  // Strategy: drive every peg toward the FAR APEX of the target triangle
  // (deepest cell), measured by hex distance. Pegs that have settled into
  // the deepest contiguous run of target cells are "locked" so they don't
  // wander back out — this guarantees monotone progress and avoids loops.

  const cpuTargetSet = new Set(CPU_TARGET);
  const cpuHomeSet = new Set(CPU_HOME);

  // hex distance between two cells (cube coords)
  function hexDist(k1,k2){
    const a=board.get(k1), b=board.get(k2);
    return (Math.abs(a.x-b.x)+Math.abs(a.y-b.y)+Math.abs(a.z-b.z))/2;
  }

  // Apex = the single deepest target cell (greatest r for the bottom tip).
  const cpuApex = CPU_TARGET.reduce(
    (best,k)=> board.get(k).r > board.get(best).r ? k : best,
    CPU_TARGET[0]
  );
  function cpuVal(k){ return hexDist(k, cpuApex); } // lower = closer to goal

  // Target cells ordered from deepest (apex) outward.
  const cpuTargetByDepth = CPU_TARGET.slice().sort((a,b)=>cpuVal(a)-cpuVal(b));

  // Lock the deepest contiguous run of target cells currently held by C.
  function cpuLockedTargets(){
    const locked = new Set();
    for(const k of cpuTargetByDepth){
      if(occ.get(k)==='C') locked.add(k);
      else break; // first unfilled deep slot breaks the run
    }
    return locked;
  }

  function cpuTurn(){
    if(gameOver || mode!=='ai') return;
    busy=true;
    let bestMove=null, bestScore=-1e9;

    const locked = cpuLockedTargets();
    const cpuPegs=[];
    for(const [k,o] of occ){ if(o==='C') cpuPegs.push(k); }

    for(const fromK of cpuPegs){
      if(locked.has(fromK)) continue; // never disturb settled pegs
      const moves=computeMoves(fromK);
      const fromV=cpuVal(fromK);
      const fromInTarget = cpuTargetSet.has(fromK);
      const fromInHome = cpuHomeSet.has(fromK);
      for(const [destK,mv] of moves){
        if(locked.has(destK)) continue; // don't try to enter a locked slot
        let score = (fromV - cpuVal(destK)) * 10; // progress toward apex

        // prefer long hop chains
        if(mv.type==='hop') score += (mv.path.length-1) * 1.5;

        // reward settling into the target; penalize leaving it
        const destInTarget = cpuTargetSet.has(destK);
        if(destInTarget && !fromInTarget) score += 8;
        if(fromInTarget && !destInTarget) score -= 15;

        // encourage leaving home early
        if(fromInHome && !cpuHomeSet.has(destK)) score += 2;

        // tiny tie-break randomness
        score += Math.random()*0.3;

        if(score>bestScore){
          bestScore=score;
          bestMove={path:mv.path, type:mv.type};
        }
      }
    }

    if(!bestMove){
      // no legal move available — pass the turn
      busy=false;
      endMove();
      return;
    }
    animateMove(bestMove.path, 'C', ()=>{ endMove(); });
  }

  // ----- Mode selection -----
  const modeOverlay=document.getElementById('modeOverlay');
  function showModeSelect(){ modeOverlay.classList.add('show'); modeOverlay.style.display='flex'; }
  function startMode(m){
    mode=m;
    modeOverlay.classList.remove('show');
    modeOverlay.style.display='none';
    resetGame();
  }
  document.getElementById('modeAi').addEventListener('click', function(){
    if(actx && actx.state==='suspended') actx.resume();
    startMode('ai');
  });
  document.getElementById('modeTwo').addEventListener('click', function(){
    if(actx && actx.state==='suspended') actx.resume();
    startMode('2p');
  });

  // ----- Buttons & resize -----
  // "New Game" returns to the mode picker so you can switch AI / pass-and-play.
  document.getElementById('newBtn').addEventListener('click', function(){
    if(actx && actx.state==='suspended') actx.resume();
    showModeSelect();
  });
  // "Play Again" from game over restarts the same mode. Online: host broadcasts
  // a reset to everyone; a "New game" (after a peer left) reopens the picker.
  document.getElementById('ovBtn').addEventListener('click', function(){
    if(mode==='online'){
      if(onlinePeerLeft){ leaveOnline(); showModeSelect(); return; }
      if(mySide===SIDES[0]){ GameMP.sendReset(); resetGame(); }
      return;
    }
    resetGame();
  });

  // Reset back to local play (used when leaving an online match).
  function leaveOnline(){
    online=false; mode='ai'; mySide=null; onlinePeerLeft=false;
    finishedSides={}; setupLocalSides();
  }

  let rT=null;
  window.addEventListener('resize', function(){
    clearTimeout(rT); rT=setTimeout(layout, 120);
  });
  window.addEventListener('orientationchange', function(){ setTimeout(layout, 250); });

  // prevent page scroll / pinch
  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('touchmove', function(e){
    if(e.touches.length>1) e.preventDefault();
  }, {passive:false});

  // ----- Online multiplayer (GameMP) -----------------------------------------
  // Deterministic, no hidden info: on your turn you broadcast the full move path
  // (single step or hop chain). Every client runs the SAME legality + apply +
  // animate logic, so boards stay identical. Seats map to the standard starting
  // tips for the player count; each side's goal is the diametrically-opposite
  // tip. Turn cycles among seated sides; first to fill its target wins.
  function startOnline(seat, count){
    online=true; mode='online'; onlinePeerLeft=false;
    const order=seatingFor(count);            // seat -> tip index (consistent on all clients)
    const defs=order.map(function(tipIdx, s){
      return {
        home: TIPS[tipIdx],
        target: TIPS[(tipIdx+3)%6],           // opposite tip is the goal
        color: TIP_COLORS[tipIdx],
        name: TIP_COLORS[tipIdx].name,
        seat: s,
      };
    });
    // Side tags are 'a'..'f' keyed by SEAT order (every client agrees on this).
    const tags=order.map(function(_,s){ return String.fromCharCode(97+s); });
    setupSides(tags, defs);
    mySide=tags[seat];
    finishedSides={};
    modeOverlay.classList.remove('show'); modeOverlay.style.display='none';
    resetGame();
  }

  // Apply a remote move: find the legal move matching the received path's
  // destination from its origin and animate it identically, then advance.
  function applyRemoteMove(m){
    if(busy){ setTimeout(function(){ applyRemoteMove(m); }, 60); return; }
    if(gameOver) return;
    const path=m.path;
    if(!path || path.length<2) return;
    // Trust the sender's side == current turn (turn order is deterministic), but
    // guard against stale/duplicate sends.
    if(m.side && m.side!==turn) return;
    selected=null; legalMoves=new Map();
    animateMove(path, turn, function(){ endMove(); });
  }

  GameMP.setup({ gameName: "Chinese Checkers", minPlayers: 2, maxPlayers: 6 });
  GameMP.onReady(function(seat, count){
    if(actx && actx.state==='suspended') actx.resume();
    startOnline(seat, count);
  });
  GameMP.onMove(function(m){
    if(mode!=='online') return;
    if(m.action==='move') applyRemoteMove(m);
  });
  GameMP.onReset(function(){
    // Host pressed Rematch — everyone resets to a fresh match (same seats).
    if(mode!=='online') return;
    onlinePeerLeft=false;
    resetGame();
  });
  GameMP.onPeerLeft(function(){
    // No authoritative server: a mid-match drop breaks the deterministic turn
    // order, so end cleanly and offer a fresh game.
    if(mode!=='online' || gameOver) return;
    onlinePeerLeft=true;
    gameOver=true; busy=false;
    selected=null; legalMoves=new Map();
    draw();
    document.getElementById('ovTitle').textContent='Player left';
    document.getElementById('ovText').textContent='Someone disconnected, so this match can’t continue. Start a new game to play again.';
    document.getElementById('statusText').textContent='Player left';
    const ob=document.getElementById('ovBtn'); ob.textContent='New game'; ob.style.display='';
    overlay.classList.add('show');
  });

  // ----- Init -----
  const overlay=document.getElementById('overlay');
  resetGame();
  // ensure layout after fonts/render
  setTimeout(layout, 60);

})();
</script>
</body>
</html>
