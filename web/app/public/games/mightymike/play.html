<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Mighty Mike (web demo)</title>
<!-- PWA installability (own icon = Mighty Mike's face) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#C2410C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mighty Mike">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).catch(function(){})})}</script>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  /* The SDL canvas; scale to fit the viewport, keep pixels crisp, letterbox. */
  #canvas{max-width:100vw;max-height:100vh;width:auto;height:auto;
    image-rendering:pixelated;image-rendering:crisp-edges;background:#000;outline:none;display:block;}
  #status{position:fixed;left:0;right:0;top:42%;text-align:center;color:#9ab;
    font:600 15px system-ui,sans-serif;z-index:5;}
  #credit{position:fixed;left:0;bottom:2px;width:100%;text-align:center;color:#456;
    font:500 10px system-ui,sans-serif;z-index:2147483000;pointer-events:none;}
</style>
</head>
<body>
  <div id="wrap"><canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas></div>
  <div id="status">Loading Mighty Mike…</div>
  <div id="credit">Mighty Mike © 1995–2000 Pangea Software · web port of jorio/MightyMike (CC BY-NC-SA 4.0)</div>

  <script>
    var statusEl = document.getElementById("status");
    var Module = {
      canvas: (function(){
        var c = document.getElementById("canvas");
        // Surface WebGL context-loss so we notice it during testing.
        c.addEventListener("webglcontextlost", function(e){ e.preventDefault(); console.error("WebGL context lost"); }, false);
        return c;
      })(),
      setStatus: function(t){ if(statusEl) statusEl.textContent = t || ""; if(!t && statusEl){ statusEl.style.display="none"; } },
      print:   function(t){ console.log(t); },
      printErr:function(t){ console.error(t); },
      onRuntimeInitialized: function(){ Module.setStatus(""); },
    };
    // Keep focus on the canvas so SDL receives keyboard events.
    window.addEventListener("load", function(){ Module.canvas.focus(); });
    window.addEventListener("click", function(){ Module.canvas.focus(); });
  </script>

  <!-- Touch gamepad overlay → synthesizes the game's real key bindings.
       The ?v= version busts Cloudflare's 4h edge cache on each change —
       play.html itself is served fresh (not edge-cached), so bumping this
       token guarantees the new overlay is fetched. Bump it on every edit. -->
  <script src="gamepad-overlay.js?v=20260613-zone"></script>
  <script>
    window.addEventListener("load", function(){
      if (!window.GamepadOverlay) return;
      GamepadOverlay.mount({
        target: window,           // SDL3/emscripten listens for keys on window
        show: "always",           // visible on desktop too (handy for testing)
        dpad: { up:"ArrowUp", down:"ArrowDown", left:"ArrowLeft", right:"ArrowRight" },
        buttons: [
          { id:"attack", label:"●", code:"Space",     side:"right" }, // Attack
          { id:"weapon", label:"⇄", code:"ShiftLeft", side:"right" }, // Next weapon
          { id:"radar",  label:"R", code:"KeyR",      side:"right" }, // Radar
          { id:"pause",  label:"≡", code:"Escape",    side:"top"   }, // Pause
        ],
        // The overlay adds a control-mode switcher (D-Pad / Joystick) to the
        // top bar, left of Pause. (The old ▶/Enter button was replaced by it.)
      });
    });
  </script>

  <script async src="MightyMike.js"></script>
</body>
</html>
