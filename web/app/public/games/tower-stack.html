<!DOCTYPE html>
<html lang="en">
<head>

<title>Tower Stack</title>
<style>
  :root {
    --bg: #0b1020;
    --bg2: #131a33;
    --text: #f1f5ff;
    --muted: #9aa6c7;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(circle at 50% 0%, var(--bg2), var(--bg) 70%);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100%;
  }
  header {
    width: 100%;
    max-width: 480px;
    padding: 10px 16px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  h1 {
    font-size: 18px;
    margin: 0;
    letter-spacing: 1px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .scores {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .scores b {
    display: block;
    font-size: 20px;
    line-height: 1.1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  #stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    flex: 1 1 auto;
    display: flex;
    align-items: stretch;
    justify-content: center;
    touch-action: none;
  }
  canvas {
    display: block;
    touch-action: none;
    background: transparent;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 8px;
    padding: 20px;
    background: rgba(8, 12, 28, 0.55);
    backdrop-filter: blur(2px);
    user-select: none;
    cursor: pointer;
  }
  #overlay.hidden { display: none; }
  #overlay h2 {
    margin: 0;
    font-size: 26px;
  }
  #overlay p {
    margin: 2px 0;
    color: var(--muted);
    font-size: 14px;
  }
  .tap-hint {
    margin-top: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    background: linear-gradient(90deg, #2563eb, #38bdf8);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 0.95; }
    50% { transform: scale(1.06); opacity: 1; }
  }
  footer {
    width: 100%;
    max-width: 480px;
    padding: 8px 16px 14px;
    display: flex;
    justify-content: center;
    user-select: none;
  }
  #restart {
    appearance: none;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    cursor: pointer;
    touch-action: manipulation;
  }
  #restart:active { background: rgba(255,255,255,0.16); }
</style>

</head>
<body>
  <header>
    <h1>TOWER STACK</h1>
    <div class="scores">
      <div>Score<b id="score">0</b></div>
      <div>Best<b id="best">0</b></div>
    </div>
  </header>

  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h2 id="ov-title">Tower Stack</h2>
      <p id="ov-text">Tap to drop each block onto the stack.<br>Line them up — the overhang gets sliced off.</p>
      <div class="tap-hint" id="ov-action">Tap to Start</div>
    </div>
  </div>

  <footer>
    <button id="restart" type="button">Restart</button>
  </footer>

<script>
(function () {
  "use strict";

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var stage = document.getElementById("stage");
  var overlay = document.getElementById("overlay");
  var ovTitle = document.getElementById("ov-title");
  var ovText = document.getElementById("ov-text");
  var ovAction = document.getElementById("ov-action");
  var scoreEl = document.getElementById("score");
  var bestEl = document.getElementById("best");
  var restartBtn = document.getElementById("restart");

  var BEST_KEY = "tower-stack-best";

  // Logical (CSS) pixel dimensions of the canvas.
  var W = 0, H = 0, dpr = 1;

  // Layout constants (in CSS px, recomputed on resize)
  var BLOCK_H = 40;      // height of each layer
  var BASE_W = 0;        // starting block width
  var BASE_CX = 0;       // center x of tower

  // Game state
  var STATE_READY = 0, STATE_PLAYING = 1, STATE_OVER = 2;
  var state = STATE_READY;

  var stack = [];        // placed blocks: {x, w, hue}
  var current = null;    // moving block: {x, w, dir, speed, hue}
  var slices = [];       // falling sliced pieces: {x, y, w, hue, vy, vx}
  var score = 0;
  var best = 0;
  var cameraY = 0;       // how far the view has scrolled up (CSS px)
  var targetCameraY = 0;
  var hueSeed = 200;
  var lastT = 0;
  var rafId = 0;
  var flashT = 0;        // perfect-placement flash timer

  function loadBest() {
    try {
      var v = parseInt(localStorage.getItem(BEST_KEY), 10);
      if (!isNaN(v) && v > 0) best = v;
    } catch (e) {}
    bestEl.textContent = best;
  }
  function saveBest() {
    try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
  }

  // ---- Audio (WebAudio, no assets) ----
  var actx = null;
  function ensureAudio() {
    if (actx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) actx = new AC();
    } catch (e) { actx = null; }
  }
  function beep(freq, dur, type, vol) {
    if (!actx) return;
    try {
      if (actx.state === "suspended") actx.resume();
      var o = actx.createOscillator();
      var g = actx.createGain();
      o.type = type || "sine";
      o.frequency.value = freq;
      var now = actx.currentTime;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(vol || 0.15, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(now);
      o.stop(now + dur + 0.02);
    } catch (e) {}
  }

  function hueToColor(hue, light) {
    return "hsl(" + ((hue % 360) + 360) % 360 + ", 65%, " + light + "%)";
  }

  function resize() {
    var rect = stage.getBoundingClientRect();
    W = Math.max(200, Math.floor(rect.width));
    H = Math.max(200, Math.floor(rect.height));
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    BLOCK_H = Math.max(26, Math.min(46, Math.round(H / 13)));
    BASE_CX = W / 2;
    BASE_W = Math.min(W * 0.62, 300);
    draw();
  }

  // Y position (screen-space, CSS px) of layer with index i (0 = base).
  // We draw growing upward from the bottom; camera scrolls so the top stays near a fixed line.
  function layerScreenY(i) {
    // bottom of base sits near bottom of canvas
    var bottom = H - 30;
    var y = bottom - (i + 1) * BLOCK_H + cameraY;
    return y;
  }

  function startGame() {
    ensureAudio();
    stack = [];
    slices = [];
    score = 0;
    cameraY = 0;
    targetCameraY = 0;
    flashT = 0;
    hueSeed = 190 + Math.floor(Math.random() * 60);

    // base block
    stack.push({ x: BASE_CX - BASE_W / 2, w: BASE_W, hue: hueSeed });
    spawnBlock();
    state = STATE_PLAYING;
    overlay.classList.add("hidden");
    updateScore();
  }

  function spawnBlock() {
    var below = stack[stack.length - 1];
    var hue = hueSeed + (stack.length) * 18;
    // speed scales gently with height (CSS px / sec)
    var speed = 130 + Math.min(stack.length * 9, 230);
    // alternate the side the block enters from for variety
    var fromLeft = (stack.length % 2 === 0);
    var w = below.w;
    current = {
      x: fromLeft ? 0 : (W - w),
      w: w,
      dir: fromLeft ? 1 : -1,
      speed: speed,
      hue: hue
    };
    // safety clamp inside playfield
    if (current.x < 0) current.x = 0;
    if (current.x + current.w > W) current.x = W - current.w;
  }

  function place() {
    if (state !== STATE_PLAYING || !current) return;
    var below = stack[stack.length - 1];
    var left = Math.max(current.x, below.x);
    var right = Math.min(current.x + current.w, below.x + below.w);
    var overlap = right - left;

    if (overlap <= 0) {
      // total miss -> the block falls, game over
      slices.push({
        x: current.x, w: current.w,
        y: layerScreenY(stack.length),
        hue: current.hue,
        vy: 40, vx: current.dir * 30
      });
      gameOver();
      return;
    }

    var perfect = Math.abs(current.x - below.x) <= Math.max(3, below.w * 0.025);

    if (perfect) {
      // keep full width of the block below, snap aligned
      current.x = below.x;
      current.w = below.w;
      flashT = 0.35;
      beep(880, 0.12, "triangle", 0.18);
      beep(1320, 0.10, "sine", 0.10);
    } else {
      // slice off the overhang -> falling piece(s)
      if (current.x < left) {
        slices.push({
          x: current.x, w: left - current.x,
          y: layerScreenY(stack.length),
          hue: current.hue, vy: 20, vx: -40
        });
      }
      if (current.x + current.w > right) {
        slices.push({
          x: right, w: (current.x + current.w) - right,
          y: layerScreenY(stack.length),
          hue: current.hue, vy: 20, vx: 40
        });
      }
      current.x = left;
      current.w = overlap;
      beep(420 + Math.min(score * 12, 400), 0.09, "square", 0.12);
    }

    // commit
    stack.push({ x: current.x, w: current.w, hue: current.hue });
    score++;
    updateScore();

    // scroll camera up so new top stays visible
    targetCameraY = Math.max(0, (stack.length - 6) * BLOCK_H);

    spawnBlock();
  }

  function gameOver() {
    state = STATE_OVER;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      saveBest();
    }
    beep(220, 0.25, "sawtooth", 0.16);
    setTimeout(function () { beep(160, 0.3, "sawtooth", 0.14); }, 110);
    ovTitle.textContent = "Game Over";
    ovText.innerHTML = "You stacked <b>" + score + "</b> block" + (score === 1 ? "" : "s") +
      ".<br>Best: " + best;
    ovAction.textContent = "Tap to Play Again";
    overlay.classList.remove("hidden");
  }

  function updateScore() {
    scoreEl.textContent = score;
  }

  // ---- Input ----
  function onTap(e) {
    if (e) {
      if (e.cancelable) e.preventDefault();
    }
    ensureAudio();
    if (state === STATE_PLAYING) {
      place();
    } else {
      startGame();
    }
  }

  stage.addEventListener("touchstart", function (e) {
    onTap(e);
  }, { passive: false });

  stage.addEventListener("mousedown", function (e) {
    // ignore if this is a synthetic from touch (touchstart already handled)
    onTap(e);
  });

  // prevent context menu / scroll gestures on the play area
  stage.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  stage.addEventListener("touchmove", function (e) {
    if (e.cancelable) e.preventDefault();
  }, { passive: false });

  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " " || e.code === "Enter" || e.key === "Enter") {
      e.preventDefault();
      onTap(null);
    }
  });

  restartBtn.addEventListener("click", function (e) {
    e.preventDefault();
    ensureAudio();
    startGame();
  });

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () {
    setTimeout(resize, 120);
  });

  // ---- Update & Render ----
  function update(dt) {
    if (state === STATE_PLAYING && current) {
      current.x += current.dir * current.speed * dt;
      if (current.x <= 0) {
        current.x = 0;
        current.dir = 1;
      } else if (current.x + current.w >= W) {
        current.x = W - current.w;
        current.dir = -1;
      }
    }

    // camera easing
    cameraY += (targetCameraY - cameraY) * Math.min(1, dt * 6);

    // falling slices
    for (var i = slices.length - 1; i >= 0; i--) {
      var s = slices[i];
      s.vy += 900 * dt;
      s.y += s.vy * dt;
      s.x += s.vx * dt;
      if (s.y > H + 80) slices.splice(i, 1);
    }

    if (flashT > 0) flashT = Math.max(0, flashT - dt);
  }

  function drawBlock(x, y, w, hue, alpha) {
    var topC = hueToColor(hue, 62);
    var sideC = hueToColor(hue, 46);
    ctx.globalAlpha = alpha == null ? 1 : alpha;
    // body
    ctx.fillStyle = sideC;
    ctx.fillRect(x, y, w, BLOCK_H);
    // top highlight strip
    var grad = ctx.createLinearGradient(0, y, 0, y + BLOCK_H);
    grad.addColorStop(0, topC);
    grad.addColorStop(1, sideC);
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, BLOCK_H);
    // subtle top edge
    ctx.fillStyle = hueToColor(hue, 74);
    ctx.fillRect(x, y, w, Math.max(2, BLOCK_H * 0.12));
    ctx.globalAlpha = 1;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // ground line
    var groundY = H - 30 + cameraY;
    if (groundY < H + 4) {
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fillRect(0, groundY, W, H - groundY + 30);
    }

    // placed stack
    for (var i = 0; i < stack.length; i++) {
      var b = stack[i];
      var y = layerScreenY(i);
      if (y > H + BLOCK_H || y < -BLOCK_H * 2) continue;
      drawBlock(b.x, y, b.w, b.hue, 1);
    }

    // current moving block
    if (state === STATE_PLAYING && current) {
      var cy = layerScreenY(stack.length);
      drawBlock(current.x, cy, current.w, current.hue, 1);
      // alignment guide: faint vertical edges of block below
      var below = stack[stack.length - 1];
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(below.x + 0.5, 0);
      ctx.lineTo(below.x + 0.5, H);
      ctx.moveTo(below.x + below.w - 0.5, 0);
      ctx.lineTo(below.x + below.w - 0.5, H);
      ctx.stroke();
    }

    // falling slices
    for (var j = 0; j < slices.length; j++) {
      var s = slices[j];
      drawBlock(s.x, s.y, s.w, s.hue, 0.85);
    }

    // perfect flash
    if (flashT > 0) {
      ctx.fillStyle = "rgba(255,255,255," + (flashT * 0.4).toFixed(3) + ")";
      ctx.fillRect(0, 0, W, H);
    }
  }

  function loop(t) {
    rafId = requestAnimationFrame(loop);
    if (!lastT) lastT = t;
    var dt = (t - lastT) / 1000;
    lastT = t;
    if (dt > 0.05) dt = 0.05; // clamp big gaps
    update(dt);
    draw();
  }

  // init
  loadBest();
  resize();
  // small delay so layout settles, then ensure sizing again
  setTimeout(resize, 60);
  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
