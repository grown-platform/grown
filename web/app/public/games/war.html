<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>War</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #0b3d2e 0%, #0a2f24 100%);
    color: #f4f0e6;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
    padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    touch-action: manipulation;
  }
  .wrap {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    flex: 1;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }
  h1 {
    font-size: clamp(26px, 9vw, 40px);
    font-weight: 800;
    letter-spacing: 4px;
    color: #ffd34d;
    text-shadow: 0 2px 0 #5a3e00, 0 0 18px rgba(255,211,77,.35);
  }
  .counts {
    display: flex;
    justify-content: space-between;
    width: 100%;
    gap: 10px;
  }
  .count {
    flex: 1;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 12px;
    padding: 8px 6px;
    text-align: center;
  }
  .count .lbl { font-size: 12px; opacity: .8; letter-spacing: 1px; text-transform: uppercase; }
  .count .num { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .count.cpu .num { color: #ff8f6b; }
  .count.you .num { color: #8fe3ff; }
  .bar {
    width: 100%;
    height: 8px;
    border-radius: 8px;
    background: #ff8f6b;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.25);
  }
  .bar > i {
    display: block;
    height: 100%;
    background: #8fe3ff;
    width: 50%;
    transition: width .35s ease;
  }
  .table {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    min-height: 0;
  }
  .row { text-align: center; }
  .row .who { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: .75; margin-bottom: 6px; }
  .pile {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 120px;
    position: relative;
  }
  .card {
    width: 76px;
    height: 108px;
    border-radius: 9px;
    background: #fdfcf7;
    color: #111;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,.4);
    flex: 0 0 auto;
    margin: 0 -14px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: deal .25s ease;
  }
  @keyframes deal { from { transform: translateY(-12px) scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }
  .card.win { box-shadow: 0 0 0 3px #ffd34d, 0 4px 10px rgba(0,0,0,.4); transform: translateY(-6px); }
  .card .corner {
    position: absolute;
    font-weight: 800;
    font-size: 15px;
    line-height: 1;
    text-align: center;
  }
  .card .corner.tl { top: 5px; left: 6px; }
  .card .corner.br { bottom: 5px; right: 6px; transform: rotate(180deg); }
  .card .corner .s { font-size: 13px; display: block; }
  .card .pip { font-size: 34px; line-height: 1; }
  .card.red { color: #d22; }
  .card.black { color: #111; }
  .card.back {
    background:
      repeating-linear-gradient(45deg, #1b4f8a 0 7px, #15406f 7px 14px);
    border: 3px solid #fdfcf7;
  }
  .card.back::after {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 5px;
    border: 2px solid rgba(255,255,255,.35);
  }
  .msg {
    text-align: center;
    min-height: 26px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .msg.war { color: #ffd34d; text-shadow: 0 0 14px rgba(255,211,77,.6); animation: pulse .5s ease infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
  .btn {
    width: 100%;
    max-width: 440px;
    border: none;
    border-radius: 16px;
    padding: 20px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #1a1200;
    background: linear-gradient(180deg, #ffe07a, #ffc62e);
    box-shadow: 0 6px 0 #b98a00, 0 8px 16px rgba(0,0,0,.4);
    cursor: pointer;
    touch-action: manipulation;
    transition: transform .05s ease, box-shadow .05s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b98a00, 0 4px 8px rgba(0,0,0,.4); }
  .btn:disabled { opacity: .5; box-shadow: 0 6px 0 #6b5200; }
  .btn.over { background: linear-gradient(180deg, #9fffb0, #38d96a); box-shadow: 0 6px 0 #1d7a3a, 0 8px 16px rgba(0,0,0,.4); }
</style>

<body>
  <div class="wrap">
    <h1>WAR</h1>
    <div class="counts">
      <div class="count cpu"><div class="lbl">CPU</div><div class="num" id="cpuCount">26</div></div>
      <div class="count you"><div class="lbl">You</div><div class="num" id="youCount">26</div></div>
    </div>
    <div class="bar"><i id="bar"></i></div>
    <div class="table">
      <div class="row">
        <div class="who">CPU</div>
        <div class="pile" id="cpuPile"></div>
      </div>
      <div class="msg" id="msg">Tap PLAY to flip cards</div>
      <div class="row">
        <div class="who">You</div>
        <div class="pile" id="youPile"></div>
      </div>
    </div>
    <button class="btn" id="btn">PLAY</button>
  </div>

<script>
(function () {
  "use strict";

  var SUITS = [
    { s: "♠", red: false }, // spades
    { s: "♥", red: true },  // hearts
    { s: "♦", red: true },  // diamonds
    { s: "♣", red: false }  // clubs
  ];
  // rank value: 2..14 (Ace high)
  var RANK_LABEL = { 11: "J", 12: "Q", 13: "K", 14: "A" };

  var youDeck = []; // index 0 = top
  var cpuDeck = [];
  var gameOver = false;
  var pendingWar = false; // true when next tap should resolve a war
  var warPot = [];        // accumulated cards in current battle (for war chaining)

  var el = {
    cpuCount: document.getElementById("cpuCount"),
    youCount: document.getElementById("youCount"),
    bar: document.getElementById("bar"),
    cpuPile: document.getElementById("cpuPile"),
    youPile: document.getElementById("youPile"),
    msg: document.getElementById("msg"),
    btn: document.getElementById("btn")
  };

  // ---- audio ----
  var audioCtx = null;
  function ac() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    return audioCtx;
  }
  function beep(freq, dur, type, vol) {
    var c = ac();
    if (!c) return;
    try {
      var o = c.createOscillator();
      var g = c.createGain();
      o.type = type || "sine";
      o.frequency.value = freq;
      g.gain.value = 0;
      o.connect(g); g.connect(c.destination);
      var t = c.currentTime;
      g.gain.linearRampToValueAtTime(vol || 0.12, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur + 0.02);
    } catch (e) {}
  }
  function sFlip() { beep(420, 0.08, "square", 0.07); }
  function sWin() { beep(660, 0.12, "triangle", 0.12); }
  function sLose() { beep(180, 0.16, "sawtooth", 0.10); }
  function sWar() { beep(300, 0.1, "square", 0.1); setTimeout(function(){ beep(450, 0.12, "square", 0.1); }, 90); }
  function sGameOver(winYou) {
    if (winYou) {
      [523, 659, 784, 1046].forEach(function (f, i) { setTimeout(function () { beep(f, 0.18, "triangle", 0.14); }, i * 130); });
    } else {
      [392, 330, 262, 196].forEach(function (f, i) { setTimeout(function () { beep(f, 0.2, "sawtooth", 0.12); }, i * 150); });
    }
  }

  // ---- deck ----
  function buildDeck() {
    var d = [];
    for (var s = 0; s < 4; s++) {
      for (var r = 2; r <= 14; r++) {
        d.push({ rank: r, suit: s });
      }
    }
    // Fisher-Yates
    for (var i = d.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = d[i]; d[i] = d[j]; d[j] = tmp;
    }
    return d;
  }

  function deal() {
    var d = buildDeck();
    youDeck = d.slice(0, 26);
    cpuDeck = d.slice(26, 52);
    warPot = [];
    pendingWar = false;
    gameOver = false;
  }

  // ---- rendering ----
  function rankText(r) { return RANK_LABEL[r] || String(r); }

  function cardFaceEl(card, isWin) {
    var div = document.createElement("div");
    var suit = SUITS[card.suit];
    div.className = "card " + (suit.red ? "red" : "black") + (isWin ? " win" : "");
    var rt = rankText(card.rank);
    var tl = document.createElement("div");
    tl.className = "corner tl";
    tl.innerHTML = rt + '<span class="s">' + suit.s + '</span>';
    var br = document.createElement("div");
    br.className = "corner br";
    br.innerHTML = rt + '<span class="s">' + suit.s + '</span>';
    var pip = document.createElement("div");
    pip.className = "pip";
    pip.textContent = suit.s;
    div.appendChild(tl);
    div.appendChild(pip);
    div.appendChild(br);
    return div;
  }

  function cardBackEl() {
    var div = document.createElement("div");
    div.className = "card back";
    return div;
  }

  function clearPiles() {
    el.cpuPile.innerHTML = "";
    el.youPile.innerHTML = "";
  }

  function updateCounts() {
    var yc = youDeck.length, cc = cpuDeck.length;
    el.youCount.textContent = yc;
    el.cpuCount.textContent = cc;
    var total = yc + cc;
    var pct = total > 0 ? (yc / total) * 100 : 50;
    el.bar.style.width = pct + "%";
  }

  function setMsg(text, isWar) {
    el.msg.textContent = text;
    el.msg.className = "msg" + (isWar ? " war" : "");
  }

  // ---- game logic ----
  // Add cards to bottom of a deck (winner picks them up)
  function awardTo(deck, cards) {
    for (var i = 0; i < cards.length; i++) deck.push(cards[i]);
  }

  // Play one battle round. Resolves wars internally by collecting all cards.
  // Returns when a winner is decided for this battle, or game ends mid-war.
  function playRound() {
    if (gameOver) return;
    if (youDeck.length === 0 || cpuDeck.length === 0) { finish(); return; }

    clearPiles();
    warPot = [];

    var yc = youDeck.shift();
    var cc = cpuDeck.shift();
    warPot.push(yc, cc);

    el.cpuPile.appendChild(cardFaceEl(cc, false));
    el.youPile.appendChild(cardFaceEl(yc, false));
    sFlip();

    if (yc.rank === cc.rank) {
      // WAR
      pendingWar = true;
      setMsg("WAR! Tie at " + rankText(yc.rank) + " — tap to battle", true);
      sWar();
      el.btn.textContent = "BATTLE!";
      updateCounts();
      // keep these two face-up cards on table; war resolves on next tap
    } else {
      resolveSimple(yc, cc);
    }
  }

  function resolveSimple(yc, cc) {
    var youWon = yc.rank > cc.rank;
    highlightWinner(youWon);
    if (youWon) {
      // winner's own card goes first, then loser's (order cosmetic)
      awardTo(youDeck, warPot);
      setMsg("You win the round! (" + rankText(yc.rank) + " beats " + rankText(cc.rank) + ")", false);
      sWin();
    } else {
      awardTo(cpuDeck, warPot);
      setMsg("CPU wins the round (" + rankText(cc.rank) + " beats " + rankText(yc.rank) + ")", false);
      sLose();
    }
    warPot = [];
    pendingWar = false;
    el.btn.textContent = "NEXT";
    updateCounts();
    checkEnd();
  }

  // Resolve a WAR triggered by the last face-up tie.
  // Each player puts up to 3 cards face down + 1 face up (if available).
  function resolveWar() {
    sWar();
    var faceDownCount = 3;

    // Determine how many face-down each can afford; each needs at least 1 card to flip.
    // If a player can't produce a face-up card, they lose the whole pot.
    var youDown = [];
    var cpuDown = [];

    // Lay face-down cards (as many as available, up to faceDownCount, but keep >=1 for the face-up)
    var i;
    for (i = 0; i < faceDownCount; i++) {
      if (youDeck.length > 1) youDown.push(youDeck.shift());
      else break;
    }
    for (i = 0; i < faceDownCount; i++) {
      if (cpuDeck.length > 1) cpuDown.push(cpuDeck.shift());
      else break;
    }

    // Add face-down cards to pot and render backs
    for (i = 0; i < youDown.length; i++) { warPot.push(youDown[i]); el.youPile.appendChild(cardBackEl()); }
    for (i = 0; i < cpuDown.length; i++) { warPot.push(cpuDown[i]); el.cpuPile.appendChild(cardBackEl()); }

    // Now each flips one face-up card if able
    var youHas = youDeck.length > 0;
    var cpuHas = cpuDeck.length > 0;

    if (!youHas && !cpuHas) {
      // Neither can flip — pot splits back? Edge case: decide by remaining counts.
      // Give pot to whoever still has cards; if both empty, the game ends by counts.
      pendingWar = false;
      finishByPot();
      return;
    }

    if (!youHas || !cpuHas) {
      // The player who cannot produce a war card loses the pot.
      var winnerIsYou = youHas;
      if (winnerIsYou) {
        var yf = youDeck.shift();
        warPot.push(yf);
        el.youPile.appendChild(cardFaceEl(yf, true));
      } else {
        var cf = cpuDeck.shift();
        warPot.push(cf);
        el.cpuPile.appendChild(cardFaceEl(cf, true));
      }
      awardWar(winnerIsYou);
      return;
    }

    // Both can flip a face-up war card
    var yc = youDeck.shift();
    var cc = cpuDeck.shift();
    warPot.push(yc, cc);
    el.cpuPile.appendChild(cardFaceEl(cc, false));
    el.youPile.appendChild(cardFaceEl(yc, false));
    sFlip();

    if (yc.rank === cc.rank) {
      // Another war chained
      var lastY = el.youPile.lastChild, lastC = el.cpuPile.lastChild;
      if (lastY) lastY.classList.add("win");
      if (lastC) lastC.classList.add("win");
      pendingWar = true;
      setMsg("DOUBLE WAR! Tie at " + rankText(yc.rank) + " — tap again", true);
      el.btn.textContent = "BATTLE!";
      updateCounts();
    } else {
      var youWon = yc.rank > cc.rank;
      var lastY2 = el.youPile.lastChild, lastC2 = el.cpuPile.lastChild;
      if (youWon && lastY2) lastY2.classList.add("win");
      if (!youWon && lastC2) lastC2.classList.add("win");
      awardWar(youWon);
    }
  }

  function awardWar(youWon) {
    if (youWon) {
      awardTo(youDeck, warPot);
      setMsg("You won the WAR! +" + warPot.length + " cards", false);
      sWin();
    } else {
      awardTo(cpuDeck, warPot);
      setMsg("CPU won the WAR (" + warPot.length + " cards)", false);
      sLose();
    }
    warPot = [];
    pendingWar = false;
    el.btn.textContent = "NEXT";
    updateCounts();
    checkEnd();
  }

  function highlightWinner(youWon) {
    var yCards = el.youPile.children;
    var cCards = el.cpuPile.children;
    if (youWon) {
      if (yCards.length) yCards[yCards.length - 1].classList.add("win");
    } else {
      if (cCards.length) cCards[cCards.length - 1].classList.add("win");
    }
  }

  function checkEnd() {
    if (youDeck.length === 0 || cpuDeck.length === 0) finish();
  }

  function finishByPot() {
    // Tie-break when both ran out mid-war: award pot to whoever had more cards.
    // (Rare edge case.) Put pot in the larger pile; if equal, split is impossible
    // since total is fixed — just give to player with cards, else CPU.
    if (youDeck.length >= cpuDeck.length) awardTo(youDeck, warPot);
    else awardTo(cpuDeck, warPot);
    warPot = [];
    updateCounts();
    finish();
  }

  function finish() {
    gameOver = true;
    pendingWar = false;
    // Total cards is always 52, so a player at 0 means the other holds all.
    var youWin = youDeck.length > cpuDeck.length;

    setMsg(youWin ? "★ YOU WIN THE WAR! ★" : "CPU conquered all 52 cards", false);
    el.btn.textContent = "PLAY AGAIN";
    el.btn.classList.add("over");
    sGameOver(youWin);
    updateCounts();
  }

  // ---- input ----
  function onTap() {
    var c = ac();
    if (c && c.state === "suspended") { c.resume(); }

    if (gameOver) {
      // restart
      el.btn.classList.remove("over");
      deal();
      clearPiles();
      updateCounts();
      setMsg("Tap PLAY to flip cards", false);
      el.btn.textContent = "PLAY";
      return;
    }

    if (pendingWar) {
      resolveWar();
      return;
    }

    playRound();
  }

  el.btn.addEventListener("click", onTap);
  // Prevent double-fire / scroll on touch
  document.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });

  // init
  deal();
  clearPiles();
  updateCounts();
  setMsg("Tap PLAY to flip cards", false);
})();
</script>
</body>
</html>
