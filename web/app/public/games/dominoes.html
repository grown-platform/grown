<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dominoes — vs CPU</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #14532d;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
  }
  header {
    padding: 10px 12px 8px;
    text-align: center;
    background: #0f3d22;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: .5px;
    font-weight: 700;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 12px;
    gap: 6px;
  }
  .topbar .stat {
    background: #155e35;
    border-radius: 8px;
    padding: 4px 8px;
    flex: 1;
    text-align: center;
    white-space: nowrap;
  }
  .topbar .stat b { display: block; font-size: 15px; }
  button.newgame {
    background: #f59e0b;
    color: #1c1917;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  button.newgame:active { background: #d97706; }

  .turn {
    text-align: center;
    font-size: 14px;
    padding: 6px 8px;
    min-height: 32px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .turn.you { color: #fde68a; }
  .turn.cpu { color: #93c5fd; }
  .turn.win { color: #86efac; font-size: 16px; }

  /* CPU hand (face down) */
  .cpu-hand {
    display: flex;
    justify-content: center;
    gap: 3px;
    padding: 4px 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .cpu-tile {
    width: 16px; height: 30px;
    background: #1e3a8a;
    border: 1px solid #1e40af;
    border-radius: 4px;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.08) 0 3px, transparent 3px 6px);
  }

  /* Board / line of play */
  .board-wrap {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    background: #0c3a1f;
    border-top: 2px solid #0a2e18;
    border-bottom: 2px solid #0a2e18;
    display: flex;
    align-items: center;
    min-height: 90px;
    touch-action: pan-x;
  }
  .board {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 0;
    margin: auto;
    min-width: min-content;
    flex-wrap: nowrap;
  }
  .board.empty-msg {
    color: #6ee7b7;
    font-style: italic;
    font-size: 13px;
    padding: 0 16px;
  }
  .end-label {
    font-size: 11px;
    color: #fbbf24;
    align-self: center;
    padding: 0 2px;
  }

  /* Played tiles on the line */
  .line-tile {
    display: flex;
    background: #faf7f0;
    border: 1px solid #1c1917;
    border-radius: 5px;
    margin: 2px;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
    flex-shrink: 0;
  }
  /* horizontal orientation: two square halves side by side */
  .line-tile.horiz { flex-direction: row; }
  .line-tile.horiz .half { width: 34px; height: 34px; }
  .line-tile.horiz .divider { width: 0; border-left: 1px solid #1c1917; }
  /* vertical orientation: stacked */
  .line-tile.vert { flex-direction: column; }
  .line-tile.vert .half { width: 34px; height: 34px; }
  .line-tile.vert .divider { height: 0; border-top: 1px solid #1c1917; }

  /* the open-end tap targets */
  .endplay {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 40px;
    align-self: stretch;
    color: #fef08a;
    font-weight: 700;
    font-size: 22px;
    cursor: pointer;
    border: 2px dashed #fbbf24;
    border-radius: 8px;
    margin: 2px;
    background: rgba(251,191,36,.12);
    padding: 4px 6px;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.55;} 50%{opacity:1;} }
  .endplay small { display:block; font-size:9px; color:#fde68a; font-weight:600; }

  /* Pip layout */
  .half {
    position: relative;
    background: #faf7f0;
  }
  .pip {
    position: absolute;
    width: 17%;
    height: 17%;
    background: #1c1917;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  /* Your hand */
  .hand-area {
    flex-shrink: 0;
    background: #0f3d22;
    padding: 8px 6px 12px;
    box-shadow: 0 -2px 6px rgba(0,0,0,.4);
  }
  .hand-label {
    text-align: center;
    font-size: 11px;
    color: #a7f3d0;
    margin-bottom: 4px;
    letter-spacing: .5px;
  }
  .hand {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 4px 6px 8px;
    touch-action: pan-x;
    justify-content: safe center;
  }
  .hand-tile {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #faf7f0;
    border: 1px solid #1c1917;
    border-radius: 6px;
    box-shadow: 0 2px 4px rgba(0,0,0,.4);
    cursor: pointer;
    transition: transform .1s;
  }
  .hand-tile .half { width: 40px; height: 40px; }
  .hand-tile .divider { height: 0; border-top: 1px solid #1c1917; }
  .hand-tile.playable { box-shadow: 0 0 0 2px #34d399, 0 2px 4px rgba(0,0,0,.4); }
  .hand-tile.dead { opacity: .45; }
  .hand-tile.selected { transform: translateY(-8px); box-shadow: 0 0 0 3px #f59e0b, 0 4px 8px rgba(0,0,0,.5); }

  .actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 4px;
    min-height: 36px;
    align-items: center;
  }
  .actions button {
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .actions button:active { background: #1d4ed8; }
  .actions button.pass { background: #6b7280; }
  .actions button:disabled { opacity: .4; cursor: default; }
  .hint {
    text-align:center; font-size:11px; color:#cbd5e1; margin-top:4px; min-height:14px;
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #1e293b;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    max-width: 320px;
    box-shadow: 0 8px 30px rgba(0,0,0,.6);
  }
  .modal h2 { margin: 0 0 8px; font-size: 22px; }
  .modal p { margin: 6px 0; font-size: 14px; color: #cbd5e1; }
  .modal button {
    margin-top: 16px;
    background: #f59e0b;
    color: #1c1917;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
  }

  /* Mode-select buttons (stacked, in the modal) */
  .mode-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .mode-btns button { margin-top: 0; min-width: 200px; }

  /* Privacy handoff overlay (2-player pass & play). A full-screen OPAQUE cover
     so the incoming player can't see the previous player's hand. Revealing
     requires a deliberate slide-all-the-way gesture, so an accidental tap can't
     expose the hand. z-index sits just below the injected top-right menu. */
  .handoff {
    position: fixed; inset: 0; z-index: 2147483640;
    background: #14532d;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .handoff.show { display: flex; }
  .handoff-card {
    text-align: center; display: flex; flex-direction: column;
    gap: 18px; align-items: center;
  }
  #dom_handoffTitle { font-size: 24px; font-weight: 700; color: #fde68a; }
  #dom_handoffSub { font-size: 14px; color: #d1fae5; max-width: 280px; line-height: 1.4; }
  .reveal-track {
    position: relative;
    width: min(320px, 78vw);
    height: 60px;
    border-radius: 30px;
    background: #0f3d22;
    border: 1px solid #155e35;
    overflow: hidden;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  .reveal-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 56px;
    background: #f59e0b;
    border-radius: 30px;
  }
  .reveal-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font: 600 14px system-ui, sans-serif;
    color: #a7f3d0;
    letter-spacing: 1px;
    pointer-events: none;
    padding-left: 40px;
  }
  .reveal-handle {
    position: absolute; left: 4px; top: 4px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #f59e0b; color: #1c1917;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45);
    touch-action: none;
  }
</style>

    <script>

      function item(label,fn){var b=document.createElement('button');b.textContent=label;css(b,'display:block;width:100%;text-align:left;margin:6px 0;padding:12px 14px;border:1px solid #243049;border-radius:10px;background:#16203a;color:#e8eefc;font:600 15px system-ui,sans-serif;cursor:pointer;touch-action:manipulation');b.onclick=fn;return b;}
      function openMenu(){if(isOpen)return;isOpen=true;hiEl.textContent='High score: '+(window.GrownGame.highScore()||'—');scrim.style.pointerEvents='auto';scrim.style.opacity='1';sheet.style.transform='translateY(0)';emit('grown:pause');}
      function closeMenu(){if(!isOpen)return;isOpen=false;scrim.style.opacity='0';scrim.style.pointerEvents='none';sheet.style.transform='translateY(-110%)';emit('grown:resume');}
      function doInstall(){if(!dp)return;var d=dp;dp=null;installItem.style.display='none';d.prompt();d.userChoice.finally(function(){});closeMenu();}
      function report(){var body='\n\n----\nGame: '+NAME+'\nURL: '+location.href+'\nDevice: '+navigator.userAgent;location.href='mailto:games@pick.haus?subject='+encodeURIComponent('Issue: '+NAME)+'&body='+encodeURIComponent(body);}
      function build(){

        css(btn,'position:fixed;right:calc(env(safe-area-inset-right,0px) + 10px);top:calc(env(safe-area-inset-top,0px) + 10px);z-index:2147483646;width:40px;height:40px;padding:0;border:none;border-radius:50%;background:rgba(15,23,42,.6);color:#fff;font-size:17px;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;touch-action:manipulation');
        btn.onclick=openMenu;document.body.appendChild(btn);
        scrim=document.createElement('div');css(scrim,'position:fixed;inset:0;z-index:2147483646;background:rgba(0,0,0,.55);opacity:0;transition:opacity .18s;pointer-events:none');scrim.onclick=closeMenu;document.body.appendChild(scrim);
        sheet=document.createElement('div');css(sheet,'position:fixed;left:0;right:0;top:0;z-index:2147483647;transform:translateY(-110%);transition:transform .22s;background:#0f172a;color:#e8eefc;border-bottom-left-radius:16px;border-bottom-right-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 16px;max-width:480px;margin:0 auto');document.body.appendChild(sheet);
        var h=document.createElement('div');css(h,'font-weight:700;font-size:17px;color:'+COLOR);h.textContent=NAME;sheet.appendChild(h);
        hiEl=document.createElement('div');css(hiEl,'font-size:13px;color:#9fb3d9;margin:2px 0 12px');sheet.appendChild(hiEl);

        installItem=item('\u2B07 Install app',doInstall);installItem.style.display=dp?'':'none';sheet.appendChild(installItem);

<body>
<header>
  <h1>🁫 Dominoes</h1>
  <div class="topbar">
    <div class="stat" id="cpuStat">CPU<b id="cpuCount">7</b></div>
    <div class="stat">Boneyard<b id="boneCount">14</b></div>
    <div class="stat" id="youStat">You<b id="youCount">7</b></div>
    <button class="newgame" id="newBtn">New Game</button>
  </div>
</header>

<div class="cpu-hand" id="cpuHand"></div>
<div class="turn you" id="turnInd">Your turn — pick a tile</div>

<div class="board-wrap" id="boardWrap">
  <div class="board empty-msg" id="board">Board is empty — play any tile to start.</div>
</div>

<div class="hand-area">
  <div class="hand-label" id="handLabel">YOUR HAND</div>
  <div class="hand" id="hand"></div>
  <div class="actions" id="actions"></div>
  <div class="hint" id="hint"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Game Over</h2>
    <p id="modalMsg"></p>
    <button id="modalBtn">New Game</button>
  </div>
</div>

<!-- Mode-select overlay (shown on load and from New Game) -->
<div class="overlay" id="modeOverlay">
  <div class="modal">
    <h2>🁫 Dominoes</h2>
    <p>Choose a mode</p>
    <div class="mode-btns">
      <button id="modeAi">🤖 vs Computer</button>
      <button id="modeTwo">👥 2 Players</button>
    </div>
  </div>
</div>

<!-- Privacy handoff overlay (2-player pass & play) -->
<div class="handoff" id="dom_handoff">
  <div class="handoff-card">
    <div id="dom_handoffTitle">Pass the device</div>
    <div id="dom_handoffSub"></div>
    <div id="dom_revealTrack" class="reveal-track">
      <div id="dom_revealFill" class="reveal-fill"></div>
      <div id="dom_revealText" class="reveal-text">slide to reveal</div>
      <div id="dom_revealHandle" class="reveal-handle">›</div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- Pip positions (fraction of half, x,y) ----------
  // 5 column-grid positions reused for all faces
  var P = {
    c:[0.5,0.5], tl:[0.27,0.27], tr:[0.73,0.27], bl:[0.27,0.73], br:[0.73,0.73],
    ml:[0.27,0.5], mr:[0.73,0.5]
  };
  var PIPMAP = {
    0:[], 1:[P.c], 2:[P.tl,P.br], 3:[P.tl,P.c,P.br],
    4:[P.tl,P.tr,P.bl,P.br], 5:[P.tl,P.tr,P.c,P.bl,P.br],
    6:[P.tl,P.tr,P.ml,P.mr,P.bl,P.br]
  };

  function makeHalf(n){
    var h = document.createElement('div');
    h.className = 'half';
    PIPMAP[n].forEach(function(pos){
      var p = document.createElement('div');
      p.className = 'pip';
      p.style.left = (pos[0]*100)+'%';
      p.style.top  = (pos[1]*100)+'%';
      h.appendChild(p);
    });
    return h;
  }

  // ---------- Audio ----------
  var actx = null;
  function beep(freq, dur, type, vol){
    try {
      if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state === 'suspended') actx.resume();
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = type||'sine'; o.frequency.value = freq;
      g.gain.value = vol||0.07;
      o.connect(g); g.connect(actx.destination);
      var t = actx.currentTime;
      o.start(t);
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (dur||0.12));
      o.stop(t + (dur||0.12));
    } catch(e){}
  }
  function sndPlace(){ beep(420,0.09,'triangle',0.09); }
  function sndDraw(){ beep(260,0.08,'sine',0.07); }
  function sndPass(){ beep(180,0.18,'sawtooth',0.06); }
  function sndWin(){ beep(523,0.12,'triangle',0.1); setTimeout(function(){beep(659,0.12,'triangle',0.1);},120); setTimeout(function(){beep(784,0.18,'triangle',0.1);},240); }
  function sndLose(){ beep(330,0.18,'sawtooth',0.08); setTimeout(function(){beep(220,0.25,'sawtooth',0.08);},160); }

  // ---------- Game state ----------
  // tile = {a, b}  (a,b are 0..6). Each unique unordered pair once.
  var youHand, cpuHand, boneyard, line; // line: array of {a,b} where adjacency: line[i].b === line[i+1].a
  var leftEnd, rightEnd; // open pip values
  var current; // 'you' | 'cpu'  (the active seat)
  var gameOver;
  var selectedIdx = -1; // selected tile index in the active hand
  var busy = false; // block input during CPU/animation/handoff

  // ---------- Mode + seat helpers ----------
  // mode 'ai' (DEFAULT): seat 'you' = human (bottom, face-up), seat 'cpu' = AI.
  // mode '2p': seat 'you' = Player 1, seat 'cpu' = Player 2 — both human. The
  // ACTIVE seat's tiles render face-up at the bottom; the other seat's tiles
  // render face-down (count) at the top, since the opponent's hand is secret.
  var mode = 'ai'; // 'ai' | '2p'  — default MUST stay 'ai'
  // Display name for a seat, used in labels/status/win text.
  function sideName(seat){
    if(mode === '2p') return seat === 'you' ? 'Player 1' : 'Player 2';
    return seat === 'you' ? 'You' : 'CPU';
  }
  function otherSeat(seat){ return seat === 'you' ? 'cpu' : 'you'; }
  function handOf(seat){ return seat === 'you' ? youHand : cpuHand; }
  // The hand shown face-up at the bottom: active seat's hand. The hand shown
  // face-down at the top: the inactive seat's hand.
  function activeHand(){ return handOf(current); }
  function inactiveHand(){ return handOf(otherSeat(current)); }
  // The hand the local human controls right now (the face-up bottom hand). In
  // 'ai' mode that's always 'you'; in '2p' it's whichever seat is active.
  function myHand(){ return mode === '2p' ? activeHand() : youHand; }
  // Is it the local human's turn to provide input? In 'ai' only when seat 'you'
  // is active; in '2p' the active seat is always the local human.
  function myInputTurn(){ return mode === '2p' ? true : current === 'you'; }

  var el = {
    cpuCount: document.getElementById('cpuCount'),
    boneCount: document.getElementById('boneCount'),
    youCount: document.getElementById('youCount'),
    cpuHand: document.getElementById('cpuHand'),
    turnInd: document.getElementById('turnInd'),
    board: document.getElementById('board'),
    boardWrap: document.getElementById('boardWrap'),
    hand: document.getElementById('hand'),
    actions: document.getElementById('actions'),
    hint: document.getElementById('hint'),
    overlay: document.getElementById('overlay'),
    modalTitle: document.getElementById('modalTitle'),
    modalMsg: document.getElementById('modalMsg'),
    modalBtn: document.getElementById('modalBtn'),
    newBtn: document.getElementById('newBtn'),
    modeOverlay: document.getElementById('modeOverlay'),
    handoff: document.getElementById('dom_handoff'),
    cpuCountLabel: document.getElementById('cpuStat'),
    youCountLabel: document.getElementById('youStat'),
    handLabel: document.getElementById('handLabel')
  };

  function buildDeck(){
    var d = [];
    for(var a=0;a<=6;a++){ for(var b=a;b<=6;b++){ d.push({a:a,b:b}); } }
    return d;
  }
  function shuffle(arr){
    for(var i=arr.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = arr[i]; arr[i]=arr[j]; arr[j]=t;
    }
    return arr;
  }

  function newGame(){
    var deck = shuffle(buildDeck());
    youHand = deck.slice(0,7);
    cpuHand = deck.slice(7,14);
    boneyard = deck.slice(14);
    line = [];
    leftEnd = rightEnd = null;
    gameOver = false;
    selectedIdx = -1;
    busy = false;
    el.overlay.classList.remove('show');

    // Determine first player: highest double, else highest tile. Whoever has it starts by playing it.
    var firstPlayer = decideFirst();
    current = firstPlayer;

    if(mode === '2p'){
      // Pass-and-play: gate the start so the first player sees their own hand,
      // then it's their turn (no auto-play — both seats are human).
      busy = true;
      render(); // renders from the (about-to-be-active) player's perspective; covered by handoff
      showHandoff(current, sideName(current) + ' goes first!', function(){
        busy = false;
        render();
        setHint(handHasPlay(activeHand()) ? sideName(current) + ': tap a highlighted tile.' : sideName(current) + ': draw from the boneyard.');
      });
      return;
    }

    render();
    if(current === 'cpu'){
      busy = true;
      setHint("CPU goes first…");
      setTimeout(cpuTurn, 700);
    } else {
      setHint("Your turn. Tap a green-highlighted tile.");
    }
  }

  function tilePipSum(t){ return t.a + t.b; }

  function decideFirst(){
    // Highest double held starts; if no doubles, highest pip sum.
    var best = null, bestOwner = null, bestKey = -1;
    function scan(hand, owner){
      hand.forEach(function(t){
        var isDouble = t.a === t.b;
        // doubles rank above non-doubles; within, higher value wins
        var key = isDouble ? (100 + t.a) : tilePipSum(t);
        if(key > bestKey){ bestKey = key; best = t; bestOwner = owner; }
      });
    }
    scan(youHand,'you'); scan(cpuHand,'cpu');
    return bestOwner || 'you';
  }

  // ---------- Matching logic ----------
  // Does a tile fit either open end? returns object describing placements.
  // When line empty, any tile fits.
  function tileFits(t){
    if(line.length === 0){ return { any:true, left:true, right:true }; }
    var fitsLeft  = (t.a === leftEnd  || t.b === leftEnd);
    var fitsRight = (t.a === rightEnd || t.b === rightEnd);
    return { any:false, left:fitsLeft, right:fitsRight };
  }
  function handHasPlay(hand){
    for(var i=0;i<hand.length;i++){
      var f = tileFits(hand[i]);
      if(f.any || f.left || f.right) return true;
    }
    return false;
  }

  // Place tile from a hand onto an end. side = 'left'|'right'. Returns true if placed.
  function placeTile(hand, idx, side){
    var t = hand[idx];
    if(line.length === 0){
      // orient so .a is the left-open value, .b right-open value (arbitrary)
      line.push({a:t.a, b:t.b});
      leftEnd = t.a; rightEnd = t.b;
      hand.splice(idx,1);
      return true;
    }
    if(side === 'left'){
      var match = leftEnd;
      // we attach tile to the left; the half touching the line must equal leftEnd,
      // outer half becomes new leftEnd. Stored {a:outer, b:inner} so b connects to line.
      var inner, outer;
      if(t.a === match){ inner = t.a; outer = t.b; }
      else if(t.b === match){ inner = t.b; outer = t.a; }
      else return false;
      line.unshift({a:outer, b:inner}); // b(inner)===old leftEnd
      leftEnd = outer;
    } else {
      var matchR = rightEnd;
      var innerR, outerR;
      if(t.a === matchR){ innerR = t.a; outerR = t.b; }
      else if(t.b === matchR){ innerR = t.b; outerR = t.a; }
      else return false;
      line.push({a:innerR, b:outerR}); // a(inner)===old rightEnd
      rightEnd = outerR;
    }
    hand.splice(idx,1);
    return true;
  }

  // ---------- Rendering ----------
  function render(){
    // Topbar counts: the top stat shows the OPPONENT (inactive seat), the bottom
    // stat shows the active player whose tiles are face-up. In 'ai' mode the
    // active player is always 'you', so this matches the original layout exactly.
    var topSeat = (mode === '2p') ? otherSeat(current) : 'cpu';
    var botSeat = (mode === '2p') ? current : 'you';
    el.cpuCount.textContent = handOf(topSeat).length;
    el.youCount.textContent = handOf(botSeat).length;
    el.boneCount.textContent = boneyard.length;
    if(el.cpuCountLabel) el.cpuCountLabel.firstChild.textContent = sideName(topSeat);
    if(el.youCountLabel) el.youCountLabel.firstChild.textContent = sideName(botSeat);
    if(el.handLabel) el.handLabel.textContent = (mode === '2p' ? sideName(current).toUpperCase() + "'S HAND" : 'YOUR HAND');
    renderCpuHand();
    renderBoard();
    renderHand();
    renderActions();
  }

  // Face-down backs for the inactive seat (the opponent's secret hand).
  function renderCpuHand(){
    el.cpuHand.innerHTML = '';
    var n = (mode === '2p') ? inactiveHand().length : cpuHand.length;
    for(var i=0;i<n;i++){
      var d = document.createElement('div');
      d.className = 'cpu-tile';
      el.cpuHand.appendChild(d);
    }
  }

  function renderBoard(){
    el.board.innerHTML = '';
    if(line.length === 0){
      el.board.className = 'board empty-msg';
      el.board.textContent = 'Board is empty — play any tile to start.';
      // if it's your turn and a tile is selected, allow play (handled via tile tap auto-start)
      return;
    }
    el.board.className = 'board';

    var canPlayLeft  = (!busy && myInputTurn() && selectedIdx>=0 && tileFits(myHand()[selectedIdx]).left);
    var canPlayRight = (!busy && myInputTurn() && selectedIdx>=0 && tileFits(myHand()[selectedIdx]).right);

    // Left end tap zone
    if(canPlayLeft){
      el.board.appendChild(makeEndZone('left', leftEnd));
    }

    for(var i=0;i<line.length;i++){
      el.board.appendChild(makeLineTile(line[i], i));
    }

    if(canPlayRight){
      el.board.appendChild(makeEndZone('right', rightEnd));
    }
  }

  function makeEndZone(side, val){
    var z = document.createElement('div');
    z.className = 'endplay';
    z.innerHTML = '▸<small>play '+val+'</small>';
    if(side==='left') z.innerHTML = '◂<small>play '+val+'</small>';
    z.addEventListener('click', function(){ youPlay(side); });
    return z;
  }

  function makeLineTile(t, i){
    // A double is drawn vertical (perpendicular); non-double horizontal along the line.
    var isDouble = (t.a === t.b);
    var wrap = document.createElement('div');
    wrap.className = 'line-tile ' + (isDouble ? 'vert' : 'horiz');
    var h1 = makeHalf(t.a);
    var div = document.createElement('div'); div.className='divider';
    var h2 = makeHalf(t.b);
    wrap.appendChild(h1); wrap.appendChild(div); wrap.appendChild(h2);
    return wrap;
  }

  function renderHand(){
    el.hand.innerHTML = '';
    myHand().forEach(function(t, idx){
      var wrap = document.createElement('div');
      wrap.className = 'hand-tile';
      var fits = tileFits(t);
      var playable = (myInputTurn() && !busy && !gameOver && (fits.any || fits.left || fits.right));
      if(myInputTurn() && !busy && !gameOver){
        wrap.classList.add(playable ? 'playable' : 'dead');
      }
      if(idx === selectedIdx) wrap.classList.add('selected');
      var h1 = makeHalf(t.a);
      var div = document.createElement('div'); div.className='divider';
      var h2 = makeHalf(t.b);
      wrap.appendChild(h1); wrap.appendChild(div); wrap.appendChild(h2);
      wrap.addEventListener('click', function(){ onTileTap(idx); });
      el.hand.appendChild(wrap);
    });
  }

  function renderActions(){
    el.actions.innerHTML = '';
    if(gameOver || !myInputTurn() || busy) return;
    var canPlay = handHasPlay(myHand());
    if(!canPlay){
      if(boneyard.length > 0){
        var b = document.createElement('button');
        b.textContent = 'Draw from boneyard';
        b.addEventListener('click', youDraw);
        el.actions.appendChild(b);
      } else {
        var p = document.createElement('button');
        p.className = 'pass';
        p.textContent = 'Pass';
        p.addEventListener('click', youPass);
        el.actions.appendChild(p);
      }
    }
  }

  function setHint(msg){ el.hint.textContent = msg || ''; }
  function setTurnIndicator(){
    if(gameOver) return;
    if(mode === '2p'){
      // The active seat is always the face-up bottom player in 2p.
      el.turnInd.className = 'turn you';
      el.turnInd.textContent = sideName(current) + "'s turn";
    } else if(current === 'you'){
      el.turnInd.className = 'turn you';
      el.turnInd.textContent = 'Your turn';
    } else {
      el.turnInd.className = 'turn cpu';
      el.turnInd.textContent = "CPU's turn…";
    }
  }

  // ---------- Player actions ----------
  function onTileTap(idx){
    if(busy || gameOver || !myInputTurn()) return;
    var t = myHand()[idx];
    var fits = tileFits(t);
    if(!(fits.any || fits.left || fits.right)){
      // not playable
      setHint("That tile doesn't fit either end.");
      beep(140,0.12,'sawtooth',0.05);
      return;
    }
    // select / toggle
    if(selectedIdx === idx){ selectedIdx = -1; }
    else { selectedIdx = idx; }

    if(selectedIdx >= 0){
      if(fits.any){
        // first tile of the game — auto place
        doYouPlace('right');
        return;
      }
      if(fits.left && fits.right){
        setHint('Tap an end (◂ or ▸) to place this tile.');
      } else if(fits.left || fits.right){
        // only one end fits — auto place
        doYouPlace(fits.left ? 'left' : 'right');
        return;
      }
    } else {
      setHint('');
    }
    render();
  }

  function youPlay(side){
    if(busy || gameOver || !myInputTurn() || selectedIdx < 0) return;
    doYouPlace(side);
  }

  function doYouPlace(side){
    var idx = selectedIdx;
    if(idx < 0) return;
    var ok = placeTile(myHand(), idx, side);
    if(!ok){ setHint("Can't place there."); return; }
    selectedIdx = -1;
    sndPlace();
    setHint('');
    render();
    scrollEnd(side);
    if(checkWin(current)) return;
    endTurn();
  }

  function youDraw(){
    if(busy || gameOver || !myInputTurn()) return;
    if(boneyard.length === 0) return;
    var t = boneyard.pop();
    myHand().push(t);
    sndDraw();
    render();
    var who = (mode === '2p') ? sideName(current) + ': you' : 'You';
    if(handHasPlay(myHand())){
      setHint(who + ' drew a tile that can be played. Tap a highlighted tile.');
    } else if(boneyard.length === 0){
      setHint('No plays left — you must pass.');
    } else {
      setHint('Still no play — keep drawing.');
    }
  }

  function youPass(){
    if(busy || gameOver || !myInputTurn()) return;
    sndPass();
    setHint(sideName(current) + ' passed.');
    endTurn();
  }

  // ---------- CPU ----------
  function cpuTurn(){
    if(gameOver) return;
    busy = true;
    setTurnIndicator();
    setHint('CPU is thinking…');
    render();

    // Draw until CPU can play (or boneyard empty)
    var drewAny = false;
    while(!handHasPlay(cpuHand) && boneyard.length > 0){
      cpuHand.push(boneyard.pop());
      drewAny = true;
    }
    if(drewAny){ sndDraw(); render(); }

    if(!handHasPlay(cpuHand)){
      // CPU passes
      sndPass();
      setHint('CPU passed.');
      busy = false;
      endTurn();
      return;
    }

    var move = chooseCpuMove();
    setTimeout(function(){
      placeTile(cpuHand, move.idx, move.side);
      sndPlace();
      render();
      scrollEnd(move.side);
      if(checkWin('cpu')){ return; }
      busy = false;
      endTurn();
    }, 450);
  }

  function chooseCpuMove(){
    // Gather legal moves; prefer playing doubles early and highest-pip tiles to shed points.
    var moves = [];
    for(var i=0;i<cpuHand.length;i++){
      var t = cpuHand[i];
      var f = tileFits(t);
      if(f.any){ moves.push({idx:i, side:'right', score: tilePipSum(t) + (t.a===t.b?5:0)}); continue; }
      if(f.left)  moves.push({idx:i, side:'left',  score: tilePipSum(t) + (t.a===t.b?3:0)});
      if(f.right) moves.push({idx:i, side:'right', score: tilePipSum(t) + (t.a===t.b?3:0)});
    }
    // pick highest score (sheds most pips; slight double preference)
    moves.sort(function(a,b){ return b.score - a.score; });
    return moves[0];
  }

  // ---------- Turn / end conditions ----------
  function endTurn(){
    if(gameOver) return;
    // Check blocked: neither player can play AND boneyard empty
    if(boneyard.length === 0 && !handHasPlay(youHand) && !handHasPlay(cpuHand)){
      return endBlocked();
    }

    // 2-player pass & play: the turn passes between two humans. Lock input
    // immediately so a fast tap can't act for the wrong player, advance the
    // active seat, then cover everything with the slide-to-reveal privacy
    // overlay. Only re-render for the new active player AFTER they finish the
    // slide — the previous player's hand is never exposed during the handoff.
    if(mode === '2p'){
      busy = true;          // input lock during the brief pre-overlay window
      selectedIdx = -1;
      current = otherSeat(current);
      showHandoff(current, sideName(current) + ', your turn!', function(){
        busy = false;
        setTurnIndicator();
        render(); // first render from the NEW active player's perspective
        if(handHasPlay(activeHand())){
          setHint(sideName(current) + ': tap a highlighted tile.');
        } else if(boneyard.length > 0){
          setHint(sideName(current) + ': no play — draw from the boneyard.');
        } else {
          setHint(sideName(current) + ': no play and boneyard empty — pass.');
        }
      });
      return;
    }

    current = (current === 'you') ? 'cpu' : 'you';
    selectedIdx = -1;
    setTurnIndicator();
    render();
    if(current === 'cpu'){
      busy = true;
      setTimeout(cpuTurn, 600);
    } else {
      busy = false;
      if(handHasPlay(youHand)){
        setHint('Your turn — tap a highlighted tile.');
      } else if(boneyard.length > 0){
        setHint('No play — draw from the boneyard.');
      } else {
        setHint('No play and boneyard empty — pass.');
      }
    }
  }

  function checkWin(who){
    var hand = (who==='you') ? youHand : cpuHand;
    if(hand.length === 0){
      gameOver = true;
      busy = true;
      var loser = otherSeat(who);
      var loserPts = handOf(loser).reduce(function(s,t){return s+tilePipSum(t);},0);
      if(mode === '2p'){
        finish(sideName(who) + ' Wins! 🎉',
               sideName(who) + ' played all their tiles. ' + sideName(loser) + ' held ' + loserPts + ' pips.',
               who === 'you');
      } else if(who === 'you'){
        finish('You Win! 🎉', 'You played all your tiles. CPU held ' + loserPts + ' pips.', true);
      } else {
        var youPts = youHand.reduce(function(s,t){return s+tilePipSum(t);},0);
        finish('CPU Wins', 'CPU played all its tiles. You held ' + youPts + ' pips.', false);
      }
      return true;
    }
    return false;
  }

  function endBlocked(){
    gameOver = true;
    busy = true;
    var youPts = youHand.reduce(function(s,t){return s+tilePipSum(t);},0);
    var cpuPts = cpuHand.reduce(function(s,t){return s+tilePipSum(t);},0);
    var msg = 'Board blocked! Lowest pip count wins.\n' +
              sideName('you') + ': ' + youPts + ' pips • ' + sideName('cpu') + ': ' + cpuPts + ' pips.';
    if(youPts < cpuPts){
      finish(sideName('you') + ' Win' + (mode==='2p'?'s':'') + '! 🎉', msg, true);
    } else if(cpuPts < youPts){
      finish(mode === '2p' ? sideName('cpu') + ' Wins! 🎉' : 'CPU Wins', msg, false);
    } else {
      finish("It's a Tie!", msg, null);
    }
  }

  function finish(title, msg, youWon){
    setTurnIndicatorWin(title);
    render();
    el.modalTitle.textContent = title;
    el.modalMsg.textContent = msg;
    el.overlay.classList.add('show');
    if(youWon === true) sndWin();
    else if(youWon === false) sndLose();
    else beep(440,0.2,'sine',0.08);
  }
  function setTurnIndicatorWin(title){
    el.turnInd.className = 'turn win';
    el.turnInd.textContent = title;
  }

  // ---------- Misc ----------
  function scrollEnd(side){
    // After placing, scroll board to the affected end so it's visible.
    requestAnimationFrame(function(){
      if(side === 'left'){ el.boardWrap.scrollLeft = 0; }
      else { el.boardWrap.scrollLeft = el.boardWrap.scrollWidth; }
    });
  }

  // ---------- Privacy handoff (2-player pass & play) ----------
  // Full-screen OPAQUE overlay between the two humans. Revealing the next
  // player's hand requires a deliberate slide-all-the-way gesture, so the hand
  // is never exposed by an accidental tap when handing over the device.
  var slideMove = null, slideUp = null; // active window listeners (cleaned up on reveal)
  function showHandoff(toSeat, subText, cb){
    document.getElementById('dom_handoffTitle').textContent = 'Pass to ' + sideName(toSeat);
    document.getElementById('dom_handoffSub').textContent = subText || '';
    el.handoff.classList.add('show');
    initSlider(function(){
      el.handoff.classList.remove('show');
      cb();
    });
  }

  function initSlider(onReveal){
    var track  = document.getElementById('dom_revealTrack');
    var handle = document.getElementById('dom_revealHandle');
    var fill   = document.getElementById('dom_revealFill');
    var text   = document.getElementById('dom_revealText');
    var dragging = false, done = false, grabDX = 0, x = 0, maxX = 0;

    function layout(){ maxX = Math.max(0, track.clientWidth - handle.offsetWidth - 8); }
    function paint(px){
      x = Math.max(0, Math.min(maxX, px));
      handle.style.left = (4 + x) + 'px';
      fill.style.width  = (handle.offsetWidth + 4 + x) + 'px';
      text.style.opacity = maxX ? String(Math.max(0, 1 - x / maxX)) : '1';
    }
    function animate(on){
      handle.style.transition = on ? 'left .2s' : '';
      fill.style.transition   = on ? 'width .2s' : '';
    }
    function cleanup(){
      window.removeEventListener('pointermove', slideMove);
      window.removeEventListener('pointerup', slideUp);
      window.removeEventListener('pointercancel', slideUp);
      slideMove = slideUp = null;
    }
    function reset(){
      animate(true); paint(0);
      setTimeout(function(){ animate(false); }, 210);
    }
    function complete(){
      done = true;
      animate(true); paint(maxX);
      cleanup();
      setTimeout(onReveal, 190);
    }
    function ptX(e){ return e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0); }

    function down(e){
      if(done) return;
      layout();
      dragging = true;
      animate(false);
      grabDX = ptX(e) - x;
      e.preventDefault();
    }
    slideMove = function(e){
      if(!dragging || done) return;
      e.preventDefault();
      paint(ptX(e) - grabDX);
    };
    slideUp = function(){
      if(!dragging || done) return;
      dragging = false;
      if(x >= maxX - 4) complete(); else reset();
    };

    // Reset any prior state and (re)wire fresh listeners for this handoff.
    cleanup();
    done = false; dragging = false;
    layout(); animate(false); paint(0); text.style.opacity = '1';
    track.onpointerdown = down;
    window.addEventListener('pointermove', slideMove, { passive: false });
    window.addEventListener('pointerup', slideUp);
    window.addEventListener('pointercancel', slideUp);
  }

  // ---------- Mode selection ----------
  function showModeSelect(){ el.modeOverlay.classList.add('show'); }
  function startMode(m){
    mode = m;
    el.modeOverlay.classList.remove('show');
    el.handoff.classList.remove('show');
    newGame();
  }

  // Prevent double-tap zoom / pinch while keeping scroll
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
  var lastTouch = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if(now - lastTouch < 300){ e.preventDefault(); }
    lastTouch = now;
  }, {passive:false});

  // "New Game" returns to the mode picker so you can switch AI / 2-player.
  el.newBtn.addEventListener('click', showModeSelect);
  // "Play Again" from the game-over modal restarts the SAME mode.
  el.modalBtn.addEventListener('click', function(){ el.overlay.classList.remove('show'); newGame(); });
  document.getElementById('modeAi').addEventListener('click', function(){ startMode('ai'); });
  document.getElementById('modeTwo').addEventListener('click', function(){ startMode('2p'); });

  // unlock audio on first interaction
  document.addEventListener('touchstart', function unlock(){
    try{ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){}
    document.removeEventListener('touchstart', unlock);
  }, {once:true});
  document.addEventListener('mousedown', function unlockM(){
    try{ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){}
    document.removeEventListener('mousedown', unlockM);
  }, {once:true});

  // Deal an initial (idle) vs-CPU game behind the picker, then ask for a mode.
  // Default mode stays 'ai'; picking a mode (re)deals via startMode → newGame.
  newGame();
  showModeSelect();
})();
</script>
</body>
</html>
