syntax = "proto3";

package grown.v1;

import "google/api/annotations.proto";

option go_package = "code.pick.haus/grown/grown/gen/go/grown/v1;grownv1";

// CalendarService manages a per-org event calendar.
service CalendarService {
  // ListEvents returns events overlapping [time_min, time_max] (RFC3339).
  // Recurring events are expanded into individual instances server-side.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse) {
    option (google.api.http) = {
      get: "/api/v1/calendar/events"
    };
  }

  rpc CreateEvent(CreateEventRequest) returns (Event) {
    option (google.api.http) = {
      post: "/api/v1/calendar/events"
      body: "*"
    };
  }

  rpc GetEvent(GetEventRequest) returns (Event) {
    option (google.api.http) = {
      get: "/api/v1/calendar/events/{id}"
    };
  }

  rpc UpdateEvent(UpdateEventRequest) returns (Event) {
    option (google.api.http) = {
      patch: "/api/v1/calendar/events/{id}"
      body: "*"
    };
  }

  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse) {
    option (google.api.http) = {
      delete: "/api/v1/calendar/events/{id}"
    };
  }

  // AddAttendee adds an attendee to an event (organizer only).
  rpc AddAttendee(AddAttendeeRequest) returns (Attendee) {
    option (google.api.http) = {
      post: "/api/v1/calendar/events/{event_id}/attendees"
      body: "*"
    };
  }

  // ListAttendees returns all attendees and their RSVP status for an event.
  rpc ListAttendees(ListAttendeesRequest) returns (ListAttendeesResponse) {
    option (google.api.http) = {
      get: "/api/v1/calendar/events/{event_id}/attendees"
    };
  }

  // RemoveAttendee removes an attendee from an event (organizer only).
  rpc RemoveAttendee(RemoveAttendeeRequest) returns (RemoveAttendeeResponse) {
    option (google.api.http) = {
      delete: "/api/v1/calendar/events/{event_id}/attendees/{email}"
    };
  }

  // SetRSVP lets an attendee set their own response status.
  rpc SetRSVP(SetRSVPRequest) returns (Attendee) {
    option (google.api.http) = {
      patch: "/api/v1/calendar/events/{event_id}/attendees/rsvp"
      body: "*"
    };
  }
}

// EditScope controls whether an update/delete applies to a single recurring
// occurrence or to the entire series.
enum EditScope {
  EDIT_SCOPE_UNSPECIFIED = 0;
  // Modify/delete only this occurrence (creates an exception override row).
  EDIT_SCOPE_THIS_EVENT = 1;
  // Modify/delete the master event and all future occurrences.
  EDIT_SCOPE_ALL_EVENTS = 2;
}

message Event {
  string id = 1;
  string org_id = 2;
  string owner_id = 3;
  string title = 4;
  string description = 5;
  string location = 6;
  string start_at = 7;   // RFC3339
  string end_at = 8;     // RFC3339
  bool all_day = 9;
  string color = 10;
  // RRULE-subset string; empty means the event does not repeat.
  string recurrence = 11;
  string created_at = 12;
  string updated_at = 13;
  // Attendee email addresses (legacy flat list — populated when no attendees
  // table rows exist; prefer the ListAttendees RPC for full RSVP data).
  repeated string attendees = 14;
  // For expanded recurring instances: the id of the stored master event.
  // Empty for normal (non-recurring) events.
  string recurring_event_id = 15;
  // item_type: "event" | "task" | "out_of_office" | "focus_time"
  string item_type = 16;
  // reminders: minutes-before-start list (e.g. [0, 10, 30]).
  repeated int32 reminders = 17;
  // status: "busy" | "free"
  string status = 18;
  // visibility: "default" | "public" | "private"
  string visibility = 19;
  // task_done: completion flag (only meaningful when item_type == "task").
  bool task_done = 20;
  // For exception overrides: the original computed start of this occurrence.
  string original_start = 21;
  // recurrence_parent_id is set when this row is an exception override for a
  // specific occurrence of a recurring series.
  string recurrence_parent_id = 22;
}

// Attendee represents a single guest on an event.
message Attendee {
  string event_id = 1;
  string email = 2;
  // response_status: needs_action | accepted | declined | tentative
  string response_status = 3;
  bool optional = 4;
  string created_at = 5;
}

message ListEventsRequest {
  string time_min = 1; // RFC3339
  string time_max = 2; // RFC3339
  // item_type filter; empty means return all types.
  string item_type = 3;
}

message ListEventsResponse {
  repeated Event events = 1;
}

message CreateEventRequest {
  string title = 1;
  string description = 2;
  string location = 3;
  string start_at = 4;
  string end_at = 5;
  bool all_day = 6;
  string color = 7;
  string recurrence = 8;
  repeated string attendees = 9;
  // item_type: "event" | "task" | "out_of_office" | "focus_time" (default: "event")
  string item_type = 10;
  repeated int32 reminders = 11;
  string status = 12;
  string visibility = 13;
  bool task_done = 14;
}

message GetEventRequest {
  string id = 1;
}

message UpdateEventRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string location = 4;
  string start_at = 5;
  string end_at = 6;
  bool all_day = 7;
  string color = 8;
  string recurrence = 9;
  repeated string attendees = 10;
  string item_type = 11;
  repeated int32 reminders = 12;
  string status = 13;
  string visibility = 14;
  bool task_done = 15;
  // scope controls whether this update applies to a single occurrence or the
  // whole series. Only meaningful when id refers to a recurring master; for
  // non-recurring events this field is ignored. Defaults to ALL_EVENTS when
  // unspecified for backwards compatibility.
  EditScope scope = 16;
  // original_start is required when scope=THIS_EVENT: the RFC3339 timestamp of
  // the specific occurrence being overridden (the start_at the expander would
  // have produced for that instance).
  string original_start = 17;
}

message DeleteEventRequest {
  string id = 1;
  // scope and original_start have the same semantics as UpdateEventRequest.
  EditScope scope = 2;
  string original_start = 3;
}

message DeleteEventResponse {}

// ---- Attendee RPCs ----

message AddAttendeeRequest {
  string event_id = 1;
  string email = 2;
  bool optional = 3;
}

message ListAttendeesRequest {
  string event_id = 1;
}

message ListAttendeesResponse {
  repeated Attendee attendees = 1;
}

message RemoveAttendeeRequest {
  string event_id = 1;
  string email = 2;
}

message RemoveAttendeeResponse {}

message SetRSVPRequest {
  string event_id = 1;
  // response_status: accepted | declined | tentative | needs_action
  string response_status = 2;
}
