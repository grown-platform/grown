syntax = "proto3";

package grown.v1;

import "google/api/annotations.proto";

option go_package = "code.pick.haus/grown/grown/gen/go/grown/v1;grownv1";

// BooksService manages a per-org ebook library (Play Books-style). Book files
// (epub/pdf/mobi/txt/cbz) and cover images live in the blob store; their
// metadata lives in Postgres. The raw file upload/download and cover endpoints
// are served over plain HTTP (see internal/books/files.go), not gRPC.
service BooksService {
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse) {
    option (google.api.http) = {
      get: "/api/v1/books"
    };
  }

  rpc GetBook(GetBookRequest) returns (Book) {
    option (google.api.http) = {
      get: "/api/v1/books/{id}"
    };
  }

  rpc CreateBook(CreateBookRequest) returns (Book) {
    option (google.api.http) = {
      post: "/api/v1/books"
      body: "*"
    };
  }

  rpc UpdateBook(UpdateBookRequest) returns (Book) {
    option (google.api.http) = {
      patch: "/api/v1/books/{id}"
      body: "*"
    };
  }

  rpc DeleteBook(DeleteBookRequest) returns (DeleteBookResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/{id}"
    };
  }

  // UpdateBookProgress records reading position + state (last read page/locator,
  // finished flag). Separate from UpdateBook so the reader can checkpoint
  // frequently without touching library metadata.
  rpc UpdateBookProgress(UpdateBookProgressRequest) returns (Book) {
    option (google.api.http) = {
      post: "/api/v1/books/{id}/progress"
      body: "*"
    };
  }

  // --- Per-user reading progress (separate from the shared book record) ---

  // SetProgress upserts the calling user's reading position for a book.
  rpc SetProgress(SetProgressRequest) returns (BookProgress) {
    option (google.api.http) = {
      put: "/api/v1/books/{book_id}/reading-progress"
      body: "*"
    };
  }

  // GetProgress returns the calling user's reading position for a book.
  rpc GetProgress(GetProgressRequest) returns (BookProgress) {
    option (google.api.http) = {
      get: "/api/v1/books/{book_id}/reading-progress"
    };
  }

  // --- Bookmarks ---

  rpc AddBookmark(AddBookmarkRequest) returns (Bookmark) {
    option (google.api.http) = {
      post: "/api/v1/books/{book_id}/bookmarks"
      body: "*"
    };
  }

  rpc ListBookmarks(ListBookmarksRequest) returns (ListBookmarksResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/{book_id}/bookmarks"
    };
  }

  rpc DeleteBookmark(DeleteBookmarkRequest) returns (DeleteBookmarkResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/{book_id}/bookmarks/{id}"
    };
  }

  // --- Highlights / annotations ---

  rpc AddHighlight(AddHighlightRequest) returns (Highlight) {
    option (google.api.http) = {
      post: "/api/v1/books/{book_id}/highlights"
      body: "*"
    };
  }

  rpc ListHighlights(ListHighlightsRequest) returns (ListHighlightsResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/{book_id}/highlights"
    };
  }

  rpc DeleteHighlight(DeleteHighlightRequest) returns (DeleteHighlightResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/{book_id}/highlights/{id}"
    };
  }

  // --- Shelves / collections ---

  rpc CreateShelf(CreateShelfRequest) returns (Shelf) {
    option (google.api.http) = {
      post: "/api/v1/books/shelves"
      body: "*"
    };
  }

  rpc ListShelves(ListShelvesRequest) returns (ListShelvesResponse) {
    option (google.api.http) = {
      get: "/api/v1/books/shelves"
    };
  }

  rpc DeleteShelf(DeleteShelfRequest) returns (DeleteShelfResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/shelves/{id}"
    };
  }

  rpc AddToShelf(AddToShelfRequest) returns (AddToShelfResponse) {
    option (google.api.http) = {
      post: "/api/v1/books/shelves/{shelf_id}/items"
      body: "*"
    };
  }

  rpc RemoveFromShelf(RemoveFromShelfRequest) returns (RemoveFromShelfResponse) {
    option (google.api.http) = {
      delete: "/api/v1/books/shelves/{shelf_id}/items/{book_id}"
    };
  }
}

// Book mirrors a grown.books row. Per spec the core message is named "Book";
// all request/response messages carry the Book* prefix to avoid namespace
// collisions across the shared grown.v1 package.
message Book {
  string id = 1;
  string org_id = 2;
  string owner_id = 3;
  string title = 4;
  string author = 5;
  // format is one of: epub, pdf, mobi, txt, cbz.
  string format = 6;
  string description = 7;
  // file_name is the original uploaded filename.
  string file_name = 8;
  // content_type is the MIME type of the book file.
  string content_type = 9;
  // size_bytes is the size of the book file in the blob store.
  int64 size_bytes = 10;
  // has_cover is true when a cover image is present (fetch via the cover URL).
  bool has_cover = 11;
  bool starred = 12;
  bool finished = 13;
  // last_location is a reader-defined position marker (page number for pdf/cbz,
  // text offset for txt/epub). Opaque to the backend.
  string last_location = 14;
  // progress_percent is 0-100, a coarse reading-progress indicator.
  int32 progress_percent = 15;
  string created_at = 16;
  string updated_at = 17;
}

message ListBooksRequest {
  // Optional: filter to books belonging to this shelf (UUID). Empty = all books.
  string shelf_id = 1;
}

message ListBooksResponse {
  repeated Book books = 1;
}

message GetBookRequest {
  string id = 1;
}

// CreateBookRequest creates a metadata-only book row. The file bytes are
// attached separately via the raw upload endpoint
// (POST /api/v1/books/{id}/file). Format must be one of the supported values.
message CreateBookRequest {
  string title = 1;
  string author = 2;
  string format = 3;
  string description = 4;
}

message UpdateBookRequest {
  string id = 1;
  string title = 2;
  string author = 3;
  string description = 4;
  bool starred = 5;
}

message DeleteBookRequest {
  string id = 1;
}

message DeleteBookResponse {}

message UpdateBookProgressRequest {
  string id = 1;
  string last_location = 2;
  int32 progress_percent = 3;
  bool finished = 4;
}

// BookProgress is the per-user reading position for a specific book.
message BookProgress {
  string user_id = 1;
  string book_id = 2;
  // locator is a reader-defined opaque position string (chapter index, CFI, etc.).
  string locator = 3;
  // percent is 0-100.
  int32 percent = 4;
  string updated_at = 5;
}

message SetProgressRequest {
  string book_id = 1;
  string locator = 2;
  int32 percent = 3;
}

message GetProgressRequest {
  string book_id = 1;
}

// Bookmark is a named position marker within a book.
message Bookmark {
  string id = 1;
  string org_id = 2;
  string user_id = 3;
  string book_id = 4;
  string locator = 5;
  string label = 6;
  string created_at = 7;
}

message AddBookmarkRequest {
  string book_id = 1;
  string locator = 2;
  string label = 3;
}

message ListBookmarksRequest {
  string book_id = 1;
}

message ListBookmarksResponse {
  repeated Bookmark bookmarks = 1;
}

message DeleteBookmarkRequest {
  string book_id = 1;
  string id = 2;
}

message DeleteBookmarkResponse {}

// Highlight is a text passage with optional note and color.
message Highlight {
  string id = 1;
  string org_id = 2;
  string user_id = 3;
  string book_id = 4;
  string locator = 5;
  string selected_text = 6;
  string note = 7;
  // color is one of: yellow, green, blue, pink.
  string color = 8;
  string created_at = 9;
}

message AddHighlightRequest {
  string book_id = 1;
  string locator = 2;
  string selected_text = 3;
  string note = 4;
  string color = 5;
}

message ListHighlightsRequest {
  string book_id = 1;
}

message ListHighlightsResponse {
  repeated Highlight highlights = 1;
}

message DeleteHighlightRequest {
  string book_id = 1;
  string id = 2;
}

message DeleteHighlightResponse {}

// Shelf is a named collection of books owned by a user.
message Shelf {
  string id = 1;
  string org_id = 2;
  string owner_user_id = 3;
  string name = 4;
  string created_at = 5;
}

message CreateShelfRequest {
  string name = 1;
}

message ListShelvesRequest {}

message ListShelvesResponse {
  repeated Shelf shelves = 1;
}

message DeleteShelfRequest {
  string id = 1;
}

message DeleteShelfResponse {}

message AddToShelfRequest {
  string shelf_id = 1;
  string book_id = 2;
}

message AddToShelfResponse {}

message RemoveFromShelfRequest {
  string shelf_id = 1;
  string book_id = 2;
}

message RemoveFromShelfResponse {}
