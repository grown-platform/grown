version: v2
managed:
  enabled: true
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - remote: buf.build/grpc-ecosystem/gateway
    out: gen/go
    opt:
      - paths=source_relative
      # generate gateway handlers even for RPCs without google.api.http annotations
      - generate_unbound_methods=true
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gen/openapi
    opt:
      # keep proto snake_case field names in the spec to match the gateway's
      # UseProtoNames=true marshaler (configured in internal/server/server.go).
      - json_names_for_fields=false
