name: Build and Deploy
# On every push to main (and manual dispatch) build the grown image from the
# root Dockerfile and push it to the Forgejo container registry. Flux's
# ImagePolicy "grown:grown" (in the gitops repo) then detects the newest
# YYYYMMDD-HHMMSS-<sha> tag and rolls it out — so push-to-main auto-deploys.
#
# Runs on the in-cluster Forgejo runner (label `docker`, which has a dind
# sidecar). Auth uses the automatic per-job token — no pre-created secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: docker
    permissions:
      contents: read
      packages: write
    env:
      # The image must be tagged for the public registry the cluster pulls from,
      # not the internal GITHUB_SERVER_URL the runner uses for git/API.
      REGISTRY: code.pick.haus
      IMAGE: code.pick.haus/grown/grown
    steps:
      - name: Diagnostics
        run: |
          set -x
          echo "actor=$GITHUB_ACTOR repo=$GITHUB_REPOSITORY ref=$GITHUB_REF_NAME"
          echo "server=$GITHUB_SERVER_URL sha=$GITHUB_SHA"
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
          ls -la /var/run/docker.sock 2>&1 || true
          (command -v git && git --version) || echo "NO git"
          (command -v docker && docker version) || echo "NO docker cli yet"

      - name: Ensure docker + git
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            (apt-get update -qq && apt-get install -y -qq docker.io git) \
              || (apk add --no-cache docker-cli git) || true
          fi
          docker version

      - name: Verify daemon + registry auth (fail fast)
        run: |
          docker info >/dev/null
          # The automatic job token can't write org-level packages; use the
          # org REGISTRY_USER/REGISTRY_TOKEN secrets (package:write on grown).
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "$REGISTRY" -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Checkout
        run: |
          git config --global --add safe.directory '*'
          host="${GITHUB_SERVER_URL#*://}"; scheme="${GITHUB_SERVER_URL%%://*}"
          # Full commit history (lazy blobs) so we can read each game's last
          # commit time for the "NEW" badge — a --depth 1 clone has only one
          # commit, which would stamp every game identically.
          git clone --filter=blob:none --branch "$GITHUB_REF_NAME" \
            "${scheme}://token:${{ github.token }}@${host}/${GITHUB_REPOSITORY}.git" src
          cd src && git rev-parse HEAD

      - name: Generate games-updated manifest
        run: |
          # Map each bundled game's id → the ISO-8601 timestamp of the last git
          # commit that touched its .html. Shipped at /games-updated.json (Vite
          # copies web/app/public/* to the dist root) and read by the
          # /api/v1/games/recent endpoint to drive the dynamic "NEW" badge.
          cd src
          OUT=web/app/public/games-updated.json
          {
            echo '{'
            first=1
            for f in web/app/public/games/*.html; do
              [ -e "$f" ] || continue
              id=$(basename "$f" .html)
              ts=$(git log -1 --format=%cI -- "$f" 2>/dev/null)
              [ -z "$ts" ] && continue
              if [ $first -eq 1 ]; then first=0; else echo ','; fi
              printf '  "%s": "%s"' "$id" "$ts"
            done
            echo
            echo '}'
          } > "$OUT"
          echo "generated $OUT:"; cat "$OUT"

      - name: Build and push
        run: |
          cd src
          VERSION="$(date -u +%Y%m%d-%H%M%S)-$(echo "$GITHUB_SHA" | cut -c1-8)"
          export DOCKER_BUILDKIT=1
          docker build \
            --build-arg VERSION="$VERSION" \
            --build-arg COMMIT="$GITHUB_SHA" \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
          echo "Pushed $IMAGE:$VERSION"
