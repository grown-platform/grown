name: Checks
# Test + build gate. Runs on every push to main and on pull requests (and via
# manual dispatch). Complements publish.yaml (which only builds/pushes the
# image): this surfaces failing Go tests, a broken frontend build, or invalid
# e2e specs BEFORE/independently of the image build.
#
# Runs on the in-cluster Forgejo runner (label `docker`). Each job uses a pinned
# toolchain container matching the Dockerfile (golang:1.25-alpine, node:22-alpine).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  go:
    runs-on: docker
    # Pin the exact patch so the image's Go matches go.mod's `go 1.25.7`, and
    # force GOTOOLCHAIN=local so the job never tries to download a toolchain at
    # runtime (a stale cached `golang:1.25-alpine` < 1.25.7 would otherwise
    # attempt that and fail).
    container:
      image: golang:1.25.7-alpine
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Tools
        run: apk add --no-cache git build-base

      - name: Checkout
        run: |
          git config --global --add safe.directory '*'
          host="${GITHUB_SERVER_URL#*://}"; scheme="${GITHUB_SERVER_URL%%://*}"
          git clone --filter=blob:none \
            "${scheme}://token:${{ github.token }}@${host}/${GITHUB_REPOSITORY}.git" src
          cd src && git checkout "$GITHUB_SHA" && git rev-parse HEAD

      - name: Generate protobuf code
        # gen/ (gRPC + grpc-gateway stubs) is gitignored and regenerated here,
        # exactly as the Dockerfile build stage does — otherwise packages that
        # import gen/go/... fail to compile.
        run: |
          cd src
          go install github.com/bufbuild/buf/cmd/buf@v1.64.0
          buf dep update && buf generate

      - name: go vet
        run: cd src && go vet ./...

      - name: go test
        # DB-backed tests are gated on GROWN_TEST_DSN (unset here) and skip
        # cleanly; the rest run as unit/integration tests.
        run: cd src && go test ./...

  frontend:
    runs-on: docker
    container:
      image: node:22-alpine
    steps:
      - name: Tools
        run: apk add --no-cache git

      - name: Checkout
        run: |
          git config --global --add safe.directory '*'
          host="${GITHUB_SERVER_URL#*://}"; scheme="${GITHUB_SERVER_URL%%://*}"
          git clone --filter=blob:none \
            "${scheme}://token:${{ github.token }}@${host}/${GITHUB_REPOSITORY}.git" src
          cd src && git checkout "$GITHUB_SHA" && git rev-parse HEAD

      - name: web app — install, typecheck+build, unit tests
        run: |
          cd src/web/app
          npm ci --no-fund --no-audit
          npm run build      # tsc -b && vite build
          npm test           # vitest run

      - name: e2e specs — validate (no running stack needed)
        run: |
          cd src/web/e2e
          npm ci --no-fund --no-audit
          npx playwright test --list
