<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pdf Signing Agent</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 320px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: #333;
        padding: 16px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e5e7eb;
      }
      .header img {
        width: 32px;
        height: 32px;
      }
      .header h1 {
        font-size: 16px;
        font-weight: 600;
      }
      .status {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .status.success {
        background: #dcfce7;
        color: #166534;
      }
      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }
      .status.warning {
        background: #fef3c7;
        color: #92400e;
      }
      .status-icon {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 8px;
      }
      .status.success .status-icon {
        background: #22c55e;
      }
      .status.error .status-icon {
        background: #ef4444;
      }
      .status.warning .status-icon {
        background: #f59e0b;
      }

      .certs-section {
        margin-top: 16px;
      }
      .certs-section h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .cert-card {
        padding: 12px;
        background: #f9fafb;
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .cert-card .name {
        font-weight: 500;
        margin-bottom: 4px;
      }
      .cert-card .details {
        font-size: 12px;
        color: #6b7280;
      }
      .no-certs {
        text-align: center;
        padding: 24px;
        color: #6b7280;
      }
      .loader {
        text-align: center;
        padding: 24px;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 8px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .btn {
        display: block;
        width: 100%;
        padding: 10px 16px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 12px;
      }
      .btn:hover {
        background: #2563eb;
      }
      .footer {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e5e7eb;
        font-size: 12px;
        color: #9ca3af;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icons/icon48.png" alt="Pdf" />
      <h1>Pdf Signing Agent</h1>
    </div>

    <div id="status-section"></div>
    <div id="certs-section"></div>
    <button id="refresh-btn" class="btn">Refresh Certificates</button>

    <div class="footer">Version 1.0.0 &middot; Grown</div>

    <script src="popup.js"></script>
  </body>
</html>
