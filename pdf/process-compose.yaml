version: "0.5"

log_level: info
log_location: ""

processes:
  # PostgreSQL database (port 5433 to avoid conflict with agility on 5442)
  postgres:
    command: |
      docker network create pdf-network 2>/dev/null || true
      mkdir -p .data/postgres
      docker run --rm --name pdf-postgres \
        --network pdf-network \
        -e POSTGRES_USER=pdf \
        -e POSTGRES_PASSWORD=pdf \
        -e POSTGRES_DB=pdf \
        -p 5433:5432 \
        -v $${PWD}/.data/postgres:/var/lib/postgresql \
        postgres:16-alpine
    readiness_probe:
      exec:
        command: "docker exec pdf-postgres pg_isready -U pdf"
      initial_delay_seconds: 2
      period_seconds: 2
      timeout_seconds: 5
      failure_threshold: 30
    shutdown:
      command: "docker stop pdf-postgres"
      timeout_seconds: 10

  # RustFS (S3-compatible storage) - port 9020/9021 to avoid conflict with agility
  rustfs:
    command: |
      mkdir -p .data/rustfs
      docker run --rm --name pdf-rustfs \
        --user "$$(id -u):$$(id -g)" \
        -e RUSTFS_ACCESS_KEY=pdf-access-key \
        -e RUSTFS_SECRET_KEY=pdf-secret-key \
        -p 9020:9000 \
        -p 9021:9001 \
        -v $${PWD}/.data/rustfs:/data \
        rustfs/rustfs:latest
    shutdown:
      command: "docker stop pdf-rustfs"
      timeout_seconds: 10

  # Create S3 bucket using curl to RustFS API
  rustfs-init:
    command: |
      echo "Waiting for RustFS to be ready..."
      for i in $$(seq 1 30); do
        if curl -sf http://localhost:9020/minio/health/live >/dev/null 2>&1; then
          echo "RustFS is ready!"
          break
        fi
        echo "  Attempt $$i/30: RustFS not ready yet, waiting 2s..."
        sleep 2
      done
      echo "Creating bucket pdf-documents..."
      curl -sf -X PUT http://localhost:9020/pdf-documents \
        -H "Authorization: AWS pdf-access-key:$$(echo -n 'PUT\n\n\n' | openssl sha1 -hmac pdf-secret-key -binary | base64)" \
        || echo "Bucket might already exist or will be created on first use"
    depends_on:
      rustfs:
        condition: process_started

  # Zitadel database
  zitadel-db:
    command: |
      mkdir -p .data/zitadel-db
      docker run --rm --name pdf-zitadel-db \
        --network pdf-network \
        -v $${PWD}/.data/zitadel-db:/var/lib/postgresql/data \
        -e POSTGRES_USER=postgres \
        -e POSTGRES_PASSWORD=zitadel \
        -e POSTGRES_DB=zitadel \
        postgres:17
    depends_on:
      postgres:
        condition: process_healthy
    readiness_probe:
      exec:
        command: docker exec pdf-zitadel-db pg_isready -U postgres -d zitadel
      initial_delay_seconds: 3
      period_seconds: 2
    shutdown:
      command: docker stop pdf-zitadel-db

  # Zitadel identity provider (port 8094 to avoid conflict with agility on 8091)
  zitadel:
    command: |
      # Source .env if exists
      if [ -f .env ]; then
        set -a
        source .env
        set +a
      fi

      # Create .zitadel directory
      mkdir -p .zitadel && chmod 777 .zitadel

      # Admin password for local dev
      ADMIN_PASSWORD="Admin123!"

      docker run --rm --name pdf-zitadel \
        --network pdf-network \
        -p 8094:8094 \
        -v $${PWD}/.zitadel:/zitadel-data \
        -e ZITADEL_DATABASE_POSTGRES_HOST=pdf-zitadel-db \
        -e ZITADEL_DATABASE_POSTGRES_PORT=5432 \
        -e ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel \
        -e ZITADEL_DATABASE_POSTGRES_USER_USERNAME=zitadel \
        -e ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=zitadel \
        -e ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE=disable \
        -e ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=postgres \
        -e ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=zitadel \
        -e ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE=disable \
        -e ZITADEL_EXTERNALSECURE=false \
        -e ZITADEL_EXTERNALPORT=8094 \
        -e ZITADEL_EXTERNALDOMAIN=localhost \
        -e ZITADEL_SYSTEMDEFAULTS_TRUSTEDDOMAINS_0=localhost \
        -e ZITADEL_TLS_ENABLED=false \
        -e ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME=admin \
        -e "ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD=$${ADMIN_PASSWORD}" \
        -e ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED=false \
        -e ZITADEL_FIRSTINSTANCE_PATPATH=/zitadel-data/admin.pat \
        -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME=pdf-admin \
        -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME=PdfAdminServiceAccount \
        -e ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE=2099-01-01T00:00:00Z \
        -e ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH=/zitadel-data/login-client.pat \
        -e ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME=login-client \
        -e ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME=LoginClientServiceAccount \
        -e ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE=2099-01-01T00:00:00Z \
        -e ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED=true \
        -e ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI=http://localhost:8097/ui/v2/login \
        -e ZITADEL_OIDC_DEFAULTLOGINURLV2=http://localhost:8097/ui/v2/login/login?authRequest= \
        -e ZITADEL_OIDC_DEFAULTLOGOUTURLV2=http://localhost:8097/ui/v2/login/logout?post_logout_redirect= \
        -e ZITADEL_SAML_DEFAULTLOGINURLV2=http://localhost:8097/ui/v2/login/login?samlRequest= \
        -e ZITADEL_MASTERKEY=MasterkeyNeedsToHave32Characters \
        ghcr.io/zitadel/zitadel:latest start-from-init \
        --masterkey MasterkeyNeedsToHave32Characters \
        --tlsMode disabled \
        --port 8094
    depends_on:
      zitadel-db:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 8094
        path: /debug/healthz
      initial_delay_seconds: 10
      period_seconds: 5
    shutdown:
      command: docker stop pdf-zitadel

  # Zitadel login UI (port 8097 to avoid conflict with agility on 8092)
  zitadel-login:
    command: |
      docker run --rm --name pdf-zitadel-login \
        --add-host=localhost:host-gateway \
        -p 8097:8097 \
        -v $${PWD}/.zitadel:/zitadel-data:ro \
        -e "ZITADEL_API_URL=http://localhost:8094" \
        -e NEXT_PUBLIC_BASE_PATH=/ui/v2/login \
        -e ZITADEL_SERVICE_USER_TOKEN_FILE=/zitadel-data/login-client.pat \
        -e PORT=8097 \
        ghcr.io/zitadel/zitadel-login:latest
    depends_on:
      zitadel:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: 8097
        path: /ui/v2/login
      initial_delay_seconds: 10
      period_seconds: 3
    shutdown:
      command: docker stop pdf-zitadel-login

  # Setup Zitadel OIDC app
  setup-zitadel:
    command: |
      export ZITADEL_URL=http://localhost:8094
      ./scripts/setup-zitadel.sh
    depends_on:
      zitadel-login:
        condition: process_healthy
    availability:
      restart: "no"

  # Backend server
  backend:
    command: |
      # Source credentials
      if [ -f .zitadel/credentials.env ]; then
        set -a
        source .zitadel/credentials.env
        set +a
      fi
      if [ -f .env ]; then
        set -a
        source .env
        set +a
      fi

      # Wait for OIDC client credentials
      echo "Waiting for OIDC client credentials..."
      for i in $$(seq 1 30); do
        if [ -f .zitadel/credentials.env ] && grep -q "PDF_AUTH_CLIENT_ID=" .zitadel/credentials.env; then
          echo "OIDC credentials found!"
          break
        fi
        echo "  Attempt $$i/30: Credentials not ready yet, waiting 2s..."
        sleep 2
      done
      if [ ! -f .zitadel/credentials.env ]; then
        echo "ERROR: OIDC credentials file not found after 60s"
        exit 1
      fi

      cd backend && go run ./cmd/server
    environment:
      # Database
      - PDF_DATABASE_URL=postgres://pdf:pdf@localhost:5433/pdf?sslmode=disable
      # Storage
      - PDF_STORAGE_ENDPOINT=http://localhost:9020
      - PDF_STORAGE_REGION=us-east-1
      - PDF_STORAGE_BUCKET=pdf-documents
      - PDF_STORAGE_ACCESS_KEY=pdf-access-key
      - PDF_STORAGE_SECRET_KEY=pdf-secret-key
      # Server
      - PDF_SERVER_HTTP_ADDR=:8085
      - PDF_SERVER_GRPC_ADDR=:50053
      # Auth - callback goes directly to backend to avoid vite proxy cookie issues
      - PDF_AUTH_ISSUER_URL=http://localhost:8094
      - PDF_AUTH_REDIRECT_URL=http://localhost:8085/auth/callback
      # Server frontend URL (for redirects after OAuth)
      - PDF_SERVER_FRONTEND_URL=http://localhost:5173
      # Crypto - Key Encryption Key for signing certificates
      - PDF_CRYPTO_KEY_ENCRYPTION_KEY=wWwDxAaMbc6w7gpizZI+mFi7vhL/U+HYhxjDyQyl598=
      # mTLS proxy mode - nginx handles TLS, backend reads X-SSL-Client-* headers
      - PDF_MTLS_PROXY_MODE=true
      - PDF_MTLS_VERIFY_MODE=optional
      # Email - only password needed, other Resend defaults are in config.go
      # Password is sourced from .env file in the command block
    depends_on:
      postgres:
        condition: process_healthy
      rustfs:
        condition: process_started
      rustfs-init:
        condition: process_completed
      zitadel:
        condition: process_healthy
      setup-zitadel:
        condition: process_completed_successfully
    readiness_probe:
      http_get:
        host: "localhost"
        port: 8085
        path: "/health"
      initial_delay_seconds: 5
      period_seconds: 2
      timeout_seconds: 5
      failure_threshold: 30

  # Seed development data (test document for signing)
  seed-data:
    command: |
      ./scripts/seed-dev-data.sh
    environment:
      - PDF_DATABASE_URL=postgres://pdf:pdf@localhost:5433/pdf?sslmode=disable
      - PDF_STORAGE_ENDPOINT=http://localhost:9020
      - PDF_STORAGE_BUCKET=pdf-documents
      - PDF_STORAGE_ACCESS_KEY=pdf-access-key
      - PDF_STORAGE_SECRET_KEY=pdf-secret-key
    depends_on:
      backend:
        condition: process_healthy
    availability:
      restart: "no"

  # Nginx reverse proxy for mTLS (HTTPS on 8443)
  nginx:
    command: |
      docker run --rm --name pdf-nginx \
        --network host \
        -v $${PWD}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
        -v $${PWD}/backend/certs:/etc/nginx/certs:ro \
        nginx:alpine
    depends_on:
      backend:
        condition: process_healthy
    shutdown:
      command: docker stop pdf-nginx

  # Frontend dev server
  frontend:
    command: |
      cd frontend && npm install && npm run dev
    depends_on:
      backend:
        condition: process_healthy
      seed-data:
        condition: process_completed
    environment:
      - VITE_API_URL=http://localhost:8085
