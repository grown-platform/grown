worker_processes 1;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    log_format mtls '$remote_addr - $ssl_client_verify - $ssl_client_s_dn - [$time_local] "$request" $status';
    access_log /dev/stdout mtls;

    upstream backend {
        server 127.0.0.1:8085;
    }

    # HTTPS server with mTLS (for client certificate authentication)
    server {
        listen 8443 ssl;
        server_name localhost;

        # Server certificate
        ssl_certificate /etc/nginx/certs/server.pem;
        ssl_certificate_key /etc/nginx/certs/server-key.pem;

        # Client certificate verification (optional_no_ca - accept any client cert without CA validation)
        ssl_client_certificate /etc/nginx/certs/client-ca.pem;
        ssl_verify_client optional_no_ca;
        ssl_verify_depth 2;

        # TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Pass client certificate info to backend
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
            proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
        }
    }
}
