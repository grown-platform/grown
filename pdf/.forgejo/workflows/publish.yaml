name: Build and Push
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: nix-arc
    steps:
      - name: Checkout
        run: |
          git config --global credential.helper '!f() { echo "username=token"; echo "password=${{ secrets.CLONE_TOKEN }}"; }; f'
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${{ github.server_url }}/${{ github.repository }}.git" .
      - name: Set version
        run: |
          echo "$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}" > version.txt
          echo "VERSION=$(cat version.txt)" >> "$GITHUB_ENV"
      - name: Build and push
        run: |
          REGISTRY=$(echo "${{ github.server_url }}" | sed 's|https\?://||')
          DEST="docker://${REGISTRY}/grown/pdf:${VERSION}"
          unset GH_TOKEN GITHUB_TOKEN
          nix run .#container.copyTo -- "$DEST" --dest-creds "forgejo_admin:${{ secrets.REGISTRY_PASSWORD }}" --dest-tls-verify=false
          echo "Pushed ${DEST#docker://}"
      - name: Push to Attic cache
        if: always()
        run: |
          OUT=$(nix build .#container --no-link --print-out-paths 2>/dev/null || true)
          if [ -n "$OUT" ]; then
            DRV=$(nix-store --query --deriver "$OUT")
            nix-store --query --requisites --include-outputs "$DRV" \
              | attic push pdf --stdin --jobs 10 \
              || true
          fi
