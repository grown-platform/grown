# Source: grown/templates/minio.yaml
# Bucket-init Job: waits for MinIO, then creates the grown bucket (+ pdf bucket).
apiVersion: batch/v1
kind: Job
metadata:
  name: grown-minio-init
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: minio-init
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grown
        app.kubernetes.io/instance: grown
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: grown-0.1.0
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              echo "waiting for minio S3 auth..."
              until mc alias set m http://grown-minio:9000 "$ACCESS" "$SECRET" 2>/dev/null; do sleep 3; done
              mc mb --ignore-existing m/grown-default
              echo "bucket grown-default ready"
              mc mb --ignore-existing m/pdf-docs
              echo "bucket pdf-docs ready"
          env:
            - name: ACCESS
              valueFrom:
                secretKeyRef: { name: grown-minio, key: MINIO_ROOT_USER }
            - name: SECRET
              valueFrom:
                secretKeyRef: { name: grown-minio, key: MINIO_ROOT_PASSWORD }
