metadata:
  name: grown-zitadel-provision
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: zitadel-provision
---
# Source: grown/templates/minio.yaml
# Bundled MinIO (S3-compatible object storage). grown's GROWN_RUSTFS_* point at
# the MinIO Service. A bucket-init Job (post-install hook) creates the buckets.
apiVersion: v1
kind: Secret
metadata:
  name: grown-minio
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: minio
type: Opaque
stringData:
  MINIO_ROOT_USER: "grown"
  MINIO_ROOT_PASSWORD: "DevPassword!1"
---
# Source: grown/templates/oidc-secret.yaml
# Bundled OIDC: seed a placeholder secret so grown's secretKeyRef resolves on
# first boot. The zitadel-provision Job overwrites client-id/client-secret with
# the real Zitadel-issued values once Zitadel is up. grown's readiness probe
# keeps the pod out of rotation until OIDC is actually configured.
#
# helm.sh/resource-policy keeps it from being clobbered on upgrade; the Job
# owns the real values.
apiVersion: v1
kind: Secret
metadata:
  name: grown-zitadel-secret
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: oidc
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  client-id: "CHANGE_ME"
  client-secret: "CHANGE_ME"
---
# Source: grown/templates/postgres.yaml
# Bundled Postgres — a plain StatefulSet (NOT CNPG, so no operator required).
# Creates the grown DB plus any postgres.extraDatabases (zitadel, pdf).
apiVersion: v1
kind: Secret
metadata:
  name: grown-postgres
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_USER: "grown"
  POSTGRES_PASSWORD: "DevPassword!1"
  POSTGRES_DB: "grown"
---
# Source: grown/templates/s3-secret.yaml
# S3 connection secret grown reads (mirrors the homelab grown-s3 secret shape).
apiVersion: v1
kind: Secret
metadata:
  name: grown-s3
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: s3
type: Opaque
stringData:
  endpoint: "http://grown-minio.grown.svc.cluster.local:9000"
  access_key: "grown"
  secret_key: "DevPassword!1"
  bucket: "grown-default"
---
# Source: grown/templates/zitadel.yaml
# Bundled Zitadel (OIDC provider). One Deployment running `start-from-init`,
# which runs init + setup (first-instance admin + bootstrap service account +
# PAT) and then starts the server. The bootstrap PAT is written to a shared
# emptyDir-backed file that the provisioning Job reads (see zitadel-provision).
#
# Zitadel uses the bundled Postgres `zitadel` database.
apiVersion: v1
kind: Secret
metadata:
  name: grown-zitadel-config
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: zitadel
type: Opaque
stringData:
  ZITADEL_MASTERKEY: "MasterkeyNeedsToHave32Characters"
  # Database wiring -> bundled Postgres.
  ZITADEL_DATABASE_POSTGRES_HOST: "grown-postgres.grown.svc.cluster.local"
  ZITADEL_DATABASE_POSTGRES_PORT: "5432"
  ZITADEL_DATABASE_POSTGRES_DATABASE: "zitadel"
  ZITADEL_DATABASE_POSTGRES_USER_USERNAME: "grown"
  ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "DevPassword!1"
  ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: "disable"
  ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: "grown"
  ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "DevPassword!1"
  ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: "disable"
  # External access config.
  ZITADEL_EXTERNALDOMAIN: "grown-zitadel.grown.svc.cluster.local"
  ZITADEL_EXTERNALPORT: "8080"
  ZITADEL_EXTERNALSECURE: "false"
  ZITADEL_TLS_ENABLED: "false"
  ZITADEL_PORT: "8080"
  # First-instance admin + machine bootstrap (env wins over steps merge).
  ZITADEL_FIRSTINSTANCE_PATPATH: "/shared/bootstrap-pat.txt"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: "admin"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: "Grown"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: "Admin"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: "admin@grown.localtest.me"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "DevPassword!1"
  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
  ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: "bootstrap"
  ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: "Bootstrap SA"
  ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
---
# Source: grown/templates/postgres.yaml
# Init script: creates extra databases owned by the grown user.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grown-postgres-init
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: postgres
data:
  init-extra-dbs.sh: |
    #!/bin/sh
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      SELECT 'CREATE DATABASE zitadel OWNER "'||current_user||'"'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'zitadel')\gexec
    EOSQL
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      SELECT 'CREATE DATABASE pdf OWNER "'||current_user||'"'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'pdf')\gexec
    EOSQL
