# Source: grown/templates/grown.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grown-grown
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: grown
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grown
      app.kubernetes.io/component: grown
      app.kubernetes.io/instance: grown
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grown
        app.kubernetes.io/instance: grown
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: grown-0.1.0
        app.kubernetes.io/component: grown
    spec:
      containers:
        - name: grown
          image: "code.pick.haus/grown/grown:20260613-150615-2d752d1c"
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 9000 }
          env:
            - name: GROWN_POSTGRES_DSN
              value: "postgres://grown:DevPassword!1@grown-postgres.grown.svc.cluster.local:5432/grown?sslmode=disable"
            # --- OIDC ---
            - name: GROWN_OIDC_ISSUER
              value: "http://grown-zitadel.grown.svc.cluster.local:8080"
            - name: GROWN_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grown-zitadel-secret
                  key: client-id
            - name: GROWN_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grown-zitadel-secret
                  key: client-secret
            - name: GROWN_OIDC_REDIRECT_URL
              value: "http://grown.example.com/api/v1/auth/callback"
            # --- session ---
            - name: GROWN_SESSION_COOKIE_NAME
              value: "grown_session"
            - name: GROWN_SESSION_COOKIE_SECURE
              value: "false"
            - name: GROWN_SESSION_COOKIE_DOMAIN
              value: "grown.example.com"
            - name: GROWN_SESSION_LIFETIME
              value: "168h"
            - name: GROWN_DEFAULT_ORG_SLUG
              value: "default"
            - name: GROWN_ADMIN_EMAILS
              value: "admin@grown.localtest.me"
            # In-app user management via the Zitadel User API (in-cluster).
            - name: GROWN_ZITADEL_API_URL
              value: "http://grown-zitadel.grown.svc.cluster.local:8080"
            # --- object storage (S3 / rustfs-compatible) ---
            - name: GROWN_RUSTFS_ENDPOINT
              valueFrom:
                secretKeyRef: { name: grown-s3, key: endpoint }
            - name: GROWN_RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: grown-s3, key: access_key }
            - name: GROWN_RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: grown-s3, key: secret_key }
            - name: GROWN_RUSTFS_BUCKET
              valueFrom:
                secretKeyRef: { name: grown-s3, key: bucket }
            # --- PDF signing app (built in-process) ---
            - name: GROWN_PDF_BUILTIN
              value: "true"
            - name: PDF_DATABASE_URL
              value: "postgres://grown:DevPassword!1@grown-postgres.grown.svc.cluster.local:5432/pdf?sslmode=disable"
            - name: PDF_STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef: { name: grown-s3, key: endpoint }
            - name: PDF_STORAGE_BUCKET
              value: "pdf-docs"
            - name: PDF_STORAGE_REGION
              value: "us-east-1"
            - name: PDF_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: grown-s3, key: access_key }
            - name: PDF_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: grown-s3, key: secret_key }
            - name: PDF_CRYPTO_KEY_ENCRYPTION_KEY
              value: "wWwDxAaMbc6w7gpizZI+mFi7vhL/U+HYhxjDyQyl598="
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
