# Source: grown/templates/zitadel.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grown-zitadel
  labels:
    app.kubernetes.io/name: grown
    app.kubernetes.io/instance: grown
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: grown-0.1.0
    app.kubernetes.io/component: zitadel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grown
      app.kubernetes.io/component: zitadel
      app.kubernetes.io/instance: grown
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grown
        app.kubernetes.io/instance: grown
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: grown-0.1.0
        app.kubernetes.io/component: zitadel
    spec:
      initContainers:
        # Wait for Postgres to accept connections before init.
        - name: wait-for-postgres
          image: "postgres:17.2-alpine"
          command:
            - sh
            - -c
            - |
              until pg_isready -h grown-postgres.grown.svc.cluster.local -p 5432 -U grown; do
                echo "waiting for postgres..."; sleep 3
              done
      containers:
        - name: zitadel
          image: "ghcr.io/zitadel/zitadel:v2.71.0"
          imagePullPolicy: IfNotPresent
          args:
            - start-from-init
            - --masterkeyFromEnv
            - --tlsMode
            - disabled
          envFrom:
            - secretRef:
                name: grown-zitadel-config
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: shared
              mountPath: /shared
          readinessProbe:
            httpGet: { path: /debug/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet: { path: /debug/healthz, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        # Shared between the zitadel container and the provisioning Job via a
        # PVC so the bootstrap PAT survives and is readable cross-pod.
        - name: shared
          persistentVolumeClaim:
            claimName: grown-zitadel-shared
---
