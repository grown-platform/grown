# REFERENCE — how to publicly route https://guac.pick.haus/ to the in-cluster
# Guacamole gateway (Service guacamole.grown.svc.cluster.local:8080, ns grown).
#
# IMPORTANT: this cloudflared tunnel is REMOTELY-MANAGED. cloudflared pulls its
# ingress config from the Cloudflare API ("Updated to new configuration
# version=N" in its logs) and IGNORES the local config.yaml ConfigMap in ns
# network. So the route must be added in Cloudflare, NOT in the ConfigMap/gitops.
#
# Two parts:
#
# 1. DNS — DONE: a proxied CNAME guac.pick.haus -> <tunnel-id>.cfargotunnel.com
#    was created via the Cloudflare API (tunnel d8f930ef-73c0-4283-bd8a-d9180e8f9ed0).
#
# 2. Tunnel public hostname — TODO (needs a "Cloudflare Tunnel: Edit" token or the
#    dashboard; the in-cluster DNS token can't do it):
#
#    Dashboard: Zero Trust → Networks → Tunnels → <the tunnel> → Public Hostnames
#      → Add a public hostname:
#         Subdomain: guac   Domain: pick.haus
#         Service:   HTTP   URL: guacamole.grown.svc.cluster.local:8080
#
#    Or via API (PUT the tunnel configuration with the extra ingress rule):
#      PUT https://api.cloudflare.com/client/v4/accounts/<acct>/cfd_tunnel/<tunnel>/configurations
#      adding: { "hostname": "guac.pick.haus",
#                "service": "http://guacamole.grown.svc.cluster.local:8080" }
#      before the catch-all { "service": "http_status:503" }.
#
# After that, https://guac.pick.haus/ reaches Guacamole. Then switch guacadmin →
# SSO (deploy/guacamole/30-guacamole.yaml + the Zitadel client) and set
# GROWN_GUAC_URL on the grown deployment for the Access-page button.
