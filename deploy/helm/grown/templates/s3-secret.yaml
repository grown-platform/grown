# S3 connection secret grown reads (mirrors the homelab grown-s3 secret shape).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-s3
  labels:
    {{- include "grown.labels" . | nindent 4 }}
    app.kubernetes.io/component: s3
type: Opaque
stringData:
  endpoint: {{ include "grown.s3Endpoint" . | quote }}
  access_key: {{ .Values.minio.accessKey | quote }}
  secret_key: {{ .Values.minio.secretKey | quote }}
  bucket: {{ .Values.minio.bucket | quote }}
