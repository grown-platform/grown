{{- if eq .Values.auth.mode "external" }}
# External OIDC: the chart materializes the client secret from values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.clientSecretName }}
  labels:
    {{- include "grown.labels" . | nindent 4 }}
    app.kubernetes.io/component: oidc
type: Opaque
stringData:
  client-id: {{ .Values.auth.external.clientId | quote }}
  client-secret: {{ .Values.auth.external.clientSecret | quote }}
{{- else }}
# Bundled OIDC: seed a placeholder secret so grown's secretKeyRef resolves on
# first boot. The zitadel-provision Job overwrites client-id/client-secret with
# the real Zitadel-issued values once Zitadel is up. grown's readiness probe
# keeps the pod out of rotation until OIDC is actually configured.
#
# helm.sh/resource-policy keeps it from being clobbered on upgrade; the Job
# owns the real values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.clientSecretName }}
  labels:
    {{- include "grown.labels" . | nindent 4 }}
    app.kubernetes.io/component: oidc
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  client-id: "CHANGE_ME"
  client-secret: "CHANGE_ME"
{{- end }}
