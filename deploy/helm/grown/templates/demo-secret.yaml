{{- if or .Values.grown.demo.password .Values.zitadel.serviceToken .Values.grown.forgejoAdminToken }}
# Secret backing the one-click demo login + grown's Zitadel service token.
#   GROWN_DEMO_PASSWORD       - the demo account's Zitadel password (not read by
#                               grown, kept here for completeness/rotation).
#   GROWN_ZITADEL_SERVICE_TOKEN - PAT grown uses to call the Zitadel user API
#                               (required for demo login + in-app password login).
# Only created when at least one of the values is set, so non-demo deployments
# carry no extra secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-demo
  labels:
    {{- include "grown.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo
type: Opaque
stringData:
  {{- if .Values.grown.demo.password }}
  GROWN_DEMO_PASSWORD: {{ .Values.grown.demo.password | quote }}
  {{- end }}
  {{- if .Values.zitadel.serviceToken }}
  GROWN_ZITADEL_SERVICE_TOKEN: {{ .Values.zitadel.serviceToken | quote }}
  {{- end }}
  {{- if .Values.grown.forgejoAdminToken }}
  GROWN_FORGEJO_ADMIN_TOKEN: {{ .Values.grown.forgejoAdminToken | quote }}
  {{- end }}
{{- end }}
